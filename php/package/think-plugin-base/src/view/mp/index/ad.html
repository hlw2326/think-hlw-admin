<form action="{:sysuri()}" method="post" data-auto="true" class="layui-form layui-card" data-table-id="AppTable">
    <div class="layui-card-body padding-left-40">

        <!-- 全局与免广告设置 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">全局广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="ad_global_enabled" type="radio" value="1" lay-ignore {eq name='$vo.ad_global_enabled|default="1"' value='1'}checked{/eq}> 开启</label>
                        <label class="think-radio"><input name="ad_global_enabled" type="radio" value="0" lay-ignore {eq name='$vo.ad_global_enabled|default="1"' value='0'}checked{/eq}> 关闭</label>
                    </div>
                    <p class="help-block">控制小程序所有广告的整体显示状态</p>
                </div>
            </div>
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">VIP 免广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="vip_no_ad" type="radio" value="1" lay-ignore {if !empty($vo.vip_no_ad)}checked{/if}> 开启</label>
                        <label class="think-radio"><input name="vip_no_ad" type="radio" value="0" lay-ignore {if empty($vo.vip_no_ad)}checked{/if}> 关闭</label>
                    </div>
                    <p class="help-block">开启后，VIP 会员用户将不会看到 any 广告</p>
                </div>
            </div>
        </div>

        <!-- 横幅广告 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">横幅广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="ad_enabled_banner" type="radio" value="1" lay-ignore {eq name='$vo.ad_enabled_banner|default="1"' value='1'}checked{/eq}> 开启</label>
                        <label class="think-radio"><input name="ad_enabled_banner" type="radio" value="0" lay-ignore {eq name='$vo.ad_enabled_banner|default="1"' value='0'}checked{/eq}> 关闭</label>
                    </div>
                    <p class="help-block">是否开启横幅广告</p>
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-item relative block">
                    <span class="color-green font-w7">横幅广告 Unit ID</span>
                    <input name="banner_unit_id" value="{$vo.banner_unit_id|default=''}" placeholder="请输入广告 Unit ID" class="layui-input">
                    <p class="help-block">微信小程序横幅广告单元 ID (banner_unit_id)</p>
                </label>
            </div>
        </div>

        <!-- 格子广告 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">格子广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="ad_enabled_grid" type="radio" value="1" lay-ignore {eq name='$vo.ad_enabled_grid|default="1"' value='1'}checked{/eq}> 开启</label>
                        <label class="think-radio"><input name="ad_enabled_grid" type="radio" value="0" lay-ignore {eq name='$vo.ad_enabled_grid|default="1"' value='0'}checked{/eq}> 关闭</label>
                    </div>
                    <p class="help-block">是否开启格子广告</p>
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-item relative block">
                    <span class="color-green font-w7">格子广告 Unit ID</span>
                    <input name="grid_unit_id" value="{$vo.grid_unit_id|default=''}" placeholder="请输入广告 Unit ID" class="layui-input">
                    <p class="help-block">微信小程序格子广告单元 ID (grid_unit_id)</p>
                </label>
            </div>
        </div>

        <!-- 原生模板广告 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">原生模板广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="ad_enabled_custom" type="radio" value="1" lay-ignore {eq name='$vo.ad_enabled_custom|default="1"' value='1'}checked{/eq}> 开启</label>
                        <label class="think-radio"><input name="ad_enabled_custom" type="radio" value="0" lay-ignore {eq name='$vo.ad_enabled_custom|default="1"' value='0'}checked{/eq}> 关闭</label>
                    </div>
                    <p class="help-block">是否开启原生模板广告</p>
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-item relative block">
                    <span class="color-green font-w7">原生模板广告 Unit ID</span>
                    <input name="custom_unit_id" value="{$vo.custom_unit_id|default=''}" placeholder="请输入广告 Unit ID" class="layui-input">
                    <p class="help-block">微信小程序自定义/原生模板广告单元 ID (custom_unit_id)</p>
                </label>
            </div>
        </div>

        <!-- 视频贴片广告 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">视频贴片广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="ad_enabled_video" type="radio" value="1" lay-ignore {eq name='$vo.ad_enabled_video|default="1"' value='1'}checked{/eq}> 开启</label>
                        <label class="think-radio"><input name="ad_enabled_video" type="radio" value="0" lay-ignore {eq name='$vo.ad_enabled_video|default="1"' value='0'}checked{/eq}> 关闭</label>
                    </div>
                    <p class="help-block">是否开启视频贴片广告</p>
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-item relative block">
                    <span class="color-green font-w7">视频贴片广告 Unit ID</span>
                    <input name="video_unit_id" value="{$vo.video_unit_id|default=''}" placeholder="请输入广告 Unit ID" class="layui-input">
                    <p class="help-block">微信小程序前贴片/视频广告单元 ID (video_unit_id)</p>
                </label>
            </div>
        </div>

        <!-- 激励视频广告 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">激励视频广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="ad_enabled_reward" type="radio" value="1" lay-ignore {eq name='$vo.ad_enabled_reward|default="1"' value='1'}checked{/eq}> 开启</label>
                        <label class="think-radio"><input name="ad_enabled_reward" type="radio" value="0" lay-ignore {eq name='$vo.ad_enabled_reward|default="1"' value='0'}checked{/eq}> 关闭</label>
                    </div>
                    <p class="help-block">是否开启激励视频广告</p>
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-item relative block">
                    <span class="color-green font-w7">激励视频广告 Unit ID</span>
                    <input name="reward_unit_id" value="{$vo.reward_unit_id|default=''}" placeholder="请输入广告 Unit ID" class="layui-input">
                    <p class="help-block">微信小程序激励视频广告单元 ID (reward_unit_id)</p>
                </label>
            </div>
        </div>

        <!-- 插屏广告 -->
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md6">
                <div class="layui-form-item relative block">
                    <span class="color-green font-w7">插屏广告</span>
                    <div class="layui-textarea help-checks">
                        <label class="think-radio"><input name="ad_enabled_popup" type="radio" value="1" lay-ignore {eq name='$vo.ad_enabled_popup|default="1"' value='1'}checked{/eq}> 开启</label>
                        <label class="think-radio"><input name="ad_enabled_popup" type="radio" value="0" lay-ignore {eq name='$vo.ad_enabled_popup|default="1"' value='0'}checked{/eq}> 关闭</label>
                    </div>
                    <p class="help-block">是否开启插屏广告</p>
                </div>
            </div>
            <div class="layui-col-md6">
                <label class="layui-form-item relative block">
                    <span class="color-green font-w7">插屏广告 Unit ID</span>
                    <input name="popup_unit_id" value="{$vo.popup_unit_id|default=''}" placeholder="请输入广告 Unit ID" class="layui-input">
                    <p class="help-block">微信小程序插屏广告单元 ID (popup_unit_id)</p>
                </label>
            </div>
        </div>

    </div>
    <div class="hr-line-dashed"></div>
    <input type="hidden" value="{$vo.id}" name="id">
    <div class="layui-form-item text-center">
        <button class="layui-btn" type="submit">保存广告配置</button>
        <button class="layui-btn layui-btn-danger" type="button" data-close>取消操作</button>
    </div>
</form>
