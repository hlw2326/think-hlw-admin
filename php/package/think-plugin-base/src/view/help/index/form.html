<form action="{:sysuri()}" method="post" data-auto="true" class="layui-form layui-card" data-table-id="HelpTable">
    <div class="layui-card-body">
        
        <div class="layui-form-item">
            <label class="layui-form-label">排序权重</label>
            <div class="layui-input-block">
                <input name="sort" value="{$vo.sort|default='0'}" class="layui-input" type="number">
                <p class="help-block"><b>可选</b>，设置该常见问题排序，数字越小排序越靠前</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label label-required-next">显示状态</label>
            <div class="layui-input-block">
                <select name="status" class="layui-select">
                    <option value="1" {eq name='$vo.status|default="1"' value='1'}selected{/eq}>已启用</option>
                    <option value="0" {eq name='$vo.status|default="1"' value='0'}selected{/eq}>已禁用</option>
                </select>
                <p class="help-block"><b>必选</b>，请选择是否启用该常见问题的展示状态</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label label-required-next">问题标题</label>
            <div class="layui-input-block">
                <input name="question" value="{$vo.question|default=''}" required vali-name="问题" placeholder="请输入问题标题" class="layui-input">
                <p class="help-block"><b>必填</b>，请输入常见问题的具体问题内容</p>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">问题答案</label>
            <div class="layui-input-block">
                <textarea name="answer" placeholder="请输入答案内容" class="layui-textarea">{$vo.answer|default=''}</textarea>
                <p class="help-block"><b>可选</b>，支持占位符：{day_parse_count}、{reward_parse_count}，小程序端会按当前配置替换。</p>
            </div>
        </div>

    </div>
    <div class="hr-line-dashed"></div>
    {notempty name='vo.id'}<input type="hidden" value="{$vo.id}" name="id">{/notempty}
    <input type="hidden" value="faq" name="type">
    <div class="layui-form-item text-center">
        <button class="layui-btn" type="submit">保存数据</button>
        <button class="layui-btn layui-btn-danger" type="button" data-close>取消操作</button>
    </div>
</form>
