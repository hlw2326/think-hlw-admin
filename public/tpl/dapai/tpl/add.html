<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>创建规则 - 打牌计分</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
            'glow-indigo': '0 0 20px rgba(99, 102, 241, 0.4)',
            'card': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F6F8FC;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 120px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    .bento-card {
      background: #ffffff;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }

    .dark-glass {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .noise-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.3;
      pointer-events: none;
    }

    .nav-float {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
      border-top: 1px solid rgba(0,0,0,0.03);
    }

    /* 自定义开关样式 */
    .switch-checkbox:checked + .switch-label {
      background-color: #4f46e5;
    }
    .switch-checkbox:checked + .switch-label .switch-dot {
      transform: translateX(1.5rem);
    }

    /* 输入框焦点效果 */
    .input-focus-effect {
      transition: all 0.3s ease;
      border: 1.5px solid transparent;
    }
    .input-focus-effect:focus {
      border-color: #6366f1;
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .category-chip.active {
      background-color: #6366f1;
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-indigo-100">

<!-- 背景光晕 -->
<div class="fixed top-0 w-full max-w-md h-96 -z-10 pointer-events-none overflow-hidden">
  <div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float"></div>
  <div class="absolute bottom-0 left-[-50px] w-72 h-72 bg-purple-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float" style="animation-delay: 3s"></div>
</div>

<!-- 顶部导航 -->
<header class="w-full max-w-md flex justify-between items-center px-6 pt-8 pb-6 z-50">
  <div class="flex items-center gap-4">
    <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
      <i class="fa-solid fa-chevron-left text-sm"></i>
    </button>
    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">自定义规则</h1>
  </div>
  <span class="text-[10px] font-bold text-indigo-500 bg-indigo-50 px-3 py-1.5 rounded-full uppercase tracking-wider">Step 1/1</span>
</header>

<main class="w-full max-w-md px-5 flex flex-col gap-5">

  <!-- 1. 基础信息卡片 -->
  <section class="animate-slide-up">
    <div class="bento-card p-6">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 block">游戏名称</label>
      <input type="text" placeholder="例如：老家麻将、周五斗地主..."
             class="w-full bg-slate-50 border-none rounded-2xl py-4 px-5 text-base font-semibold input-focus-effect outline-none">

      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-6 mb-3 block">游戏类型</label>
      <div class="flex flex-wrap gap-2">
        <button class="category-chip active px-4 py-2 rounded-xl text-xs font-bold transition-all">扑克</button>
        <button class="category-chip bg-white border border-slate-100 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold transition-all">麻将</button>
        <button class="category-chip bg-white border border-slate-100 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold transition-all">桌游</button>
        <button class="category-chip bg-white border border-slate-100 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold transition-all">其他</button>
      </div>
    </div>
  </section>

  <!-- 2. 人数控制 (Dark Glass) -->
  <section class="animate-slide-up" style="animation-delay: 0.1s">
    <div class="dark-glass rounded-[2rem] p-6 shadow-xl relative">
      <div class="noise-bg"></div>
      <div class="relative z-10 flex justify-between items-center">
        <div>
          <h3 class="text-lg font-bold text-white">默认人数</h3>
          <p class="text-slate-400 text-[10px]">游戏中参与计分的玩家数量</p>
        </div>
        <div class="flex items-center gap-4 bg-white/10 p-2 rounded-2xl backdrop-blur-md">
          <button onclick="changeValue('player-count', -1)" class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center text-white active:bg-white/20">-</button>
          <span id="player-count" class="text-xl font-bold w-4 text-center">3</span>
          <button onclick="changeValue('player-count', 1)" class="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center text-white active:bg-indigo-400 shadow-lg shadow-indigo-500/30">+</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 3. 计分逻辑配置 Grid -->
  <div class="grid grid-cols-2 gap-4 animate-slide-up" style="animation-delay: 0.2s">
    <div class="bento-card p-5">
      <div class="w-8 h-8 rounded-lg bg-amber-50 text-amber-500 flex items-center justify-center mb-3">
        <i class="fa-solid fa-coins text-xs"></i>
      </div>
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">基础分</label>
      <div class="flex items-baseline gap-1">
        <input type="number" value="1" class="w-full bg-transparent border-none text-2xl font-black text-slate-800 outline-none p-0 focus:ring-0">
        <span class="text-xs text-slate-400 font-bold">分</span>
      </div>
    </div>

    <div class="bento-card p-5">
      <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center mb-3">
        <i class="fa-solid fa-arrow-up-9-1 text-xs"></i>
      </div>
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">分值封顶</label>
      <div class="flex items-baseline gap-1">
        <input type="number" placeholder="无" class="w-full bg-transparent border-none text-2xl font-black text-slate-800 outline-none p-0 focus:ring-0 placeholder:text-slate-200 placeholder:text-lg">
      </div>
    </div>
  </div>

  <!-- 4. 高级开关列表 -->
  <section class="animate-slide-up" style="animation-delay: 0.3s">
    <div class="bento-card p-2 overflow-hidden">
      <!-- Item 1 -->
      <div class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center">
            <i class="fa-solid fa-bomb text-sm"></i>
          </div>
          <div>
            <span class="font-bold text-slate-700 block text-sm">炸弹翻倍</span>
            <span class="text-[10px] text-slate-400">每出现一个炸弹分值 x2</span>
          </div>
        </div>
        <div class="relative inline-block w-10 align-middle select-none">
          <input type="checkbox" name="toggle1" id="toggle1" class="switch-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-slate-200 appearance-none cursor-pointer transition-all duration-300 left-0 top-0 m-1 checked:border-transparent z-10" checked/>
          <label for="toggle1" class="switch-label block overflow-hidden h-6 rounded-full bg-slate-200 cursor-pointer transition-colors duration-300"></label>
          <span class="switch-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300 pointer-events-none"></span>
        </div>
      </div>

      <div class="h-[1px] bg-slate-50 mx-4"></div>

      <!-- Item 2 -->
      <div class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-purple-50 text-purple-500 flex items-center justify-center">
            <i class="fa-solid fa-crown text-sm"></i>
          </div>
          <div>
            <span class="font-bold text-slate-700 block text-sm">春天翻倍</span>
            <span class="text-[10px] text-slate-400">一方全出完而另一方未出牌</span>
          </div>
        </div>
        <div class="relative inline-block w-10 align-middle select-none">
          <input type="checkbox" name="toggle2" id="toggle2" class="switch-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-slate-200 appearance-none cursor-pointer transition-all duration-300 left-0 top-0 m-1 checked:border-transparent z-10"/>
          <label for="toggle2" class="switch-label block overflow-hidden h-6 rounded-full bg-slate-200 cursor-pointer transition-colors duration-300"></label>
          <span class="switch-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300 pointer-events-none"></span>
        </div>
      </div>

      <div class="h-[1px] bg-slate-50 mx-4"></div>

      <!-- Item 3 -->
      <div class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center">
            <i class="fa-solid fa-rotate text-sm"></i>
          </div>
          <div>
            <span class="font-bold text-slate-700 block text-sm">自动轮转</span>
            <span class="text-[10px] text-slate-400">每一局结束后自动轮换地主/庄家</span>
          </div>
        </div>
        <div class="relative inline-block w-10 align-middle select-none">
          <input type="checkbox" name="toggle3" id="toggle3" class="switch-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-slate-200 appearance-none cursor-pointer transition-all duration-300 left-0 top-0 m-1 checked:border-transparent z-10" checked/>
          <label for="toggle3" class="switch-label block overflow-hidden h-6 rounded-full bg-slate-200 cursor-pointer transition-colors duration-300"></label>
          <span class="switch-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300 pointer-events-none"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- 提示信息 -->
  <p class="text-center text-[10px] text-slate-300 px-10 leading-relaxed">
    创建后的规则将保存在您的本地库中，您可以随时在“计分模板”页面进行修改或分享给好友。
  </p>

</main>

<!-- 底部固定保存按钮 -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-md px-6 z-50">
  <button onclick="saveRule()" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-bold text-lg shadow-2xl shadow-indigo-300 active:scale-95 transition-all flex items-center justify-center gap-3">
    <span>完成并创建</span>
    <i class="fa-solid fa-arrow-right-long text-sm opacity-70"></i>
  </button>
</div>

<script>
  function changeValue(id, delta) {
    const el = document.getElementById(id);
    let val = parseInt(el.innerText);
    val = Math.max(1, Math.min(10, val + delta)); // 限制1-10人
    el.innerText = val;

    // 简单的触感反馈模拟
    if(window.navigator.vibrate) window.navigator.vibrate(10);
  }

  function saveRule() {
    // 这里可以添加保存逻辑
    const btn = event.currentTarget;
    const originalContent = btn.innerHTML;

    btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 正在保存...';
    btn.disabled = true;

    setTimeout(() => {
      btn.innerHTML = '<i class="fa-solid fa-check"></i> 已成功创建';
      btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
      btn.classList.replace('shadow-indigo-300', 'shadow-emerald-200');

      setTimeout(() => {
        window.history.back();
      }, 1000);
    }, 1500);
  }

  // 分类点击切换
  const chips = document.querySelectorAll('.category-chip');
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => {
        c.classList.remove('active', 'bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/30');
        c.classList.add('bg-white', 'border', 'border-slate-100', 'text-slate-500');
      });
      chip.classList.remove('bg-white', 'border', 'border-slate-100', 'text-slate-500');
      chip.classList.add('active', 'bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/30');
    });
  });
</script>

</body>
</html>
