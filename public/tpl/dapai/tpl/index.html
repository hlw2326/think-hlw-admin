<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打牌计分 - 计分模板</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
            'glow-indigo': '0 0 20px rgba(99, 102, 241, 0.3)',
            'card': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'pulse-soft': 'pulseSoft 2s infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.7' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F6F8FC;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 120px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    .bento-card {
      background: #ffffff;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .bento-card:active { transform: scale(0.96); }

    .dark-glass {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .noise-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.3;
      pointer-events: none;
    }

    .nav-float {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
      border-top: 1px solid rgba(0,0,0,0.03);
    }

    .tag-blue { @apply bg-blue-50 text-blue-600; }
    .tag-purple { @apply bg-purple-50 text-purple-600; }
    .tag-amber { @apply bg-amber-50 text-amber-600; }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-indigo-100">

<!-- 背景光晕 -->
<div class="fixed top-0 w-full max-w-md h-96 -z-10 pointer-events-none overflow-hidden">
  <div class="absolute top-[-50px] left-[-50px] w-64 h-64 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float"></div>
  <div class="absolute bottom-0 right-[-50px] w-72 h-72 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float" style="animation-delay: 3s"></div>
</div>

<!-- 顶部导航 -->
<header class="w-full max-w-md flex justify-between items-center px-6 pt-8 pb-4 z-50">
  <div class="flex items-center gap-4">
    <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
      <i class="fa-solid fa-arrow-left text-sm"></i>
    </button>
    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">计分模板</h1>
  </div>
  <button onclick="alert('新建自定义模板')" class="w-10 h-10 rounded-full bg-indigo-600 shadow-lg shadow-indigo-200 flex items-center justify-center text-white active:scale-90 transition-transform">
    <i class="fa-solid fa-plus"></i>
  </button>
</header>

<main class="w-full max-w-md px-5 flex flex-col gap-6">

  <!-- 搜索栏 -->
  <div class="relative animate-slide-up">
    <input type="text" placeholder="搜索游戏模板..." class="w-full bg-white border-none rounded-2xl py-4 pl-12 pr-4 shadow-sm focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm">
    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
  </div>

  <!-- 1. 推荐/常用模板 (Dark Glass Style) -->
  <section class="animate-slide-up" style="animation-delay: 0.1s">
    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">最近使用</h2>
      <span class="text-[10px] text-indigo-500 font-bold">查看全部</span>
    </div>

    <div onclick="alert('加载：经典斗地主')" class="dark-glass rounded-[2rem] p-6 shadow-2xl shadow-indigo-900/10 relative cursor-pointer group">
      <div class="noise-bg"></div>
      <div class="relative z-10">
        <div class="flex justify-between items-start mb-6">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xl shadow-lg shadow-indigo-500/30">
            <i class="fa-solid fa-clover text-white"></i>
          </div>
          <div class="bg-white/10 backdrop-blur-md px-3 py-1 rounded-full border border-white/10 flex items-center gap-2">
            <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse-soft"></span>
            <span class="text-[10px] font-bold text-white/90">最常玩</span>
          </div>
        </div>

        <h3 class="text-xl font-bold text-white mb-1">经典斗地主</h3>
        <p class="text-slate-400 text-xs mb-4">3人局 • 基础分1分 • 炸弹翻倍 • 封顶设置</p>

        <div class="flex items-center gap-3">
          <div class="flex -space-x-2">
            <img src="https://ui-avatars.com/api/?name=A&background=random" class="w-6 h-6 rounded-full border-2 border-[#0f172a]">
            <img src="https://ui-avatars.com/api/?name=B&background=random" class="w-6 h-6 rounded-full border-2 border-[#0f172a]">
            <img src="https://ui-avatars.com/api/?name=C&background=random" class="w-6 h-6 rounded-full border-2 border-[#0f172a]">
          </div>
          <span class="text-[10px] text-slate-500">等3位常用牌友已就绪</span>
        </div>
      </div>
      <!-- 装饰背景 -->
      <div class="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-110 transition-transform duration-700">
        <i class="fa-solid fa-dice-five text-8xl text-white"></i>
      </div>
    </div>
  </section>

  <!-- 2. 分类模板 Bento Grid -->
  <section class="animate-slide-up" style="animation-delay: 0.2s">
    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">模板库</h2>
    </div>

    <div class="grid grid-cols-2 gap-4">

      <!-- 卡项 1: 麻将系列 -->
      <div onclick="alert('进入麻将模板库')" class="bento-card p-5 relative overflow-hidden group cursor-pointer">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center mb-3 group-hover:bg-emerald-500 group-hover:text-white transition-all duration-300">
          <i class="fa-solid fa-layer-group text-sm"></i>
        </div>
        <h3 class="font-bold text-slate-800 text-sm">四川麻将</h3>
        <p class="text-[10px] text-slate-400 mt-1">血战到底 / 血流成河</p>
        <div class="absolute -right-2 -bottom-2 opacity-5 group-hover:opacity-10 transition-opacity">
          <i class="fa-solid fa-table-cells text-6xl"></i>
        </div>
      </div>

      <!-- 卡项 2: 扑克系列 -->
      <div onclick="alert('进入扑克模板库')" class="bento-card p-5 relative overflow-hidden group cursor-pointer">
        <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center mb-3 group-hover:bg-blue-500 group-hover:text-white transition-all duration-300">
          <i class="fa-solid fa-spade text-sm"></i>
        </div>
        <h3 class="font-bold text-slate-800 text-sm">德州扑克</h3>
        <p class="text-[10px] text-slate-400 mt-1">SNG / MTT / 现金桌</p>
        <div class="absolute -right-2 -bottom-2 opacity-5 group-hover:opacity-10 transition-opacity">
          <i class="fa-solid fa-heart text-6xl"></i>
        </div>
      </div>

      <!-- 卡项 3: 掼蛋/跑得快 -->
      <div onclick="alert('进入地方棋牌')" class="bento-card p-5 col-span-2 flex items-center gap-5 relative overflow-hidden group cursor-pointer">
        <div class="w-12 h-12 rounded-2xl bg-amber-50 text-amber-600 flex items-center justify-center text-xl group-hover:bg-amber-500 group-hover:text-white transition-all duration-300">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <div class="flex-1">
          <h3 class="font-bold text-slate-800">地方棋牌专区</h3>
          <p class="text-xs text-slate-400 mt-0.5">掼蛋、跑得快、锄大地等</p>
        </div>
        <div class="bg-amber-100 text-amber-700 text-[9px] font-black px-2 py-1 rounded-md">8+ 模板</div>
        <i class="fa-solid fa-chevron-right text-slate-200 group-hover:translate-x-1 transition-transform"></i>
      </div>

      <!-- 卡项 4: 自定义 -->
      <div onclick="alert('从空白开始创建')" class="bento-card p-5 border-dashed border-2 border-slate-200 bg-slate-50/50 flex flex-col items-center justify-center py-8 group cursor-pointer">
        <div class="w-10 h-10 rounded-full border border-slate-300 flex items-center justify-center text-slate-400 group-hover:border-indigo-500 group-hover:text-indigo-500 transition-all mb-2">
          <i class="fa-solid fa-plus text-xs"></i>
        </div>
        <span class="text-xs font-bold text-slate-400 group-hover:text-indigo-500">自定义新规则</span>
      </div>

      <!-- 卡项 5: 导入 -->
      <div onclick="alert('输入邀请码导入')" class="bento-card p-5 border-dashed border-2 border-slate-200 bg-slate-50/50 flex flex-col items-center justify-center py-8 group cursor-pointer">
        <div class="w-10 h-10 rounded-full border border-slate-300 flex items-center justify-center text-slate-400 group-hover:border-indigo-500 group-hover:text-indigo-500 transition-all mb-2">
          <i class="fa-solid fa-qrcode text-xs"></i>
        </div>
        <span class="text-xs font-bold text-slate-400 group-hover:text-indigo-500">导入他人模板</span>
      </div>
    </div>
  </section>

  <!-- 3. 最近修改列表 -->
  <section class="animate-slide-up" style="animation-delay: 0.3s">
    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">历史编辑</h2>
    </div>
    <div class="bg-white rounded-[2rem] p-2 border border-slate-100 shadow-sm">
      <div class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors cursor-pointer group">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-500 flex items-center justify-center">
            <i class="fa-solid fa-history text-sm"></i>
          </div>
          <div>
            <span class="font-semibold text-slate-700 block">家庭麻将 (老规矩)</span>
            <span class="text-[10px] text-slate-400">修改于 昨天 22:45</span>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <i class="fa-solid fa-star text-amber-400 text-xs"></i>
          <i class="fa-solid fa-chevron-right text-slate-200 text-xs"></i>
        </div>
      </div>
      <div class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors cursor-pointer group">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-400 flex items-center justify-center">
            <i class="fa-solid fa-history text-sm"></i>
          </div>
          <div>
            <span class="font-semibold text-slate-700 block">三人德扑测试</span>
            <span class="text-[10px] text-slate-400">修改于 3天前</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-200 text-xs"></i>
      </div>
    </div>
  </section>

</main>

<!-- 悬浮底部导航 (保持与主页一致) -->
<div class="fixed bottom-6 w-[90%] max-w-[360px] z-40 left-1/2 -translate-x-1/2">
  <div class="nav-float rounded-full px-6 py-3 flex justify-around items-center">
    <!-- Home (Active as current tool) -->
    <a href="index.html" class="flex flex-col items-center gap-1 text-indigo-600 transition-colors">
      <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-lg">
        <i class="fa-solid fa-house"></i>
      </div>
    </a>

    <!-- Analysis -->
    <a href="#" onclick="alert('统计功能开发中')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-chart-simple"></i>
      </div>
    </a>

    <!-- Profile -->
    <a href="#" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-user"></i>
      </div>
    </a>
  </div>
</div>

</body>
</html>
