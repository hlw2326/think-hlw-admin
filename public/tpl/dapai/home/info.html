<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打牌计分 - 房间详情</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.08)',
            'glow-blue': '0 0 20px rgba(59, 130, 246, 0.3)',
          },
          animation: {
            'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
            'pop-in': 'popIn 0.3s cubic-bezier(0.26, 1.36, 0.74, 1) forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(100%)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            shake: {
              '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
            },
            popIn: {
              '0%': { transform: 'scale(0.9)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' }
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F8FAFC;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }

    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .dark-glass {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .noise-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.3;
      pointer-events: none;
    }

    .font-mono-num { font-variant-numeric: tabular-nums; }

    #toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .score-input-container:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      background: white;
    }

    /* 正负切换按钮动画 */
    .sign-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .sign-btn:active { transform: scale(0.9); }

    .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center">

<!-- Toast Notification -->
<div id="toast" class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2">

  <span id="toastMessage" class="text-sm font-bold">已成功复制</span>
</div>

<!-- 1. Top Navigation -->
<nav class="w-full max-w-md px-6 py-4 flex justify-between items-center sticky top-0 bg-[#F8FAFC]/80 backdrop-blur-xl z-40">

  </button>
  <div class="text-center">

    <i class="fa-solid fa-share-nodes"></i>

</nav>

<!-- Modal: Score Entry (Improved with Sign Toggle) -->

    <div class="flex justify-between items-start mb-8">
      <div>
        <h3 id="modalRoundTitle" class="text-3xl font-black text-slate-900 tracking-tight">录入本局得分</h3>
        <p class="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-widest">点击图标可切换加分/扣分</p>
      </div>
      <div id="balanceDisplay" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-2xl text-xs font-black border border-rose-100 shadow-sm transition-all duration-300">
        总分: 0
      </div>
    </div>

    <div class="space-y-4 mb-10">
      <!-- Player Input Block -->

        <!-- Sign Toggle Button -->
        <button onclick="toggleSign(this)" class="sign-btn w-10 h-10 rounded-xl flex items-center justify-center bg-emerald-500 text-white shadow-sm" data-sign="1">
          <i class="fa-solid fa-plus text-xs"></i>
        </button>

        <input type="number" data-name="王" oninput="calculateBalance()" class="player-score w-24 bg-transparent text-right font-black text-2xl outline-none placeholder:text-slate-200" placeholder="0" inputmode="numeric">
      </div>

      <div class="score-input-container group flex items-center gap-4 bg-slate-50 p-4 rounded-3xl border-2 border-slate-50 transition-all">
        <img src="https://ui-avatars.com/api/?name=L&background=random" class="w-10 h-10 rounded-2xl">
        <span class="font-bold text-slate-700 flex-1 truncate">李女士</span>

        <button onclick="toggleSign(this)" class="sign-btn w-10 h-10 rounded-xl flex items-center justify-center bg-rose-500 text-white shadow-sm" data-sign="-1">
          <i class="fa-solid fa-minus text-xs"></i>
        </button>

        <input type="number" data-name="李" oninput="calculateBalance()" class="player-score w-24 bg-transparent text-right font-black text-2xl outline-none placeholder:text-slate-200" placeholder="0" inputmode="numeric">
      </div>

      <div class="score-input-container group flex items-center gap-4 bg-indigo-50/50 p-4 rounded-3xl border-2 border-indigo-50 transition-all">
        <img src="https://ui-avatars.com/api/?name=ME&background=0f172a&color=fff" class="w-10 h-10 rounded-2xl ring-2 ring-white shadow-sm">
        <span class="font-bold text-blue-900 flex-1">我</span>

        <button onclick="toggleSign(this)" class="sign-btn w-10 h-10 rounded-xl flex items-center justify-center bg-rose-500 text-white shadow-sm" data-sign="-1">
          <i class="fa-solid fa-minus text-xs"></i>
        </button>

        <input type="number" data-name="我" oninput="calculateBalance()" class="player-score w-24 bg-transparent text-right font-black text-2xl outline-none text-blue-600 placeholder:text-blue-100" placeholder="0" inputmode="numeric">
      </div>

      <div class="score-input-container group flex items-center gap-4 bg-slate-50 p-4 rounded-3xl border-2 border-slate-50 transition-all">
        <img src="https://ui-avatars.com/api/?name=Z&background=random" class="w-10 h-10 rounded-2xl">
        <span class="font-bold text-slate-700 flex-1 truncate">张三</span>

        <button onclick="toggleSign(this)" class="sign-btn w-10 h-10 rounded-xl flex items-center justify-center bg-rose-500 text-white shadow-sm" data-sign="-1">
          <i class="fa-solid fa-minus text-xs"></i>
        </button>

        <input type="number" data-name="张" oninput="calculateBalance()" class="player-score w-24 bg-transparent text-right font-black text-2xl outline-none placeholder:text-slate-200" placeholder="0" inputmode="numeric">
      </div>
    </div>

    <div class="flex gap-4">

      <button id="saveScoreBtn" onclick="saveRound()" class="flex-[2.5] bg-slate-900 text-white py-5 rounded-[2rem] font-black shadow-xl opacity-50 transition-all">确认保存</button>

<!-- Modals: Share -->
<div id="shareModal" class="fixed inset-0 bg-slate-900/60 z-[100] hidden flex items-end justify-center backdrop-blur-md opacity-0 transition-opacity duration-500">
  <div class="absolute inset-0" onclick="toggleShareModal(false)"></div>
  <div class="relative bg-white w-full max-w-md rounded-t-[3rem] p-8 transform translate-y-full transition-transform duration-500 shadow-2xl text-center">
    <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-10"></div>
    <h3 class="text-2xl font-black text-slate-900 mb-8">邀请好友加入</h3>
    <button onclick="copyText('889204')" class="w-full bg-blue-600 text-white py-5 rounded-[1.8rem] font-black shadow-xl">复制链接 889204</button>
  </div>
</div>

<textarea id="copyHelper" class="fixed -top-10 left-0 w-1 h-1 opacity-0 pointer-events-none"></textarea>

<script>
  let currentRound = 8;
  const scoreModal = document.getElementById('scoreModal');
  const scoreModalContent = document.getElementById('scoreModalContent');
  const balanceDisplay = document.getElementById('balanceDisplay');
  const saveScoreBtn = document.getElementById('saveScoreBtn');
  const historyList = document.getElementById('historyList');

  // 正负号切换逻辑
  function toggleSign(btn) {
    const currentSign = parseInt(btn.dataset.sign);
    const newSign = currentSign === 1 ? -1 : 1;
    btn.dataset.sign = newSign;

    // UI 更新
    if (newSign === 1) {
      btn.className = "sign-btn w-10 h-10 rounded-xl flex items-center justify-center bg-emerald-500 text-white shadow-sm";
      btn.innerHTML = '<i class="fa-solid fa-plus text-xs"></i>';
      btn.parentElement.classList.replace('border-rose-200', 'border-slate-50');
    } else {
      btn.className = "sign-btn w-10 h-10 rounded-xl flex items-center justify-center bg-rose-500 text-white shadow-sm";
      btn.innerHTML = '<i class="fa-solid fa-minus text-xs"></i>';
      btn.parentElement.classList.add('border-rose-200'); // 给个红色微边框增强感知
    }

    calculateBalance(); // 切换符号后重新计算平衡
  }

  function calculateBalance() {
    let total = 0;
    const inputBlocks = document.querySelectorAll('.score-input-container');

    inputBlocks.forEach(block => {
      const sign = parseInt(block.querySelector('.sign-btn').dataset.sign);
      const val = parseInt(block.querySelector('.player-score').value) || 0;
      total += (val * sign);
    });

    if (total === 0) {
      balanceDisplay.innerText = "账目已平 ✓";
      balanceDisplay.className = "bg-emerald-50 text-emerald-600 px-4 py-2 rounded-2xl text-xs font-black border border-emerald-100 shadow-sm transition-all";
      saveScoreBtn.classList.replace('opacity-50', 'opacity-100');
    } else {
      balanceDisplay.innerText = `总分: ${total > 0 ? '+' : ''}${total}`;
      balanceDisplay.className = "bg-rose-50 text-rose-600 px-4 py-2 rounded-2xl text-xs font-black border border-rose-100 shadow-sm transition-all";
      saveScoreBtn.classList.replace('opacity-100', 'opacity-50');
    }
  }

  function saveRound() {
    let total = 0;
    const scores = [];
    const inputBlocks = document.querySelectorAll('.score-input-container');

    inputBlocks.forEach(block => {
      const sign = parseInt(block.querySelector('.sign-btn').dataset.sign);
      const input = block.querySelector('.player-score');
      const val = (parseInt(input.value) || 0) * sign;
      total += val;
      scores.push({ name: input.getAttribute('data-name'), score: val });
    });

    if (total !== 0) {
      scoreModalContent.classList.add('shake');
      setTimeout(() => scoreModalContent.classList.remove('shake'), 400);
      showToast(`总分为 ${total}，账目不平`, 'error');
      return;
    }

    const now = new Date();
    const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')} ${now.getHours() >= 12 ? 'PM' : 'AM'}`;

    const item = document.createElement('div');
    item.className = "glass-card p-5 rounded-[2rem] shadow-sm border border-slate-100 animate-pop-in mb-4";

    let breakdownHtml = '';
    scores.forEach(s => {
      const colorClass = s.score >= 0 ? 'text-emerald-500' : 'text-rose-400';
      breakdownHtml += `
                    <div class="text-center">
                        <div class="text-[8px] font-bold text-slate-400 mb-0.5">${s.name}</div>
                        <div class="text-xs font-black ${colorClass}">${s.score > 0 ? '+' : ''}${s.score}</div>
                    </div>
                `;
    });

    item.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-slate-900 text-white flex flex-col items-center justify-center font-mono-num">
                            <span class="text-[7px] font-black opacity-60">RD</span>
                            <span class="text-sm font-black">${currentRound.toString().padStart(2, '0')}</span>
                        </div>
                        <div class="text-sm font-black text-slate-800">记分流水更新 <span class="text-[10px] text-slate-400 font-bold ml-2">${timeStr}</span></div>
                    </div>
                </div>
                <div class="grid grid-cols-4 gap-2 pt-3 border-t border-slate-50">${breakdownHtml}</div>
            `;

    historyList.prepend(item);
    currentRound++;
    document.getElementById('currentRoundDisplay').innerText = currentRound.toString().padStart(2, '0');
    toggleScoreModal(false);
    showToast('记分成功 ✨');

    // 重置输入
    inputBlocks.forEach(block => block.querySelector('.player-score').value = '');
    calculateBalance();
  }

  // --- UI Utils ---
  function toggleModal(modal, show) {
    if (show) {
      modal.classList.remove('hidden');
      setTimeout(() => { modal.classList.remove('opacity-0'); modal.lastElementChild.classList.remove('translate-y-full'); }, 10);
    } else {
      modal.lastElementChild.classList.add('translate-y-full');
      modal.classList.add('opacity-0');
      setTimeout(() => modal.classList.add('hidden'), 500);
    }
  }

  function toggleScoreModal(s) { if(s) document.getElementById('modalRoundTitle').innerText = `录入第 ${currentRound} 局`; toggleModal(scoreModal, s); }
  function toggleShareModal(s) { toggleModal(document.getElementById('shareModal'), s); }
  function showToast(msg, type = 'success') {
    document.getElementById('toastMessage').innerText = msg;
    document.getElementById('toastIcon').className = type === 'success' ? 'fa-solid fa-circle-check text-emerald-400' : 'fa-solid fa-circle-exclamation text-rose-400';
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
  function copyText(text) { const helper = document.getElementById('copyHelper'); helper.value = text; helper.select(); document.execCommand('copy'); showToast('已复制'); }
  function confirmEndGame() { if(confirm('是否结束本场对局？')) showToast('结算中...'); }
  window.onclick = function(e) { if (e.target.id.includes('Modal')) { toggleScoreModal(false); toggleShareModal(false); } }
</script>
