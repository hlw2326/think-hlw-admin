<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>打牌计分 - 首页</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'glow': '0 0 20px rgba(59, 130, 246, 0.5)',
                        'premium': '0 20px 50px -12px rgba(59, 130, 246, 0.12)',
                        'player': '0 4px 10px rgba(0,0,0,0.04)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8FAFF;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 100px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .match-card-premium {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(246, 251, 255, 0.98) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            position: relative;
            overflow: hidden;
        }

        .premium-shimmer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent 30%, rgba(59, 130, 246, 0.05) 50%, transparent 70%);
            transform: translateX(-150%);
            animation: shimmer-swipe 4s infinite;
            pointer-events: none;
        }

        @keyframes shimmer-swipe {
            0% { transform: translateX(-150%); }
            30%, 100% { transform: translateX(150%); }
        }

        .nav-float {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 计分颜色习惯 */
        .text-win { color: #EF4444; }
        .text-lose { color: #10B981; }

        /* 玩家卡片独立样式 */
        .player-slot {
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
        }

        .player-slot.winner {
            background: #FFFBEB;
            border-color: #FDE68A;
        }

        .player-slot.me {
            background: #3B82F6;
            border-color: #2563EB;
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-blue-100">

<!-- 顶部背景光晕 -->
<div class="fixed top-0 w-full max-w-md h-96 -z-10 pointer-events-none overflow-hidden">
    <div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float"></div>
    <div class="absolute top-[-20px] left-[-50px] w-72 h-72 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float" style="animation-delay: 2s"></div>
</div>

<!-- 1. Header -->
<header class="w-full max-w-md flex justify-between items-center px-6 pt-6 pb-2 z-50">
    <div>
        <div class="text-[10px] font-bold text-blue-500 mb-0.5 tracking-[0.2em] uppercase">October 24</div>
        <h1 class="text-2xl font-extrabold text-slate-900 flex items-center gap-2">
            晚上好
            <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Hand%20gestures/Waving%20Hand.png" alt="Wave" width="28" height="28" />
        </h1>
    </div>
    <div class="w-11 h-11 rounded-2xl bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 cursor-pointer active:scale-95 transition-transform">
        <i class="fa-regular fa-bell text-lg"></i>
    </div>
</header>

<main class="w-full max-w-md flex-1 px-5 py-4 flex flex-col gap-6">

    <!-- 2. Optimized Match Card (8-Player UI Focus) -->
    <div id="activeGameCard" onclick="alert('进入详情页')" class="match-card-premium rounded-[2.5rem] p-5 shadow-premium cursor-pointer group transform transition-all hover:scale-[1.01] animate-slide-up">
        <div class="premium-shimmer"></div>

        <!-- A. Card Header -->
        <div class="flex justify-between items-center mb-5 relative z-10 px-1">
            <div class="flex items-center gap-2.5">
                <div class="bg-blue-600 p-2 rounded-xl text-white">
                    <i class="fa-solid fa-dice text-sm"></i>
                </div>
                <div>
                    <h2 class="text-[13px] font-black text-slate-900 leading-none mb-1">德州扑克局 · 08房</h2>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-bold text-slate-400">房号: 883291</span>
                        <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
                        <span class="text-[9px] font-bold text-blue-500">第 12 局</span>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-[11px] font-mono font-black text-slate-900 bg-white/60 px-2 py-1 rounded-lg border border-slate-100 shadow-inner">01:45:12</div>
            </div>
        </div>

        <!-- B. 8-Player Grid (4x2 Optimized) -->
        <div class="grid grid-cols-4 gap-2 mb-6 relative z-10">

            <!-- Player 1 (Winner Highlight) -->
            <div class="player-slot winner rounded-2xl p-2.5 flex flex-col items-center gap-1 relative border-2">
                <div class="absolute -top-2 left-1/2 -translate-x-1/2 text-amber-500 text-[11px] drop-shadow-sm animate-bounce">
                    <i class="fa-solid fa-crown"></i>
                </div>
                <img src="https://ui-avatars.com/api/?name=W&background=3b82f6&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm mb-0.5">
                <div class="text-[9px] font-black text-slate-500 truncate w-full text-center">小王</div>
                <div class="text-[10px] font-black text-win">+1200</div>
                <div class="text-[7px] font-bold text-amber-600 bg-amber-100 px-1 rounded uppercase">Leader</div>
            </div>

            <!-- Player 2 -->
            <div class="player-slot rounded-2xl p-2.5 flex flex-col items-center gap-1 border">
                <img src="https://ui-avatars.com/api/?name=L&background=94a3b8&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm mb-0.5 opacity-60">
                <div class="text-[9px] font-black text-slate-400 truncate w-full text-center">老李</div>
                <div class="text-[10px] font-black text-lose">-450</div>
                <div class="text-[7px] font-bold text-emerald-600 bg-emerald-50 px-1 rounded uppercase">Loss</div>
            </div>

            <!-- Player 3 (ME - Highlight) -->
            <div class="player-slot me rounded-2xl p-2.5 flex flex-col items-center gap-1 border-2 border-blue-500">
                <img src="https://ui-avatars.com/api/?name=Me&background=0f172a&color=fff" class="w-10 h-10 rounded-full border-2 border-blue-300 shadow-sm mb-0.5">
                <div class="text-[9px] font-black text-white truncate w-full text-center">我</div>
                <div class="text-[10px] font-black text-white">+850</div>
                <div class="text-[7px] font-bold text-blue-900 bg-blue-300 px-1 rounded uppercase">You</div>
            </div>

            <!-- Player 4 -->
            <div class="player-slot rounded-2xl p-2.5 flex flex-col items-center gap-1 border">
                <img src="https://ui-avatars.com/api/?name=Q&background=94a3b8&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-sm mb-0.5 opacity-60">
                <div class="text-[9px] font-black text-slate-400 truncate w-full text-center">阿强</div>
                <div class="text-[10px] font-black text-lose">-1200</div>
                <div class="text-[7px] font-bold text-emerald-600 bg-emerald-50 px-1 rounded uppercase">Loss</div>
            </div>

            <!-- Player 5 -->
            <div class="player-slot rounded-2xl p-2.5 flex flex-col items-center gap-1 border">
                <img src="https://ui-avatars.com/api/?name=Z&background=random" class="w-10 h-10 rounded-full border-2 border-white shadow-sm mb-0.5">
                <div class="text-[9px] font-black text-slate-500 truncate w-full text-center">老张</div>
                <div class="text-[10px] font-black text-win">+150</div>
                <div class="text-[7px] font-bold text-red-600 bg-red-50 px-1 rounded uppercase">Win</div>
            </div>

            <!-- Player 6 -->
            <div class="player-slot rounded-2xl p-2.5 flex flex-col items-center gap-1 border">
                <img src="https://ui-avatars.com/api/?name=C&background=random" class="w-10 h-10 rounded-full border-2 border-white shadow-sm mb-0.5 opacity-60">
                <div class="text-[9px] font-black text-slate-400 truncate w-full text-center">陈总</div>
                <div class="text-[10px] font-black text-lose">-200</div>
                <div class="text-[7px] font-bold text-emerald-600 bg-emerald-50 px-1 rounded uppercase">Loss</div>
            </div>

            <!-- Player 7 -->
            <div class="player-slot rounded-2xl p-2.5 flex flex-col items-center gap-1 border">
                <img src="https://ui-avatars.com/api/?name=S&background=random" class="w-10 h-10 rounded-full border-2 border-white shadow-sm mb-0.5">
                <div class="text-[9px] font-black text-slate-500 truncate w-full text-center">苏苏</div>
                <div class="text-[10px] font-black text-win">+300</div>
                <div class="text-[7px] font-bold text-red-600 bg-red-50 px-1 rounded uppercase">Win</div>
            </div>

            <!-- Player 8 (Add Slot) -->
            <div class="player-slot rounded-2xl p-2.5 flex flex-col items-center justify-center gap-1 border-dashed border-2 border-slate-200 bg-slate-50/30">
                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-slate-400 text-xs shadow-inner">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <div class="text-[8px] font-black text-slate-300 uppercase tracking-tighter">Invite</div>
            </div>
        </div>

        <!-- C. Footer -->
        <div class="flex items-center justify-between pt-4 border-t border-slate-100 relative z-10">
            <div class="flex gap-4">
                <div class="flex flex-col">
                    <span class="text-[8px] font-black text-slate-300 uppercase tracking-widest">池底金额</span>
                    <span class="text-sm font-black text-slate-900">¥ 2,850</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="event.stopPropagation(); alert('复制邀请码')" class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 text-slate-500 flex items-center justify-center text-xs active:scale-90 transition-all shadow-sm">
                    <i class="fa-solid fa-link"></i>
                </button>
                <button class="px-6 py-3 bg-slate-900 text-white rounded-xl text-[10px] font-black shadow-lg shadow-slate-200 active:scale-95 transition-all flex items-center gap-2">
                    详情看板 <i class="fa-solid fa-arrow-right-long text-[9px]"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 3. Action Grid -->
    <div class="grid grid-cols-2 gap-4 animate-slide-up" style="animation-delay: 0.1s">
        <div onclick="openCreateModal()" class="bg-white rounded-[2rem] p-6 cursor-pointer relative overflow-hidden group border border-slate-50 shadow-sm active:scale-95 transition-all">
            <div class="absolute -right-8 -bottom-8 w-28 h-28 bg-blue-50 rounded-full group-hover:scale-150 transition-transform duration-700"></div>
            <div class="relative z-10">
                <div class="w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center text-xl shadow-lg shadow-blue-600/20 mb-6">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <h3 class="font-black text-slate-900 text-lg leading-tight">开个新局</h3>
                <p class="text-[11px] font-medium text-slate-400 mt-1">设置规则并邀请好友</p>
            </div>
        </div>

        <div onclick="openJoinModal()" class="bg-white rounded-[2rem] p-6 cursor-pointer relative overflow-hidden group border border-slate-50 shadow-sm active:scale-95 transition-all">
            <div class="absolute -right-8 -bottom-8 w-28 h-28 bg-indigo-50 rounded-full group-hover:scale-150 transition-transform duration-700"></div>
            <div class="relative z-10">
                <div class="w-12 h-12 rounded-2xl bg-indigo-600 text-white flex items-center justify-center text-xl shadow-lg shadow-indigo-600/20 mb-6">
                    <i class="fa-solid fa-hashtag"></i>
                </div>
                <h3 class="font-black text-slate-900 text-lg leading-tight">加入对局</h3>
                <p class="text-[11px] font-medium text-slate-400 mt-1">输入 6 位房间邀请码</p>
            </div>
        </div>
    </div>

    <!-- 4. Quick Tools -->
    <div class="grid grid-cols-4 gap-2 animate-slide-up" style="animation-delay: 0.2s">
        <div class="bg-white rounded-[1.5rem] p-3 shadow-sm border border-slate-50 flex flex-col items-center gap-1.5 cursor-pointer hover:bg-slate-50 transition-colors">
            <div class="text-indigo-500 text-lg"><i class="fa-solid fa-calculator"></i></div>
            <span class="text-[10px] font-bold text-slate-500">计算器</span>
        </div>
        <div class="bg-white rounded-[1.5rem] p-3 shadow-sm border border-slate-50 flex flex-col items-center gap-1.5 cursor-pointer hover:bg-slate-50 transition-colors">
            <div class="text-emerald-500 text-lg"><i class="fa-solid fa-book-open"></i></div>
            <span class="text-[10px] font-bold text-slate-500">规则集</span>
        </div>
        <div class="bg-white rounded-[1.5rem] p-3 shadow-sm border border-slate-50 flex flex-col items-center gap-1.5 cursor-pointer hover:bg-slate-50 transition-colors">
            <div class="text-orange-500 text-lg"><i class="fa-solid fa-dice-six"></i></div>
            <span class="text-[10px] font-bold text-slate-500">掷骰子</span>
        </div>
        <div class="bg-white rounded-[1.5rem] p-3 shadow-sm border border-slate-50 flex flex-col items-center gap-1.5 cursor-pointer hover:bg-slate-50 transition-colors">
            <div class="text-rose-500 text-lg"><i class="fa-solid fa-chart-line"></i></div>
            <span class="text-[10px] font-bold text-slate-500">战报</span>
        </div>
    </div>

    <!-- 5. History List -->
    <div class="animate-slide-up pb-10" style="animation-delay: 0.3s">
        <div class="flex items-center justify-between mb-4 px-2">
            <h3 class="font-extrabold text-lg text-slate-900">历史战绩</h3>
            <button class="text-xs font-bold text-blue-600">全部记录</button>
        </div>

        <div class="space-y-4">
            <div class="bg-white p-5 rounded-[2rem] border border-slate-50 shadow-sm flex items-center justify-between active:scale-[0.98] transition-all cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 rounded-2xl bg-blue-50 text-3xl flex items-center justify-center">🀄️</div>
                    <div>
                        <div class="font-extrabold text-slate-900 text-sm mb-0.5">四川麻将 (血战)</div>
                        <div class="text-[10px] text-slate-400 font-bold tracking-wider uppercase">Oct 22 · 4 Players</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="font-black text-red-500 text-lg">+320</div>
                    <div class="text-[9px] font-black bg-red-50 text-red-600 px-2 py-1 rounded-full inline-block">🏆 大赢家</div>
                </div>
            </div>
        </div>
    </div>

</main>

<!-- Floating Bottom Nav -->
<div class="fixed bottom-6 w-[90%] max-w-[380px] z-40">
    <div class="nav-float rounded-[2.5rem] px-8 py-3.5 flex justify-between items-center">
        <a href="#" class="flex flex-col items-center gap-1 text-blue-600">
            <i class="fa-solid fa-house text-xl"></i>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors">
            <i class="fa-solid fa-chart-pie text-xl"></i>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 hover:text-slate-500 transition-colors">
            <i class="fa-solid fa-circle-user text-xl"></i>
        </a>
    </div>
</div>

<!-- Modals -->
<div id="createModal" class="fixed inset-0 bg-slate-900/40 z-[60] hidden flex items-end sm:items-center justify-center sm:p-6 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div class="bg-white w-full max-w-sm rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 transform translate-y-full sm:translate-y-0 sm:scale-95 transition-transform duration-300">
        <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-8"></div>
        <h3 class="text-2xl font-black text-slate-900 mb-8">创建新对局</h3>
        <div class="flex gap-4">
            <button onclick="closeCreateModal()" class="flex-1 py-4 rounded-2xl font-black text-slate-500 bg-slate-50">返回</button>
            <button onclick="closeCreateModal()" class="flex-[2] py-4 rounded-2xl font-black text-white bg-slate-900 shadow-2xl">确认创建</button>
        </div>
    </div>
</div>

<div id="joinModal" class="fixed inset-0 bg-slate-900/40 z-[60] hidden flex items-center justify-center p-6 backdrop-blur-sm opacity-0 transition-opacity duration-300">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center transform scale-90 transition-transform duration-300 shadow-2xl">
        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-2xl mx-auto mb-6">
            <i class="fa-solid fa-lock-open"></i>
        </div>
        <h3 class="text-xl font-black text-slate-900 mb-2">输入邀请码</h3>
        <p class="text-xs font-bold text-slate-400 mb-8">输入房主提供的 6 位房间号</p>
        <div class="flex justify-center gap-2 mb-10">
            <input maxlength="1" class="w-11 h-14 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-xl font-black focus:border-blue-500 focus:outline-none">
            <input maxlength="1" class="w-11 h-14 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-xl font-black focus:border-blue-500 focus:outline-none">
            <input maxlength="1" class="w-11 h-14 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-xl font-black focus:border-blue-500 focus:outline-none">
            <input maxlength="1" class="w-11 h-14 bg-slate-50 border-2 border-slate-100 rounded-xl text-center text-xl font-black focus:border-blue-500 focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="closeJoinModal()" class="py-3.5 rounded-xl font-black text-slate-400">取消</button>
            <button onclick="closeJoinModal()" class="py-3.5 rounded-xl font-black text-white bg-blue-600 shadow-xl shadow-blue-200">进入房间</button>
        </div>
    </div>
</div>

<script>
    const createModal = document.getElementById('createModal');
    const joinModal = document.getElementById('joinModal');

    function openCreateModal() {
        createModal.classList.remove('hidden');
        void createModal.offsetWidth;
        createModal.classList.remove('opacity-0');
        createModal.children[0].classList.remove('translate-y-full', 'scale-95');
    }

    function closeCreateModal() {
        createModal.children[0].classList.add('translate-y-full', 'scale-95');
        createModal.classList.add('opacity-0');
        setTimeout(() => createModal.classList.add('hidden'), 300);
    }

    function openJoinModal() {
        joinModal.classList.remove('hidden');
        void joinModal.offsetWidth;
        joinModal.classList.remove('opacity-0');
        joinModal.children[0].classList.remove('scale-90');
        joinModal.children[0].classList.add('scale-100');
    }

    function closeJoinModal() {
        joinModal.children[0].classList.remove('scale-100');
        joinModal.children[0].classList.add('scale-90');
        joinModal.classList.add('opacity-0');
        setTimeout(() => joinModal.classList.add('hidden'), 300);
    }
</script>
</body>
</html>
