<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>创建房间 - 打牌计分</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
            'glow': '0 0 20px rgba(59, 130, 246, 0.5)',
            'float': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F6F8FC;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 120px; /* Space for bottom button */
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* 选中状态的边框动画 */
    .game-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .game-card.selected {
      border-color: #3b82f6;
      background-color: #eff6ff;
      transform: translateY(-2px); /* Slight lift */
      box-shadow: 0 8px 20px -6px rgba(59, 130, 246, 0.3);
    }
    .game-card.selected .icon-box {
      background-color: #3b82f6;
      color: white;
    }
    .game-card.selected .check-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* 底部固定栏模糊效果 */
    .bottom-action-bar {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.5);
    }

    /* 计数器按钮样式 */
    .counter-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      color: #64748b;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .counter-btn:active {
      transform: scale(0.9);
      background: #e2e8f0;
    }

    /* 优化后的卡片 hover 态 */
    .game-card:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center">

<!-- 顶部背景光晕 (保持一致) -->
<div class="fixed top-0 w-full max-w-md h-96 -z-10 pointer-events-none overflow-hidden">
  <div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float"></div>
  <div class="absolute top-[-20px] left-[-50px] w-72 h-72 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float" style="animation-delay: 2s"></div>
</div>

<!-- 1. Header -->
<header class="w-full max-w-md flex items-center px-6 pt-6 pb-4 z-50 sticky top-0 bg-[#F6F8FC]/80 backdrop-blur-md">
  <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 active:scale-90 transition-transform mr-4">
    <i class="fa-solid fa-arrow-left"></i>
  </button>
  <h1 class="text-xl font-bold text-slate-800">新建对局</h1>
</header>

<main class="w-full max-w-md flex-1 px-5 flex flex-col gap-6">

  <!-- 2. Game Type Selection (优化：使用 Grid 布局，不超出屏幕) -->
  <section class="animate-slide-up">
    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-1">选择游戏类型</label>

    <div class="grid grid-cols-3 gap-3">

      <!-- Card: Mahjong -->
      <div onclick="selectGame(this, 'mahjong')" class="game-card selected w-full p-3 rounded-2xl bg-white border-2 border-transparent shadow-sm cursor-pointer relative overflow-hidden flex flex-col items-center text-center">
        <div class="icon-box w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center text-lg mb-2 transition-colors">
          <i class="fa-solid fa-cubes-stacked"></i>
        </div>
        <h3 class="font-bold text-slate-800 text-sm">麻将</h3>
        <p class="text-[10px] text-slate-400 mt-0.5 leading-tight">川麻 / 国标</p>
        <!-- Check Icon -->
        <div class="check-icon absolute top-2 right-2 text-blue-500 opacity-0 transform scale-50 transition-all duration-300">
          <i class="fa-solid fa-circle-check"></i>
        </div>
      </div>

      <!-- Card: Poker -->
      <div onclick="selectGame(this, 'poker')" class="game-card w-full p-3 rounded-2xl bg-white border-2 border-transparent shadow-sm cursor-pointer relative overflow-hidden flex flex-col items-center text-center">
        <div class="icon-box w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center text-lg mb-2 transition-colors">
          <i class="fa-solid fa-diamond"></i>
        </div>
        <h3 class="font-bold text-slate-800 text-sm">扑克</h3>
        <p class="text-[10px] text-slate-400 mt-0.5 leading-tight">德州 / 斗地主</p>
        <div class="check-icon absolute top-2 right-2 text-blue-500 opacity-0 transform scale-50 transition-all duration-300">
          <i class="fa-solid fa-circle-check"></i>
        </div>
      </div>

      <!-- Card: Custom -->
      <div onclick="selectGame(this, 'custom')" class="game-card w-full p-3 rounded-2xl bg-white border-2 border-transparent shadow-sm cursor-pointer relative overflow-hidden flex flex-col items-center text-center">
        <div class="icon-box w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center text-lg mb-2 transition-colors">
          <i class="fa-solid fa-pen-ruler"></i>
        </div>
        <h3 class="font-bold text-slate-800 text-sm">通用</h3>
        <p class="text-[10px] text-slate-400 mt-0.5 leading-tight">自定义规则</p>
        <div class="check-icon absolute top-2 right-2 text-blue-500 opacity-0 transform scale-50 transition-all duration-300">
          <i class="fa-solid fa-circle-check"></i>
        </div>
      </div>
    </div>
  </section>

  <!-- 3. Room Settings -->
  <section class="animate-slide-up space-y-4" style="animation-delay: 0.1s">

    <!-- Room Name -->
    <div class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">房间名称</label>
      <div class="relative">
        <input type="text" id="roomName" value="周五麻将局 🀄️" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3.5 text-slate-800 font-bold focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all outline-none placeholder-slate-300 text-sm">
        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 p-2">
          <i class="fa-solid fa-dice"></i>
        </button>
      </div>
    </div>

    <!-- Players Count -->
    <div class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100">
      <div class="flex items-center justify-between mb-4">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider">玩家人数</label>
        <span id="playerCountDisplay" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md">4 人</span>
      </div>

      <div class="flex justify-between items-center bg-slate-50 p-1.5 rounded-xl">
        <div class="flex-1 grid grid-cols-4 gap-2">
          <button onclick="setPlayers(2)" class="player-opt h-9 rounded-lg text-sm font-bold text-slate-500 hover:bg-white hover:shadow-sm transition-all">2</button>
          <button onclick="setPlayers(3)" class="player-opt h-9 rounded-lg text-sm font-bold text-slate-500 hover:bg-white hover:shadow-sm transition-all">3</button>
          <button onclick="setPlayers(4)" class="player-opt active-players bg-white shadow-sm text-blue-600 ring-1 ring-black/5 h-9 rounded-lg text-sm font-bold transition-all">4</button>
          <button onclick="setPlayers(5)" class="player-opt h-9 rounded-lg text-sm font-bold text-slate-500 hover:bg-white hover:shadow-sm transition-all">5+</button>
        </div>
      </div>
    </div>

    <!-- Rules Config -->
    <div class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">规则设置</label>

      <!-- Item 1 -->
      <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-50">
        <div>
          <div class="font-bold text-slate-700 text-sm">初始分数</div>
          <div class="text-[10px] text-slate-400">每位玩家开局分数</div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="adjustValue('initialScore', -100)" class="counter-btn"><i class="fa-solid fa-minus text-xs"></i></button>
          <input id="initialScore" type="number" value="1000" class="w-14 text-center font-bold text-slate-800 bg-transparent outline-none p-0 text-sm" readonly>
          <button onclick="adjustValue('initialScore', 100)" class="counter-btn"><i class="fa-solid fa-plus text-xs"></i></button>
        </div>
      </div>

      <!-- Item 2 -->
      <div class="flex items-center justify-between">
        <div>
          <div class="font-bold text-slate-700 text-sm">底分 (倍率)</div>
          <div class="text-[10px] text-slate-400">结算时的倍率设置</div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="adjustValue('baseScore', -1)" class="counter-btn"><i class="fa-solid fa-minus text-xs"></i></button>
          <input id="baseScore" type="number" value="1" class="w-14 text-center font-bold text-slate-800 bg-transparent outline-none p-0 text-sm" readonly>
          <button onclick="adjustValue('baseScore', 1)" class="counter-btn"><i class="fa-solid fa-plus text-xs"></i></button>
        </div>
      </div>
    </div>

    <!-- Advanced Toggle -->
    <div class="text-center py-2">
      <button onclick="toggleAdvanced()" class="text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors flex items-center justify-center gap-2 w-full">
        <span>更多高级设置</span>
        <i id="chevron" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
      </button>

      <div id="advancedOptions" class="hidden overflow-hidden transition-all duration-300 ease-in-out text-left mt-3">
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center justify-between mb-2">
          <span class="text-sm font-bold text-slate-600">允许负分</span>
          <div class="relative inline-block w-10 h-6 align-middle select-none transition duration-200 ease-in">
            <input type="checkbox" name="toggle" id="toggle1" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer translate-x-0.5 translate-y-0.5 checked:translate-x-4.5 checked:border-green-500 transition-transform duration-200"/>
            <label for="toggle1" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer checked:bg-green-500"></label>
          </div>
        </div>
        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center justify-between">
          <span class="text-sm font-bold text-slate-600">房主防作弊模式</span>
          <div class="relative inline-block w-10 h-6 align-middle select-none transition duration-200 ease-in">
            <input type="checkbox" name="toggle" id="toggle2" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 appearance-none cursor-pointer translate-x-0.5 translate-y-0.5 transition-transform duration-200"/>
            <label for="toggle2" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer"></label>
          </div>
        </div>
      </div>
    </div>

  </section>

</main>

<!-- Bottom Action Bar -->
<div class="fixed bottom-0 w-full max-w-md z-40 pb-6 pt-4 px-6 bottom-action-bar">
  <button onclick="createRoom()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl text-lg shadow-xl shadow-slate-300 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
    <span class="group-hover:translate-x-1 transition-transform">开始对局</span>
    <i class="fa-solid fa-arrow-right opacity-0 group-hover:opacity-100 -translate-x-2 group-hover:translate-x-0 transition-all"></i>
  </button>
</div>

<style>
  /* Checkbox Styles for Toggles */
  .toggle-checkbox:checked {
    right: 0;
    border-color: #10b981;
  }
  .toggle-checkbox:checked + .toggle-label {
    background-color: #10b981;
  }
  .toggle-checkbox {
    transition: all 0.3s;
  }
</style>

<script>
  // 1. Game Selection Logic
  function selectGame(element, gameType) {
    // Remove selected class from all cards
    document.querySelectorAll('.game-card').forEach(card => {
      card.classList.remove('selected');
      card.classList.add('border-transparent');
    });

    // Add selected class to clicked card
    element.classList.add('selected');
    element.classList.remove('border-transparent');

    // Update Room Name Suggestion (Optional)
    const date = new Date();
    const dayName = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
    const nameInput = document.getElementById('roomName');

    let gameName = "对局";
    if(gameType === 'mahjong') gameName = "麻将局 🀄️";
    if(gameType === 'poker') gameName = "扑克局 🃏";
    if(gameType === 'custom') gameName = "计分局 🎲";

    nameInput.value = `${dayName}${gameName}`;
  }

  // 2. Player Count Logic
  function setPlayers(count) {
    document.querySelectorAll('.player-opt').forEach(btn => {
      btn.classList.remove('active-players', 'bg-white', 'shadow-sm', 'text-blue-600', 'ring-1', 'ring-black/5');
      btn.classList.add('text-slate-500');
    });

    // Find button by text content (simplified for demo)
    const btns = document.querySelectorAll('.player-opt');
    let targetBtn;
    if(count === 2) targetBtn = btns[0];
    if(count === 3) targetBtn = btns[1];
    if(count === 4) targetBtn = btns[2];
    if(count === 5) targetBtn = btns[3];

    if(targetBtn) {
      targetBtn.classList.add('active-players', 'bg-white', 'shadow-sm', 'text-blue-600', 'ring-1', 'ring-black/5');
      targetBtn.classList.remove('text-slate-500');
    }

    const text = count === 5 ? "5+ 人" : `${count} 人`;
    document.getElementById('playerCountDisplay').innerText = text;
  }

  // 3. Counter Logic
  function adjustValue(id, delta) {
    const input = document.getElementById(id);
    let val = parseInt(input.value);
    val += delta;
    if(val < 0) val = 0; // Prevent negative if needed
    input.value = val;
  }

  // 4. Advanced Toggle
  function toggleAdvanced() {
    const section = document.getElementById('advancedOptions');
    const chevron = document.getElementById('chevron');

    if (section.classList.contains('hidden')) {
      section.classList.remove('hidden');
      setTimeout(() => {
        // Add height animation logic here if needed, keeping it simple for now
      }, 10);
      chevron.style.transform = 'rotate(180deg)';
    } else {
      section.classList.add('hidden');
      chevron.style.transform = 'rotate(0deg)';
    }
  }

  // 5. Create Action
  function createRoom() {
    const btn = document.querySelector('.bottom-action-bar button');
    const originalText = btn.innerHTML;

    // Loading State
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 创建中...';
    btn.disabled = true;
    btn.classList.add('opacity-80');

    setTimeout(() => {
      alert('房间创建成功！正在跳转...');
      // Reset (in real app, redirect here)
      btn.innerHTML = originalText;
      btn.disabled = false;
      btn.classList.remove('opacity-80');
    }, 1000);
  }
</script>
</body>
</html>
