<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打牌计分 - 牌友档案</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
            'glow': '0 0 20px rgba(59, 130, 246, 0.5)',
            'card': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F6F8FC;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 120px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    .bento-card {
      background: #ffffff;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .bento-card:active { transform: scale(0.98); }

    .dark-glass {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .noise-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .nav-float {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
      border-top: 1px solid rgba(0,0,0,0.03);
    }

    .search-input {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }
    .search-input:focus {
      background: #fff;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .friend-avatar {
      position: relative;
    }
    .friend-avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 1.2rem;
      border: 2px solid transparent;
      background: linear-gradient(45deg, #6366f1, #a855f7) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: 0.3;
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-indigo-100">

<!-- 顶部背景光晕 -->
<div class="fixed top-0 w-full max-w-md h-96 -z-10 pointer-events-none overflow-hidden">
  <div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-purple-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float"></div>
  <div class="absolute top-[150px] left-[-80px] w-80 h-80 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float" style="animation-delay: 3s"></div>
</div>

<!-- 1. Header -->
<header class="w-full max-w-md flex justify-between items-center px-6 pt-8 pb-4 z-50">
  <div class="flex items-center gap-3">
    <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
      <i class="fa-solid fa-chevron-left text-sm"></i>
    </button>
    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">牌友档案</h1>
  </div>
  <button onclick="alert('添加新牌友')" class="w-10 h-10 rounded-full bg-indigo-600 shadow-lg shadow-indigo-200 flex items-center justify-center text-white active:scale-90 transition-transform">
    <i class="fa-solid fa-plus"></i>
  </button>
</header>

<main class="w-full max-w-md px-5 flex flex-col gap-6">

  <!-- 2. Search Bar -->
  <div class="relative animate-slide-up">
    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
    <input type="text" placeholder="搜索牌友姓名或标签..." class="search-input w-full py-4 pl-12 pr-4 rounded-2xl text-sm outline-none">
  </div>

  <!-- 3. Top Partner (High Contrast Card) -->
  <div class="dark-glass rounded-[2.5rem] p-6 shadow-2xl shadow-indigo-900/10 animate-slide-up relative overflow-hidden" style="animation-delay: 0.05s">
    <div class="noise-bg"></div>
    <div class="relative z-10">
      <div class="flex justify-between items-start mb-6">
        <div>
          <span class="bg-indigo-500/30 text-indigo-200 text-[10px] font-bold px-2 py-1 rounded-lg uppercase tracking-wider">最佳拍档</span>
          <h2 class="text-xl font-bold text-white mt-2">张大伟 (老张)</h2>
          <p class="text-slate-400 text-[10px] mt-1">共同对局 42 次 · 胜率 68%</p>
        </div>
        <div class="w-14 h-14 rounded-2xl border border-white/10 p-1">
          <img src="https://ui-avatars.com/api/?name=Zhang&background=4f46e5&color=fff" class="w-full h-full rounded-xl object-cover" alt="Avatar">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
          <div class="text-[10px] text-slate-400 mb-1">累计带赢</div>
          <div class="text-lg font-bold text-emerald-400">+1,840</div>
        </div>
        <div class="bg-white/5 rounded-2xl p-3 border border-white/5">
          <div class="text-[10px] text-slate-400 mb-1">对局倾向</div>
          <div class="text-lg font-bold text-white">进攻型</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. Friends Stats Grid -->
  <div class="grid grid-cols-2 gap-4 animate-slide-up" style="animation-delay: 0.1s">
    <div class="bento-card p-4 flex flex-col justify-between">
      <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center mb-3">
        <i class="fa-solid fa-user-group text-xs"></i>
      </div>
      <div>
        <div class="text-2xl font-extrabold text-slate-800">24</div>
        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">活跃好友</div>
      </div>
    </div>
    <div class="bento-card p-4 flex flex-col justify-between">
      <div class="w-8 h-8 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center mb-3">
        <i class="fa-solid fa-fire text-xs"></i>
      </div>
      <div>
        <div class="text-2xl font-extrabold text-slate-800">8</div>
        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">本周约战</div>
      </div>
    </div>
  </div>

  <!-- 5. Friend List Section -->
  <div class="flex flex-col gap-3 animate-slide-up" style="animation-delay: 0.15s">
    <div class="flex justify-between items-end px-1">
      <h3 class="font-bold text-slate-800">所有牌友</h3>
      <span class="text-[10px] text-slate-400">按最近对局排序</span>
    </div>

    <!-- Friend Item 1 -->
    <div class="bento-card p-4 flex items-center justify-between group cursor-pointer hover:shadow-lg transition-all">
      <div class="flex items-center gap-4">
        <div class="friend-avatar">
          <img src="https://ui-avatars.com/api/?name=Li&background=f1f5f9&color=64748b" class="w-12 h-12 rounded-2xl" alt="">
          <div class="absolute -top-1 -right-1 bg-emerald-500 w-3 h-3 rounded-full border-2 border-white"></div>
        </div>
        <div>
          <h4 class="font-bold text-slate-800">李小青</h4>
          <div class="flex gap-2 mt-0.5">
            <span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">经常一起</span>
            <span class="text-[9px] bg-indigo-50 text-indigo-500 px-1.5 py-0.5 rounded">计算精准</span>
          </div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-sm font-bold text-rose-500">-420</div>
        <div class="text-[9px] text-slate-400 mt-0.5">3天前对局</div>
      </div>
    </div>

    <!-- Friend Item 2 -->
    <div class="bento-card p-4 flex items-center justify-between group cursor-pointer hover:shadow-lg transition-all">
      <div class="flex items-center gap-4">
        <div class="friend-avatar">
          <img src="https://ui-avatars.com/api/?name=Wang&background=f1f5f9&color=64748b" class="w-12 h-12 rounded-2xl" alt="">
        </div>
        <div>
          <h4 class="font-bold text-slate-800">王局</h4>
          <div class="flex gap-2 mt-0.5">
            <span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">偶尔对战</span>
          </div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-sm font-bold text-emerald-500">+1,105</div>
        <div class="text-[9px] text-slate-400 mt-0.5">上周</div>
      </div>
    </div>

    <!-- Friend Item 3 -->
    <div class="bento-card p-4 flex items-center justify-between group cursor-pointer hover:shadow-lg transition-all">
      <div class="flex items-center gap-4">
        <div class="friend-avatar">
          <img src="https://ui-avatars.com/api/?name=Chen&background=f1f5f9&color=64748b" class="w-12 h-12 rounded-2xl" alt="">
        </div>
        <div>
          <h4 class="font-bold text-slate-800">陈阿姨</h4>
          <div class="flex gap-2 mt-0.5">
            <span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">新手</span>
            <span class="text-[9px] bg-orange-50 text-orange-500 px-1.5 py-0.5 rounded">运气爆棚</span>
          </div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-sm font-bold text-slate-400">0</div>
        <div class="text-[9px] text-slate-400 mt-0.5">1个月前</div>
      </div>
    </div>

  </div>

</main>

<!-- Floating Bottom Nav -->
<div class="fixed bottom-6 w-[90%] max-w-[360px] z-40 left-1/2 -translate-x-1/2">
  <div class="nav-float rounded-full px-6 py-3 flex justify-around items-center">
    <!-- Home -->
    <a href="#" onclick="alert('返回首页')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-house"></i>
      </div>
    </a>

    <!-- Analysis -->
    <a href="#" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-chart-simple"></i>
      </div>
    </a>

    <!-- Friends (Active) -->
    <a href="#" class="flex flex-col items-center gap-1 text-indigo-600">
      <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-lg shadow-inner scale-110 transition-transform">
        <i class="fa-solid fa-users-viewfinder"></i>
      </div>
    </a>

    <!-- Profile -->
    <a href="#" onclick="alert('个人中心')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-user"></i>
      </div>
    </a>
  </div>
</div>

</body>
</html>
