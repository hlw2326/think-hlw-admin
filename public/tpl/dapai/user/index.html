<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打牌计分 - 个人中心</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
            'glow': '0 0 20px rgba(59, 130, 246, 0.5)',
            'card': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F6F8FC;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 120px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    .bento-card {
      background: #ffffff;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .bento-card:active { transform: scale(0.98); }

    .dark-glass {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .noise-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .nav-float {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
      border-top: 1px solid rgba(0,0,0,0.03);
    }

    .stats-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-indigo-100">

<!-- 顶部背景光晕 -->
<div class="fixed top-0 w-full max-w-md h-96 -z-10 pointer-events-none overflow-hidden">
  <div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float"></div>
  <div class="absolute top-[100px] left-[-50px] w-72 h-72 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float" style="animation-delay: 2s"></div>
</div>

<!-- 1. Header -->
<header class="w-full max-w-md flex justify-between items-center px-6 pt-8 pb-4 z-50">
  <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">我的空间</h1>
  <button onclick="alert('通用设置')" class="w-10 h-10 rounded-full bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
    <i class="fa-solid fa-sliders"></i>
  </button>
</header>

<main class="w-full max-w-md px-5 flex flex-col gap-6">

  <!-- 2. Profile Card -->
  <div class="dark-glass rounded-[2.5rem] p-8 shadow-2xl shadow-blue-900/10 animate-slide-up relative overflow-hidden">
    <div class="noise-bg"></div>

    <div class="relative z-10">
      <div class="flex items-center gap-5 mb-8">
        <div class="relative">
          <div class="w-20 h-20 rounded-[2rem] border-2 border-white/20 p-1">
            <img src="https://ui-avatars.com/api/?name=G&background=8b5cf6&color=fff&size=128" class="w-full h-full rounded-[1.7rem] object-cover" alt="Avatar">
          </div>
          <div class="absolute -bottom-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-[#0f172a]"></div>
        </div>
        <div>
          <h2 class="text-2xl font-bold text-white mb-1">牌场之星 ⭐</h2>
          <p class="text-slate-400 text-xs font-mono tracking-widest">RANK: 大师级计分员</p>
          <div class="flex gap-2 mt-2">
            <span class="bg-white/10 text-white/70 text-[10px] px-2 py-0.5 rounded-md">1,240 局</span>
            <span class="bg-white/10 text-white/70 text-[10px] px-2 py-0.5 rounded-md">数据云同步</span>
          </div>
        </div>
      </div>

      <!-- Stats Grid (Scoring Focused) -->
      <div class="flex justify-between items-center bg-white/5 rounded-3xl p-5 backdrop-blur-xl border border-white/5">
        <div class="text-center flex-1">
          <div class="text-lg font-bold text-white">128</div>
          <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">总局数</div>
        </div>
        <div class="stats-divider"></div>
        <div class="text-center flex-1">
          <div class="text-lg font-bold text-indigo-400">82</div>
          <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">胜场数</div>
        </div>
        <div class="stats-divider"></div>
        <!-- 核心改动：总积分盈亏显示 -->
        <div class="text-center flex-1">
          <!-- 赢钱显示 emerald-400 (+) | 输钱显示 rose-500 (-) -->
          <div class="text-lg font-bold text-emerald-400">+2,480</div>
          <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">累计盈亏</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. Tool Bento Grid -->
  <div class="grid grid-cols-2 gap-4 animate-slide-up" style="animation-delay: 0.1s">

    <!-- Game Archive -->
    <div onclick="alert('查看详细对局报表')" class="bento-card p-5 col-span-2 flex items-center justify-between relative overflow-hidden group cursor-pointer">
      <div class="absolute -right-10 -top-10 w-32 h-32 bg-indigo-50 rounded-full group-hover:scale-110 transition-transform duration-500"></div>
      <div class="flex items-center gap-4 relative z-10">
        <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl">
          <i class="fa-solid fa-file-invoice-dollar"></i>
        </div>
        <div>
          <h3 class="font-bold text-slate-800">历史账单</h3>
          <p class="text-xs text-slate-400 mt-0.5">查看每一局的输赢明细</p>
        </div>
      </div>
      <i class="fa-solid fa-chevron-right text-slate-300 mr-2 group-hover:translate-x-1 transition-transform"></i>
    </div>

    <!-- Rule Presets -->
    <div onclick="alert('自定义规则库')" class="bento-card p-5 relative overflow-hidden group cursor-pointer">
      <div class="absolute -right-4 -bottom-4 w-20 h-20 bg-emerald-50 rounded-full group-hover:scale-125 transition-transform duration-500"></div>
      <div class="relative z-10">
        <div class="w-10 h-10 rounded-xl bg-emerald-500 text-white flex items-center justify-center mb-3 shadow-lg shadow-emerald-200">
          <i class="fa-solid fa-gavel text-sm"></i>
        </div>
        <h3 class="font-bold text-slate-800">计分模板</h3>
        <p class="text-[10px] text-slate-400 mt-1">保存常用规则</p>
      </div>
    </div>

    <!-- Group/Friends Circle -->
    <div onclick="alert('我的牌友圈')" class="bento-card p-5 relative overflow-hidden group cursor-pointer">
      <div class="absolute -right-4 -bottom-4 w-20 h-20 bg-orange-50 rounded-full group-hover:scale-125 transition-transform duration-500"></div>
      <div class="relative z-10">
        <div class="w-10 h-10 rounded-xl bg-orange-500 text-white flex items-center justify-center mb-3 shadow-lg shadow-orange-200">
          <i class="fa-solid fa-users-viewfinder text-sm"></i>
        </div>
        <h3 class="font-bold text-slate-800">牌友档案</h3>
        <p class="text-[10px] text-slate-400 mt-1">常用对局成员</p>
      </div>
    </div>

    <!-- Activity Chart -->
    <div class="bento-card p-5 col-span-2 overflow-hidden">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-slate-800 text-sm">近七日积分趋势</h3>
        <span class="text-[10px] text-emerald-500 bg-emerald-50 px-2 py-0.5 rounded-full font-bold">状态大好</span>
      </div>
      <div class="flex items-end justify-between h-16 px-2 gap-2">
        <div class="flex-1 bg-slate-100 rounded-t-lg h-[40%] transition-all hover:bg-indigo-400"></div>
        <div class="flex-1 bg-slate-100 rounded-t-lg h-[60%] transition-all hover:bg-indigo-400"></div>
        <div class="flex-1 bg-indigo-500 rounded-t-lg h-[90%]"></div>
        <div class="flex-1 bg-rose-200 rounded-t-lg h-[30%]"></div>
        <div class="flex-1 bg-slate-100 rounded-t-lg h-[50%] transition-all hover:bg-indigo-400"></div>
        <div class="flex-1 bg-indigo-500 rounded-t-lg h-[100%]"></div>
        <div class="flex-1 bg-indigo-200 rounded-t-lg h-[70%]"></div>
      </div>
    </div>
  </div>

  <!-- 4. Functional List -->
  <div class="bg-white rounded-[2rem] p-2 border border-slate-100 shadow-sm animate-slide-up" style="animation-delay: 0.2s">
    <div class="space-y-1">

      <a href="#" class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors group">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors">
            <i class="fa-solid fa-display text-sm"></i>
          </div>
          <div>
            <span class="font-semibold text-slate-700 block">对局环境控制</span>
            <span class="text-[10px] text-slate-400">屏幕常亮、语音播报设置</span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
      </a>

      <a href="#" class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors group">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center group-hover:bg-purple-50 group-hover:text-purple-600 transition-colors">
            <i class="fa-solid fa-palette text-sm"></i>
          </div>
          <span class="font-semibold text-slate-700">界面主题</span>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
      </a>

      <a href="#" class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors group">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center group-hover:bg-emerald-50 group-hover:text-emerald-600 transition-colors">
            <i class="fa-solid fa-circle-nodes text-sm"></i>
          </div>
          <span class="font-semibold text-slate-700">数据同步</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-[10px] text-slate-400">已连接云端</span>
          <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
        </div>
      </a>

      <a href="#" class="flex items-center justify-between p-4 rounded-2xl hover:bg-slate-50 transition-colors group">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
            <i class="fa-solid fa-comment-dots text-sm"></i>
          </div>
          <span class="font-semibold text-slate-700">意见反馈</span>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
      </a>

    </div>
  </div>

  <div class="text-center opacity-30 py-4">
    <p class="text-[10px] font-bold tracking-widest text-slate-400">SCOREGUARD PRO V2.4</p>
  </div>

</main>

<!-- Floating Bottom Nav -->
<div class="fixed bottom-6 w-[90%] max-w-[360px] z-40 left-1/2 -translate-x-1/2">
  <div class="nav-float rounded-full px-6 py-3 flex justify-around items-center">
    <!-- Home -->
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-house"></i>
      </div>
    </a>

    <!-- Analysis -->
    <a href="#" onclick="alert('功能开发中')" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-chart-simple"></i>
      </div>
    </a>

    <!-- Profile (Active) -->
    <a href="#" class="flex flex-col items-center gap-1 text-indigo-600">
      <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-lg shadow-inner scale-110 transition-transform">
        <i class="fa-solid fa-user"></i>
      </div>
    </a>
  </div>
</div>

</body>
</html>
