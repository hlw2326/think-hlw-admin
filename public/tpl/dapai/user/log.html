<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>打牌计分 - 历史账单</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
            'glow': '0 0 20px rgba(59, 130, 246, 0.5)',
            'card': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F6F8FC;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 120px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    .bento-card {
      background: #ffffff;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .dark-glass {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .noise-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .nav-float {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 -10px 40px rgba(0,0,0,0.04);
      border-top: 1px solid rgba(0,0,0,0.03);
    }

    .bill-item {
      transition: transform 0.2s ease;
    }
    .bill-item:active {
      transform: scale(0.97);
    }

    .pill-tab {
      transition: all 0.3s ease;
    }
    .pill-tab.active {
      background: #4f46e5;
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-indigo-100">

<!-- 顶部背景光晕 -->
<div class="fixed top-0 w-full max-w-md h-96 -z-10 pointer-events-none overflow-hidden">
  <div class="absolute top-[-50px] left-[-50px] w-64 h-64 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float"></div>
  <div class="absolute top-[100px] right-[-50px] w-72 h-72 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float" style="animation-delay: 2s"></div>
</div>

<!-- 1. Header -->
<header class="w-full max-w-md flex justify-between items-center px-6 pt-8 pb-4 z-50">
  <div class="flex items-center gap-4">
    <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">历史账单</h1>
  </div>
  <button onclick="alert('筛选对局类型')" class="w-10 h-10 rounded-full bg-white border border-slate-100 shadow-sm flex items-center justify-center text-slate-600 active:scale-90 transition-transform">
    <i class="fa-solid fa-filter text-sm"></i>
  </button>
</header>

<main class="w-full max-w-md px-5 flex flex-col gap-6">

  <!-- 2. Summary Stats Card -->
  <div class="dark-glass rounded-[2.5rem] p-6 shadow-2xl shadow-blue-900/10 animate-slide-up relative">
    <div class="noise-bg"></div>
    <div class="relative z-10">
      <div class="flex justify-between items-start mb-6">
        <div>
          <p class="text-slate-400 text-[10px] uppercase tracking-widest mb-1">本月累计盈亏</p>
          <h2 class="text-3xl font-black text-white">+1,840.00</h2>
        </div>
        <div class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-500/30">
          <i class="fa-solid fa-arrow-trend-up mr-1"></i>胜率 68%
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4 border-t border-white/10 pt-5">
        <div>
          <p class="text-slate-500 text-[10px] mb-1">对局总数</p>
          <p class="text-lg font-bold text-white">24 局</p>
        </div>
        <div>
          <p class="text-slate-500 text-[10px] mb-1">最高赢分</p>
          <p class="text-lg font-bold text-emerald-400">820</p>
        </div>
        <div>
          <p class="text-slate-500 text-[10px] mb-1">平均盈亏</p>
          <p class="text-lg font-bold text-indigo-300">+76</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. Month Selector / Tabs -->
  <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 animate-slide-up" style="animation-delay: 0.1s">
    <button class="pill-tab active whitespace-nowrap px-6 py-2 rounded-full text-sm font-bold bg-white text-slate-400 shadow-sm border border-slate-100">全部</button>
    <button class="pill-tab whitespace-nowrap px-6 py-2 rounded-full text-sm font-bold bg-white text-slate-400 shadow-sm border border-slate-100">本月</button>
    <button class="pill-tab whitespace-nowrap px-6 py-2 rounded-full text-sm font-bold bg-white text-slate-400 shadow-sm border border-slate-100">12月</button>
    <button class="pill-tab whitespace-nowrap px-6 py-2 rounded-full text-sm font-bold bg-white text-slate-400 shadow-sm border border-slate-100">11月</button>
  </div>

  <!-- 4. Records List -->
  <div class="space-y-4 animate-slide-up" style="animation-delay: 0.2s">
    <p class="text-[10px] font-bold text-slate-400 tracking-widest px-2 uppercase">今天 - 1月24日</p>

    <!-- Record Item 1 (Win) -->
    <div onclick="alert('对局详情')" class="bento-card p-4 flex items-center justify-between bill-item cursor-pointer">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl">
          <i class="fa-solid fa-dice-six"></i>
        </div>
        <div>
          <h3 class="font-bold text-slate-800 text-sm">欢乐麻将 - 亲友圈</h3>
          <p class="text-[10px] text-slate-400 mt-0.5">14:30 · 4人局 · 计分制</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-emerald-500 font-black text-lg">+450</p>
        <p class="text-[9px] text-emerald-400 font-bold bg-emerald-50 px-1 rounded">WINNER</p>
      </div>
    </div>

    <!-- Record Item 2 (Loss) -->
    <div onclick="alert('对局详情')" class="bento-card p-4 flex items-center justify-between bill-item cursor-pointer">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-rose-50 text-rose-600 flex items-center justify-center text-xl">
          <i class="fa-solid fa-clover"></i>
        </div>
        <div>
          <h3 class="font-bold text-slate-800 text-sm">德州扑克 - 练习赛</h3>
          <p class="text-[10px] text-slate-400 mt-0.5">11:15 · 6人局 · 积分赛</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-rose-500 font-black text-lg">-120</p>
        <p class="text-[9px] text-slate-300 font-bold bg-slate-50 px-1 rounded">LOSS</p>
      </div>
    </div>

    <p class="text-[10px] font-bold text-slate-400 tracking-widest px-2 uppercase mt-8">昨天 - 1月23日</p>

    <!-- Record Item 3 -->
    <div onclick="alert('对局详情')" class="bento-card p-4 flex items-center justify-between bill-item cursor-pointer">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl">
          <i class="fa-solid fa-spade"></i>
        </div>
        <div>
          <h3 class="font-bold text-slate-800 text-sm">跑得快 - 晚间场</h3>
          <p class="text-[10px] text-slate-400 mt-0.5">22:05 · 3人局 · 翻倍规则</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-emerald-500 font-black text-lg">+1,200</p>
        <p class="text-[9px] text-emerald-400 font-bold bg-emerald-50 px-1 rounded">WINNER</p>
      </div>
    </div>

    <!-- Record Item 4 -->
    <div onclick="alert('对局详情')" class="bento-card p-4 flex items-center justify-between bill-item cursor-pointer">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center text-xl">
          <i class="fa-solid fa-chess-pawn"></i>
        </div>
        <div>
          <h3 class="font-bold text-slate-800 text-sm">斗地主 - 娱乐场</h3>
          <p class="text-[10px] text-slate-400 mt-0.5">19:40 · 3人局 · 封顶规则</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-slate-400 font-black text-lg">0</p>
        <p class="text-[9px] text-slate-300 font-bold bg-slate-50 px-1 rounded">DRAW</p>
      </div>
    </div>
  </div>

  <div class="text-center py-6 opacity-30">
    <p class="text-[10px] font-bold tracking-widest text-slate-400">已加载全部历史数据</p>
  </div>

</main>

<!-- Floating Bottom Nav -->
<div class="fixed bottom-6 w-[90%] max-w-[360px] z-40 left-1/2 -translate-x-1/2">
  <div class="nav-float rounded-full px-6 py-3 flex justify-around items-center">
    <!-- Home -->
    <a href="#" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-house"></i>
      </div>
    </a>

    <!-- Analysis (Active) -->
    <a href="#" class="flex flex-col items-center gap-1 text-indigo-600">
      <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-lg shadow-inner scale-110 transition-transform">
        <i class="fa-solid fa-chart-simple"></i>
      </div>
    </a>

    <!-- Profile -->
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors">
      <div class="w-10 h-10 flex items-center justify-center text-lg">
        <i class="fa-solid fa-user"></i>
      </div>
    </a>
  </div>
</div>

<script>
  // 简单的选项卡切换逻辑
  document.querySelectorAll('.pill-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.pill-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });
</script>

</body>
</html>
