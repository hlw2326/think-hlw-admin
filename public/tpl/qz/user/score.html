<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>积分充值</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        amber: {
                            450: '#F59E0B',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* 选中态的高亮边框与背景 */
        .plan-card-active {
            border-color: #fbbf24 !important;
            background-color: #fffbeb !important; /* amber-50 */
            position: relative;
        }

        /* 选中态的右下角角标 */
        .plan-card-active::after {
            content: '\f00c';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            bottom: 0;
            right: 0;
            background: #fbbf24;
            color: #1e293b;
            font-size: 10px;
            padding: 2px 6px 4px 8px;
            border-top-left-radius: 10px;
            border-bottom-right-radius: 0.75rem; /* matches rounded-xl */
        }

        /* 推荐标签流光 */
        .badge-shimmer {
            background: linear-gradient(45deg, #ef4444, #f43f5e, #ef4444);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-amber-100">

<!-- 背景装饰 (保持一致) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-blue-400/10 blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-20%] w-[100vw] h-[100vw] rounded-full bg-indigo-500/10 blur-3xl"></div>
</div>

<main class="w-full max-w-md flex-1 flex flex-col pb-24">

    <!-- 头部Header已移除 -->

    <div class="p-5 flex flex-col gap-6 pt-8"> <!-- 增加顶部padding以弥补Header缺失的空间 -->

        <!-- 2. Current Balance Card -->
        <div class="bg-white/95 backdrop-blur border border-white shadow-sm rounded-2xl p-5 relative overflow-hidden">
            <!-- 装饰背景 -->
            <div class="absolute top-0 right-0 w-24 h-24 bg-amber-100/50 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>

            <div class="flex items-center justify-between relative z-10">
                <div>
                    <div class="text-xs text-slate-400 font-medium mb-1">当前剩余积分</div>
                    <div class="flex items-baseline gap-1">
                        <span class="text-3xl font-black text-slate-800 tracking-tight">2,850</span>
                        <span class="text-xs font-bold text-amber-500 bg-amber-50 px-1.5 py-0.5 rounded">Lv.9 加成中</span>
                    </div>
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-amber-500 shadow-sm">
                    <i class="fa-solid fa-coins text-lg"></i>
                </div>
            </div>
            <div class="mt-4 pt-3 border-t border-slate-50 flex items-center gap-4 text-[10px] text-slate-400">
                <span class="flex items-center gap-1"><i class="fa-solid fa-check text-green-500"></i> 积分永久有效</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-check text-green-500"></i> 支持多端同步</span>
            </div>
        </div>

        <!-- 3. Recharge Grid -->
        <div>
            <h3 class="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2">
                选择充值套餐
                <span class="text-[10px] font-normal text-slate-400 bg-slate-100 px-1.5 rounded text-scale-90">1元=10积分</span>
            </h3>

            <div class="grid grid-cols-2 gap-3" id="planContainer">
                <!-- Plan 1 -->
                <div class="plan-card bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-hidden" onclick="selectPlan(this, 6, 60)">
                    <div class="text-xl font-black text-slate-800">60 <span class="text-xs font-normal text-slate-400">积分</span></div>
                    <div class="text-sm font-bold text-slate-600">¥ 6.00</div>
                </div>

                <!-- Plan 2 (Active) -->
                <div class="plan-card plan-card-active bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-hidden shadow-sm" onclick="selectPlan(this, 28, 300)">
                    <div class="absolute top-0 left-0 bg-slate-800 text-amber-400 text-[9px] font-bold px-2 py-0.5 rounded-br-lg z-10">
                        首充惠
                    </div>
                    <div class="text-xl font-black text-slate-800">300 <span class="text-xs font-normal text-slate-400">积分</span></div>
                    <div class="text-sm font-bold text-amber-600">¥ 28.00</div>
                    <div class="text-[9px] text-slate-400 line-through">¥ 30.00</div>
                </div>

                <!-- Plan 3 (Hot) -->
                <div class="plan-card bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-visible" onclick="selectPlan(this, 68, 750)">
                    <!-- 悬浮标签 -->
                    <div class="absolute -top-2.5 left-1/2 -translate-x-1/2 badge-shimmer text-white text-[9px] font-bold px-2 py-0.5 rounded-full shadow-sm z-20 whitespace-nowrap border border-white">
                        超值热销
                    </div>
                    <div class="text-xl font-black text-slate-800">750 <span class="text-xs font-normal text-slate-400">积分</span></div>
                    <div class="text-sm font-bold text-slate-600">¥ 68.00</div>
                    <div class="text-[9px] text-green-500 font-medium">多送70积分</div>
                </div>

                <!-- Plan 4 -->
                <div class="plan-card bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-hidden" onclick="selectPlan(this, 128, 1500)">
                    <div class="text-xl font-black text-slate-800">1500 <span class="text-xs font-normal text-slate-400">积分</span></div>
                    <div class="text-sm font-bold text-slate-600">¥ 128.00</div>
                    <div class="text-[9px] text-green-500 font-medium">多送220积分</div>
                </div>

                <!-- 企业版已移除 -->

            </div>
        </div>

        <!-- 4. Payment Method -->
        <div>
            <h3 class="text-sm font-bold text-slate-800 mb-3">支付方式</h3>
            <div class="bg-white/95 backdrop-blur border border-white shadow-sm rounded-2xl overflow-hidden">
                <!-- WeChat -->
                <div class="flex items-center justify-between p-4 border-b border-slate-50 cursor-pointer active:bg-slate-50" onclick="selectPayment('wechat')">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-[#09BB07]/10 text-[#09BB07] flex items-center justify-center text-lg">
                            <i class="fa-brands fa-weixin"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-slate-700">微信支付</span>
                            <span class="text-[10px] text-slate-400">亿万用户的选择</span>
                        </div>
                    </div>
                    <div class="w-4 h-4 rounded-full border border-slate-300 flex items-center justify-center pay-radio relative" id="radio-wechat">
                        <div class="w-2 h-2 rounded-full bg-slate-800 hidden"></div>
                    </div>
                </div>

                <!-- Alipay -->
                <div class="flex items-center justify-between p-4 cursor-pointer active:bg-slate-50" onclick="selectPayment('alipay')">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-[#1677FF]/10 text-[#1677FF] flex items-center justify-center text-lg">
                            <i class="fa-brands fa-alipay"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-slate-700">支付宝</span>
                            <span class="text-[10px] text-slate-400">数码港推荐支付</span>
                        </div>
                    </div>
                    <div class="w-4 h-4 rounded-full border border-slate-300 flex items-center justify-center pay-radio relative" id="radio-alipay">
                        <div class="w-2 h-2 rounded-full bg-slate-800 hidden"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Disclaimer -->
        <p class="text-[10px] text-slate-400 leading-relaxed text-center px-2">
            点击立即支付即代表您已同意 <a href="#" class="text-blue-500">《用户充值协议》</a>。
            虚拟商品充值后不支持退款。如遇充值到账延迟，请联系客服。
        </p>

    </div>

</main>

<!-- 5. Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 pb-8 z-50">
    <div class="w-full max-w-md mx-auto flex items-center justify-between gap-4">
        <div class="flex flex-col">
            <div class="text-[10px] text-slate-500">实付金额</div>
            <div class="flex items-baseline gap-1">
                <span class="text-xs font-bold text-slate-800">¥</span>
                <span class="text-2xl font-black text-slate-800" id="totalPrice">28.00</span>
            </div>
        </div>
        <button class="flex-1 bg-gradient-to-r from-slate-800 to-slate-900 text-amber-400 font-bold py-3 px-6 rounded-xl shadow-lg shadow-slate-200 active:scale-[0.98] transition-transform flex items-center justify-center gap-2" onclick="alert('调起支付接口...')">
            <span>立即支付</span>
            <i class="fa-solid fa-bolt text-xs animate-pulse"></i>
        </button>
    </div>
</div>

<script>
    // 默认选中
    let selectedPrice = 28.00;
    let paymentMethod = 'wechat';

    // 初始化状态
    document.addEventListener('DOMContentLoaded', () => {
        updatePaymentUI();
    });

    function selectPlan(element, price, points) {
        // 1. Remove active class from all
        document.querySelectorAll('.plan-card').forEach(card => {
            card.classList.remove('plan-card-active');

            // Handle special styling for the dark card removal if needed
            // (In this simple logic, we just toggle the specific border/bg class)
            if(card.classList.contains('col-span-2')) {
                // Remove custom active styling for dark card if implemented differently
            }
        });

        // 2. Add active class to clicked
        element.classList.add('plan-card-active');

        // 3. Update Price
        selectedPrice = price;
        animateValue(document.getElementById('totalPrice'), parseFloat(document.getElementById('totalPrice').innerText), price, 300);
    }

    function selectPayment(method) {
        paymentMethod = method;
        updatePaymentUI();
    }

    function updatePaymentUI() {
        // Reset Radios
        document.querySelectorAll('.pay-radio div').forEach(dot => dot.classList.add('hidden'));
        document.querySelectorAll('.pay-radio').forEach(circle => {
            circle.classList.remove('border-slate-800', 'border-2');
            circle.classList.add('border-slate-300');
        });

        // Set Active
        const activeRadio = document.getElementById(`radio-${paymentMethod}`);
        const activeDot = activeRadio.querySelector('div');

        activeRadio.classList.remove('border-slate-300');
        activeRadio.classList.add('border-slate-800', 'border-2');
        activeDot.classList.remove('hidden');
    }

    // Number Animation for Price
    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = (start + (end - start) * progress).toFixed(2);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }
</script>

</body>
</html>
