<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>开通会员</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        gold: {
                            100: '#FEF3C7',
                            300: '#FCD34D',
                            400: '#FBBF24',
                            500: '#F59E0B',
                            600: '#D97706',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* 顶部黑金卡片背景 */
        .vip-header-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #000000 100%);
            position: relative;
            overflow: hidden;
        }

        /* 金色流光动画 */
        .shimmer-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent 0%, rgba(251, 191, 36, 0.1) 50%, transparent 100%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: skewX(-20deg) translateX(-150%); }
            50% { transform: skewX(-20deg) translateX(150%); }
            100% { transform: skewX(-20deg) translateX(150%); }
        }

        /* 选中套餐的样式 */
        .plan-card.active {
            background-color: #FFFBEB; /* amber-50 */
            border-color: #FBBF24; /* amber-400 */
            position: relative;
        }

        /* 选中套餐的角标 */
        .plan-card.active::after {
            content: '\f00c';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            bottom: 0;
            right: 0;
            background: #FBBF24;
            color: #1e293b;
            font-size: 10px;
            padding: 2px 6px 2px 8px;
            border-top-left-radius: 8px;
            border-bottom-right-radius: 12px; /* Match card radius */
        }

        /* 支付方式选中样式 */
        .payment-card.active {
            border-color: #FBBF24;
            background-color: #FFFBEB;
        }
        .payment-card.active .check-icon {
            background-color: #FBBF24;
            border-color: #FBBF24;
            color: white;
        }

        .text-gold-gradient {
            background: linear-gradient(to right, #fcd34d, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative selection:bg-amber-100">

<!-- 背景装饰 (保持一致) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-blue-400/10 blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-20%] w-[100vw] h-[100vw] rounded-full bg-indigo-500/10 blur-3xl"></div>
</div>

<main class="w-full max-w-md flex-1 p-5 pt-8 flex flex-col gap-6 pb-32">

    <!-- 1. VIP Identity Card (Preview) -->
    <div class="vip-header-card rounded-2xl p-6 text-white shadow-xl shadow-amber-900/10 border border-amber-500/20">
        <!-- 返回按钮 -->
        <button onclick="history.back()" class="absolute top-4 right-4 text-white/50 hover:text-white transition-colors">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>

        <div class="shimmer-effect"></div>

        <!-- User Info inside Card -->
        <div class="flex items-center gap-3 relative z-10 mb-6">
            <div class="w-12 h-12 rounded-full border-2 border-amber-300 p-0.5">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix&backgroundColor=FFE0B2" class="w-full h-full rounded-full bg-slate-800 object-cover">
            </div>
            <div>
                <div class="font-bold text-lg leading-tight text-white">Guest_9527</div>
                <div class="text-[11px] text-slate-400">当前身份: <span class="text-slate-300">普通用户</span></div>
            </div>
        </div>

        <div class="relative z-10">
            <h1 class="text-2xl font-black italic tracking-wide text-gold-gradient mb-1">PRO MEMBER</h1>
            <p class="text-xs text-amber-100/60 font-light">解锁 12 项专属特权，尊享极速体验</p>
        </div>

        <!-- Decorative Icon -->
        <i class="fa-solid fa-crown absolute -bottom-4 -right-4 text-8xl text-white/5 rotate-12"></i>
    </div>

    <!-- 2. Benefits Grid (Privileges) - Wrapped in Card -->
    <div class="bg-white/95 backdrop-blur border border-white shadow-sm rounded-2xl p-4">
        <div class="flex items-center justify-between mb-3">
            <h3 class="font-bold text-slate-800">会员特权</h3>
            <!-- 这里删除了“查看全部” -->
        </div>

        <!-- Horizontal Scroll Container -->
        <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar">
            <!-- Item 1 -->
            <div class="flex-shrink-0 w-20 flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl shadow-sm border border-amber-100 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <span class="text-[11px] text-slate-600 font-medium">极速通道</span>
            </div>
            <!-- Item 2 -->
            <div class="flex-shrink-0 w-20 flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl shadow-sm border border-amber-100 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-infinity"></i>
                </div>
                <span class="text-[11px] text-slate-600 font-medium">无限次数</span>
            </div>
            <!-- Item 3 -->
            <div class="flex-shrink-0 w-20 flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl shadow-sm border border-amber-100 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <span class="text-[11px] text-slate-600 font-medium">高级模型</span>
            </div>
            <!-- Item 4 -->
            <div class="flex-shrink-0 w-20 flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-xl shadow-sm border border-amber-100 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-headset"></i>
                </div>
                <span class="text-[11px] text-slate-600 font-medium">专属客服</span>
            </div>
            <!-- Item 5 -->
            <div class="flex-shrink-0 w-20 flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-xl bg-slate-50 text-slate-300 flex items-center justify-center text-xl shadow-sm border border-slate-100 group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <span class="text-[11px] text-slate-400 font-medium">敬请期待</span>
            </div>
        </div>
    </div>

    <!-- 3. Pricing Plans -->
    <div>
        <h3 class="font-bold text-slate-800 mb-3 px-1">选择套餐</h3>
        <div class="grid grid-cols-3 gap-3">

            <!-- Plan 1: Monthly -->
            <div class="plan-card bg-white border border-slate-200 rounded-2xl p-3 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-95" onclick="selectPlan(this, 18, '月卡')">
                <div class="text-xs text-slate-500 font-medium">连续包月</div>
                <div class="flex items-baseline gap-0.5 text-slate-800">
                    <span class="text-xs font-bold">¥</span>
                    <span class="text-2xl font-black font-mono">18</span>
                </div>
                <div class="text-[10px] text-slate-400 line-through">¥28</div>
            </div>

            <!-- Plan 2: Quarterly (Active by default) -->
            <div class="plan-card active bg-white border border-slate-200 rounded-2xl p-3 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-95 relative overflow-hidden" onclick="selectPlan(this, 48, '季卡')">
                <!-- Tag -->
                <div class="absolute top-0 left-0 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-br-lg z-10">
                    热门
                </div>
                <div class="text-xs text-slate-500 font-medium mt-1">连续包季</div>
                <div class="flex items-baseline gap-0.5 text-slate-800">
                    <span class="text-xs font-bold">¥</span>
                    <span class="text-2xl font-black font-mono">48</span>
                </div>
                <div class="text-[10px] text-amber-500 font-bold bg-amber-50 px-1.5 rounded">省 ¥36</div>
            </div>

            <!-- Plan 3: Yearly -->
            <div class="plan-card bg-white border border-slate-200 rounded-2xl p-3 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-95 overflow-hidden relative" onclick="selectPlan(this, 168, '年卡')">
                <!-- Tag -->
                <div class="absolute top-0 right-0 bg-amber-400 text-slate-900 text-[9px] font-bold px-1.5 py-0.5 rounded-bl-lg z-10">
                    5折
                </div>
                <div class="text-xs text-slate-500 font-medium mt-1">12个月</div>
                <div class="flex items-baseline gap-0.5 text-slate-800">
                    <span class="text-xs font-bold">¥</span>
                    <span class="text-2xl font-black font-mono">168</span>
                </div>
                <div class="text-[10px] text-slate-400 line-through">¥336</div>
            </div>

        </div>
    </div>

    <!-- 4. Payment Method (Redesigned) -->
    <div class="space-y-3">
        <h3 class="font-bold text-slate-800 px-1">支付方式</h3>

        <!-- WeChat Pay -->
        <div class="payment-card active flex items-center justify-between p-4 rounded-xl border border-amber-400 bg-amber-50 cursor-pointer transition-all" onclick="selectPayment(this)">
            <div class="flex items-center gap-3">
                <i class="fa-brands fa-weixin text-[#09BB07] text-2xl"></i>
                <div>
                    <div class="text-sm font-bold text-slate-800">微信支付</div>
                    <div class="text-[10px] text-slate-400">亿万用户的选择</div>
                </div>
            </div>
            <!-- Custom Radio Circle -->
            <div class="check-icon w-5 h-5 rounded-full border border-amber-400 bg-amber-400 flex items-center justify-center text-white text-xs transition-colors">
                <i class="fa-solid fa-check"></i>
            </div>
        </div>

        <!-- Alipay -->
        <div class="payment-card flex items-center justify-between p-4 rounded-xl border border-slate-200 bg-white cursor-pointer transition-all" onclick="selectPayment(this)">
            <div class="flex items-center gap-3">
                <i class="fa-brands fa-alipay text-[#1677FF] text-2xl"></i>
                <div>
                    <div class="text-sm font-bold text-slate-800">支付宝</div>
                    <div class="text-[10px] text-slate-400">数亿用户的选择</div>
                </div>
            </div>
            <!-- Custom Radio Circle -->
            <div class="check-icon w-5 h-5 rounded-full border border-slate-300 bg-transparent flex items-center justify-center text-transparent text-xs transition-colors">
                <i class="fa-solid fa-check"></i>
            </div>
        </div>
    </div>

</main>

<!-- Bottom Sticky Bar -->
<div class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 pb-8 shadow-[0_-4px_12px_-4px_rgba(0,0,0,0.05)] z-40">
    <div class="flex items-center gap-4">
        <div class="flex-1">
            <div class="flex items-baseline gap-1">
                <span class="text-xs font-medium text-slate-500">总计:</span>
                <span class="text-lg font-bold text-slate-900">¥</span>
                <span id="totalPrice" class="text-3xl font-black text-slate-900 font-mono tracking-tighter">48</span>
            </div>
            <div id="planName" class="text-[10px] text-amber-500 font-medium">已选: 连续包季</div>
        </div>
        <button class="flex-1 bg-gradient-to-r from-slate-800 to-black text-amber-400 font-bold py-3.5 rounded-xl shadow-lg shadow-slate-900/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
            <span>立即开通</span>
            <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
        </button>
    </div>
</div>

<script>
    function selectPlan(element, price, name) {
        // 1. Remove active class from all cards
        document.querySelectorAll('.plan-card').forEach(card => {
            card.classList.remove('active');
        });

        // 2. Add active class to clicked card
        element.classList.add('active');

        // 3. Update bottom price display with animation
        const priceEl = document.getElementById('totalPrice');
        const planEl = document.getElementById('planName');

        // Simple scale animation
        priceEl.style.transform = 'scale(0.8)';
        priceEl.style.opacity = '0.5';

        setTimeout(() => {
            priceEl.innerText = price;
            planEl.innerText = '已选: ' + name;
            priceEl.style.transform = 'scale(1)';
            priceEl.style.opacity = '1';
            priceEl.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }, 150);
    }

    function selectPayment(element) {
        // 1. Remove active from all payment cards
        document.querySelectorAll('.payment-card').forEach(card => {
            card.classList.remove('active');
            card.classList.remove('bg-amber-50');
            card.classList.remove('border-amber-400');
            card.classList.add('border-slate-200');
            card.classList.add('bg-white');

            // Reset Icon
            const icon = card.querySelector('.check-icon');
            icon.classList.remove('bg-amber-400', 'border-amber-400', 'text-white');
            icon.classList.add('border-slate-300', 'text-transparent');
        });

        // 2. Add active to clicked card
        element.classList.add('active');
        element.classList.remove('bg-white', 'border-slate-200');
        element.classList.add('bg-amber-50', 'border-amber-400');

        // 3. Update Icon style
        const activeIcon = element.querySelector('.check-icon');
        activeIcon.classList.remove('border-slate-300', 'text-transparent');
        activeIcon.classList.add('bg-amber-400', 'border-amber-400', 'text-white');
    }
</script>
</body>
</html>
