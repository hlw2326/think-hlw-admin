<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>新手教程</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            800: '#1F2937',
                            900: '#111827',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F3F4F6; /* 统一的浅灰背景 */
            -webkit-tap-highlight-color: transparent;
        }

        /* 隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 简单的时间轴线 */
        .timeline-line {
            position: absolute;
            left: 20px;
            top: 40px;
            bottom: -20px;
            width: 2px;
            background-color: #E5E7EB;
            z-index: 0;
        }
        .step-item:last-child .timeline-line { display: none; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center">

<main class="w-full max-w-md bg-white min-h-screen shadow-sm flex flex-col">

    <!-- 1. 简洁顶部栏 (白底黑字) -->
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100 px-4 pt-safe-top">
        <div class="h-12 flex items-center justify-between">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center -ml-2 text-gray-800 hover:bg-gray-50 rounded-full transition-colors">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="font-bold text-base text-gray-900">如何获取链接</h1>
            <div class="w-10"></div>
        </div>

        <!-- 平台切换 Tabs (简单的下划线风格) -->
        <div class="flex overflow-x-auto hide-scrollbar gap-6 px-1 mt-1">
            <button onclick="switchTab('douyin')" id="tab-douyin" class="tab-btn pb-3 text-sm font-bold text-gray-900 border-b-2 border-gray-900 whitespace-nowrap transition-colors">
                抖音
            </button>
            <button onclick="switchTab('kuaishou')" id="tab-kuaishou" class="tab-btn pb-3 text-sm font-medium text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-colors">
                快手
            </button>
            <button onclick="switchTab('rednote')" id="tab-rednote" class="tab-btn pb-3 text-sm font-medium text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-colors">
                小红书
            </button>
            <button onclick="switchTab('bilibili')" id="tab-bilibili" class="tab-btn pb-3 text-sm font-medium text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-colors">
                B站
            </button>
            <button onclick="switchTab('wechat')" id="tab-wechat" class="tab-btn pb-3 text-sm font-medium text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-colors">
                视频号
            </button>
        </div>
    </header>

    <!-- 2. 内容区域 -->
    <div class="flex-1 p-5 pb-10 overflow-y-auto" id="content-area">
        <!-- 动态内容将直接在这里渲染，无动画 -->
    </div>

</main>

<script>
    // 数据源
    const tutorials = {
        douyin: {
            color: 'text-gray-900', // 抖音黑
            bgColor: 'bg-gray-900',
            icon: 'fa-brands fa-tiktok',
            steps: [
                { title: '进入主页', desc: '打开抖音App，点击右下角“我”' },
                { title: '打开菜单', desc: '点击右上角的 <i class="fa-solid fa-bars mx-1 bg-gray-100 px-1 rounded text-xs"></i> 三条杠图标' },
                { title: '找到入口', desc: '在侧边栏底部找到“分享主页”' },
                { title: '复制链接', desc: '点击 <span class="font-bold">复制链接</span> 按钮' }
            ]
        },
        kuaishou: {
            color: 'text-orange-500',
            bgColor: 'bg-orange-500',
            icon: 'fa-solid fa-camera',
            steps: [
                { title: '进入主页', desc: '打开快手App，点击“我”' },
                { title: '分享主页', desc: '点击右上角的 <i class="fa-solid fa-share-nodes mx-1 bg-gray-100 px-1 rounded text-xs"></i> 箭头图标' },
                { title: '复制链接', desc: '在面板中点击 <span class="text-orange-600 font-bold">复制链接</span>' }
            ]
        },
        rednote: {
            color: 'text-red-500',
            bgColor: 'bg-red-500',
            icon: 'fa-solid fa-book',
            steps: [
                { title: '个人主页', desc: '进入小红书个人主页' },
                { title: '点击分享', desc: '点击右上角 <i class="fa-solid fa-arrow-up-from-bracket mx-1 bg-gray-100 px-1 rounded text-xs"></i> 或 <i class="fa-solid fa-gear mx-1 bg-gray-100 px-1 rounded text-xs"></i>' },
                { title: '复制链接', desc: '选择“分享主页”，然后点击 <span class="text-red-600 font-bold">复制链接</span>' }
            ]
        },
        bilibili: {
            color: 'text-pink-500',
            bgColor: 'bg-pink-500',
            icon: 'fa-brands fa-bilibili',
            steps: [
                { title: 'UP主空间', desc: '进入你想分享的UP主空间' },
                { title: '更多菜单', desc: '点击右上角 <i class="fa-solid fa-ellipsis-vertical mx-1 bg-gray-100 px-1 rounded text-xs"></i> 三个点' },
                { title: '分享空间', desc: '选择 <span class="text-pink-500 font-bold">分享空间</span> -> 复制链接' }
            ]
        },
        wechat: {
            color: 'text-green-600',
            bgColor: 'bg-green-600',
            icon: 'fa-brands fa-weixin',
            steps: [
                { title: '视频号主页', desc: '点击头像进入视频号主页' },
                { title: '点击菜单', desc: '点击右上角 <i class="fa-solid fa-ellipsis mx-1 bg-gray-100 px-1 rounded text-xs"></i> 按钮' },
                { title: '推荐给朋友', desc: '选择“推荐给朋友”，发给“文件传输助手”' },
                { title: '长按复制', desc: '在聊天框长按卡片复制' }
            ]
        }
    };

    function switchTab(platform) {
        const data = tutorials[platform];

        // 1. 更新 Tabs 样式 (纯CSS类切换)
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.className = 'tab-btn pb-3 text-sm font-medium text-gray-500 border-b-2 border-transparent whitespace-nowrap transition-colors cursor-pointer';
        });
        const activeTab = document.getElementById(`tab-${platform}`);
        activeTab.className = 'tab-btn pb-3 text-sm font-bold text-gray-900 border-b-2 border-gray-900 whitespace-nowrap transition-colors cursor-pointer';

        // 2. 生成内容 (直接HTML拼接，无动效)
        const contentArea = document.getElementById('content-area');

        let html = `
                <div class="mb-8 mt-2 flex items-center gap-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <div class="w-12 h-12 rounded-lg ${data.bgColor} text-white flex items-center justify-center text-2xl shadow-sm">
                        <i class="${data.icon}"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg text-gray-900">操作步骤</h2>
                        <p class="text-xs text-gray-500">请跟随以下指引完成操作</p>
                    </div>
                </div>

                <div class="pl-2">
            `;

        data.steps.forEach((step, index) => {
            html += `
                    <div class="step-item relative flex gap-4 mb-8">
                        <div class="timeline-line"></div>

                        <!-- 序号圆圈 -->
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-sm font-bold text-gray-700 z-10 shadow-sm">
                            ${index + 1}
                        </div>

                        <!-- 文字内容 -->
                        <div class="pt-1.5 pb-2">
                            <h3 class="font-bold text-gray-900 text-sm mb-1">${step.title}</h3>
                            <p class="text-sm text-gray-600 leading-relaxed">${step.desc}</p>
                        </div>
                    </div>
                `;
        });

        // 提示信息
        html += `
                <div class="mt-4 p-3 bg-blue-50 text-blue-800 text-xs rounded-lg flex gap-2 items-start leading-relaxed">
                    <i class="fa-solid fa-circle-info mt-0.5"></i>
                    <span>温馨提示：复制出来的链接如果包含中文文字，系统会自动识别处理，无需手动删除。</span>
                </div>
                </div>
            `;

        contentArea.innerHTML = html;
    }

    // 初始化
    switchTab('douyin');

</script>
</body>
</html>
