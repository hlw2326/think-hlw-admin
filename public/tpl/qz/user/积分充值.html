<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>积分充值</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        amber: {
                            450: '#F59E0B',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* 选中态的高亮边框与背景 */
        .plan-card-active {
            border-color: #fbbf24 !important;
            background-color: #fffbeb !important; /* amber-50 */
            position: relative;
        }

        /* 选中态的右下角角标 */
        .plan-card-active::after {
            content: '\f00c';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            bottom: 0;
            right: 0;
            background: #fbbf24;
            color: #1e293b;
            font-size: 10px;
            padding: 2px 6px 4px 8px;
            border-top-left-radius: 10px;
            border-bottom-right-radius: 0.75rem; /* matches rounded-xl */
        }

        /* 推荐标签流光 */
        .badge-shimmer {
            background: linear-gradient(45deg, #ef4444, #f43f5e, #ef4444);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-amber-100">

<!-- 背景装饰 (保持一致) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-blue-400/10 blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-20%] w-[100vw] h-[100vw] rounded-full bg-indigo-500/10 blur-3xl"></div>
</div>

<main class="w-full max-w-md flex-1 flex flex-col pb-24">

    <!-- 顶部操作栏 (新增，用于放置充值记录入口) -->
    <div class="w-full px-5 pt-4 flex justify-end">
        <button class="text-xs text-slate-500 bg-white/50 backdrop-blur border border-slate-200 px-2.5 py-1 rounded-full flex items-center gap-1 active:scale-95 transition-transform"
                onclick="alert('跳转到充值记录页面')">
            <i class="fa-solid fa-clock-rotate-left"></i> 充值记录
        </button>
    </div>

    <div class="p-5 flex flex-col gap-6 pt-2">

        <!-- 2. Current Balance Card -->
        <div class="bg-white/95 backdrop-blur border border-white shadow-sm rounded-2xl p-5 relative overflow-hidden">
            <!-- 装饰背景 -->
            <div class="absolute top-0 right-0 w-24 h-24 bg-amber-100/50 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>

            <div class="flex items-center justify-between relative z-10">
                <div>
                    <div class="text-xs text-slate-400 font-medium mb-1">当前剩余积分</div>
                    <div class="flex items-baseline gap-1">
                        <span class="text-4xl font-black text-slate-800 tracking-tight">2,850</span>
                        <!-- Lv.9 加成中 已删除 -->
                    </div>
                </div>
                <!-- 积分图标稍微调大一点 -->
                <div class="w-12 h-12 rounded-full bg-amber-50 border border-amber-100 flex items-center justify-center text-amber-500 shadow-sm animate-[bounce_3s_infinite]">
                    <i class="fa-solid fa-coins text-xl"></i>
                </div>
            </div>
            <div class="mt-5 pt-4 border-t border-slate-100 flex items-center justify-between text-[10px] text-slate-400">
                <span class="flex items-center gap-1.5"><i class="fa-solid fa-shield-halved text-green-500"></i> 支付安全保障</span>
                <span class="flex items-center gap-1.5"><i
                        class="fa-solid fa-bolt text-yellow-500"></i> 极速自动到账</span>
                <!-- 支持多端同步 已删除并替换为更有用的信息 -->
            </div>
        </div>

        <!-- 3. Recharge Grid -->
        <div>
            <h3 class="text-sm font-bold text-slate-800 mb-3 flex items-center justify-between">
                <span>选择充值套餐</span>
                <span class="text-[10px] font-normal text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">1元=10积分</span>
            </h3>

            <div class="grid grid-cols-2 gap-3" id="planContainer">
                <!-- Plan 1 -->
                <div class="plan-card bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-hidden"
                     onclick="selectPlan(this, 6, 60)">
                    <div class="text-xl font-black text-slate-800">60 <span class="text-xs font-normal text-slate-400">积分</span>
                    </div>
                    <div class="text-sm font-bold text-slate-600">¥ 6.00</div>
                </div>

                <!-- Plan 2 (Active) -->
                <div class="plan-card plan-card-active bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-hidden shadow-sm"
                     onclick="selectPlan(this, 28, 300)">
                    <div class="absolute top-0 left-0 bg-slate-800 text-amber-400 text-[9px] font-bold px-2 py-0.5 rounded-br-lg z-10">
                        首充惠
                    </div>
                    <div class="text-xl font-black text-slate-800">300 <span class="text-xs font-normal text-slate-400">积分</span>
                    </div>
                    <div class="text-sm font-bold text-amber-600">¥ 28.00</div>
                    <div class="text-[9px] text-slate-400 line-through">¥ 30.00</div>
                </div>

                <!-- Plan 3 (Hot) -->
                <div class="plan-card bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-visible"
                     onclick="selectPlan(this, 68, 750)">
                    <!-- 悬浮标签 -->
                    <div class="absolute -top-2.5 left-1/2 -translate-x-1/2 badge-shimmer text-white text-[9px] font-bold px-2 py-0.5 rounded-full shadow-sm z-20 whitespace-nowrap border border-white">
                        超值热销
                    </div>
                    <div class="text-xl font-black text-slate-800">750 <span class="text-xs font-normal text-slate-400">积分</span>
                    </div>
                    <div class="text-sm font-bold text-slate-600">¥ 68.00</div>
                    <div class="text-[9px] text-green-500 font-medium">多送70积分</div>
                </div>

                <!-- Plan 4 -->
                <div class="plan-card bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center gap-1 cursor-pointer transition-all active:scale-[0.98] relative overflow-hidden"
                     onclick="selectPlan(this, 128, 1500)">
                    <div class="text-xl font-black text-slate-800">1500 <span
                            class="text-xs font-normal text-slate-400">积分</span></div>
                    <div class="text-sm font-bold text-slate-600">¥ 128.00</div>
                    <div class="text-[9px] text-green-500 font-medium">多送220积分</div>
                </div>

            </div>
        </div>

        <!-- 新增: 常见问题入口 / 联系客服 -->
        <div class="bg-white/50 border border-white/60 rounded-xl p-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-xs">
                    <i class="fa-solid fa-headset"></i>
                </div>
                <div class="text-xs text-slate-600">
                    <div>充值遇到问题？</div>
                    <div class="text-[10px] text-slate-400">联系人工客服解决</div>
                </div>
            </div>
            <button class="px-3 py-1 bg-white border border-slate-200 rounded-lg text-[10px] text-slate-600 font-bold active:scale-95"
                    onclick="alert('打开客服会话')">
                联系客服
            </button>
        </div>

        <!-- Disclaimer -->
        <div class="text-center mt-2">
            <p class="text-[10px] text-slate-400 leading-relaxed px-2">
                点击立即支付即代表您已同意 <a href="#" class="text-blue-500">《用户充值协议》</a>
            </p>
            <p class="text-[9px] text-slate-300 mt-1">虚拟商品充值后不支持退款 · 积分永久有效</p>
        </div>

    </div>

</main>

<!-- 5. Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 p-4 pb-8 z-50">
    <div class="w-full max-w-md mx-auto flex items-center justify-between gap-4">
        <div class="flex flex-col">
            <div class="text-[10px] text-slate-500 flex items-center gap-1">
                微信支付
                <i class="fa-solid fa-lock text-[8px] text-green-500"></i>
            </div>
            <div class="flex items-baseline gap-1">
                <span class="text-xs font-bold text-slate-800">¥</span>
                <span class="text-2xl font-black text-slate-800" id="totalPrice">28.00</span>
            </div>
        </div>
        <button class="flex-1 bg-[#07c160] text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-green-100 active:scale-[0.98] transition-transform flex items-center justify-center gap-2"
                onclick="alert('正在调起微信支付...')">
            <span>立即支付</span>
            <i class="fa-brands fa-weixin text-sm"></i>
        </button>
    </div>
</div>

<script>
    // 默认选中
    let selectedPrice = 28.00;

    function selectPlan(element, price, points) {
        // 1. Remove active class from all
        document.querySelectorAll('.plan-card').forEach(card => {
            card.classList.remove('plan-card-active');
        });

        // 2. Add active class to clicked
        element.classList.add('plan-card-active');

        // 3. Update Price
        selectedPrice = price;
        animateValue(document.getElementById('totalPrice'), parseFloat(document.getElementById('totalPrice').innerText), price, 300);
    }

    // Number Animation for Price
    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = (start + (end - start) * progress).toFixed(2);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }
</script>

</body>
</html>
