<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>关注公众号</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        wechat: '#07C160',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* 扫描线动画 */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #07C160;
            box-shadow: 0 0 4px #07C160;
            top: 0;
            left: 0;
            animation: scan 2.5s infinite linear;
            opacity: 0.6;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-green-100">

<!-- 背景装饰 (保持与个人中心一致) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-blue-400/10 blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-20%] w-[100vw] h-[100vw] rounded-full bg-emerald-500/10 blur-3xl"></div>
</div>

<!-- 顶部全局提示 (复制成功提示) -->
<div id="copyToast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-xs font-medium transition-all duration-300 opacity-0 -translate-y-10 pointer-events-none">
    <i class="fa-solid fa-circle-check text-green-400"></i>
    <span>复制成功，请搜索关注</span>
</div>

<!-- 导航栏 (简单返回) -->
<nav class="w-full max-w-md px-5 pt-6 pb-2 flex items-center justify-between z-10">
    <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/50 backdrop-blur border border-white text-slate-600 active:scale-90 transition-transform">
        <i class="fa-solid fa-arrow-left text-sm"></i>
    </button>
    <h1 class="font-bold text-lg text-slate-800">关注我们</h1>
    <div class="w-8"></div> <!-- 占位符保持居中 -->
</nav>

<main class="w-full max-w-md flex-1 p-5 flex flex-col gap-5 pb-10">

    <!-- 顶部文案 -->
    <div class="text-center px-4">
        <h2 class="text-xl font-black text-slate-800 mb-2">获取更多福利</h2>
        <p class="text-xs text-slate-500 leading-relaxed">
            关注官方公众号，领取 <span class="text-orange-500 font-bold">50积分</span><br>
            获取最新活动资讯与专属客服服务
        </p>
    </div>

    <!-- 方式一：二维码 (推荐) -->
    <div class="bg-white/95 backdrop-blur border border-white shadow-sm rounded-2xl p-6 relative overflow-hidden group">

        <!-- 推荐角标 -->
        <div class="absolute top-0 right-0">
            <div class="bg-gradient-to-bl from-orange-500 to-amber-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl rounded-tr-lg shadow-sm">
                <i class="fa-solid fa-thumbs-up mr-0.5"></i> 推荐方式
            </div>
        </div>

        <div class="flex flex-col items-center gap-4">
            <!-- 二维码容器 -->
            <div class="relative w-48 h-48 bg-white rounded-xl p-2 border border-slate-100 shadow-inner">
                <!-- 模拟二维码图片 -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://weixin.qq.com"
                     class="w-full h-full object-contain rounded-lg opacity-90" alt="公众号二维码">

                <!-- 微信Logo中心遮挡 (模拟真实二维码样式) -->
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 bg-white rounded-lg p-1 shadow-sm border border-slate-100 flex items-center justify-center">
                    <i class="fa-brands fa-weixin text-2xl text-wechat"></i>
                </div>

                <!-- 扫描线动画 -->
                <div class="scan-line rounded-lg"></div>
            </div>

            <div class="text-center space-y-1">
                <div class="text-sm font-bold text-slate-800 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-fingerprint text-wechat animate-pulse"></i>
                    <span>长按识别二维码</span>
                </div>
                <p class="text-[10px] text-gray-400">截图保存到相册，在微信扫一扫中打开</p>
            </div>
        </div>
    </div>

    <!-- 分割线 -->
    <div class="flex items-center gap-4 px-2">
        <div class="h-[1px] flex-1 bg-slate-200"></div>
        <span class="text-[10px] text-slate-400 font-medium">或者搜一搜</span>
        <div class="h-[1px] flex-1 bg-slate-200"></div>
    </div>

    <!-- 方式二：搜索ID -->
    <div class="bg-white/95 backdrop-blur border border-white shadow-sm rounded-2xl p-5">
        <div class="flex items-start gap-4 mb-4">
            <div class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 text-slate-400 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div>
                <h3 class="text-sm font-bold text-slate-800">搜索关注</h3>
                <p class="text-[11px] text-gray-400 mt-1 leading-tight">无法识别二维码？复制下方ID，打开微信搜索公众号关注。</p>
            </div>
        </div>

        <!-- ID 复制区域 -->
        <div class="bg-slate-50 border border-slate-100 rounded-xl p-1.5 pl-4 flex items-center justify-between mb-4">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-400">公众号ID</span>
                <span class="font-mono font-bold text-slate-800 tracking-wide select-all" id="wechatId">AppOfficial_666</span>
            </div>
            <button onclick="copyAndOpen('AppOfficial_666')"
                    class="bg-white text-slate-700 hover:text-wechat text-xs font-bold px-3 py-2 rounded-lg border border-slate-200 shadow-sm active:scale-95 transition-all">
                复制
            </button>
        </div>

        <!-- 步骤指引 -->
        <div class="bg-blue-50/50 rounded-xl p-3 border border-blue-50">
            <div class="flex items-center justify-between text-[10px] text-slate-500">
                <div class="flex flex-col items-center gap-1.5 w-1/3">
                    <div class="w-6 h-6 rounded-full bg-white text-blue-500 flex items-center justify-center font-bold shadow-sm border border-blue-100">1</div>
                    <span>复制ID</span>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300 text-[8px]"></i>
                <div class="flex flex-col items-center gap-1.5 w-1/3">
                    <div class="w-6 h-6 rounded-full bg-white text-blue-500 flex items-center justify-center font-bold shadow-sm border border-blue-100">2</div>
                    <span>点击搜索</span>
                </div>
                <i class="fa-solid fa-chevron-right text-gray-300 text-[8px]"></i>
                <div class="flex flex-col items-center gap-1.5 w-1/3">
                    <div class="w-6 h-6 rounded-full bg-white text-blue-500 flex items-center justify-center font-bold shadow-sm border border-blue-100">3</div>
                    <span>粘贴关注</span>
                </div>
            </div>
        </div>
    </div>

</main>

<script>
    // 复制ID
    function copyAndOpen(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => {
                showCopyToast();
            }).catch(() => {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    // 兼容旧版浏览器的复制
    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            showCopyToast();
        } catch (err) {
            alert('复制失败，请手动长按ID复制');
        }
        document.body.removeChild(textArea);
    }

    function showCopyToast() {
        const toast = document.getElementById('copyToast');
        toast.classList.remove('opacity-0', '-translate-y-10');
        setTimeout(() => {
            toast.classList.add('opacity-0', '-translate-y-10');
        }, 2500);
    }
</script>
</body>
</html>
