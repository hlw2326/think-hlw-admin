<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>新手教程</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        brand: {
                            douyin: '#000000',
                            kuaishou: '#FF5000',
                            rednote: '#FF2442',
                            bilibili: '#FB7299',
                            wechat: '#07C160'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 时间轴线 - 调整了位置以适应更小的圆圈 (15px) */
        .timeline-line {
            position: absolute;
            left: 15px;
            top: 32px;
            bottom: -12px;
            width: 2px;
            background-color: #f1f5f9;
            z-index: 0;
        }
        .step-item:last-child .timeline-line { display: none; }

        /* 激活的Tab样式 - 纯色扁平 */
        .tab-active {
            background-color: #334155;
            color: #ffffff;
            font-weight: 600;
        }
        .tab-inactive {
            color: #64748b;
            border: 1px solid transparent;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-blue-100">

<!-- 背景装饰 - 调淡，减少立体感 -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-50">
    <div class="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-blue-100 blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-20%] w-[100vw] h-[100vw] rounded-full bg-indigo-100 blur-3xl"></div>
</div>

<main class="w-full max-w-md flex-1 p-5 flex flex-col gap-4">

    <!-- 1. Tabs Card -->
    <div class="bg-white border border-slate-100 shadow-sm rounded-2xl p-2 shrink-0 z-10 mt-2">
        <div class="flex overflow-x-auto hide-scrollbar gap-2 px-1 py-0.5">
            <!-- 初始状态由 JS 接管 -->
            <button onclick="switchTab('douyin')" id="tab-douyin" class="flex-shrink-0 px-4 py-2.5 rounded-xl text-xs flex items-center gap-2">
                <i class="fa-brands fa-tiktok"></i> 抖音
            </button>
            <button onclick="switchTab('kuaishou')" id="tab-kuaishou" class="flex-shrink-0 px-4 py-2.5 rounded-xl text-xs flex items-center gap-2">
                <i class="fa-solid fa-camera"></i> 快手
            </button>
            <button onclick="switchTab('rednote')" id="tab-rednote" class="flex-shrink-0 px-4 py-2.5 rounded-xl text-xs flex items-center gap-2">
                <i class="fa-solid fa-book"></i> 小红书
            </button>
            <button onclick="switchTab('bilibili')" id="tab-bilibili" class="flex-shrink-0 px-4 py-2.5 rounded-xl text-xs flex items-center gap-2">
                <i class="fa-brands fa-bilibili"></i> B站
            </button>
            <button onclick="switchTab('wechat')" id="tab-wechat" class="flex-shrink-0 px-4 py-2.5 rounded-xl text-xs flex items-center gap-2">
                <i class="fa-brands fa-weixin"></i> 视频号
            </button>
        </div>
    </div>

    <!-- 2. Content Card - 扁平化边框 -->
    <div class="bg-white border border-slate-100 shadow-sm rounded-2xl p-4 min-h-[400px]" id="content-area">
        <!-- 动态内容 -->
    </div>

</main>

<script>
    // 数据源
    const tutorials = {
        douyin: {
            color: 'text-slate-900',
            iconBg: 'bg-slate-100',
            icon: 'fa-brands fa-tiktok',
            title: '抖音 App',
            example: '7.89 复制打开抖音，看看【用户名为...】 https://v.douyin.com/ikLq8.../',
            steps: [
                { title: '进入个人主页', desc: '打开抖音App，点击右下角“我”进入主页。' },
                { title: '打开菜单', desc: '点击右上角的 <span class="inline-flex items-center justify-center bg-slate-100 px-1.5 h-4 rounded text-slate-600 text-[10px] mx-0.5 align-middle border border-slate-200"><i class="fa-solid fa-bars"></i></span> 三条杠图标。' },
                { title: '找到分享入口', desc: '在侧边栏底部找到“分享主页”选项。' },
                { title: '复制链接', desc: '点击 <span class="text-blue-600 font-bold bg-blue-50 px-1 rounded">🔗 复制链接</span> 按钮。' }
            ]
        },
        kuaishou: {
            color: 'text-orange-500',
            iconBg: 'bg-orange-50',
            icon: 'fa-solid fa-camera',
            title: '快手 App',
            example: '复制此消息，打开【快手】直接观看！HmP9... https://v.kuaishou.com/s/...',
            steps: [
                { title: '进入个人主页', desc: '打开快手，点击“我”。' },
                { title: '点击分享图标', desc: '点击右上角的 <span class="inline-flex items-center justify-center bg-slate-100 px-1.5 h-4 rounded text-slate-600 text-[10px] mx-0.5 align-middle border border-slate-200"><i class="fa-solid fa-share-nodes"></i></span> 箭头分享图标。' },
                { title: '复制链接', desc: '在下方弹出的面板中，点击橙色的 <span class="text-orange-500 font-bold bg-orange-50 px-1 rounded">复制链接</span> 图标。' }
            ]
        },
        rednote: {
            color: 'text-rose-500',
            iconBg: 'bg-rose-50',
            icon: 'fa-solid fa-book',
            title: '小红书 App',
            example: '【用户名】 https://www.xiaohongshu.com/user/profile/...',
            steps: [
                { title: '点击右上角分享', desc: '在个人主页，点击右上角的 <span class="inline-flex items-center justify-center bg-slate-100 px-1.5 h-4 rounded text-slate-600 text-[10px] mx-0.5 align-middle border border-slate-200"><i class="fa-solid fa-arrow-up-from-bracket"></i></span> 分享图标或设置。' },
                { title: '选择分享主页', desc: '如果出现菜单，选择“分享主页”。' },
                { title: '复制链接', desc: '点击红色的 <span class="text-rose-500 font-bold bg-rose-50 px-1 rounded">复制链接</span> 按钮。' }
            ]
        },
        bilibili: {
            color: 'text-pink-500',
            iconBg: 'bg-pink-50',
            icon: 'fa-brands fa-bilibili',
            title: '哔哩哔哩 App',
            example: '【用户名】 https://b23.tv/AbCd...',
            steps: [
                { title: '右上角菜单', desc: '进入UP主空间，点击右上角 <span class="inline-flex items-center justify-center bg-slate-100 px-1.5 h-4 rounded text-slate-600 text-[10px] mx-0.5 align-middle border border-slate-200"><i class="fa-solid fa-ellipsis-vertical"></i></span> 三个点。' },
                { title: '分享空间', desc: '点击 <span class="text-pink-500 font-bold bg-pink-50 px-1 rounded">分享空间</span> 按钮。' },
                { title: '复制链接', desc: '点击 <span class="text-pink-500 font-bold bg-pink-50 px-1 rounded"><i class="fa-solid fa-link"></i> 复制链接</span>。' }
            ]
        },
        wechat: {
            color: 'text-emerald-500',
            iconBg: 'bg-emerald-50',
            icon: 'fa-brands fa-weixin',
            title: '微信视频号',
            example: 'https://channels.weixin.qq.com/mobile/profile/...',
            steps: [
                { title: '点击菜单', desc: '在视频号主页，点击右上角 <span class="inline-flex items-center justify-center bg-slate-100 px-1.5 h-4 rounded text-slate-600 text-[10px] mx-0.5 align-middle border border-slate-200"><i class="fa-solid fa-ellipsis"></i></span> 图标。' },
                { title: '推荐给朋友', desc: '选择“推荐给朋友”，发送给 <span class="text-emerald-600 font-bold bg-emerald-50 px-1 rounded">“文件传输助手”</span>。' },
                { title: '从聊天复制', desc: '回到聊天窗口，长按刚才发送的卡片，选择“复制”。' }
            ]
        }
    };

    function switchTab(platform) {
        const data = tutorials[platform];
        const contentArea = document.getElementById('content-area');

        // 1. Tab 样式切换
        document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
            btn.className = 'flex-shrink-0 px-4 py-2.5 rounded-xl text-xs font-medium flex items-center gap-2 text-slate-500 bg-slate-50 border border-transparent';
        });

        // 设置选中状态 (无动画)
        const activeTab = document.getElementById(`tab-${platform}`);
        activeTab.className = `flex-shrink-0 px-4 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 cursor-default border border-black/5 ${data.iconBg} ${data.color}`;

        // 3. 生成内容 (静态)
        // 移除了标题旁的 check 图标
        let html = `
                <div class="mb-6 flex items-center gap-3">
                    <div class="w-12 h-12 rounded-xl ${data.iconBg} ${data.color} flex items-center justify-center text-xl shadow-sm border border-slate-100/50">
                        <i class="${data.icon}"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800 text-base flex items-center gap-1.5 tracking-tight">
                            ${data.title}
                        </h2>
                        <p class="text-xs text-slate-400 mt-0.5">请跟随以下指引完成操作</p>
                    </div>
                </div>

                <div class="relative pl-2 space-y-6">
            `;

        data.steps.forEach((step, index) => {
            html += `
                    <div class="step-item relative flex gap-4">
                        <div class="timeline-line"></div>

                        <!-- 优化后的序号：w-8 h-8，使用品牌色的背景和文字，等宽字体 -->
                        <div class="flex-shrink-0 w-8 h-8 rounded-full border border-black/5 ${data.iconBg} flex items-center justify-center text-xs font-mono font-bold ${data.color} z-10 shadow-sm">
                             ${index + 1}
                        </div>

                        <!-- 文字内容 -->
                        <div class="pt-1 flex-1">
                            <h3 class="font-bold text-slate-800 text-sm mb-1">${step.title}</h3>
                            <p class="text-xs text-slate-500 leading-relaxed">
                                ${step.desc}
                            </p>
                        </div>
                    </div>
                `;
        });

        // 示例链接展示
        html += `
                </div>

                <div class="mt-8 mb-4 pl-14">
                    <div class="relative">
                        <!-- 修改：移除悬浮样式，改为普通文本标题 -->
                        <div class="mb-2 text-[10px] font-bold text-slate-400 flex items-center gap-1.5">
                            <i class="fa-solid fa-link text-slate-300 text-[9px]"></i>
                            <span>链接示例</span>
                        </div>

                        <!-- 容器：移除 pt-5，改为均匀的 p-3 -->
                        <div class="border border-dashed border-slate-300 bg-slate-50/50 rounded-xl p-3">
                            <div class="text-[11px] text-slate-600 font-mono break-all leading-relaxed select-all">
                                ${data.example}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-dashed border-slate-200">
                    <div class="flex items-start gap-3 p-3 rounded-xl bg-amber-50 border border-amber-100">
                        <div class="w-5 h-5 rounded-full bg-amber-100 border border-amber-200 text-amber-500 flex items-center justify-center text-[10px] flex-shrink-0 mt-0.5 shadow-sm">
                            <i class="fa-solid fa-lightbulb"></i>
                        </div>
                        <div class="text-[11px] text-amber-900/80 leading-relaxed">
                            <span class="font-bold text-amber-900">温馨提示：</span> 复制出来的链接如果包含中文文字，系统会自动识别处理，无需手动删除。
                        </div>
                    </div>
                </div>
            `;

        contentArea.innerHTML = html;
    }

    // 初始化
    switchTab('douyin');

</script>
</body>
</html>
