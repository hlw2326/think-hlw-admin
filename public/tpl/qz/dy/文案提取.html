<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>视频文案一键提取</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1', // Indigo for Tools
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image:
                    linear-gradient(rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Loading Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden pb-20">

<main class="w-full max-w-md flex-1 px-3 flex flex-col gap-4 pt-4 relative z-0">

    <!-- 1. 顶部工具卡片 -->
    <div class="bg-white border border-slate-200 rounded-2xl p-5 relative overflow-hidden animate-fade-in-up shadow-sm z-20">

        <!-- 标题 -->
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <span class="w-8 h-8 bg-brand-50 text-brand-600 rounded-lg flex items-center justify-center text-sm">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </span>
                文案提取神器
            </h2>
            <span class="text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-full font-mono">Ver 2.0</span>
        </div>

        <!-- 输入区域 -->
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-link text-slate-300 group-focus-within:text-brand-500 transition-colors"></i>
            </div>
            <input type="text" id="urlInput"
                   class="block w-full pl-10 pr-20 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all font-mono"
                   placeholder="请粘贴作品分享链接...">
            <div class="absolute inset-y-0 right-0 flex items-center pr-2">
                <button onclick="pasteFromClipboard()" class="text-xs text-brand-600 hover:bg-brand-50 px-2 py-1 rounded transition-colors font-medium">
                    粘贴
                </button>
            </div>
        </div>

        <!-- 操作按钮 -->
        <button onclick="startExtraction()" id="extractBtn"
                class="mt-3 w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3.5 rounded-xl shadow-lg shadow-slate-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
            <span>开始提取文案</span>
            <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform text-xs"></i>
        </button>

        <!-- 装饰背景 -->
        <div class="absolute -right-6 -top-6 h-24 w-24 bg-brand-50 rounded-full blur-xl opacity-60 pointer-events-none"></div>
    </div>

    <!-- 2. 提取结果区域 (默认隐藏) -->
    <div id="resultSection" class="hidden flex-col gap-3 animate-fade-in-up">

        <!-- Loading 状态 -->
        <div id="loadingState" class="bg-white border border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 py-10">
            <div class="relative">
                <div class="w-12 h-12 border-4 border-slate-100 border-t-brand-500 rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[10px] font-mono text-brand-600 font-bold">AI</div>
            </div>
            <div class="text-center">
                <p class="text-sm font-bold text-slate-700">正在逐帧解析音频...</p>
                <p class="text-[10px] text-slate-400 mt-1 font-mono">预计剩余时间: 1.2s</p>
            </div>
        </div>

        <!-- 成功结果 -->
        <div id="successResult" class="hidden bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm relative">
            <!-- 视频源信息 -->
            <div class="bg-slate-50 border-b border-slate-100 p-3 flex gap-3 items-center">
                <div class="w-10 h-10 rounded bg-slate-200 shrink-0 overflow-hidden relative">
                    <img id="videoCover" src="" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/10"></div>
                </div>
                <div class="min-w-0 flex-1">
                    <h4 id="videoTitle" class="text-xs font-bold text-slate-700 truncate"></h4>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span id="videoAuthor" class="text-[10px] text-slate-500"></span>
                        <span class="text-[9px] bg-brand-50 text-brand-600 px-1.5 rounded border border-brand-100">提取成功</span>
                    </div>
                </div>
            </div>

            <!-- 文案内容 -->
            <div class="p-4 relative group">
                <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="copyText()" class="bg-white border border-slate-200 shadow-sm text-slate-600 hover:text-brand-600 w-8 h-8 rounded-lg flex items-center justify-center transition-colors">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
                <textarea id="extractedText" readonly
                          class="w-full h-48 text-sm text-slate-600 leading-relaxed bg-transparent border-none resize-none focus:ring-0 p-0 font-sans"></textarea>

                <!-- 底部数据 -->
                <div class="flex items-center justify-between mt-2 pt-3 border-t border-slate-100 border-dashed">
                    <span id="wordCount" class="text-[10px] text-slate-400 font-mono"></span>
                    <button onclick="copyText()" class="text-xs font-bold text-brand-600 flex items-center gap-1 hover:opacity-80">
                        <i class="fa-regular fa-copy"></i> 复制全文
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 历史记录标题 -->
    <div class="flex items-center justify-between px-1 pt-2">
        <h3 class="font-bold text-slate-700 text-sm">最近提取记录</h3>
        <button onclick="clearHistory()" class="text-[10px] text-slate-400 hover:text-red-400 flex items-center gap-1 transition-colors">
            <i class="fa-regular fa-trash-can"></i> 清空
        </button>
    </div>

    <!-- 4. 历史列表 -->
    <div id="historyList" class="flex flex-col gap-3 pb-10">
        <!-- JS 渲染 -->
    </div>

</main>

<!-- Toast 提示 -->
<div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs px-4 py-2.5 rounded-full shadow-xl flex items-center gap-2 opacity-0 pointer-events-none transition-opacity duration-300 z-50">
    <i class="fa-solid fa-circle-check text-green-400"></i>
    <span id="toastMsg">操作成功</span>
</div>

<script>
    // 模拟数据
    let historyData = [
        {
            id: 201,
            title: "这真的是我吃过最好吃的提拉米苏...",
            cover: "https://images.unsplash.com/photo-1571115177098-24ec42ed204d?w=100&h=100&fit=crop",
            author: "@甜点日记",
            date: "刚刚",
            words: 328,
            content: "家人们谁懂啊！今天路过街角那家新开的甜品店，本来只想随便看看，结果被这个提拉米苏的颜值硬控了五分钟！\n\n入口即化真的不是说说而已，马斯卡彭芝士的奶香混合着咖啡酒的微苦，在舌尖化开的感觉太治愈了。重点是它一点都不腻！\n\n老板说他们用的是进口的手指饼干，每天限量发售。真的强烈推荐给所有甜品控，不吃真的会后悔系列！📍坐标放在评论区啦，快冲！"
        },
        {
            id: 202,
            title: "如何在30岁前存到人生第一个10万？",
            cover: "https://images.unsplash.com/photo-1579621970563-ebec7560eb3e?w=100&h=100&fit=crop",
            author: "@理财小能手",
            date: "10分钟前",
            words: 856,
            content: "很多人觉得存钱很难，其实是因为没有建立正确的理财思维。今天分享三个普通人也能做到的存钱小技巧..."
        },
        {
            id: 203,
            title: "沉浸式回家Vlog | 独居女生的快乐",
            cover: "https://images.unsplash.com/photo-1584622050111-993a426fbf0a?w=100&h=100&fit=crop",
            author: "@宅家也没事",
            date: "1小时前",
            words: 124,
            content: "下班啦，虽然今天工作很累，但是推开门看到猫咪在等我的那一刻，瞬间治愈..."
        }
    ];

    const urlInput = document.getElementById('urlInput');
    const extractBtn = document.getElementById('extractBtn');
    const resultSection = document.getElementById('resultSection');
    const loadingState = document.getElementById('loadingState');
    const successResult = document.getElementById('successResult');
    const historyList = document.getElementById('historyList');

    // 初始化加载历史记录
    renderHistory();

    // 粘贴剪贴板内容
    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            urlInput.value = text;
            showToast('已粘贴链接');
            // 自动触发简单校验视觉反馈
            urlInput.focus();
        } catch (err) {
            showToast('无法访问剪贴板，请手动粘贴');
        }
    }

    // 开始提取
    function startExtraction() {
        const url = urlInput.value.trim();
        if (!url) {
            showToast('请输入有效的视频链接');
            urlInput.focus();
            urlInput.classList.add('ring-2', 'ring-red-100', 'border-red-400');
            setTimeout(() => urlInput.classList.remove('ring-2', 'ring-red-100', 'border-red-400'), 1500);
            return;
        }

        // 按钮状态
        extractBtn.disabled = true;
        extractBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> 解析中...`;

        // 显示结果区域 Loading
        resultSection.classList.remove('hidden');
        loadingState.classList.remove('hidden');
        successResult.classList.add('hidden');

        // 滚动到结果区
        setTimeout(() => {
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);

        // 模拟 API 请求延迟
        setTimeout(() => {
            finishExtraction(url);
        }, 1500);
    }

    // 提取完成逻辑
    function finishExtraction(url) {
        // 模拟生成新数据
        const newData = {
            id: Date.now(),
            title: "✨ 提取结果：关于" + url.substring(0, 10) + "...的内容",
            cover: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=100&h=100&fit=crop",
            author: "@AI提取助手",
            date: "刚刚",
            words: 450,
            content: "【文案提取成功】\n\n这里是模拟的提取结果。在实际应用中，后端会解析视频链接，利用ASR（语音转文字）技术提取内容。\n\n本工具特点：\n1. 支持短视频链接解析\n2. 自动过滤语气词\n3. 智能分段排版\n\n您输入的链接是：" + url + "\n\n(此处为示例文本，用于展示UI效果)"
        };

        // 更新UI
        loadingState.classList.add('hidden');
        successResult.classList.remove('hidden');

        // 填充数据
        document.getElementById('videoCover').src = newData.cover;
        document.getElementById('videoTitle').innerText = newData.title;
        document.getElementById('videoAuthor').innerText = newData.author;
        document.getElementById('extractedText').value = newData.content;
        document.getElementById('wordCount').innerText = `共 ${newData.words} 字`;

        // 更新按钮
        extractBtn.disabled = false;
        extractBtn.innerHTML = `<span>开始提取文案</span><i class="fa-solid fa-arrow-right text-xs"></i>`;

        // 添加到历史记录
        historyData.unshift(newData);
        renderHistory();

        showToast('提取成功！');
    }

    // 复制文本
    function copyText() {
        const text = document.getElementById('extractedText').value;
        if(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('文案已复制');
            });
        }
    }

    // 渲染历史记录列表
    function renderHistory() {
        historyList.innerHTML = '';

        historyData.forEach((item, index) => {
            const delay = index * 50;
            const html = `
                <div class="bg-white border border-slate-200 rounded-2xl p-3 flex gap-3 relative overflow-hidden group hover:border-brand-200 transition-colors cursor-pointer" onclick="loadHistoryItem(${index})">
                    <!-- 封面 -->
                    <div class="w-16 h-16 rounded-lg shrink-0 overflow-hidden relative bg-slate-100">
                        <img src="${item.cover}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/5"></div>
                    </div>

                    <!-- 内容 -->
                    <div class="flex-1 min-w-0 flex flex-col justify-between py-0.5">
                        <div>
                            <h3 class="font-bold text-slate-800 text-sm truncate leading-tight">${item.title}</h3>
                            <div class="text-[10px] text-slate-400 mt-1 flex items-center gap-2">
                                <i class="fa-regular fa-clock text-[9px]"></i> ${item.date}
                            </div>
                        </div>

                        <div class="flex items-center justify-between mt-1">
                            <span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-mono border border-slate-200">
                                ${item.words} 字
                            </span>
                            <span class="text-[10px] text-brand-600 font-medium opacity-0 group-hover:opacity-100 transition-opacity">
                                点击查看 <i class="fa-solid fa-angle-right"></i>
                            </span>
                        </div>
                    </div>
                </div>
            `;
            historyList.insertAdjacentHTML('beforeend', html);
        });
    }

    // 点击历史记录加载回主显示区
    function loadHistoryItem(index) {
        const item = historyData[index];
        urlInput.value = ''; // 清空输入框

        resultSection.classList.remove('hidden');
        loadingState.classList.add('hidden');
        successResult.classList.remove('hidden');

        document.getElementById('videoCover').src = item.cover;
        document.getElementById('videoTitle').innerText = item.title;
        document.getElementById('videoAuthor').innerText = item.author;
        document.getElementById('extractedText').value = item.content;
        document.getElementById('wordCount').innerText = `共 ${item.words} 字`;

        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 清空历史
    function clearHistory() {
        historyData = [];
        renderHistory();
        showToast('历史记录已清空');
    }

    // Toast 提示函数
    let toastTimeout;
    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;

        toast.classList.remove('opacity-0', 'translate-y-4');

        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.add('opacity-0');
        }, 2000);
    }
</script>
</body>
</html>
