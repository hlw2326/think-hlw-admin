<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>抖音账号权重/限流检测报告</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              900: '#14532d',
            },
          },
          animation: {
            'progress': 'progress 1.5s ease-out forwards',
            'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
          },
          keyframes: {
            progress: {
              '0%': { width: '0%' },
              '100%': { width: 'var(--target-width)' }
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f8fafc;
      background-image:
              linear-gradient(rgba(203, 213, 225, 0.3) 1px, transparent 1px),
              linear-gradient(90deg, rgba(203, 213, 225, 0.3) 1px, transparent 1px);
      background-size: 24px 24px;
      -webkit-tap-highlight-color: transparent;
    }

    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden pb-10">

<main class="w-full max-w-md flex-1 px-3 flex flex-col gap-3 pt-4 relative z-0">

  <!-- ==================== 结果区域 ==================== -->
  <div id="resultSection" class="w-full flex flex-col gap-3 fade-in pb-10">

    <!-- 1. 账号概览 -->
    <div class="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm relative overflow-hidden">
      <div class="flex items-center gap-3 relative z-10">
        <div class="w-12 h-12 rounded-full bg-slate-100 overflow-hidden shrink-0 border-2 border-white shadow-md">
          <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Felix" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="font-bold text-slate-800 text-sm truncate">快乐小狗🐶</h3>
          <div class="flex items-center gap-2 mt-0.5">
            <span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-mono">ID: 8848123</span>
          </div>
        </div>
        <div class="flex flex-col items-end">
          <span class="text-[9px] text-slate-400 font-medium">健康分</span>
          <span class="text-xl font-black text-slate-800 italic" id="healthScore">88</span>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-2 border-t border-slate-100 mt-3 pt-2 relative z-10">
        <div class="flex flex-col items-center">
          <span class="text-sm font-bold text-slate-800 font-mono">12.8w</span>
          <span class="text-[9px] text-slate-400">粉丝数</span>
        </div>
        <div class="flex flex-col items-center border-l border-slate-100">
          <span class="text-sm font-bold text-slate-800 font-mono">108w</span>
          <span class="text-[9px] text-slate-400">点赞数</span>
        </div>
        <div class="flex flex-col items-center border-l border-slate-100">
          <span class="text-sm font-bold text-slate-800 font-mono">342</span>
          <span class="text-[9px] text-slate-400">作品数</span>
        </div>
      </div>
      <div class="absolute right-0 top-0 h-16 w-16 bg-gradient-to-l from-slate-50 to-transparent pointer-events-none"></div>
    </div>

    <!-- ==================== 2. 核心状态 (账号状态 + 流量池) ==================== -->
    <div class="grid grid-cols-2 gap-2">
      <!-- 卡片1: 账号状态 -->
      <div class="bg-green-50 border border-green-100 rounded-2xl p-3 flex flex-col justify-between relative overflow-hidden h-28">
        <div class="absolute -right-2 -top-2 text-green-100 text-5xl opacity-50 transform rotate-12">
          <i class="fa-solid fa-shield-cat"></i>
        </div>
        <span class="text-[9px] text-green-600 font-bold uppercase tracking-wider relative z-10">当前状态</span>
        <div class="relative z-10 mt-auto">
          <div class="flex items-center gap-1">
            <span class="text-lg font-black text-green-700">正常</span>
            <i class="fa-solid fa-circle-check text-green-500 text-xs"></i>
          </div>
          <p class="text-[9px] text-green-600/80 mt-0.5">无明显违规</p>
        </div>
      </div>

      <!-- 卡片2: 流量池 -->
      <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-3 flex flex-col justify-between relative overflow-hidden h-28">
        <div class="absolute -right-2 -top-2 text-indigo-100 text-5xl opacity-50 transform rotate-12">
          <i class="fa-solid fa-layer-group"></i>
        </div>
        <span class="text-[9px] text-indigo-600 font-bold uppercase tracking-wider relative z-10">当前流量池</span>
        <div class="relative z-10 mt-auto">
          <div class="flex items-center gap-1">
            <span class="text-lg font-black text-indigo-700">1w~10w</span>
          </div>
          <p class="text-[9px] text-indigo-600/80 mt-0.5">中腰部层级</p>
        </div>
      </div>
    </div>

    <!-- ==================== 3. 流量结构健康度 (合并卡片) ==================== -->
    <div class="bg-white border border-slate-200 rounded-2xl p-3">
      <div class="flex justify-between items-center mb-3">
        <h3 class="font-bold text-sm text-slate-700 flex items-center">
          <i class="fa-solid fa-chart-pie text-indigo-500 mr-2"></i>流量结构健康度
        </h3>
        <span class="text-[9px] text-slate-400">近期10条作品分析</span>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <!-- 5秒完播率 -->
        <div class="bg-slate-50 border border-slate-100 rounded-xl p-2.5 flex flex-col justify-between h-24">
          <div class="flex justify-between items-start">
            <span class="text-[9px] text-slate-400">5秒完播率</span>
            <i class="fa-solid fa-eye text-indigo-200 text-[10px]"></i>
          </div>
          <div>
            <span class="text-xl font-bold text-slate-800 font-mono tracking-tight">42.5<span class="text-[10px]">%</span></span>
            <div class="w-full bg-slate-200 h-1 mt-1.5 rounded-full overflow-hidden">
              <div class="bg-green-500 h-full rounded-full" style="width: 85%"></div>
            </div>
          </div>
        </div>

        <!-- 作品互动率 -->
        <div class="bg-slate-50 border border-slate-100 rounded-xl p-2.5 flex flex-col justify-between h-24">
          <div class="flex justify-between items-start">
            <span class="text-[9px] text-slate-400">作品互动率</span>
            <i class="fa-solid fa-chart-simple text-indigo-200 text-[10px]"></i>
          </div>
          <div>
            <span class="text-xl font-bold text-slate-800 font-mono tracking-tight">2.1<span class="text-[10px]">%</span></span>
            <div class="w-full bg-slate-200 h-1 mt-1.5 rounded-full overflow-hidden">
              <div class="bg-orange-400 h-full rounded-full" style="width: 30%"></div>
            </div>
          </div>
        </div>

        <!-- 推荐播放占比 -->
        <div class="bg-slate-50 border border-slate-100 rounded-xl p-2.5 flex flex-col justify-between h-24">
          <div class="flex justify-between items-start">
            <span class="text-[9px] text-slate-400">推荐播放占比</span>
            <i class="fa-solid fa-rss text-indigo-200 text-[10px]"></i>
          </div>
          <div>
            <span class="text-xl font-bold text-slate-800 font-mono tracking-tight">58<span class="text-[10px]">%</span></span>
            <p class="text-[8px] text-orange-500 mt-0.5 flex items-center">
              <i class="fa-solid fa-triangle-exclamation mr-1"></i> 低于优质线
            </p>
          </div>
        </div>

        <!-- 作品点赞率 -->
        <div class="bg-slate-50 border border-slate-100 rounded-xl p-2.5 flex flex-col justify-between h-24">
          <div class="flex justify-between items-start">
            <span class="text-[9px] text-slate-400">作品点赞率</span>
            <i class="fa-solid fa-thumbs-up text-indigo-200 text-[10px]"></i>
          </div>
          <div>
            <span class="text-xl font-bold text-slate-800 font-mono tracking-tight">5.2<span class="text-[10px]">%</span></span>
            <p class="text-[8px] text-green-500 mt-0.5 flex items-center">
              <i class="fa-solid fa-arrow-up mr-1"></i> 数据优秀
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- ==================== 4. 视频体检 (分页模式) ==================== -->
    <div class="bg-white border border-slate-200 rounded-2xl p-3">
      <div class="flex justify-between items-center mb-3">
        <h3 class="font-bold text-sm text-slate-700 flex items-center">
          <i class="fa-solid fa-stethoscope text-red-500 mr-2"></i>最新作品体检
        </h3>
        <span class="text-[9px] text-slate-400" id="videoCountText">共 12 条</span>
      </div>

      <!-- 宫格列表 (改为无边框风格) -->
      <div class="grid grid-cols-3 gap-2 min-h-[160px]" id="videoGrid">
        <!-- JS 生成 -->
      </div>

      <!-- 分页控制栏 -->
      <div class="flex items-center justify-between mt-4 px-1" id="paginationControls">
        <button onclick="changePage(-1)" id="prevBtn" class="text-xs font-medium text-slate-500 hover:text-indigo-600 disabled:opacity-30 disabled:hover:text-slate-500 transition-colors flex items-center gap-1">
          <i class="fa-solid fa-chevron-left text-[10px]"></i> 上一页
        </button>

        <div class="text-[10px] font-mono text-slate-400 bg-slate-50 px-2 py-1 rounded border border-slate-100">
          <span id="currentPageNum" class="text-indigo-600 font-bold">1</span> / <span id="totalPagesNum">2</span>
        </div>

        <button onclick="changePage(1)" id="nextBtn" class="text-xs font-medium text-slate-500 hover:text-indigo-600 disabled:opacity-30 disabled:hover:text-slate-500 transition-colors flex items-center gap-1">
          下一页 <i class="fa-solid fa-chevron-right text-[10px]"></i>
        </button>
      </div>
    </div>

    <!-- ==================== 5. 敏感词报告 ==================== -->
    <div class="bg-slate-900 rounded-2xl p-3 text-white relative overflow-hidden">
      <div class="absolute inset-0 opacity-10" style="background-image: repeating-linear-gradient(45deg, #000 0, #000 10px, #444 10px, #444 20px);"></div>

      <div class="relative z-10 flex justify-between items-center mb-3">
        <h3 class="font-bold text-sm flex items-center text-red-400">
          <i class="fa-solid fa-file-shield mr-2"></i>敏感词报告
        </h3>
        <span class="text-[9px] bg-white/10 px-1.5 py-0.5 rounded text-white/60">AI DeepCheck</span>
      </div>

      <div class="relative">
        <div class="flex flex-wrap gap-1.5 filter blur-sm select-none opacity-40 mb-1">
          <span class="bg-red-500/20 text-red-300 px-1.5 py-0.5 rounded text-[10px] border border-red-500/30">极限词</span>
          <span class="bg-red-500/20 text-red-300 px-1.5 py-0.5 rounded text-[10px] border border-red-500/30">硬广引流</span>
          <span class="bg-white/10 text-slate-300 px-1.5 py-0.5 rounded text-[10px]">文案正常</span>
        </div>
        <div class="absolute inset-0 flex items-center justify-center">
          <button class="bg-gradient-to-r from-amber-400 to-orange-500 text-white font-bold text-xs px-4 py-2 rounded-full shadow-lg shadow-orange-500/30 flex items-center gap-1.5 hover:scale-105 transition-transform active:scale-95">
            <i class="fa-solid fa-lock text-[10px]"></i> 解锁详情
          </button>
        </div>
      </div>
    </div>

    <!-- 重新检测 -->
    <button onclick="location.reload()" class="w-full bg-white text-slate-600 font-medium py-3 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors mb-4 text-sm">
      检测其他账号
    </button>
  </div>

</main>

<script>
  // 配置
  const itemsPerPage = 6;
  let currentPage = 1;

  // 模拟 12 条视频数据
  const mockVideos = Array.from({ length: 12 }, (_, i) => {
    const playCount = Math.floor(Math.random() * 50000) + 500;
    const date = new Date();
    date.setDate(date.getDate() - i);
    const dateStr = `${date.getMonth() + 1}/${date.getDate()}`;

    // 更新状态样式：改为适合悬浮在图片上的样式 (玻璃拟态白底)
    const statuses = [
      { label: '正常', bg: 'bg-white/95', text: 'text-green-600', border: 'border-white/50' },
      { label: '低俗', bg: 'bg-white/95', text: 'text-orange-600', border: 'border-white/50' },
      { label: '限流', bg: 'bg-red-500', text: 'text-white', border: 'border-red-500' }, // 严重状态用实色提醒
      { label: '审核', bg: 'bg-blue-500', text: 'text-white', border: 'border-blue-500' }
    ];

    let status = statuses[0];
    if (Math.random() > 0.7) status = statuses[Math.floor(Math.random() * statuses.length)];

    return {
      id: i,
      playCount: (playCount/1000).toFixed(1) + 'k',
      date: dateStr,
      status: status
    };
  });

  const totalPages = Math.ceil(mockVideos.length / itemsPerPage);

  // 初始化
  window.onload = function() {
    document.getElementById('totalPagesNum').innerText = totalPages;
    renderPage(currentPage);
  }

  // 翻页函数
  function changePage(direction) {
    const newPage = currentPage + direction;
    if (newPage >= 1 && newPage <= totalPages) {
      currentPage = newPage;
      renderPage(currentPage);
    }
  }

  // 渲染指定页 (完全重写 HTML 结构)
  function renderPage(page) {
    const start = (page - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const itemsToRender = mockVideos.slice(start, end);
    const container = document.getElementById('videoGrid');

    // 清空当前内容
    container.innerHTML = '';

    let html = '';
    itemsToRender.forEach((video, index) => {
      const delay = index * 50;
      // 新的无框设计结构
      html += `
                    <div class="flex flex-col gap-1.5 animate-fade-in-up group cursor-pointer" style="animation-delay: ${delay}ms">
                        <!-- 封面区域 -->
                        <div class="aspect-[3/4] bg-slate-100 rounded-xl relative overflow-hidden shadow-sm">
                            <!-- 模拟图片背景 -->
                            <div class="absolute inset-0 flex items-center justify-center bg-slate-200/50 group-hover:bg-slate-200 transition-colors">
                                <i class="fa-solid fa-play text-slate-300 text-xl group-hover:scale-110 transition-transform duration-300"></i>
                            </div>

                            <!-- 右上角状态标签 (悬浮) -->
                            <div class="absolute top-1.5 right-1.5 z-10">
                                <span class="px-1.5 py-[2px] rounded text-[8px] font-bold shadow-sm backdrop-blur-sm ${video.status.bg} ${video.status.text} border ${video.status.border}">
                                    ${video.status.label}
                                </span>
                            </div>

                            <!-- 左下角播放量 (悬浮) -->
                            <div class="absolute bottom-0 left-0 w-full pt-6 pb-1.5 px-2 bg-gradient-to-t from-black/60 to-transparent">
                                <span class="text-[10px] text-white font-mono font-bold flex items-center gap-1 shadow-black/20 drop-shadow-sm">
                                    <i class="fa-solid fa-play text-[8px] opacity-90"></i> ${video.playCount}
                                </span>
                            </div>
                        </div>

                        <!-- 底部极简日期 -->
                        <div class="text-center px-1">
                            <span class="text-[9px] text-slate-400 font-mono tracking-tight block">${video.date} 发布</span>
                        </div>
                    </div>
                `;
    });
    container.innerHTML = html;

    // 更新页码和按钮状态
    document.getElementById('currentPageNum').innerText = page;
    document.getElementById('prevBtn').disabled = (page === 1);
    document.getElementById('nextBtn').disabled = (page === totalPages);
  }
</script>
</body>
</html>
