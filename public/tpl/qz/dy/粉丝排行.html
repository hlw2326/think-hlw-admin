<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>抖音粉丝数排行榜</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        rank: ['Oswald', 'sans-serif'],
                    },
                    colors: {
                        douyin: {
                            dark: '#0f1014',
                            card: '#161823',
                            pink: '#fe2c55',
                            cyan: '#25f4ee',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 扁平卡片通用样式 */
        .flat-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden pb-20">

<main class="w-full max-w-md flex-1 px-4 flex flex-col gap-5 pt-4 relative z-0">

    <!-- 1. 头部概览卡片 (白色清爽风格) -->
    <div class="bg-white border border-slate-200 rounded-2xl p-5 relative overflow-hidden animate-fade-in-up group">
        <div class="flex items-center gap-4 relative z-10">
            <!-- 头像容器 -->
            <div class="w-12 h-12 rounded-full bg-slate-900 overflow-hidden shrink-0 border-2 border-slate-50 flex items-center justify-center relative group-hover:scale-105 transition-transform duration-500">
                <i class="fa-brands fa-tiktok text-white text-2xl z-10"></i>
                <div class="absolute inset-0 bg-gradient-to-tr from-[#25F4EE] to-[#FE2C55] opacity-20"></div>
            </div>

            <!-- 标题文字 -->
            <div class="flex-1 min-w-0">
                <h3 class="font-bold text-slate-800 text-lg flex items-center gap-2">
                    粉丝数排行榜
                    <i class="fa-solid fa-users text-[10px] bg-black text-white p-1 rounded-full"></i>
                </h3>
                <div class="flex items-center gap-2 mt-0.5">
                    <span class="text-[10px] text-slate-500 bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded">数据源: 全站统计</span>
                </div>
            </div>

            <!-- 右侧 TOP 100 -->
            <div class="text-right">
                <div class="text-3xl font-black text-slate-900 font-rank italic pr-1 leading-none tracking-tight">TOP 100</div>
                <div class="text-[10px] text-slate-400 mt-1 font-medium">最具影响力</div>
            </div>
        </div>

        <!-- 装饰背景 -->
        <div class="absolute right-0 top-0 h-32 w-32 bg-gradient-to-l from-pink-50/80 to-cyan-50/80 pointer-events-none opacity-60 rounded-bl-[80px]"></div>
    </div>

    <!-- 2. 排行榜列表区域 -->
    <div class="flex flex-col gap-3 relative">
        <!-- 列表头 -->
        <div class="flex items-center justify-between px-3 text-[10px] text-slate-400 font-bold uppercase tracking-wider">
            <span>排名 / 用户</span>
            <span>粉丝数 / 趋势</span>
        </div>

        <!-- JS 动态渲染列表容器 -->
        <div id="rankList" class="flex flex-col gap-3">
            <!-- 列表项将在此生成 -->
        </div>
    </div>

    <!-- 3. 加载更多区域 (已移除广告逻辑) -->
    <div id="lockSection" class="pb-10 pt-2">
        <div id="lockContent" class="flat-card rounded-2xl p-6 flex flex-col items-center justify-center gap-4 text-center animate-fade-in-up">
            <div class="relative">
                <div class="w-14 h-14 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-800 relative z-10">
                    <i class="fa-solid fa-unlock-keyhole text-xl"></i>
                </div>
            </div>
            <div>
                <h3 class="font-bold text-slate-800 text-sm">还有 50 位大V未显示</h3>
                <p class="text-[11px] text-slate-400 mt-1 max-w-[200px] leading-relaxed">点击下方按钮，立即加载剩余榜单数据。</p>
            </div>

            <button onclick="loadRest()" class="w-full max-w-[220px] bg-douyin-card hover:bg-black text-white text-xs font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 group overflow-hidden relative border border-douyin-card">
                <i class="fa-solid fa-arrow-down text-douyin-cyan"></i>
                <span>点击解锁全部排名</span>
            </button>
        </div>

        <div id="endText" class="hidden text-center text-[10px] text-slate-400 py-6 flex items-center justify-center gap-2 font-medium">
            <span class="w-1 h-1 rounded-full bg-slate-300"></span>
            THE END
            <span class="w-1 h-1 rounded-full bg-slate-300"></span>
        </div>
    </div>

</main>

<script>
    // 1. 生成数据
    const generateFans = () => {
        const fans = [];
        const seeds = ['Felix', 'Aneka', 'Bella', 'Caleb', 'Daisy', 'Eden', 'Frank', 'Gia', 'Henry', 'Ivy'];
        const tagsPool = ['千万粉', '头部主播', '搞笑博主', '颜值达人', '技术流', '带货王', '正能量'];

        for (let i = 1; i <= 100; i++) {
            let rawScore;
            if (i <= 3) {
                rawScore = 50000000 - (i * 2000000) + Math.random() * 1000000;
            } else {
                rawScore = 40000000 * Math.pow(0.95, i - 3) + Math.random() * 500000;
            }
            const scoreInWan = (rawScore / 10000).toFixed(1) + 'w';

            const tagCount = i <= 5 ? 2 : (Math.random() > 0.6 ? 1 : 0);
            const myTags = [];
            if (i <= 10 && !myTags.includes('千万粉')) myTags.push('千万粉');
            for(let t=myTags.length; t<tagCount; t++) {
                const randomTag = tagsPool[Math.floor(Math.random() * tagsPool.length)];
                if (!myTags.includes(randomTag)) myTags.push(randomTag);
            }

            fans.push({
                rank: i,
                name: `抖音用户_${Math.random().toString(36).substring(2, 8)}`,
                avatarSeed: seeds[i % seeds.length] + i,
                score: scoreInWan,
                trend: Math.random() > 0.5 ? 'up' : (Math.random() > 0.5 ? 'down' : 'flat'),
                changeVal: Math.floor(Math.random() * 9) + 1,
                tags: myTags,
                isVip: i <= 5
            });
        }
        return fans;
    };

    const allFans = generateFans();
    const listContainer = document.getElementById('rankList');

    // 2. 渲染函数
    function renderList(start, end) {
        const batch = allFans.slice(start, end);
        let html = '';

        batch.forEach((fan, index) => {
            const delay = (index % 20) * 50;

            // --- 样式逻辑 ---
            let cardClass = 'bg-white border border-slate-200';
            let rankClass = 'text-slate-300 font-rank italic text-xl';

            // 前三名样式
            if (fan.rank === 1) {
                cardClass = 'bg-yellow-50 border border-yellow-200 relative overflow-hidden';
                rankClass = 'text-yellow-600 text-3xl font-rank italic';
            } else if (fan.rank === 2) {
                cardClass = 'bg-slate-100 border border-slate-300';
                rankClass = 'text-slate-600 text-2xl font-rank italic';
            } else if (fan.rank === 3) {
                cardClass = 'bg-orange-50 border border-orange-200';
                rankClass = 'text-orange-500 text-2xl font-rank italic';
            }

            // 趋势标签
            let trendHtml = '';
            if(fan.trend === 'up') {
                trendHtml = `
                    <div class="flex flex-col items-end">
                        <div class="flex items-center gap-0.5 text-emerald-600 font-bold text-[10px] bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100">
                            <i class="fa-solid fa-arrow-up text-[9px]"></i>${fan.changeVal}
                        </div>
                    </div>`;
            } else if(fan.trend === 'down') {
                trendHtml = `
                    <div class="flex flex-col items-end">
                        <div class="flex items-center gap-0.5 text-red-600 font-bold text-[10px] bg-red-50 px-1.5 py-0.5 rounded border border-red-100">
                            <i class="fa-solid fa-arrow-down text-[9px]"></i>${fan.changeVal}
                        </div>
                    </div>`;
            } else {
                trendHtml = `<div class="text-slate-300 text-[10px] font-medium px-2">-</div>`;
            }

            // 标签
            const tagsHtml = fan.tags.map(t => {
                const isRich = t === '千万粉';
                const tagStyle = isRich
                    ? 'bg-douyin-pink text-white border border-transparent'
                    : 'bg-white text-slate-500 border border-slate-200';
                return `<span class="text-[9px] px-1.5 py-0.5 rounded ${tagStyle}">${t}</span>`
            }).join('');

            // 第一名印花
            const crownBg = fan.rank === 1
                ? '<i class="fa-solid fa-crown absolute -right-2 -bottom-4 text-6xl text-yellow-500/10 pointer-events-none rotate-12"></i>'
                : '';

            html += `
                <div class="flex items-center gap-4 ${cardClass} rounded-2xl p-3 animate-fade-in-up transition-transform active:scale-[0.99]" style="animation-delay: ${delay}ms">
                    ${crownBg}

                    <!-- 排名数字 -->
                    <div class="w-8 text-center shrink-0 ${rankClass}">
                        ${fan.rank}
                    </div>

                    <!-- 头像 -->
                    <div class="relative shrink-0">
                        <div class="w-11 h-11 rounded-full bg-slate-100 overflow-hidden border border-slate-200">
                            <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=${fan.avatarSeed}" class="w-full h-full object-cover">
                        </div>
                        ${fan.isVip ? '<div class="absolute -bottom-0.5 -right-0.5 bg-yellow-400 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center border border-white"><i class="fa-solid fa-star"></i></div>' : ''}
                    </div>

                    <!-- 信息 -->
                    <div class="flex-1 min-w-0 flex flex-col gap-1">
                        <div class="flex items-center gap-1.5">
                            <span class="font-bold text-slate-800 text-sm truncate">${fan.name}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            ${tagsHtml}
                        </div>
                    </div>

                    <!-- 数据与趋势 -->
                    <div class="flex flex-col items-end gap-1 shrink-0">
                        <div class="font-rank font-bold text-slate-800 text-base leading-none">
                            ${fan.score}
                        </div>
                        ${trendHtml}
                    </div>
                </div>
            `;
        });

        listContainer.insertAdjacentHTML('beforeend', html);
    }

    // 初始加载
    window.onload = function() {
        renderList(0, 50);
    }

    // 3. 直接加载剩余逻辑
    function loadRest() {
        const lockContent = document.getElementById('lockContent');
        const endText = document.getElementById('endText');
        const btn = lockContent.querySelector('button');

        // 简单的加载状态
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在加载...';

        // 模拟一点延迟，提升交互感
        setTimeout(() => {
            lockContent.style.display = 'none';
            renderList(50, 100);

            endText.classList.remove('hidden');
            endText.classList.add('flex');

            // 平滑滚动
            window.scrollBy({top: 100, behavior: 'smooth'});
        }, 500);
    }
</script>

</body>
</html>
