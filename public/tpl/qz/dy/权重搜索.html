<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>账号权重查询</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    backgroundImage: {
                        'grid-pattern': "url(\"data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2394a3b8' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E\")",
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.98)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .soft-shadow {
            box-shadow: 0 4px 20px -2px rgba(226, 232, 240, 0.6), 0 2px 6px -2px rgba(226, 232, 240, 0.4);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-slate-200 pb-10 bg-grid-pattern">

<!-- 背景装饰 -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] right-[-10%] w-[80vw] h-[80vw] rounded-full bg-slate-200/40 blur-[100px]"></div>
    <div class="absolute bottom-[-10%] left-[-20%] w-[100vw] h-[100vw] rounded-full bg-gray-100/40 blur-[100px]"></div>
</div>

<main class="w-full max-w-md flex-1 px-5 flex flex-col gap-6 relative pt-10">

    <!-- ==================== 主功能卡片容器 ==================== -->
    <div id="mainCard" class="relative w-full rounded-[24px] p-[1px] bg-slate-200 shadow-xl shadow-slate-200/50 animate-slide-up group">

        <!-- 内部白色容器 -->
        <div class="relative bg-white rounded-[23px] p-6 overflow-hidden min-h-[360px] flex flex-col">

            <!-- 背景网格纹理 -->
            <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
                 style="background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 16px 16px;">
            </div>

            <!-- 顶部标题区域 (始终显示，内容会变) -->
            <div class="relative z-10 text-center mb-4 flex-shrink-0">
                <!-- 移除了 transition-all duration-300 -->
                <h2 id="mainTitle" class="text-xl font-black text-slate-800 tracking-tight">
                    AI 账号深度诊断
                </h2>
            </div>

            <!-- 内容区域容器 -->
            <div class="relative flex-1">

                <!-- ========== 状态 A: 输入表单 (默认显示) ========== -->
                <div id="inputView" class="absolute inset-0 flex flex-col z-10 bg-white">

                    <!-- 输入框 -->
                    <div class="relative z-10 mb-5 group/input flex-1">
                        <!-- [已删除] 这里原本有一个外发光(Shadow Glow)的 div，已移除 -->

                        <!--
                            修改说明：
                            1. 移除了 focus-within:shadow-inner 类
                            2. 保留了 focus-within:border-blue-400 (聚焦时边框变蓝)
                        -->
                        <div class="relative bg-white border border-slate-200 rounded-xl overflow-hidden h-full transition-all duration-300 focus-within:border-blue-400 flex flex-col">
                            <textarea id="urlInput" placeholder="粘贴主页分享链接或者用户ID..." class="w-full flex-1 p-4 bg-slate-50/30 text-sm focus:outline-none resize-none text-slate-700 placeholder:text-slate-400 leading-relaxed focus:bg-white transition-colors"></textarea>

                            <!-- 粘贴按钮 -->
                            <div class="p-3 flex justify-end">
                                <button onclick="pasteText()" class="flex items-center gap-1 bg-white hover:bg-blue-50 text-slate-500 hover:text-blue-600 text-xs font-bold px-3 py-1.5 rounded-lg border border-slate-100 transition-all active:scale-95">
                                    <i class="fa-regular fa-clipboard"></i>
                                    粘贴
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 按钮 -->
                    <div class="flex-shrink-0 mb-5">
                        <button onclick="startAnalyze()" class="relative w-full group/btn overflow-hidden rounded-xl active:scale-[0.98] transition-transform">
                            <div class="absolute inset-0 bg-blue-600 transition-colors group-hover/btn:bg-blue-700"></div>
                            <div class="relative px-6 py-4 flex items-center justify-center gap-2 text-white font-bold">
                                <i class="fa-solid fa-radar group-hover/btn:animate-spin"></i>
                                <span>开始全维分析</span>
                            </div>
                        </button>
                    </div>

                    <!-- 底部数据栏 -->
                    <div class="flex-shrink-0 pt-3 border-t border-slate-50 grid grid-cols-3 gap-2 text-center">
                        <div class="flex flex-col items-center">
                            <span class="text-[9px] text-slate-400 uppercase tracking-wider mb-0.5">已分析</span>
                            <span class="font-bold text-slate-700 text-xs font-mono">102,458</span>
                        </div>
                        <div class="flex flex-col items-center border-l border-slate-50">
                            <span class="text-[9px] text-slate-400 uppercase tracking-wider mb-0.5">准确率</span>
                            <span class="font-bold text-slate-800 text-xs font-mono">99.8%</span>
                        </div>
                        <div class="flex flex-col items-center border-l border-slate-50">
                            <span class="text-[9px] text-slate-400 uppercase tracking-wider mb-0.5">耗时</span>
                            <span class="font-bold text-slate-800 text-xs font-mono">~2.5s</span>
                        </div>
                    </div>
                </div>

                <!-- ========== 状态 B: 加载动画 (默认隐藏) ========== -->
                <div id="loadingView" class="absolute inset-0 hidden flex-col items-center justify-center z-10 bg-white">

                    <!-- 核心扫描动画 -->
                    <div class="relative w-24 h-24 mx-auto mb-5 flex items-center justify-center flex-shrink-0">
                        <!-- 外圈呼吸 -->
                        <div class="absolute inset-0 bg-blue-50 rounded-full animate-ping opacity-30"></div>
                        <!-- 旋转外环 -->
                        <div class="absolute inset-0 border-2 border-slate-100 rounded-full"></div>
                        <div class="absolute inset-0 border-2 border-blue-600/30 border-t-blue-600 rounded-full animate-spin"></div>
                        <!-- 逆向旋转内环 -->
                        <div class="absolute inset-3 border-2 border-slate-200 border-b-slate-400 rounded-full animate-[spin_3s_linear_infinite_reverse]"></div>

                        <!-- 中心图标 -->
                        <div class="relative z-10 w-12 h-12 bg-blue-600 rounded-full shadow-lg shadow-blue-600/30 flex items-center justify-center text-white">
                            <i class="fa-solid fa-magnifying-glass-chart text-xl animate-pulse"></i>
                        </div>
                    </div>

                    <!-- 进度与日志 -->
                    <div class="text-center w-full space-y-5">
                        <!-- 动态日志文本 -->
                        <p id="loadingText" class="text-xs text-slate-500 font-mono bg-slate-50 py-1.5 px-4 rounded-lg inline-block border border-slate-100 transition-all duration-300">
                            正在建立安全连接...
                        </p>

                        <!-- 进度条 -->
                        <div class="w-full px-4">
                            <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden p-[1px]">
                                <div id="loadingBar" class="h-full bg-blue-600 rounded-full w-[5%] transition-all duration-[300ms] ease-out shadow-[0_0_10px_rgba(37,99,235,0.3)] relative">
                                    <div class="absolute right-0 top-0 bottom-0 w-2 bg-white/30 blur-[1px]"></div>
                                </div>
                            </div>
                        </div>

                        <!-- 底部动态数据 -->
                        <div class="grid grid-cols-3 gap-2 w-full pt-2 opacity-80">
                            <div class="flex flex-col items-center">
                                <span class="text-[9px] text-slate-400 uppercase tracking-widest scale-90">网络延迟</span>
                                <span class="text-xs font-bold text-green-600 font-mono">24ms</span>
                            </div>
                            <div class="flex flex-col items-center border-l border-slate-100">
                                <span class="text-[9px] text-slate-400 uppercase tracking-widest scale-90">分析节点</span>
                                <span class="text-xs font-bold text-slate-700 font-mono" id="nodeCount">0</span>
                            </div>
                            <div class="flex flex-col items-center border-l border-slate-100">
                                <span class="text-[9px] text-slate-400 uppercase tracking-widest scale-90">核心引擎</span>
                                <span class="text-xs font-bold text-slate-800 font-mono animate-pulse">运行中</span>
                            </div>
                        </div>

                        <!-- 重新开始按钮 -->
                        <button onclick="resetDemo()" class="mt-2 text-slate-400 hover:text-blue-600 text-xs flex items-center justify-center gap-1 transition-colors w-full py-2">
                            <i class="fa-solid fa-rotate-right"></i>
                            重新开始
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script>
    let nodeTimer;

    async function pasteText() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('urlInput').value = text;
        } catch (err) {
            alert('无法访问剪贴板，请手动粘贴');
        }
    }

    function startAnalyze() {
        const input = document.getElementById('urlInput').value;
        if (!input) {
            alert('请输入抖音主页链接');
            return;
        }

        // 获取视图元素
        const inputView = document.getElementById('inputView');
        const loadingView = document.getElementById('loadingView');
        const mainTitle = document.getElementById('mainTitle');

        // 1. 切换视图状态 (瞬间切换，使用 hidden)
        inputView.classList.add('hidden');
        inputView.classList.remove('flex');

        loadingView.classList.remove('hidden');
        loadingView.classList.add('flex');

        // 改变标题
        mainTitle.innerText = "正在全维分析中...";
        mainTitle.classList.add('text-blue-600');

        // 2. 启动动画逻辑
        const loadingText = document.getElementById('loadingText');
        const loadingBar = document.getElementById('loadingBar');
        const nodeCount = document.getElementById('nodeCount');

        // 重置进度
        loadingBar.style.width = '5%';

        // 进度条动画
        setTimeout(() => { loadingBar.style.width = '30%'; }, 100);

        // 数字跳动
        let nodes = 0;
        nodeTimer = setInterval(() => {
            nodes += Math.floor(Math.random() * 5);
            nodeCount.innerText = nodes;
        }, 100);

        // 日志步骤
        const steps = [
            { time: 800, text: "正在解析用户信息...", progress: '45%' },
            { time: 1800, text: "正在获取近期作品数据...", progress: '60%' },
            { time: 2800, text: "AI 神经网络正在计算权重...", progress: '85%' },
            { time: 3800, text: "生成最终诊断报告...", progress: '98%' },
            { time: 4200, text: "分析完成，准备生成报表...", progress: '100%' }
        ];

        steps.forEach(step => {
            setTimeout(() => {
                loadingText.innerText = step.text;
                loadingBar.style.width = step.progress;
            }, step.time);
        });

        // 停止动画
        setTimeout(() => {
            clearInterval(nodeTimer);
        }, 4500);
    }

    function resetDemo() {
        clearInterval(nodeTimer);

        // 获取视图元素
        const inputView = document.getElementById('inputView');
        const loadingView = document.getElementById('loadingView');
        const mainTitle = document.getElementById('mainTitle');

        // 瞬间切换回输入页
        inputView.classList.remove('hidden');
        inputView.classList.add('flex');

        loadingView.classList.add('hidden');
        loadingView.classList.remove('flex');

        // 恢复标题
        mainTitle.innerText = "AI 账号深度诊断";
        mainTitle.classList.remove('text-blue-600');

        // 清空输入
        document.getElementById('urlInput').value = '';
    }
</script>
</body>
</html>
