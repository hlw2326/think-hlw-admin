            <span>查看更多历史记录</span>

        },
        {

            title: "微商创业心得分享",

            date: "10-07 09:15",
            play: 560,
            status: "limited",
            level: "moderate",
            reason: "过度营销",
            desc: "频繁发布产品广告，被判定为营销号",
            suggestion: "增加生活化内容比例",
            likes: "66",
            comments: "8",
            favorites: "5",
            tags: ["创业", "微商"]
        }
    ];

    // 分页状态管理
    let currentPage = 0;
    const PAGE_SIZE = 5;
    const displayWorks = allWorksData;

    window.onload = function() {
        loadMore();
        document.getElementById('paginationSection').classList.remove('hidden');
    };

    function loadMore() {
        const btn = document.getElementById('loadMoreBtn');
        const container = document.getElementById('workList');
        const noMoreText = document.getElementById('noMoreText');

        // 如果不是第一次加载，显示loading状态
        if (currentPage > 0) {
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> 加载中...`;

            // 模拟网络延迟
            setTimeout(() => {
                renderBatch();
                btn.disabled = false;
                btn.innerHTML = originalText;
                checkPaginationStatus();
            }, 600);
        } else {
            renderBatch();
            checkPaginationStatus();
        }

        function renderBatch() {
            const start = currentPage * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const batch = displayWorks.slice(start, end);

            if (batch.length === 0) return;

            let html = '';
            batch.forEach((work, index) => {
                // 判断是否是正常/优质作品
                const isNormal = work.status === 'normal';

                // 定义颜色和图标
                let statusColor, icon;
                if (isNormal) {
                    // 正常/优质作品样式
                    statusColor = 'text-green-600 bg-green-50 border-green-100';
                    icon = 'fa-thumbs-up';
                    if (work.level === 'excellent') {
                        statusColor = 'text-indigo-600 bg-indigo-50 border-indigo-100';
                        icon = 'fa-fire';
                    }
                } else {
                    // 异常作品样式
                    statusColor = work.level === 'high' || work.level === 'severe' ? 'text-red-500 bg-red-50 border-red-100' : 'text-orange-500 bg-orange-50 border-orange-100';
                    icon = work.level === 'high' || work.level === 'severe' ? 'fa-ban' : 'fa-triangle-exclamation';
                }

                // 标签 HTML 生成
                const tagsHtml = work.tags ? work.tags.map(tag =>
                    `<span class="text-[9px] text-slate-400 bg-slate-50 border border-slate-100 px-1.5 py-0.5 rounded">${tag}</span>`
                ).join('') : '';

                // 右上角热度标签 HTML 生成
                let badgeHtml = '';
                if (work.badge) {
                    badgeHtml = `
                        <div class="absolute top-2 right-2 z-10">
                             <div class="bg-gradient-to-r ${work.badge.color} text-white text-[9px] font-bold px-2 py-1 rounded shadow-sm leading-none opacity-90 hover:opacity-100 transition-opacity cursor-default">
                                ${work.badge.text}
                             </div>
                        </div>
                    `;
                }

                // 计算动画延迟
                const delay = index * 50;

                html += `
                    <div class="bg-white border border-slate-200 rounded-2xl p-3 animate-fade-in-up flex gap-3 relative overflow-hidden group hover:border-slate-300 transition-colors" style="animation-delay: ${delay}ms" id="card-${work.id}">

                        <!-- 右上角热度标签 (修改后位置：有间隙) -->
                        ${badgeHtml}

                        <!-- 左侧封面 -->
                        <div class="w-20 rounded-lg shrink-0 flex flex-col gap-1">
                             <div class="aspect-[3/4] ${work.cover} rounded-lg relative overflow-hidden bg-slate-100 shadow-inner">
                                 <div class="absolute inset-0 flex items-center justify-center text-slate-300">
                                    <i class="fa-solid fa-image text-xl"></i>
                                 </div>
                                 <div class="absolute bottom-0 left-0 w-full bg-black/40 backdrop-blur-[2px] text-white text-[9px] text-center py-0.5 font-mono shadow-sm">
                                    ${work.play} 播放
                                 </div>
                             </div>
                        </div>

                        <!-- 中间内容 -->
                        <div class="flex-1 min-w-0 flex flex-col gap-1.5 py-0.5">
                            <!-- 标题和基本信息 -->
                            <div>
                                <h3 class="font-bold text-slate-800 text-sm truncate leading-tight pr-10">${work.title}</h3>
                                <div class="flex items-center gap-2 mt-1.5 overflow-hidden">
                                    <span class="text-[10px] text-slate-400 font-mono shrink-0">${work.date}</span>
                                    <div class="flex gap-1 overflow-x-auto hide-scrollbar">
                                        ${tagsHtml}
                                    </div>
                                </div>
                            </div>

                            <!-- 诊断框 -->
                            <div class="inline-flex items-start gap-1.5 ${statusColor} border px-2 py-1.5 rounded-lg w-full">
                                <i class="fa-solid ${icon} text-[10px] mt-0.5 shrink-0"></i>
                                <div>
                                    <div class="text-[10px] font-bold leading-tight mb-0.5">${work.reason}</div>
                                    <div class="text-[9px] opacity-80 leading-tight">${work.suggestion}</div>
                                </div>
                            </div>

                            <!-- 底部数据栏 -->
                            <div class="flex items-center gap-4 text-[10px] text-slate-400 pt-1 mt-auto border-t border-slate-50 border-dashed">
                                <span class="flex items-center gap-1 hover:text-red-400 transition-colors">
                                    <i class="fa-regular fa-heart"></i> ${work.likes}
                                </span>
                                <span class="flex items-center gap-1 hover:text-blue-400 transition-colors">
                                    <i class="fa-regular fa-comment-dots"></i> ${work.comments}
                                </span>
                                <span class="flex items-center gap-1 hover:text-amber-400 transition-colors">
                                    <i class="fa-regular fa-star"></i> ${work.favorites}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.insertAdjacentHTML('beforeend', html);
            currentPage++;
        }

        function checkPaginationStatus() {
            // 如果所有数据都已加载
            if (currentPage * PAGE_SIZE >= displayWorks.length) {
                btn.classList.add('hidden');
                noMoreText.classList.remove('hidden');
                noMoreText.classList.add('flex');
            } else {
                // 更新按钮文案，显示剩余数量
                const remaining = displayWorks.length - (currentPage * PAGE_SIZE);
                btn.querySelector('span').innerText = `加载更多 (${remaining})`;
            }
        }
    }
</script>
