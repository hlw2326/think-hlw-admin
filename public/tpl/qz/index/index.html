<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>工具首页</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    colors: {
                        douyin: '#1C0B2B',
                        kuaishou: '#FF5000',
                        xhs: '#FF2442',
                        bilibili: '#00AEEC',
                        wechat: '#07C160'
                    },
                    backgroundImage: {
                        'grid-pattern': "url(\"data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2394a3b8' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E\")",
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隐藏滚动条但保留滚动功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 极柔和的卡片阴影 */
        .soft-shadow {
            box-shadow: 0 4px 20px -2px rgba(226, 232, 240, 0.6), 0 2px 6px -2px rgba(226, 232, 240, 0.4);
        }

        /* 自定义摇晃动画 */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-15deg); }
            30% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            50% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }
        .animate-shake {
            animation: shake 2.5s infinite linear;
            transform-origin: bottom center;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-blue-100 pb-10 bg-grid-pattern">

<!-- 背景装饰 (优化：更柔和的光斑) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] right-[-10%] w-[80vw] h-[80vw] rounded-full bg-blue-100/40 blur-[100px]"></div>
    <div class="absolute bottom-[-10%] left-[-20%] w-[100vw] h-[100vw] rounded-full bg-indigo-100/40 blur-[100px]"></div>
</div>

<main class="w-full max-w-md flex-1 p-5 flex flex-col gap-6">

    <!-- 1. 广告积分卡片 (优化版：橙金色财富主题) -->
    <div class="bg-white rounded-3xl p-5 soft-shadow border border-white/60 relative overflow-hidden group cursor-pointer" onclick="alert('广告加载中...')">
        <!-- 装饰背景：改为暖橙色晕染 -->
        <div class="absolute right-0 top-0 w-40 h-40 bg-gradient-to-bl from-orange-50 via-white to-transparent rounded-bl-[100px] -mr-10 -mt-10 opacity-80 pointer-events-none"></div>

        <div class="flex items-center justify-between relative z-10">
            <div class="flex items-center gap-4">
                <!-- 图标：橙色主题 -->
                <div class="w-12 h-12 rounded-2xl bg-orange-50 border border-orange-100 text-orange-500 flex items-center justify-center shadow-[inset_0_2px_4px_rgba(255,255,255,1)]">
                    <i class="fa-solid fa-gift text-xl animate-shake"></i>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800 text-[15px] leading-tight mb-1">观看广告领积分</h3>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-orange-600 font-bold bg-orange-50 px-2 py-0.5 rounded-full border border-orange-100 flex items-center gap-1">
                            <i class="fa-solid fa-coins text-[8px]"></i> +50
                        </span>
                        <span class="text-[10px] text-slate-400">极速到账</span>
                    </div>
                </div>
            </div>

            <!-- 按钮：橙色淡雅风格 -->
            <button class="bg-orange-50 text-orange-600 text-xs font-bold px-4 py-2 rounded-xl border border-orange-200 shadow-sm flex items-center gap-1 active:scale-95 transition-all hover:bg-orange-100 hover:border-orange-300">
                <span>立即观看</span>
                <i class="fa-solid fa-angle-right text-[10px] opacity-70"></i>
            </button>
        </div>
    </div>

    <!-- 2. 平台 Tab 切换 (优化：悬浮感增强) -->
    <div class="sticky top-4 z-40">
        <div class="bg-white/80 backdrop-blur-xl border border-white/60 soft-shadow rounded-2xl p-1.5">
            <div class="flex items-center gap-1 overflow-x-auto hide-scrollbar" id="platformTabs">
                <!-- 抖音 (Active) -->
                <button class="tab-btn flex-shrink-0 flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-blue-50 text-blue-600 shadow-sm text-xs font-bold" data-target="douyin">
                    <i class="fa-brands fa-tiktok"></i>
                    <span>抖音</span>
                </button>
                <!-- 快手 -->
                <button class="tab-btn flex-shrink-0 flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-transparent text-slate-500 hover:bg-white hover:shadow-sm transition-all text-xs font-medium" data-target="kuaishou">
                    <i class="fa-solid fa-video text-kuaishou"></i>
                    <span>快手</span>
                </button>
                <!-- 小红书 -->
                <button class="tab-btn flex-shrink-0 flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-transparent text-slate-500 hover:bg-white hover:shadow-sm transition-all text-xs font-medium" data-target="xhs">
                    <i class="fa-solid fa-book text-xhs"></i>
                    <span>小红书</span>
                </button>
                <!-- B站 -->
                <button class="tab-btn flex-shrink-0 flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-transparent text-slate-500 hover:bg-white hover:shadow-sm transition-all text-xs font-medium" data-target="bilibili">
                    <i class="fa-brands fa-bilibili text-bilibili"></i>
                    <span>B站</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 3. 功能宫格 (优化：纯白背景) -->
    <div class="grid grid-cols-2 gap-4" id="toolsGrid">

        <!-- 1. AI爆款文案 (新增 - Indigo) -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group hover:border-indigo-100 transition-colors" onclick="triggerTool('AI文案')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-lg shadow-sm border border-indigo-100/50">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <div class="bg-indigo-100 text-indigo-600 text-[9px] px-2 py-0.5 rounded-full font-bold border border-indigo-200">AI</div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">AI爆款文案</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">智能生成吸睛标题</div>
        </div>

        <!-- 2. 无水印下载 (新增 - Teal) -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group hover:border-teal-100 transition-colors" onclick="triggerTool('无水印下载')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-teal-50 text-teal-500 flex items-center justify-center text-lg shadow-sm border border-teal-100/50">
                    <i class="fa-solid fa-download"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-teal-50 group-hover:text-teal-400 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">无水印下载</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">支持全网视频提取</div>
        </div>

        <!-- 3. 权重查询 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group hover:border-blue-100 transition-colors" onclick="triggerTool('权重查询')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center text-lg shadow-sm border border-blue-100/50">
                    <i class="fa-solid fa-scale-balanced"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-blue-50 group-hover:text-blue-400 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">权重查询</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">查看账号基础评分</div>
        </div>

        <!-- 4. 限流检测 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group hover:border-red-100 transition-colors">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-rose-50 text-rose-500 flex items-center justify-center text-lg shadow-sm border border-rose-100/50">
                    <i class="fa-solid fa-eye-slash"></i>
                </div>
                <div class="bg-rose-100 text-rose-600 text-[9px] px-2 py-0.5 rounded-full font-bold border border-rose-200">Hot</div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">限流检测</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">作品为何0播放?</div>
        </div>

        <!-- 5. 全网热榜 (新增 - Fuchsia) -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group hover:border-fuchsia-100 transition-colors">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-fuchsia-50 text-fuchsia-500 flex items-center justify-center text-lg shadow-sm border border-fuchsia-100/50">
                    <i class="fa-solid fa-fire"></i>
                </div>
                <div class="bg-fuchsia-100 text-fuchsia-600 text-[9px] px-2 py-0.5 rounded-full font-bold border border-fuchsia-200">Trending</div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">全网热榜</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">实时追踪全网热点</div>
        </div>

        <!-- 6. 账号估值 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group border-amber-100 transition-colors" onclick="triggerTool('账号估值')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-amber-50 text-amber-500 flex items-center justify-center text-lg shadow-sm border border-amber-100/50">
                    <i class="fa-solid fa-sack-dollar"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-amber-50 group-hover:text-amber-400 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">账号估值</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">测测你的号值多少钱</div>
        </div>

        <!-- 7. 黄金时间 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group border-purple-100 transition-colors" onclick="triggerTool('黄金时间')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-purple-50 text-purple-500 flex items-center justify-center text-lg shadow-sm border border-purple-100/50">
                    <i class="fa-solid fa-clock"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-purple-50 group-hover:text-purple-400 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">黄金时间</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">最佳发布时间预测</div>
        </div>

        <!-- 8. 作品诊断 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group border-emerald-100 transition-colors" onclick="triggerTool('作品诊断')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg shadow-sm border border-emerald-100/50">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-emerald-50 group-hover:text-emerald-400 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">作品诊断</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">多维分析视频质量</div>
        </div>

        <!-- 9. 直播复盘 (新增 - Lime) -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group border-lime-100 transition-colors" onclick="triggerTool('直播复盘')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-lime-50 text-lime-600 flex items-center justify-center text-lg shadow-sm border border-lime-100/50">
                    <i class="fa-solid fa-video-camera"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-lime-50 group-hover:text-lime-500 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">直播复盘</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">直播间数据深度复盘</div>
        </div>

        <!-- 10. 粉丝排行 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group border-pink-100 transition-colors" onclick="triggerTool('粉丝排行')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-pink-50 text-pink-500 flex items-center justify-center text-lg shadow-sm border border-pink-100/50">
                    <i class="fa-solid fa-ranking-star"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-pink-50 group-hover:text-pink-400 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">粉丝排行</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">查看同类目排名</div>
        </div>

        <!-- 11. 限流解除 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group border-cyan-100 transition-colors" onclick="triggerTool('限流解除')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-cyan-50 text-cyan-500 flex items-center justify-center text-lg shadow-sm border border-cyan-100/50">
                    <i class="fa-solid fa-unlock"></i>
                </div>
                <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-gray-300 group-hover:bg-cyan-50 group-hover:text-cyan-400 transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                </div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">限流解除</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">申诉与恢复建议</div>
        </div>

        <!-- 12. 违规词检测 -->
        <div class="bg-white rounded-2xl p-4 soft-shadow border border-white/50 cursor-pointer group border-orange-100 transition-colors" onclick="triggerTool('违规词检测')">
            <div class="flex justify-between items-start mb-4">
                <div class="w-11 h-11 rounded-2xl bg-orange-50 text-orange-500 flex items-center justify-center text-lg shadow-sm border border-orange-100/50">
                    <i class="fa-solid fa-file-shield"></i>
                </div>
                <div class="bg-orange-100 text-orange-600 text-[9px] px-2 py-0.5 rounded-full font-bold border border-orange-200">New</div>
            </div>
            <div class="font-bold text-slate-700 text-[15px]">违规词检测</div>
            <div class="text-[11px] text-slate-400 mt-1 leading-normal">避免文案被吞</div>
        </div>

    </div>

</main>

<script>
    // Tab 切换逻辑
    const tabs = document.querySelectorAll('.tab-btn');
    let currentPlatformName = '抖音';

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            // 1. 重置所有 Tab 样式
            tabs.forEach(t => {
                t.className = 'tab-btn flex-shrink-0 flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-transparent text-slate-500 hover:bg-white hover:shadow-sm transition-all text-xs font-medium';
            });

            // 2. 激活当前 Tab 样式
            tab.className = 'tab-btn flex-shrink-0 flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-blue-50 text-blue-600 shadow-sm text-xs font-bold';

            // 3. 更新状态
            currentPlatformName = tab.querySelector('span').innerText;
        });
    });

    // 工具点击模拟
    function triggerTool(name) {
        console.log(`Open ${name} for ${currentPlatformName}`);
        // 这里可以添加实际的跳转逻辑
    }
</script>

</body>
</html>
