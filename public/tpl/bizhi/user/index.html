<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>艺术壁纸 Ultra - 个人中心</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
            'glow': '0 0 30px rgba(59, 130, 246, 0.3)',
            'premium': '0 25px 60px -15px rgba(59, 130, 246, 0.18)',
          },
          animation: {
            'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'shine': 'shine 4s linear infinite',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(40px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            shine: {
              '0%': { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F8FAFF;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }

    .ai-gradient {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      background-size: 200% auto;
      animation: shine 4s linear infinite;
    }

    .menu-item {
      transition: all 0.2s ease;
    }
    .menu-item:active {
      background: rgba(0,0,0,0.03);
      transform: scale(0.98);
    }

    .status-badge {
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
    }

    #copyToast {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast-show { transform: translate(-50%, 0); opacity: 1; }
    .toast-hide { transform: translate(-50%, 20px); opacity: 0; }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-blue-100 overflow-x-hidden pb-32">

<!-- 背景装饰 -->
<div class="fixed top-0 w-full max-w-md h-full -z-10 pointer-events-none overflow-hidden">
  <div class="absolute top-[-5%] left-[-10%] w-[100%] aspect-square bg-indigo-50 rounded-full blur-[80px] opacity-60"></div>
  <div class="absolute bottom-[10%] right-[-20%] w-[100%] aspect-square bg-blue-50 rounded-full blur-[100px] opacity-40"></div>
</div>

<!-- 1. 顶部用户信息 -->
<header class="w-full max-w-md px-6 pt-12 pb-6 flex flex-col items-center animate-slide-up">
  <div class="relative mb-6">
    <div class="w-28 h-28 rounded-[2.5rem] p-1.5 bg-white shadow-premium rotate-3">
      <img src="https://ui-avatars.com/api/?name=Z&background=6366f1&color=fff&size=200" class="w-full h-full rounded-[2rem] object-cover -rotate-3 transition-transform hover:rotate-0 duration-500">
    </div>
    <!-- 勋章 -->
    <div class="absolute -top-2 -right-4 status-badge px-3 py-1 rounded-full text-[10px] font-black text-white shadow-glow uppercase tracking-wider">
      Pro Artist
    </div>
  </div>

  <h2 class="text-2xl font-black text-slate-900 mb-2">Zeno Design</h2>

  <!-- 用户编号 (可点击复制) -->
  <div onclick="copyUserId('888666')" class="group flex items-center gap-2 px-4 py-1.5 bg-slate-100 rounded-full cursor-pointer active:scale-95 transition-all mb-8">
    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">UID: <span id="userId" class="text-slate-600 ml-1">888666</span></span>
    <i class="fa-regular fa-copy text-[10px] text-blue-500 group-hover:scale-110 transition-transform"></i>
  </div>

  <!-- 社交数据统计 -->
  <div class="flex gap-12 text-center">
    <div>
      <div class="text-xl font-black text-slate-900">12.8k</div>
      <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">关注者</div>
    </div>
    <div>
      <div class="text-xl font-black text-slate-900">432</div>
      <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">获得赞</div>
    </div>
    <div>
      <div class="text-xl font-black text-slate-900">86</div>
      <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">原创作品</div>
    </div>
  </div>
</header>

<main class="w-full max-w-md px-6 flex flex-col gap-6">

  <!-- 2. 会员卡片 -->
  <section class="animate-slide-up" style="animation-delay: 0.1s">
    <div class="ai-gradient p-6 rounded-[2.5rem] shadow-premium relative overflow-hidden group">
      <div class="relative z-10 flex justify-between items-start">
        <div>
          <div class="text-white/70 text-[10px] font-black uppercase tracking-[0.2em] mb-1">Ultra Membership</div>
          <h3 class="text-2xl font-black text-white mb-4">开启无限创意可能</h3>
        </div>
        <div class="w-14 h-14 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center text-white text-2xl">
          <i class="fa-solid fa-crown"></i>
        </div>
      </div>
      <button class="w-full bg-white py-4 rounded-[1.5rem] text-sm font-black text-indigo-600 shadow-xl active:scale-95 transition-all">续费会员 · ￥19.00/月</button>
      <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
    </div>
  </section>

  <!-- 3. 功能菜单列表 -->
  <section class="animate-slide-up" style="animation-delay: 0.2s">
    <div class="bg-white rounded-[2.5rem] shadow-soft border border-slate-50 overflow-hidden">
      <div class="menu-item p-5 flex items-center justify-between cursor-pointer border-b border-slate-50">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center">
            <i class="fa-solid fa-palette text-lg"></i>
          </div>
          <div>
            <div class="text-sm font-black text-slate-800">个性化装扮</div>
            <div class="text-[10px] font-bold text-slate-400">管理您的桌面组件与主题</div>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
      </div>
      <div class="menu-item p-5 flex items-center justify-between cursor-pointer border-b border-slate-50">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center">
            <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
          </div>
          <div>
            <div class="text-sm font-black text-slate-800">创作者中心</div>
            <div class="text-[10px] font-bold text-slate-400">上传作品并赚取收益</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>
          <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
        </div>
      </div>
      <div class="menu-item p-5 flex items-center justify-between cursor-pointer border-b border-slate-50">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 rounded-2xl bg-amber-50 text-amber-500 flex items-center justify-center">
            <i class="fa-solid fa-clock-rotate-left text-lg"></i>
          </div>
          <div>
            <div class="text-sm font-black text-slate-800">下载记录</div>
            <div class="text-[10px] font-bold text-slate-400">查看最近保存的 4K 壁纸</div>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
      </div>
      <div class="menu-item p-5 flex items-center justify-between cursor-pointer">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center">
            <i class="fa-solid fa-gear text-lg"></i>
          </div>
          <div>
            <div class="text-sm font-black text-slate-800">偏好设置</div>
            <div class="text-[10px] font-bold text-slate-400">隐私、清理缓存与账号设置</div>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
      </div>
    </div>
  </section>

  <!-- 4. 底部说明 -->
  <section class="animate-slide-up mb-8" style="animation-delay: 0.3s">
    <div class="mt-6 text-center">
      <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Art Wallpaper Ultra v2.4.0</p>
    </div>
  </section>

</main>

<!-- 复制成功 Toast -->
<div id="copyToast" class="fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-2xl flex items-center gap-2 toast-hide pointer-events-none z-[100]">
  <i class="fa-solid fa-circle-check text-green-400"></i>
  编号已复制到剪贴板
</div>

<!-- 导航栏 -->
<nav class="fixed bottom-0 w-full max-w-md px-6 pb-8 pt-4 z-[60]">
  <div class="bg-white/80 backdrop-blur-2xl rounded-[2.5rem] p-4 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border border-white/50">
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-300 px-4">
      <i class="fa-solid fa-house-chimney-window text-xl"></i>
      <span class="text-[8px] font-black uppercase">Home</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
      <i class="fa-solid fa-compass text-xl"></i>
      <span class="text-[8px] font-black uppercase">Explore</span>
    </a>
    <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl -mt-12 border-4 border-[#F8FAFF] active:scale-90 transition-all cursor-pointer">
      <i class="fa-solid fa-plus text-xl"></i>
    </div>
    <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
      <i class="fa-solid fa-heart text-xl"></i>
      <span class="text-[8px] font-black uppercase">Likes</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-1 text-blue-600 px-4">
      <i class="fa-solid fa-user-gear text-xl"></i>
      <span class="text-[8px] font-black uppercase">Profile</span>
    </a>
  </div>
</nav>

<script>
  function copyUserId(id) {
    // 创建隐藏的文本域用于复制（兼容性更好）
    const textArea = document.createElement("textarea");
    textArea.value = id;
    document.body.appendChild(textArea);
    textArea.select();
    try {
      document.execCommand('copy');
      showToast();
    } catch (err) {
      console.error('复制失败', err);
    }
    document.body.removeChild(textArea);
  }

  function showToast() {
    const toast = document.getElementById('copyToast');
    toast.classList.replace('toast-hide', 'toast-show');
    setTimeout(() => {
      toast.classList.replace('toast-show', 'toast-hide');
    }, 2000);
  }
</script>

</body>
</html>
