<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>艺术壁纸 Pro - 发现无限灵感</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'glow': '0 0 20px rgba(59, 130, 246, 0.4)',
                        'premium': '0 20px 50px -12px rgba(59, 130, 246, 0.15)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'pulse-slow': 'pulse 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8FAFF;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 120px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .premium-shimmer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.4) 50%, transparent 70%);
            transform: translateX(-150%);
            animation: shimmer-swipe 5s infinite;
            pointer-events: none;
        }

        @keyframes shimmer-swipe {
            0% { transform: translateX(-150%); }
            20%, 100% { transform: translateX(150%); }
        }

        .nav-float {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .preview-overlay {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-blue-100 overflow-x-hidden">

<!-- 1. Header with Points -->
<header class="w-full max-w-md px-6 pt-8 pb-4 z-50">

        <div class="w-8 h-8 rounded-full border-2 border-white shadow-sm bg-amber-400 shrink-0 cursor-pointer active:scale-90 transition-transform"></div>

</header>

                <span class="text-[10px] font-bold text-slate-400">Pixel_Art</span>

    <!-- 5. Main Grid -->

            <div class="flex items-center gap-3">

<!-- 7. Preview Modal (The big function) -->
<div id="previewModal" class="fixed inset-0 z-[100] hidden">
    <div class="preview-overlay absolute inset-0 opacity-0 transition-opacity duration-300"></div>
    <div class="absolute inset-0 flex flex-col items-center justify-center p-6 transform translate-y-full transition-transform duration-500">
        <!-- Phone Mockup Container -->
        <div class="relative w-[280px] h-[580px] rounded-[3rem] border-[8px] border-slate-800 bg-slate-900 shadow-2xl overflow-hidden mb-8">
            <img id="previewImg" src="" class="absolute inset-0 w-full h-full object-cover">

            <!-- Lock Screen Elements -->
            <div class="absolute inset-0 flex flex-col items-center pt-20 text-white pointer-events-none">
                <div class="text-6xl font-extralight opacity-90">12:45</div>
                <div class="text-sm font-medium mt-2">1月27日 星期二</div>

                <div class="mt-auto mb-16 px-6 w-full space-y-4">
                    <div class="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/10">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                                <i class="fa-solid fa-message text-xs"></i>
                            </div>
                            <div>
                                <div class="text-[10px] font-black opacity-60">WECHAT</div>
                                <div class="text-[11px] font-bold">李华：这张壁纸太酷了！</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="w-full max-w-xs flex gap-4">
            <button onclick="togglePreview()" class="flex-1 py-4 bg-white/10 backdrop-blur rounded-2xl text-white font-black text-sm border border-white/20 active:scale-95 transition-transform">返回</button>
            <button onclick="alert('壁纸已保存至相册')" class="flex-[2] py-4 bg-blue-600 rounded-2xl text-white font-black text-sm shadow-xl shadow-blue-600/30 active:scale-95 transition-transform">立即下载</button>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('previewModal');
    const previewImg = document.getElementById('previewImg');
    const overlay = modal.querySelector('.preview-overlay');
    const content = modal.querySelector('div:last-child');

    function togglePreview(src) {
        if (modal.classList.contains('hidden')) {
            previewImg.src = src;
            modal.classList.remove('hidden');
            // Force reflow
            void modal.offsetWidth;
            overlay.classList.remove('opacity-0');
            overlay.classList.add('opacity-100');
            content.classList.remove('translate-y-full');
            content.classList.add('translate-y-0');
        } else {
            overlay.classList.add('opacity-0');
            content.classList.add('translate-y-full');
            content.classList.remove('translate-y-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 500);
        }
    }

    // 处理颜色选择点击效果
    document.querySelectorAll('.shrink-0').forEach(color => {
        color.addEventListener('click', function() {
            document.querySelectorAll('.shrink-0').forEach(c => c.classList.remove('ring-offset-2', 'ring-2', 'ring-blue-400'));
            if(this.classList.contains('w-8')) {
                this.classList.add('ring-offset-2', 'ring-2', 'ring-blue-400');
            }
        });
    });
</script>
