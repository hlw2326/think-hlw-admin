<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>壁纸详情 - 艺术壁纸 Ultra</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 25px 60px -15px rgba(59, 130, 246, 0.2)',
                        'inner-glow': 'inset 0 1px 1px rgba(255,255,255,0.4)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.4)' },
                            '100%': { transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8FAFF;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .ai-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        }
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .is-favorited {
            animation: pop 0.4s ease-out;
            background-color: #f43f5e !important;
            color: white !important;
        }
    </style>
</head>
<body class="text-slate-800 selection:bg-blue-100 overflow-x-hidden">

<!-- 顶部状态栏 -->
<header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-6 py-6 max-w-md mx-auto">
    <button onclick="window.history.back()" class="w-12 h-12 glass-card rounded-2xl flex items-center justify-center text-slate-800 shadow-sm active:scale-90 transition-transform">
        <i class="fa-solid fa-chevron-left"></i>
    </button>
    <div class="flex gap-2">
        <div class="h-12 px-4 glass-card rounded-2xl flex items-center gap-2 shadow-sm">
            <div class="w-5 h-5 ai-gradient rounded-full flex items-center justify-center text-[10px] text-white">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <span id="pointDisplay" class="font-black text-sm text-slate-700">120</span>
        </div>
        <button class="w-12 h-12 glass-card rounded-2xl flex items-center justify-center text-slate-800 shadow-sm active:scale-90 transition-transform">
            <i class="fa-solid fa-share-nodes"></i>
        </button>
    </div>
</header>

<main class="w-full max-w-md mx-auto pt-24 px-6 pb-32">
    <!-- 壁纸主体预览 -->
    <div class="relative group animate-float">
        <div class="absolute -inset-4 ai-gradient opacity-20 blur-3xl rounded-[3rem] -z-10 group-hover:opacity-30 transition-opacity"></div>
        <div class="relative w-full aspect-[9/16] rounded-[3rem] border-[8px] border-slate-900 bg-slate-200 overflow-hidden shadow-premium">
            <img id="mainWallpaper" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover">
            <!-- 手机 UI 模拟覆盖 -->
            <div class="absolute inset-0 pointer-events-none flex flex-col items-center pt-16 text-white">
                <div class="text-5xl font-extralight tracking-tight">14:02</div>
                <div class="text-xs font-medium opacity-80 mt-2 uppercase tracking-[0.3em]">Tuesday, January 28</div>
            </div>
        </div>
    </div>

    <!-- 壁纸信息 -->
    <div class="mt-8 space-y-4">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">幻彩流体 #08</h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Abstract Collection • 4K UHD</p>
            </div>
            <!-- 收藏按钮 -->
            <button id="favBtn" onclick="toggleFavorite()" class="w-14 h-14 rounded-2xl bg-rose-50 text-rose-500 flex items-center justify-center text-xl active:scale-90 transition-all duration-300">
                <i class="fa-regular fa-heart"></i>
            </button>
        </div>

        <div class="flex gap-2 py-2 overflow-x-auto no-scrollbar">
            <span class="px-4 py-2 bg-white rounded-xl text-[10px] font-black text-slate-500 border border-slate-100 uppercase"># 3D渲染</span>
            <span class="px-4 py-2 bg-white rounded-xl text-[10px] font-black text-slate-500 border border-slate-100 uppercase"># 抽象艺术</span>
            <span class="px-4 py-2 bg-white rounded-xl text-[10px] font-black text-slate-500 border border-slate-100 uppercase"># 极简</span>
        </div>

        <div class="bg-white/50 border border-white p-6 rounded-[2rem] space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400">下载所需积分</span>
                <span class="text-sm font-black text-indigo-600">50 积分</span>
            </div>
            <div class="h-[1px] bg-slate-100 w-full"></div>
            <div class="flex items-center gap-4 text-[11px] font-medium text-slate-500">
                <div class="flex items-center gap-1.5"><i class="fa-regular fa-image text-indigo-500"></i> 2160x3840</div>
                <div class="flex items-center gap-1.5"><i class="fa-solid fa-weight-hanging text-indigo-500"></i> 4.2 MB</div>
                <div class="flex items-center gap-1.5"><i class="fa-regular fa-face-smile text-indigo-500"></i> 100% 授权</div>
            </div>
        </div>
    </div>
</main>

<!-- 底部操作栏 -->
<div class="fixed bottom-0 left-0 right-0 p-6 z-50 max-w-md mx-auto">
    <div class="glass-card p-4 rounded-[2.5rem] shadow-2xl flex gap-3">
        <!-- 赚取积分 -->
        <button onclick="startAd()" class="flex-1 h-16 bg-white border-2 border-slate-100 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform group">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-clapperboard text-indigo-500 group-hover:rotate-12 transition-transform"></i>
                <span class="text-[10px] font-black text-slate-900 uppercase">看广告</span>
            </div>
            <span class="text-[9px] text-slate-400 font-bold">+50 积分</span>
        </button>

        <!-- 下载按钮 -->
        <button id="downloadBtn" onclick="handleDownload()" class="flex-[2] h-16 ai-gradient rounded-2xl flex items-center justify-center gap-3 text-white font-black shadow-lg shadow-indigo-200 active:scale-95 transition-transform">
            <i id="downloadIcon" class="fa-solid fa-lock text-sm opacity-60"></i>
            <span>解锁并下载 4K</span>
        </button>
    </div>
</div>

<!-- 广告模拟遮罩 -->
<div id="adModal" class="fixed inset-0 bg-slate-900 z-[100] hidden flex flex-col items-center justify-center p-8">
    <div class="absolute top-12 right-8 flex items-center gap-2">
        <div class="px-3 py-1 bg-white/10 backdrop-blur rounded-full text-white text-[10px] font-bold" id="adTimer">
            广告还剩 15s
        </div>
        <button id="closeAdBtn" class="w-8 h-8 rounded-full bg-white/10 text-white opacity-20" disabled>
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- 模拟广告内容 -->
    <div class="w-full aspect-video bg-white/5 rounded-3xl flex flex-col items-center justify-center text-center space-y-6">
        <div class="w-20 h-20 bg-white/10 rounded-[2rem] flex items-center justify-center text-4xl animate-pulse-slow">
            <i class="fa-brands fa-app-store-ios text-white"></i>
        </div>
        <div>
            <h4 class="text-white font-black text-xl mb-2">梦幻装饰极简版</h4>
            <p class="text-white/40 text-xs">体验前所未有的桌面管理方式</p>
        </div>
        <button class="bg-blue-500 text-white px-8 py-3 rounded-xl font-black text-sm shadow-xl">立即下载</button>
    </div>

    <p class="mt-12 text-white/20 text-[10px] uppercase font-black tracking-widest">积分发放中 • 请勿关闭</p>
</div>

<!-- 吐司通知 -->
<div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[200] px-6 py-4 bg-slate-900/90 backdrop-blur-xl rounded-2xl text-white text-[11px] font-black shadow-2xl transform -translate-y-20 opacity-0 transition-all flex items-center gap-3">
    <div id="toastIcon" class="w-6 h-6 ai-gradient rounded-full flex items-center justify-center text-[10px]">
        <i class="fa-solid fa-check"></i>
    </div>
    <span id="toastMsg">操作成功</span>
</div>

<script>
    let points = 120;
    let isFavorited = false;

    // 更新界面积分显示
    function updatePoints(amount) {
        points += amount;
        const display = document.getElementById('pointDisplay');
        display.innerText = points;

        // 积分变动数字跳动动画
        display.classList.add('scale-125', 'text-indigo-600');
        setTimeout(() => display.classList.remove('scale-125', 'text-indigo-600'), 200);

        checkStatus();
    }

    // 检查下载按钮锁定状态
    function checkStatus() {
        const btn = document.getElementById('downloadBtn');
        const icon = document.getElementById('downloadIcon');

        if (points >= 50) {
            btn.classList.remove('opacity-80');
            icon.className = 'fa-solid fa-unlock text-sm text-yellow-300';
            btn.querySelector('span').innerText = '消耗 50 积分下载';
        } else {
            btn.classList.add('opacity-80');
            icon.className = 'fa-solid fa-lock text-sm opacity-60';
            btn.querySelector('span').innerText = '积分不足';
        }
    }

    // 收藏功能逻辑
    function toggleFavorite() {
        isFavorited = !isFavorited;
        const btn = document.getElementById('favBtn');
        const icon = btn.querySelector('i');

        if (isFavorited) {
            btn.classList.add('is-favorited');
            icon.className = 'fa-solid fa-heart';
            showToast('已添加到收藏夹', 'success');
        } else {
            btn.classList.remove('is-favorited');
            icon.className = 'fa-regular fa-heart';
            showToast('已从收藏夹移除', 'info');
        }
    }

    // 模拟广告逻辑
    function startAd() {
        const modal = document.getElementById('adModal');
        const timerText = document.getElementById('adTimer');
        const closeBtn = document.getElementById('closeAdBtn');
        let timeLeft = 5; // 模拟 5 秒广告

        modal.classList.remove('hidden');

        const timer = setInterval(() => {
            timeLeft--;
            timerText.innerText = `广告还剩 ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerText.innerText = '奖励已就绪';
                closeBtn.removeAttribute('disabled');
                closeBtn.classList.remove('opacity-20');
                closeBtn.onclick = () => {
                    modal.classList.add('hidden');
                    updatePoints(50);
                    showToast('积分已到账 +50', 'success');
                };
            }
        }, 1000);
    }

    function handleDownload() {
        if (points < 50) {
            showToast('积分不足，快去看个广告吧', 'error');
            return;
        }

        updatePoints(-50);
        showToast('正在准备 4K 原图文件...', 'download');

        const btn = document.getElementById('downloadBtn');
        const originalText = btn.innerHTML;
        btn.innerText = "处理中...";
        btn.disabled = true;

        setTimeout(() => {
            btn.innerText = "已保存到相册";
            btn.classList.replace('ai-gradient', 'bg-emerald-500');
            showToast('下载完成！', 'success');
        }, 2000);
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const toastIcon = document.getElementById('toastIcon');

        toastMsg.innerText = msg;

        if (type === 'error') {
            toastIcon.className = 'w-6 h-6 bg-rose-500 rounded-full flex items-center justify-center text-[10px] text-white';
            toastIcon.innerHTML = '<i class="fa-solid fa-xmark"></i>';
        } else if (type === 'download') {
            toastIcon.className = 'w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-[10px] text-white';
            toastIcon.innerHTML = '<i class="fa-solid fa-cloud-arrow-down"></i>';
        } else if (type === 'info') {
            toastIcon.className = 'w-6 h-6 bg-slate-400 rounded-full flex items-center justify-center text-[10px] text-white';
            toastIcon.innerHTML = '<i class="fa-solid fa-heart-crack"></i>';
        } else {
            toastIcon.className = 'w-6 h-6 ai-gradient rounded-full flex items-center justify-center text-[10px] text-white';
            toastIcon.innerHTML = '<i class="fa-solid fa-check"></i>';
        }

        toast.classList.add('translate-y-0', 'opacity-100');
        toast.classList.remove('-translate-y-20', 'opacity-0');

        setTimeout(() => {
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('-translate-y-20', 'opacity-0');
        }, 3000);
    }

    // 初始化检查
    checkStatus();
</script>

</body>
</html>
