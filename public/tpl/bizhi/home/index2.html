<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>艺术壁纸 Ultra - 重新定义桌面</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'glow': '0 0 30px rgba(59, 130, 246, 0.3)',
                        'premium': '0 25px 60px -15px rgba(59, 130, 246, 0.18)',
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'shine': 'shine 3s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-15px) rotate(1deg)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(40px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        shine: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8FAFF;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .ai-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }

        .phone-mockup {
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.3), 0 30px 60px -30px rgba(0,0,0,0.3), inset 0 -2px 20px 0 rgba(255,255,255,0.1);
        }

        .tag-pill {
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.3s;
        }
        .tag-pill:active { transform: scale(0.92); }

        /* 详情抽屉动画 */
        #detailDrawer {
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .toast-active { transform: translateY(0) scale(1); opacity: 1; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-blue-100 overflow-x-hidden pb-32">

<!-- 背景装饰 -->
<div class="fixed top-0 w-full max-w-md h-full -z-10 pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] right-[-10%] w-[120%] aspect-square bg-blue-50 rounded-full blur-[100px] opacity-60"></div>
    <div class="absolute bottom-[20%] left-[-20%] w-[100%] aspect-square bg-indigo-50 rounded-full blur-[100px] opacity-40"></div>
</div>

<!-- 1. 动态 Header -->
<header class="w-full max-w-md px-6 pt-8 pb-4 z-50">
    <div class="flex justify-between items-center mb-6">
        <div>
            <div class="flex items-center gap-2 mb-1">
                <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Hand%20gestures/Waving%20Hand.png" width="20" height="20">
                <span class="text-[10px] font-black text-blue-500 tracking-[0.2em] uppercase">你好, 创意者</span>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">发现今日灵感</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl bg-white shadow-soft border border-slate-50 flex items-center justify-center text-slate-400 relative">
                <i class="fa-solid fa-bell"></i>
                <span class="absolute top-3 right-3 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></span>
            </div>
            <img src="https://ui-avatars.com/api/?name=Z&background=6366f1&color=fff" class="w-11 h-11 rounded-2xl border-2 border-white shadow-soft">
        </div>
    </div>

    <!-- 搜索栏 -->
    <div class="relative group">
        <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
            <i class="fa-solid fa-magnifying-glass text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
        </div>
        <input type="text" placeholder="搜索 3D 渲染、虚幻引擎、梦幻色彩..." class="w-full h-14 pl-12 pr-6 bg-white/80 backdrop-blur-sm border border-slate-100 rounded-[1.5rem] shadow-soft focus:outline-none focus:ring-4 focus:ring-blue-500/5 focus:border-blue-500 transition-all text-sm font-semibold">
    </div>
</header>

<main class="w-full max-w-md px-5 flex flex-col gap-8">

    <!-- 2. AI 创意工坊入口 -->
    <section class="animate-slide-up">
        <div class="ai-gradient p-6 rounded-[2.5rem] shadow-premium relative overflow-hidden group cursor-pointer">
            <div class="absolute -right-4 -top-4 w-32 h-32 bg-white/10 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur flex items-center justify-center text-white">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </div>
                    <span class="text-xs font-black text-white/80 uppercase tracking-widest">AI Workshop</span>
                </div>
                <h3 class="text-xl font-black text-white mb-2 leading-tight">AI 联觉：根据文字生成壁纸</h3>
                <p class="text-[11px] text-white/60 font-medium mb-4">当前最热： "赛博朋克风格的雨夜重庆..."</p>
                <button class="bg-white text-indigo-600 px-6 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-xl active:scale-95 transition-all">立即开启</button>
            </div>
            <div class="absolute bottom-[-20px] right-[-20px] opacity-20">
                <i class="fa-solid fa-brain text-9xl text-white"></i>
            </div>
        </div>
    </section>

    <!-- 3. 话题标签 -->
    <section class="animate-slide-up" style="animation-delay: 0.1s">
        <div class="flex items-center justify-between mb-4 px-1">
            <h3 class="font-extrabold text-slate-900">热门话题</h3>
        </div>
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <div class="tag-pill shrink-0 px-5 py-2.5 rounded-2xl flex items-center gap-2 shadow-sm cursor-pointer">
                <span class="text-blue-500 text-[10px]">#</span>
                <span class="text-xs font-bold text-slate-600">莫奈花园</span>
            </div>
            <div class="tag-pill shrink-0 px-5 py-2.5 rounded-2xl flex items-center gap-2 shadow-sm cursor-pointer">
                <span class="text-indigo-500 text-[10px]">#</span>
                <span class="text-xs font-bold text-slate-600">极简白</span>
            </div>
            <div class="tag-pill shrink-0 px-5 py-2.5 rounded-2xl flex items-center gap-2 shadow-sm cursor-pointer">
                <span class="text-emerald-500 text-[10px]">#</span>
                <span class="text-xs font-bold text-slate-600">空间感</span>
            </div>
            <div class="tag-pill shrink-0 px-5 py-2.5 rounded-2xl flex items-center gap-2 shadow-sm cursor-pointer">
                <span class="text-rose-500 text-[10px]">#</span>
                <span class="text-xs font-bold text-slate-600">复古胶片</span>
            </div>
        </div>
    </section>

    <!-- 4. 专题合集 -->
    <section class="animate-slide-up" style="animation-delay: 0.2s">
        <div class="flex items-center justify-between mb-4 px-1">
            <h3 class="font-extrabold text-slate-900">精选专题</h3>
            <span class="text-[10px] font-black text-blue-600">全部专题</span>
        </div>
        <div class="flex gap-4 overflow-x-auto no-scrollbar">
            <!-- Collection 1 -->
            <div class="shrink-0 w-64 h-40 rounded-[2rem] overflow-hidden relative group cursor-pointer shadow-soft">
                <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-black/30 group-hover:bg-black/10 transition-colors"></div>
                <div class="absolute bottom-5 left-6 text-white">
                    <h4 class="text-lg font-black leading-tight">液态色彩学</h4>
                    <p class="text-[10px] font-bold opacity-80">128 张壁纸</p>
                </div>
            </div>
            <!-- Collection 2 -->
            <div class="shrink-0 w-64 h-40 rounded-[2rem] overflow-hidden relative group cursor-pointer shadow-soft">
                <img src="https://images.unsplash.com/photo-1614728263952-84ea256f9679?auto=format&fit=crop&q=80&w=600" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-black/30 group-hover:bg-black/10 transition-colors"></div>
                <div class="absolute bottom-5 left-6 text-white">
                    <h4 class="text-lg font-black leading-tight">深空探索</h4>
                    <p class="text-[10px] font-bold opacity-80">84 张壁纸</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 5. 瀑布流/网格 -->
    <section class="animate-slide-up" style="animation-delay: 0.3s">
        <div class="flex items-center justify-between mb-5 px-1">
            <h3 class="font-extrabold text-xl text-slate-900">最新发布</h3>
            <div class="flex gap-2 bg-white p-1 rounded-xl shadow-sm border border-slate-50">
                <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-xs"><i class="fa-solid fa-grid-2"></i></div>
                <div class="w-8 h-8 rounded-lg text-slate-300 flex items-center justify-center text-xs"><i class="fa-solid fa-list"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 pb-12">
            <!-- Card 1 -->
            <div class="group relative aspect-[3/4.5] rounded-[2rem] overflow-hidden shadow-soft cursor-pointer" onclick="openDetail('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=800', '抽象流体')">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                <div class="absolute top-4 right-4 w-8 h-8 rounded-xl glass-panel flex items-center justify-center text-slate-900 text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">
                    <i class="fa-regular fa-heart"></i>
                </div>
                <div class="absolute inset-x-0 bottom-0 p-5 bg-gradient-to-t from-black/60 to-transparent">
                    <span class="text-[11px] font-black text-white">抽象流体 #01</span>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="group relative aspect-[3/4.5] rounded-[2rem] overflow-hidden shadow-soft cursor-pointer" onclick="openDetail('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=800', '森之呼吸')">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                <div class="absolute inset-x-0 bottom-0 p-5 bg-gradient-to-t from-black/60 to-transparent">
                    <span class="text-[11px] font-black text-white">森之呼吸</span>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="group relative aspect-[3/4.5] rounded-[2rem] overflow-hidden shadow-soft cursor-pointer" onclick="openDetail('https://images.unsplash.com/photo-1635805737707-575885ab0820?auto=format&fit=crop&q=80&w=800', '赛博霓虹')">
                <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                <div class="absolute inset-x-0 bottom-0 p-5 bg-gradient-to-t from-black/60 to-transparent">
                    <span class="text-[11px] font-black text-white">赛博霓虹</span>
                </div>
            </div>
            <!-- Card 4 -->
            <div class="group relative aspect-[3/4.5] rounded-[2rem] overflow-hidden shadow-soft cursor-pointer" onclick="openDetail('https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&q=80&w=800', '波普艺术')">
                <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                <div class="absolute inset-x-0 bottom-0 p-5 bg-gradient-to-t from-black/60 to-transparent">
                    <span class="text-[11px] font-black text-white">波普艺术</span>
                </div>
            </div>
        </div>
    </section>

</main>

<!-- 导航栏 -->
<nav class="fixed bottom-0 w-full max-w-md px-6 pb-8 pt-4 z-[60]">
    <div class="bg-white/80 backdrop-blur-2xl rounded-[2.5rem] p-4 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border border-white/50">
        <a href="#" class="flex flex-col items-center gap-1 text-blue-600 px-4">
            <i class="fa-solid fa-house-chimney-window text-xl"></i>
            <span class="text-[8px] font-black uppercase">Home</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[8px] font-black uppercase">Explore</span>
        </a>
        <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl -mt-12 border-4 border-[#F8FAFF] active:scale-90 transition-all cursor-pointer">
            <i class="fa-solid fa-plus text-xl"></i>
        </div>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
            <i class="fa-solid fa-heart text-xl"></i>
            <span class="text-[8px] font-black uppercase">Likes</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
            <i class="fa-solid fa-user-gear text-xl"></i>
            <span class="text-[8px] font-black uppercase">Profile</span>
        </a>
    </div>
</nav>

<!-- 详情抽屉 Detail Drawer -->
<div id="drawerOverlay" class="fixed inset-0 bg-slate-900/60 z-[100] opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm" onclick="closeDetail()"></div>
<div id="detailDrawer" class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white rounded-t-[3rem] z-[110] transform translate-y-full flex flex-col items-center p-8 pb-12 shadow-2xl">
    <div class="w-12 h-1.5 bg-slate-200 rounded-full mb-8"></div>

    <div class="flex flex-col items-center w-full">
        <!-- 手机预览 -->
        <div class="phone-mockup relative w-[220px] aspect-[9/19] rounded-[2.5rem] border-[6px] border-slate-900 overflow-hidden mb-8 bg-slate-100">
            <img id="detailImg" src="" class="w-full h-full object-cover">
            <div class="absolute inset-0 flex flex-col items-center pt-10 text-white pointer-events-none">
                <div class="text-4xl font-extralight">09:41</div>
                <div class="text-[10px] opacity-70 mt-1 uppercase tracking-widest">Monday, May 24</div>
            </div>
        </div>

        <h3 id="detailTitle" class="text-2xl font-black text-slate-900 mb-2">作品标题</h3>
        <p class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest">Creator: SkyDesign Studio</p>

        <!-- 调色盘 -->
        <div class="flex gap-2 mb-8">
            <div class="w-6 h-6 rounded-full shadow-sm border border-white" style="background: #3b82f6"></div>
            <div class="w-6 h-6 rounded-full shadow-sm border border-white" style="background: #1e1b4b"></div>
            <div class="w-6 h-6 rounded-full shadow-sm border border-white" style="background: #e0f2fe"></div>
            <div class="w-6 h-6 rounded-full shadow-sm border border-white" style="background: #94a3b8"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="grid grid-cols-2 gap-4 w-full">
            <button onclick="showToast('已添加到收藏夹')" class="h-16 rounded-2xl border-2 border-slate-100 font-black text-slate-400 flex items-center justify-center gap-2 active:scale-95 transition-all">
                <i class="fa-regular fa-heart text-lg"></i> 收藏
            </button>
            <button onclick="showToast('正在下载 4K 原图...')" class="h-16 rounded-2xl bg-slate-900 text-white font-black flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all">
                <i class="fa-solid fa-cloud-arrow-down text-lg text-blue-400"></i> 下载
            </button>
        </div>
    </div>
</div>

<!-- Toast 通知 -->
<div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 bg-slate-900/90 backdrop-blur rounded-2xl text-white text-xs font-black shadow-2xl transform -translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3">
    <div class="w-5 h-5 bg-blue-500 rounded-full flex items-center justify-center"><i class="fa-solid fa-check text-[10px]"></i></div>
    <span id="toastMsg">操作成功</span>
</div>

<script>
    const overlay = document.getElementById('drawerOverlay');
    const drawer = document.getElementById('detailDrawer');
    const detailImg = document.getElementById('detailImg');
    const detailTitle = document.getElementById('detailTitle');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');

    function openDetail(src, title) {
        detailImg.src = src;
        detailTitle.innerText = title;

        overlay.classList.remove('pointer-events-none');
        overlay.classList.add('opacity-100');
        drawer.classList.remove('translate-y-full');
        drawer.classList.add('translate-y-0');
        document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
        overlay.classList.add('opacity-0');
        overlay.classList.add('pointer-events-none');
        drawer.classList.add('translate-y-full');
        drawer.classList.remove('translate-y-0');
        document.body.style.overflow = 'auto';
    }

    function showToast(msg) {
        toastMsg.innerText = msg;
        toast.classList.add('toast-active');
        setTimeout(() => {
            toast.classList.remove('toast-active');
        }, 3000);
    }

    // 搜索框焦点效果
    const searchInput = document.querySelector('input');
    searchInput.addEventListener('focus', () => {
        // 可以在这里添加搜索联想词 UI
    });
</script>

</body>
</html>
