<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亲脉 Momentum Kin - 亲戚关系计算器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.04)',
                        'glow': '0 0 30px rgba(99, 102, 241, 0.2)',
                        'premium': '0 20px 60px -15px rgba(0,0,0,0.1)',
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F9FAFF;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .btn-active:active { transform: scale(0.92); transition: 0.1s; }

        .calc-screen {
            min-height: 180px;
            background: linear-gradient(135deg, #ffffff 0%, #f3f4ff 100%);
        }

        /* 动画效果 */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.2, 0, 0, 1) forwards; }

        #shareModal {
            backdrop-filter: blur(8px);
        }

        /* 状态过渡 */
        .gender-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex flex-col items-center overflow-x-hidden pb-32">

<!-- 顶部导航 -->
<header class="w-full max-w-md px-8 pt-12 pb-6 flex justify-between items-center sticky top-0 bg-[#F9FAFF]/80 backdrop-blur-xl z-50">
    <div>
        <h2 class="text-xl font-black tracking-tight">亲脉 <span class="text-indigo-600">Kin</span></h2>
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Relative Calculator</p>
    </div>
    <div class="flex gap-4">
        <button onclick="toggleGender()" id="genderBtn" class="gender-transition px-4 h-10 rounded-2xl bg-white shadow-soft flex items-center gap-2 border border-transparent active:scale-95">
            <i id="genderIcon" class="fa-solid fa-mars text-sm text-indigo-500 gender-transition"></i>
            <span class="text-[10px] font-black uppercase tracking-wider text-indigo-500 gender-transition" id="myGender">我是男</span>
        </button>
    </div>
</header>

<main class="w-full max-w-md px-6 flex flex-col gap-6">

    <!-- 显示屏幕 -->
    <section class="calc-screen w-full rounded-[2.5rem] p-8 shadow-premium border border-white flex flex-col justify-between items-end relative overflow-hidden">
        <div class="absolute top-6 left-8 opacity-10">
            <i class="fa-solid fa-quote-left text-4xl text-indigo-900"></i>
        </div>

        <div class="w-full">
            <!-- 输入序列 -->
            <div id="inputChain" class="text-slate-400 text-sm font-semibold mb-2 text-right break-all">
                我的...
            </div>
            <!-- 结果 -->
            <div id="resultText" class="text-3xl font-black text-slate-900 tracking-tight text-right transition-all">
                你要称呼谁？
            </div>
        </div>

        <!-- 结果操作：收藏与分享 (初始隐藏) -->
        <div id="resultActions" class="flex gap-3 opacity-0 translate-y-4 pointer-events-none transition-all duration-500">
            <button onclick="addToFav()" id="favBtn" class="w-10 h-10 rounded-xl bg-white shadow-soft flex items-center justify-center text-slate-300 btn-active border border-slate-50 transition-colors duration-300">
                <i class="fa-solid fa-heart"></i>
            </button>
            <button onclick="triggerShare()" id="shareBtnAccent" class="w-10 h-10 rounded-xl bg-indigo-600 shadow-glow flex items-center justify-center text-white btn-active">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
        </div>
    </section>

    <!-- 模式切换/设置 -->
    <section class="flex justify-between items-center px-2">
        <div class="flex gap-4">
            <button class="text-[10px] font-black uppercase tracking-[0.2em] border-b-2 border-indigo-600 pb-1" id="modeLabel">找称呼</button>
            <button onclick="showToast('更多模式敬请期待')" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-300 pb-1">找关系</button>
        </div>
        <button onclick="clearAll()" class="text-[10px] font-black text-rose-500 uppercase tracking-widest bg-rose-50 px-3 py-1 rounded-full btn-active">
            <i class="fa-solid fa-trash-can mr-1"></i> 清空
        </button>
    </section>

    <!-- 计算器键盘布局 -->
    <section class="grid grid-cols-4 gap-3">
        <!-- 第一行 -->
        <button onclick="addRelation('爸爸')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">父</span>
        </button>
        <button onclick="addRelation('妈妈')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">母</span>
        </button>
        <button onclick="backspace()" class="bg-slate-100 p-5 rounded-3xl flex flex-col items-center justify-center gap-2 btn-active col-span-2">
            <i class="fa-solid fa-delete-left text-slate-500"></i>
        </button>

        <!-- 第二行 -->
        <button onclick="addRelation('老公')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">夫</span>
        </button>
        <button onclick="addRelation('老婆')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">妻</span>
        </button>
        <button onclick="addRelation('哥哥')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">兄</span>
        </button>
        <button onclick="addRelation('弟弟')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">弟</span>
        </button>

        <!-- 第三行 -->
        <button onclick="addRelation('姐姐')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">姐</span>
        </button>
        <button onclick="addRelation('妹妹')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">妹</span>
        </button>
        <button onclick="addRelation('儿子')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">子</span>
        </button>
        <button onclick="addRelation('女儿')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 btn-active border border-slate-50">
            <span class="text-sm font-black text-slate-700">女</span>
        </button>

        <!-- 最后一行 -->
        <div class="col-span-2 bg-slate-100/50 rounded-3xl p-2 flex gap-2" id="ageControl">
            <button onclick="setAge('older')" class="flex-1 bg-white rounded-2xl text-[10px] font-black text-indigo-600 shadow-sm btn-active gender-transition" id="ageOlder">年长</button>
            <button onclick="setAge('younger')" class="flex-1 rounded-2xl text-[10px] font-black text-slate-400 btn-active gender-transition" id="ageYounger">年轻</button>
        </div>
        <button onclick="calculate()" id="calcBtnAccent" class="col-span-2 bg-indigo-600 p-5 rounded-3xl shadow-glow flex items-center justify-center gap-2 btn-active text-white gender-transition">
            <i class="fa-solid fa-equals"></i>
            <span class="text-sm font-black uppercase">计算</span>
        </button>
    </section>

    <!-- 快捷入口 -->
    <section>
        <div class="bg-white rounded-[2rem] p-6 shadow-soft border border-slate-50">
            <div class="flex items-center justify-between mb-4">
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">常用查询</h4>
                <i class="fa-solid fa-chevron-right text-[10px] text-slate-300"></i>
            </div>
            <div class="flex gap-3 overflow-x-auto no-scrollbar">
                <button onclick="quickSelect('爸爸的爸爸')" class="whitespace-nowrap px-6 py-3 bg-slate-50 rounded-2xl text-[11px] font-black text-slate-600 btn-active">爷爷</button>
                <button onclick="quickSelect('妈妈的妈妈')" class="whitespace-nowrap px-6 py-3 bg-slate-50 rounded-2xl text-[11px] font-black text-slate-600 btn-active">外婆</button>
                <button onclick="quickSelect('爸爸的哥哥')" class="whitespace-nowrap px-6 py-3 bg-slate-50 rounded-2xl text-[11px] font-black text-slate-600 btn-active">伯父</button>
                <button onclick="quickSelect('老公的爸爸')" class="whitespace-nowrap px-6 py-3 bg-slate-50 rounded-2xl text-[11px] font-black text-slate-600 btn-active">公公</button>
            </div>
        </div>
    </section>

</main>

<!-- 分享模态层 -->
<div id="shareModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center px-8">
    <div class="absolute inset-0 bg-slate-900/40" onclick="closeShare()"></div>
    <div class="w-full max-w-sm bg-white rounded-[3rem] p-10 flex flex-col items-center gap-8 relative animate-slide-up shadow-premium">
        <div class="w-16 h-1 bg-slate-100 rounded-full absolute top-4 left-1/2 -translate-x-1/2"></div>

        <div id="shareCardAccent" class="w-full bg-indigo-50 rounded-[2.5rem] p-8 flex flex-col items-center gap-4 border border-indigo-100 gender-transition">
            <div id="shareIconAccent" class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-xl shadow-glow gender-transition">
                <i class="fa-solid fa-dna"></i>
            </div>
            <div class="text-center">
                <p id="sharePathDisplay" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">我的 爸爸 > 爸爸</p>
                <h4 id="shareResultDisplay" class="text-2xl font-black text-slate-900">爷爷</h4>
            </div>
            <div class="w-full h-[1px] bg-slate-200 my-2"></div>
            <p id="shareBrandAccent" class="text-[9px] font-black text-indigo-400 uppercase tracking-widest gender-transition">Momentum Kin 专业识别</p>
        </div>

        <div class="flex gap-6 w-full px-4">
            <button class="flex-1 flex flex-col items-center gap-2"><div class="w-12 h-12 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-xl"><i class="fa-brands fa-weixin"></i></div><span class="text-[10px] font-bold text-slate-500">微信好友</span></button>
            <button class="flex-1 flex flex-col items-center gap-2"><div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-xl"><i class="fa-solid fa-image"></i></div><span class="text-[10px] font-bold text-slate-500">保存图片</span></button>
            <button class="flex-1 flex flex-col items-center gap-2"><div class="w-12 h-12 rounded-full bg-slate-50 text-slate-500 flex items-center justify-center text-xl"><i class="fa-solid fa-link"></i></div><span class="text-[10px] font-bold text-slate-500">复制链接</span></button>
        </div>
    </div>
</div>

<!-- 全局提示 Toast -->
<div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 bg-slate-900/95 backdrop-blur rounded-2xl text-white text-[10px] font-black shadow-2xl transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3">
    <div id="toastIcon" class="w-5 h-5 bg-indigo-500 rounded-full flex items-center justify-center gender-transition"><i class="fa-solid fa-info text-[10px]"></i></div>
    <span id="toastMsg">计算成功</span>
</div>

<!-- 精简版底部导航 -->
<nav class="fixed bottom-0 w-full max-w-md px-6 pb-8 pt-4 z-[60]">
    <div class="bg-white/80 backdrop-blur-2xl rounded-[2.5rem] p-4 flex justify-around items-center shadow-premium border border-white">
        <a href="#" class="flex flex-col items-center gap-1 text-indigo-600 px-8 transition-all gender-transition" id="navCalcIcon">
            <i class="fa-solid fa-calculator text-xl"></i>
            <span class="text-[8px] font-black uppercase">计算</span>
        </a>
        <a href="#" onclick="showToast('设置中心开发中')" class="flex flex-col items-center gap-1 text-slate-300 px-8 transition-all">
            <i class="fa-solid fa-user-gear text-xl"></i>
            <span class="text-[8px] font-black uppercase">设置</span>
        </a>
    </div>
</nav>

<script>
    let chain = [];
    let isMale = true;
    let isFavorited = false;
    const inputChainEl = document.getElementById('inputChain');
    const resultTextEl = document.getElementById('resultText');
    const genderBtnText = document.getElementById('myGender');
    const genderIcon = document.getElementById('genderIcon');
    const genderBtn = document.getElementById('genderBtn');
    const resultActions = document.getElementById('resultActions');
    const favBtn = document.getElementById('favBtn');

    // 切换性别逻辑：更新图标、颜色和全局主题色
    function toggleGender() {
        isMale = !isMale;

        // UI 更新
        if (isMale) {
            // 男性状态
            genderBtnText.innerText = '我是男';
            genderIcon.className = 'fa-solid fa-mars text-sm text-indigo-500 gender-transition';
            genderBtnText.className = 'text-[10px] font-black uppercase tracking-wider text-indigo-500 gender-transition';
            genderBtn.style.borderColor = 'transparent';
            updateThemeColor('indigo');
        } else {
            // 女性状态
            genderBtnText.innerText = '我是女';
            genderIcon.className = 'fa-solid fa-venus text-sm text-rose-500 gender-transition';
            genderBtnText.className = 'text-[10px] font-black uppercase tracking-wider text-rose-500 gender-transition';
            genderBtn.style.borderColor = '#ffe4e6'; // rose-100
            updateThemeColor('rose');
        }

        showToast(`已切换为${isMale ? '男性' : '女性'}视角`, isMale ? 'mars' : 'venus');
        clearAll();
    }

    // 辅助函数：更新应用内的关键色彩点
    function updateThemeColor(color) {
        const primaryHex = color === 'indigo' ? '#6366f1' : '#f43f5e';
        const lightHex = color === 'indigo' ? '#e0e7ff' : '#fff1f2';

        // 计算按钮
        document.getElementById('calcBtnAccent').style.backgroundColor = primaryHex;
        // 分享按钮
        document.getElementById('shareBtnAccent').style.backgroundColor = primaryHex;
        // 模式标签
        document.getElementById('modeLabel').style.borderColor = primaryHex;
        // 底部导航激活态
        document.getElementById('navCalcIcon').style.color = primaryHex;
        // Toast 图标背景
        document.getElementById('toastIcon').style.backgroundColor = primaryHex;
        // 分享卡片背景与文字
        document.getElementById('shareCardAccent').style.backgroundColor = lightHex;
        document.getElementById('shareIconAccent').style.backgroundColor = primaryHex;
        document.getElementById('shareBrandAccent').style.color = primaryHex;
        // 年龄控制背景
        document.getElementById('ageOlder').style.color = primaryHex;
    }

    // 添加关系
    function addRelation(rel) {
        chain.push(rel);
        updateDisplay();
        hideActions();
    }

    // 退格
    function backspace() {
        chain.pop();
        updateDisplay();
        hideActions();
    }

    // 清空
    function clearAll() {
        chain = [];
        updateDisplay();
        resultTextEl.innerText = "你要称呼谁？";
        hideActions();
    }

    // 更新显示
    function updateDisplay() {
        if (chain.length === 0) {
            inputChainEl.innerText = "我的...";
        } else {
            inputChainEl.innerText = "我的 " + chain.join(' 的 ');
        }
    }

    // 隐藏并重置收藏状态
    function hideActions() {
        isFavorited = false;
        favBtn.classList.remove('text-rose-500', 'scale-110');
        favBtn.classList.add('text-slate-300');
        resultActions.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
    }

    // 核心计算
    function calculate() {
        if (chain.length === 0) {
            showToast("请先输入关系");
            return;
        }

        const query = chain.join('');
        let result = "暂无数据";

        if (query === "爸爸") result = "父亲";
        else if (query === "爸爸的爸爸") result = "爷爷";
        else if (query === "妈妈的妈妈") result = "外婆";
        else if (query === "爸爸的哥哥") result = "伯父";
        else if (query === "爸爸的弟弟") result = "叔叔";
        else if (query.includes("儿子")) result = "孙子/外孙";
        else result = "关系较远，建议称呼长辈";

        resultTextEl.innerText = result;
        resultTextEl.classList.add('scale-110');

        // 默认结果颜色随视角变化
        const themeColor = isMale ? 'text-indigo-600' : 'text-rose-600';
        resultTextEl.classList.add(themeColor);

        // 重置为未收藏状态并显示
        isFavorited = false;
        favBtn.classList.remove('text-rose-500');
        favBtn.classList.add('text-slate-300');
        resultActions.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');

        setTimeout(() => {
            resultTextEl.classList.remove('scale-110', 'text-indigo-600', 'text-rose-600');
        }, 300);
    }

    // 快速选择
    function quickSelect(path) {
        chain = path.split('的');
        updateDisplay();
        calculate();
    }

    // 收藏功能逻辑：点击后变红
    function addToFav() {
        if (!isFavorited) {
            isFavorited = true;
            favBtn.classList.remove('text-slate-300');
            favBtn.classList.add('text-rose-500', 'scale-110');
            showToast("已添加至收藏记录", "heart");
        } else {
            showToast("已经在收藏夹中啦", "heart");
        }
    }

    // 分享功能
    function triggerShare() {
        document.getElementById('sharePathDisplay').innerText = "我的 " + chain.join(' > ');
        document.getElementById('shareResultDisplay').innerText = resultTextEl.innerText;
        document.getElementById('shareModal').classList.remove('hidden');
    }

    function closeShare() {
        document.getElementById('shareModal').classList.add('hidden');
    }

    // Toast 组件
    function showToast(msg, icon = "info") {
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const toastIcon = document.getElementById('toastIcon');

        toastMsg.innerText = msg;
        toastIcon.innerHTML = `<i class="fa-solid fa-${icon} text-[10px]"></i>`;

        toast.classList.add('opacity-100', 'translate-y-0');
        toast.classList.remove('-translate-y-24');
        setTimeout(() => {
            toast.classList.remove('opacity-100', 'translate-y-0');
            toast.classList.add('-translate-y-24');
        }, 2500);
    }

    // 年龄切换
    function setAge(type) {
        const btns = event.currentTarget.parentElement.querySelectorAll('button');
        const themeColor = isMale ? '#6366f1' : '#f43f5e';
        btns.forEach(b => {
            b.classList.remove('bg-white', 'shadow-sm');
            b.style.color = '#94a3b8'; // slate-400
        });
        event.currentTarget.classList.add('bg-white', 'shadow-sm');
        event.currentTarget.style.color = themeColor;
    }
</script>

</body>
</html>
