<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>积分充值 - Momentum Ultra</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.04)',
                        'glow': '0 0 30px rgba(99, 102, 241, 0.2)',
                        'premium': '0 20px 60px -15px rgba(0,0,0,0.1)',
                        'gold': '0 10px 30px -5px rgba(251, 191, 36, 0.3)',
                    },
                    borderRadius: {
                        '4xl': '2.5rem',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F9FAFF;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .price-card.active {
            border-color: #6366f1;
            background-color: #f5f3ff;
            transform: scale(1.02);
        }

        .price-card.active .check-icon {
            opacity: 1;
        }

        /* 积分增加动效 */
        @keyframes count-up {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-count { animation: count-up 0.4s ease-out forwards; }

        /* 渐变背景 */
        .premium-grad {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex flex-col items-center overflow-x-hidden">

<!-- 顶部导航 -->
<header class="w-full max-w-md px-8 pt-12 pb-6 flex justify-between items-center sticky top-0 bg-[#F9FAFF]/80 backdrop-blur-xl z-50">
    <button onclick="history.back()" class="w-10 h-10 rounded-2xl bg-white shadow-soft flex items-center justify-center text-slate-400 active:scale-90 transition-all">
        <i class="fa-solid fa-chevron-left text-sm"></i>
    </button>
    <h2 class="text-lg font-black tracking-tight">充值中心</h2>
    <button onclick="showToast('查看充值说明')" class="w-10 h-10 rounded-2xl bg-white shadow-soft flex items-center justify-center text-slate-400 active:scale-90 transition-all">
        <i class="fa-solid fa-question text-sm"></i>
    </button>
</header>

<main class="w-full max-w-md px-6 flex flex-col gap-6">

    <!-- 当前余额卡片 -->
    <section class="premium-grad rounded-4xl p-8 shadow-premium relative overflow-hidden">
        <div class="relative z-10">
            <div class="flex items-center gap-2 mb-1">
                <i class="fa-solid fa-crown text-amber-400 text-xs"></i>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Momentum Ultra Member</span>
            </div>
            <div class="text-slate-400 text-xs font-bold mb-4">当前积分余额</div>
            <div class="flex items-baseline gap-2">
                <span id="displayBalance" class="text-5xl font-black text-white tracking-tighter">850</span>
                <span class="text-indigo-400 text-sm font-black uppercase tracking-widest">Points</span>
            </div>
        </div>
        <!-- 装饰背景 -->
        <div class="absolute -right-8 -bottom-8 w-40 h-40 bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <svg width="100%" height="100%"><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/></pattern><rect width="100%" height="100%" fill="url(#grid)" /></svg>
        </div>
    </section>

    <!-- 选择充值金额 -->
    <section>
        <div class="flex items-center justify-between mb-4 px-2">
            <h4 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">选择充值额度</h4>
            <span class="text-[10px] font-bold text-indigo-500">多充多送</span>
        </div>

        <div class="grid grid-cols-2 gap-4" id="priceGrid">
            <!-- 档位 1 -->
            <div onclick="selectTier(this, 100, 0.99)" class="price-card bg-white p-6 rounded-3xl shadow-soft border-2 border-transparent transition-all cursor-pointer relative overflow-hidden flex flex-col items-center gap-1 active:scale-95">
                <div class="check-icon absolute top-3 right-3 opacity-0 transition-opacity">
                    <i class="fa-solid fa-circle-check text-indigo-500 text-sm"></i>
                </div>
                <div class="text-2xl font-black text-slate-800">100</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">积分</div>
                <div class="text-sm font-black text-indigo-600">￥0.99</div>
            </div>

            <!-- 档位 2 (Hot) -->
            <div onclick="selectTier(this, 1200, 9.9)" class="price-card bg-white p-6 rounded-3xl shadow-soft border-2 border-transparent transition-all cursor-pointer relative overflow-hidden flex flex-col items-center gap-1 active:scale-95 active">
                <div class="absolute -left-8 top-2 -rotate-45 bg-amber-400 text-[8px] font-black text-white px-8 py-1 uppercase tracking-tighter">Hot</div>
                <div class="check-icon absolute top-3 right-3 opacity-1 transition-opacity">
                    <i class="fa-solid fa-circle-check text-indigo-500 text-sm"></i>
                </div>
                <div class="text-2xl font-black text-slate-800">1200</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">积分</div>
                <div class="text-sm font-black text-indigo-600">￥9.9</div>
                <div class="absolute bottom-0 inset-x-0 h-1 bg-amber-400"></div>
            </div>

            <!-- 档位 3 -->
            <div onclick="selectTier(this, 5000, 39.9)" class="price-card bg-white p-6 rounded-3xl shadow-soft border-2 border-transparent transition-all cursor-pointer relative overflow-hidden flex flex-col items-center gap-1 active:scale-95">
                <div class="check-icon absolute top-3 right-3 opacity-0 transition-opacity">
                    <i class="fa-solid fa-circle-check text-indigo-500 text-sm"></i>
                </div>
                <div class="text-2xl font-black text-slate-800">5000</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">积分</div>
                <div class="text-sm font-black text-indigo-600">￥39.9</div>
            </div>

            <!-- 档位 4 -->
            <div onclick="selectTier(this, 15000, 99.9)" class="price-card bg-white p-6 rounded-3xl shadow-soft border-2 border-transparent transition-all cursor-pointer relative overflow-hidden flex flex-col items-center gap-1 active:scale-95">
                <div class="check-icon absolute top-3 right-3 opacity-0 transition-opacity">
                    <i class="fa-solid fa-circle-check text-indigo-500 text-sm"></i>
                </div>
                <div class="text-2xl font-black text-slate-800">15000</div>
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">积分</div>
                <div class="text-sm font-black text-indigo-600">￥99.9</div>
            </div>
        </div>
    </section>

    <!-- 支付方式 -->
    <section class="bg-white rounded-4xl p-6 shadow-soft">
        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">支付方式</h4>
        <div class="flex flex-col gap-4">
            <label class="flex items-center justify-between cursor-pointer group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center text-emerald-500">
                        <i class="fa-brands fa-weixin text-xl"></i>
                    </div>
                    <span class="text-xs font-black text-slate-700">微信支付</span>
                </div>
                <input type="radio" name="pay" checked class="w-5 h-5 accent-indigo-600">
            </label>
            <div class="h-px bg-slate-50"></div>
            <label class="flex items-center justify-between cursor-pointer group">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-500">
                        <i class="fa-brands fa-alipay text-2xl"></i>
                    </div>
                    <span class="text-xs font-black text-slate-700">支付宝</span>
                </div>
                <input type="radio" name="pay" class="w-5 h-5 accent-indigo-600">
            </label>
        </div>
    </section>

    <!-- 协议说明 -->
    <section class="px-2 pb-32">
        <p class="text-[10px] text-slate-400 leading-relaxed text-center">
            点击立即充值即视为同意 <a href="#" class="text-indigo-500 font-bold underline">《积分服务协议》</a> 与 <a href="#" class="text-indigo-500 font-bold underline">《隐私条款》</a>。积分充值后不支持退款。
        </p>
    </section>

</main>

<!-- 底部操作栏 -->
<footer class="fixed bottom-0 w-full max-w-md bg-white/80 backdrop-blur-2xl px-8 pt-4 pb-10 border-t border-slate-100 flex items-center justify-between z-[100]">
    <div class="flex flex-col">
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">应付金额</span>
        <div class="flex items-baseline gap-1">
            <span class="text-xs font-black text-slate-900">￥</span>
            <span id="footerPrice" class="text-2xl font-black text-slate-900">9.9</span>
        </div>
    </div>
    <button onclick="handlePayment()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-xs shadow-premium active:scale-95 transition-all flex items-center gap-2">
        <span>立即充值</span>
        <i class="fa-solid fa-arrow-right text-[10px]"></i>
    </button>
</footer>

<!-- 支付成功弹窗 -->
<div id="successModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center px-6">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
    <div class="bg-white w-full max-w-xs rounded-4xl p-8 relative z-10 flex flex-col items-center text-center shadow-premium scale-90 opacity-0 transition-all duration-300">
        <div class="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-3xl flex items-center justify-center text-3xl mb-6">
            <i class="fa-solid fa-check"></i>
        </div>
        <h3 class="text-xl font-black text-slate-900 mb-2">充值成功</h3>
        <p class="text-xs text-slate-400 font-bold mb-6">您的积分已到账，请查收</p>
        <div class="w-full h-px bg-slate-50 mb-6"></div>
        <div class="flex flex-col items-center mb-8">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">入账额度</span>
            <span id="successAmount" class="text-3xl font-black text-indigo-600">+1200</span>
        </div>
        <button onclick="closeModal()" class="w-full py-4 bg-slate-100 text-slate-900 rounded-2xl font-black text-xs active:scale-95 transition-all">
            返回我的空间
        </button>
    </div>
</div>

<!-- Global Toast -->
<div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 bg-slate-900/95 backdrop-blur rounded-2xl text-white text-[10px] font-black shadow-2xl transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3">
    <div class="w-5 h-5 bg-indigo-500 rounded-full flex items-center justify-center"><i class="fa-solid fa-info text-[10px]"></i></div>
    <span id="toastMsg">提示内容</span>
</div>

<script>
    let currentBalance = 850;
    let selectedAmount = 1200;
    let selectedPrice = 9.9;

    const displayBalance = document.getElementById('displayBalance');
    const footerPrice = document.getElementById('footerPrice');
    const successModal = document.getElementById('successModal');
    const modalContent = successModal.querySelector('div:last-child');

    // 档位选择逻辑
    function selectTier(element, amount, price) {
        // 更新 UI 样式
        document.querySelectorAll('.price-card').forEach(card => {
            card.classList.remove('active', 'border-indigo-600');
            card.querySelector('.check-icon').classList.replace('opacity-1', 'opacity-0');
        });

        element.classList.add('active');
        element.querySelector('.check-icon').classList.replace('opacity-0', 'opacity-1');

        // 更新数据
        selectedAmount = amount;
        selectedPrice = price;
        footerPrice.innerText = price.toFixed(2);
    }

    // 模拟支付逻辑
    function handlePayment() {
        showToast('正在调起支付安全通道...');

        setTimeout(() => {
            // 弹出成功弹窗
            document.getElementById('successAmount').innerText = `+${selectedAmount}`;
            successModal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-90', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);

            // 实时更新背景余额（仪式感）
            animateValue(currentBalance, currentBalance + selectedAmount, 1000);
            currentBalance += selectedAmount;
        }, 1500);
    }

    // 数字跳动动画
    function animateValue(start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const val = Math.floor(progress * (end - start) + start);
            displayBalance.innerHTML = val;
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
        displayBalance.classList.add('text-amber-400', 'scale-110');
        setTimeout(() => {
            displayBalance.classList.remove('text-amber-400', 'scale-110');
        }, duration + 200);
    }

    function closeModal() {
        modalContent.classList.add('scale-90', 'opacity-0');
        setTimeout(() => {
            successModal.classList.add('hidden');
        }, 300);
    }

    // Toast 组件
    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        toast.classList.add('opacity-100', 'translate-y-0');
        toast.classList.remove('-translate-y-24');
        setTimeout(() => {
            toast.classList.remove('opacity-100', 'translate-y-0');
            toast.classList.add('-translate-y-24');
        }, 3000);
    }
</script>

</body>
</html>
