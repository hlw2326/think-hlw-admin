<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>个人中心 - Momentum Ultra</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.04)',
                        'glow': '0 0 30px rgba(99, 102, 241, 0.2)',
                        'premium': '0 20px 60px -15px rgba(0,0,0,0.1)',
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F9FAFF;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .tab-active {
            color: #0f172a;
            position: relative;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #6366f1;
            border-radius: 50%;
        }

        .stat-card:active { transform: scale(0.95); transition: 0.2s; }

        /* 积分图标动效 */
        @keyframes coin-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .coin-anim { animation: coin-bounce 2s ease-in-out infinite; }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex flex-col items-center overflow-x-hidden pb-40">

<!-- 顶部状态栏 -->
<header class="w-full max-w-md px-8 pt-12 pb-6 flex justify-between items-center sticky top-0 bg-[#F9FAFF]/80 backdrop-blur-xl z-50">
    <h2 class="text-xl font-black tracking-tight">我的空间</h2>
    <div class="flex gap-4">
        <button class="w-10 h-10 rounded-2xl bg-white shadow-soft flex items-center justify-center text-slate-400">
            <i class="fa-solid fa-bell text-sm"></i>
        </button>
        <button onclick="showToast('版本: v2.4.0')" class="w-10 h-10 rounded-2xl bg-white shadow-soft flex items-center justify-center text-slate-400">
            <i class="fa-solid fa-circle-info text-sm"></i>
        </button>
    </div>
</header>

<main class="w-full max-w-md px-6 flex flex-col gap-8">

    <!-- 用户核心信息 -->
    <section class="flex flex-col items-center">
        <div class="relative mb-4">
            <div class="w-28 h-28 rounded-[2.5rem] overflow-hidden border-4 border-white shadow-premium">
                <img src="https://ui-avatars.com/api/?name=Z&background=000&color=fff&size=200" class="w-full h-full object-cover">
            </div>
            <div class="absolute -bottom-2 -right-2 bg-indigo-600 text-white w-9 h-9 rounded-2xl flex items-center justify-center border-4 border-[#F9FAFF] text-[10px] shadow-lg">
                <i class="fa-solid fa-check"></i>
            </div>
        </div>
        <h3 class="text-2xl font-black text-slate-900">Momentum_User</h3>

        <!-- 积分显示卡片 -->
        <div class="mt-4 flex items-center gap-2 bg-white px-5 py-2 rounded-2xl shadow-soft border border-slate-50">
            <i class="fa-solid fa-coins text-amber-400 coin-anim"></i>
            <span class="text-sm font-black text-slate-700">可用积分:</span>
            <span id="pointsBalance" class="text-sm font-black text-indigo-600">850</span>
        </div>

        <!-- 数据看板 -->
        <div class="flex gap-12 mt-8">
            <div class="flex flex-col items-center text-center">
                <span class="text-xl font-black">128</span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">收藏</span>
            </div>
            <div class="flex flex-col items-center text-center">
                <span class="text-xl font-black">42</span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">下载</span>
            </div>
            <div class="flex flex-col items-center text-center">
                <span class="text-xl font-black">12</span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">创作</span>
            </div>
        </div>
    </section>

    <!-- 能量中心 (小程序核心积分获取) -->
    <section>
        <div class="bg-indigo-50 rounded-[2.5rem] p-6 border border-indigo-100/50">
            <div class="flex items-center justify-between mb-5">
                <h4 class="text-sm font-black text-indigo-900">能量中心</h4>
                <span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">做任务·攒积分</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <!-- 观看广告 -->
                <button onclick="simulateAd()" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 active:scale-95 transition-all">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white mb-1 shadow-glow">
                        <i class="fa-solid fa-circle-play text-xl"></i>
                    </div>
                    <span class="text-[11px] font-black text-slate-700">看视频广告</span>
                    <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-tighter">+50 积分</span>
                </button>
                <!-- 快捷充值 -->
                <button onclick="showToast('支付插件拉取中...')" class="bg-white p-5 rounded-3xl shadow-soft flex flex-col items-center gap-2 active:scale-95 transition-all">
                    <div class="w-12 h-12 rounded-2xl bg-amber-400 flex items-center justify-center text-white mb-1 shadow-lg shadow-amber-100">
                        <i class="fa-solid fa-bolt text-xl"></i>
                    </div>
                    <span class="text-[11px] font-black text-slate-700">快捷充值</span>
                    <span class="text-[9px] font-bold text-amber-500 uppercase tracking-tighter">￥0.99 起</span>
                </button>
            </div>
        </div>
    </section>

    <!-- 资产管理 -->
    <section class="grid grid-cols-2 gap-4">
        <div class="bg-white p-6 rounded-[2rem] shadow-soft border border-slate-50 flex flex-col gap-3 stat-card cursor-pointer" onclick="showToast('加载下载历史...')">
            <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </div>
            <span class="text-xs font-black text-slate-800">下载历史</span>
        </div>
        <div class="bg-white p-6 rounded-[2rem] shadow-soft border border-slate-50 flex flex-col gap-3 stat-card cursor-pointer" onclick="showToast('加载积分流水...')">
            <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-500">
                <i class="fa-solid fa-list-ul"></i>
            </div>
            <span class="text-xs font-black text-slate-800">积分明细</span>
        </div>
    </section>

    <!-- 作品展示 Tabs -->
    <section class="mt-4">
        <div class="flex gap-8 mb-6 border-b border-slate-100 pb-2">
            <button class="text-[10px] font-black uppercase tracking-[0.2em] tab-active">我的收藏</button>
            <button class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-300">我的作品</button>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="aspect-[3/4] rounded-2xl bg-slate-100 overflow-hidden relative group cursor-pointer" onclick="showDownloadModal()">
                <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=400" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="text-white text-[10px] font-black mb-1">下载</span>
                    <span class="text-amber-300 text-[8px] font-bold">20 积分</span>
                </div>
            </div>
            <div class="aspect-[3/4] rounded-2xl bg-slate-100 overflow-hidden relative group">
                <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=400" class="w-full h-full object-cover">
            </div>
            <div class="aspect-[3/4] rounded-2xl bg-slate-100 overflow-hidden relative group">
                <div class="w-full h-full flex items-center justify-center bg-slate-50 border-2 border-dashed border-slate-200">
                    <i class="fa-solid fa-plus text-slate-300"></i>
                </div>
            </div>
        </div>
    </section>

</main>

<!-- 模拟广告组件 -->
<div id="adLayer" class="fixed inset-0 bg-black z-[200] hidden flex flex-col items-center justify-center text-white">
    <div class="relative w-full h-full flex flex-col items-center justify-center p-10">
        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h4 class="text-xl font-black mb-2 tracking-tight">激励视频播放中</h4>
        <p class="text-slate-400 text-sm">完成后自动发放 50 奖励积分</p>
        <div id="adTimer" class="absolute top-16 right-8 w-12 h-12 rounded-full border-2 border-white/20 flex items-center justify-center font-black">3</div>
    </div>
</div>

<!-- 全局提示 Toast -->
<div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 bg-slate-900/95 backdrop-blur rounded-2xl text-white text-[10px] font-black shadow-2xl transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3">
    <div class="w-5 h-5 bg-indigo-500 rounded-full flex items-center justify-center"><i class="fa-solid fa-check text-[10px]"></i></div>
    <span id="toastMsg">操作成功</span>
</div>

<!-- 小程序通用导航栏 -->
<nav class="fixed bottom-0 w-full max-w-md px-6 pb-8 pt-4 z-[60]">
    <div class="bg-white/80 backdrop-blur-2xl rounded-[2.5rem] p-4 flex justify-between items-center shadow-premium border border-white">
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
            <i class="fa-solid fa-house-chimney text-xl"></i>
            <span class="text-[8px] font-black uppercase">首页</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[8px] font-black uppercase">探索</span>
        </a>
        <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white -mt-10 border-4 border-[#F9FAFF] shadow-xl active:scale-90 transition-all cursor-pointer">
            <i class="fa-solid fa-plus text-lg"></i>
        </div>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-300 px-4">
            <i class="fa-solid fa-heart text-xl"></i>
            <span class="text-[8px] font-black uppercase">收藏</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-slate-900 px-4">
            <i class="fa-solid fa-user-gear text-xl"></i>
            <span class="text-[8px] font-black uppercase">我的</span>
        </a>
    </div>
</nav>

<script>
    let currentPoints = 850;
    const pointsDisplay = document.getElementById('pointsBalance');
    const adLayer = document.getElementById('adLayer');
    const adTimer = document.getElementById('adTimer');

    // 广告模拟逻辑 (小程序激励视频接口模拟)
    function simulateAd() {
        adLayer.classList.remove('hidden');
        let countdown = 3;
        adTimer.innerText = countdown;

        const interval = setInterval(() => {
            countdown--;
            adTimer.innerText = countdown;
            if (countdown <= 0) {
                clearInterval(interval);
                adLayer.classList.add('hidden');
                updatePoints(50, "任务完成");
            }
        }, 1000);
    }

    // 积分变更核心
    function updatePoints(amount, reason) {
        currentPoints += amount;
        pointsDisplay.innerText = currentPoints;
        showToast(`${reason}：积分 ${amount > 0 ? '+' : ''}${amount}`);

        // 视觉强调
        pointsDisplay.classList.add('scale-125', 'text-amber-500');
        setTimeout(() => {
            pointsDisplay.classList.remove('scale-125', 'text-amber-500');
        }, 500);
    }

    // 下载扣费逻辑
    function showDownloadModal() {
        if(currentPoints >= 20) {
            // 在小程序中通常会调起自定义 Modal，这里用 confirm 模拟
            const confirmDownload = confirm("确认消耗 20 积分下载超清素材？");
            if(confirmDownload) {
                updatePoints(-20, "作品下载");
            }
        } else {
            showToast("积分余额不足");
        }
    }

    // Toast 组件
    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        toast.classList.add('opacity-100', 'translate-y-0');
        toast.classList.remove('-translate-y-24');
        setTimeout(() => {
            toast.classList.remove('opacity-100', 'translate-y-0');
            toast.classList.add('-translate-y-24');
        }, 3000);
    }

    // Tab 联动切换
    const tabs = document.querySelectorAll('section button.tracking-[0.2em]');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('tab-active', 'text-slate-900'));
            tabs.forEach(t => t.classList.add('text-slate-300'));
            tab.classList.add('tab-active', 'text-slate-900');
            tab.classList.remove('text-slate-300');
        });
    });
</script>

</body>
</html>
