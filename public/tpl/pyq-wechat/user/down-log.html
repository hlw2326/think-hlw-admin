<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>下载历史 - Momentum Ultra</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.04)',
            'glow': '0 0 30px rgba(99, 102, 241, 0.2)',
            'premium': '0 20px 60px -15px rgba(0,0,0,0.08)',
          },
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F9FAFF;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }

    .history-card:active { transform: scale(0.98); transition: 0.2s; }

    /* 渐变遮罩 */
    .img-mask {
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.4));
    }

    /* 标签激活状态 */
    .filter-active {
      background-color: #0f172a;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3);
    }
  </style>
</head>
<body class="text-slate-900 min-h-screen flex flex-col items-center overflow-x-hidden pb-32">

<!-- 顶部导航栏 -->
<header class="w-full max-w-md px-6 pt-12 pb-6 flex justify-between items-center sticky top-0 bg-[#F9FAFF]/80 backdrop-blur-xl z-50">
  <button onclick="history.back()" class="w-10 h-10 rounded-2xl bg-white shadow-soft flex items-center justify-center text-slate-900 active:scale-90 transition-all">
    <i class="fa-solid fa-chevron-left text-sm"></i>
  </button>
  <h2 class="text-lg font-black tracking-tight">下载历史</h2>
  <button onclick="confirmClear()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-red-500 transition-colors">
    清空记录
  </button>
</header>

<main class="w-full max-w-md px-6 flex flex-col gap-6">

  <!-- 简易统计 -->
  <section class="grid grid-cols-2 gap-4">
    <div class="bg-indigo-600 p-6 rounded-[2.5rem] text-white shadow-glow">
      <span class="text-[9px] font-bold uppercase tracking-widest opacity-60">累计下载</span>
      <div class="text-3xl font-black mt-1">42 <span class="text-xs opacity-60">次</span></div>
    </div>
    <div class="bg-white p-6 rounded-[2.5rem] shadow-soft border border-slate-50">
      <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400">消耗积分</span>
      <div class="text-3xl font-black mt-1 text-indigo-600">840</div>
    </div>
  </section>

  <!-- 过滤器 -->
  <section class="flex gap-3 overflow-x-auto no-scrollbar py-2">
    <button onclick="filterType(this, 'all')" class="filter-active px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shrink-0">全部</button>
    <button onclick="filterType(this, 'image')" class="bg-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400 shadow-soft transition-all shrink-0">高清图片</button>
    <button onclick="filterType(this, 'video')" class="bg-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400 shadow-soft transition-all shrink-0">动态视频</button>
    <button onclick="filterType(this, 'template')" class="bg-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400 shadow-soft transition-all shrink-0">设计工程</button>
  </section>

  <!-- 历史列表 -->
  <section class="flex flex-col gap-4">

    <!-- 历史项 1 -->
    <div class="history-card bg-white p-4 rounded-[2rem] shadow-soft border border-slate-50 flex items-center gap-4 group">
      <div class="w-20 h-20 rounded-2xl overflow-hidden shrink-0 relative">
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200" class="w-full h-full object-cover">
        <div class="absolute inset-0 img-mask flex items-end p-2">
          <span class="text-[8px] text-white font-bold">4K</span>
        </div>
      </div>
      <div class="flex-1 flex flex-col justify-center gap-1">
        <h4 class="text-sm font-black text-slate-800 line-clamp-1">Abstract Dream #042</h4>
        <p class="text-[10px] font-bold text-slate-400">2023-10-24 14:20</p>
        <div class="flex items-center gap-2 mt-1">
          <span class="px-2 py-0.5 rounded-md bg-indigo-50 text-indigo-500 text-[8px] font-black uppercase">图片</span>
          <span class="text-[10px] font-black text-amber-500">-20 积分</span>
        </div>
      </div>
      <button onclick="reDownload()" class="w-10 h-10 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center active:bg-indigo-600 active:text-white transition-all">
        <i class="fa-solid fa-arrow-down-to-bracket text-xs"></i>
      </button>
    </div>

    <!-- 历史项 2 -->
    <div class="history-card bg-white p-4 rounded-[2rem] shadow-soft border border-slate-50 flex items-center gap-4">
      <div class="w-20 h-20 rounded-2xl overflow-hidden shrink-0 relative">
        <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=200" class="w-full h-full object-cover">
        <div class="absolute inset-0 img-mask flex items-end p-2">
          <span class="text-[8px] text-white font-bold">MOV</span>
        </div>
      </div>
      <div class="flex-1 flex flex-col justify-center gap-1">
        <h4 class="text-sm font-black text-slate-800 line-clamp-1">Cyberpunk Loop 60fps</h4>
        <p class="text-[10px] font-bold text-slate-400">2023-10-22 09:15</p>
        <div class="flex items-center gap-2 mt-1">
          <span class="px-2 py-0.5 rounded-md bg-purple-50 text-purple-500 text-[8px] font-black uppercase">视频</span>
          <span class="text-[10px] font-black text-amber-500">-50 积分</span>
        </div>
      </div>
      <button onclick="reDownload()" class="w-10 h-10 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center active:bg-indigo-600 active:text-white transition-all">
        <i class="fa-solid fa-arrow-down-to-bracket text-xs"></i>
      </button>
    </div>

    <!-- 历史项 3 -->
    <div class="history-card bg-white p-4 rounded-[2rem] shadow-soft border border-slate-50 flex items-center gap-4 opacity-60">
      <div class="w-20 h-20 rounded-2xl overflow-hidden shrink-0 grayscale">
        <img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=200" class="w-full h-full object-cover">
      </div>
      <div class="flex-1 flex flex-col justify-center gap-1">
        <h4 class="text-sm font-black text-slate-800 line-clamp-1">UI Kit Ultra Pro</h4>
        <p class="text-[10px] font-bold text-slate-400">2023-10-15 21:04</p>
        <div class="flex items-center gap-2 mt-1">
          <span class="px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 text-[8px] font-black uppercase">已失效</span>
        </div>
      </div>
      <button onclick="showToast('该资源已下架，请联系客服')" class="w-10 h-10 rounded-2xl bg-slate-50 text-slate-200 flex items-center justify-center cursor-not-allowed">
        <i class="fa-solid fa-circle-exclamation text-xs"></i>
      </button>
    </div>

  </section>

  <!-- 加载更多 -->
  <button class="w-full py-6 text-[10px] font-black uppercase tracking-[0.3em] text-slate-300">
    没有更多记录了
  </button>

</main>

<!-- 全局提示 Toast -->
<div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 bg-slate-900/95 backdrop-blur rounded-2xl text-white text-[10px] font-black shadow-2xl transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3">
  <div class="w-5 h-5 bg-indigo-500 rounded-full flex items-center justify-center"><i class="fa-solid fa-check text-[10px]"></i></div>
  <span id="toastMsg">操作成功</span>
</div>

<!-- 自定义确认弹窗 -->
<div id="modal" class="fixed inset-0 z-[400] hidden flex items-center justify-center px-8">
  <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm"></div>
  <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 relative shadow-premium flex flex-col items-center text-center">
    <div class="w-16 h-16 bg-red-50 text-red-500 rounded-3xl flex items-center justify-center mb-6">
      <i class="fa-solid fa-trash-can text-xl"></i>
    </div>
    <h3 class="text-lg font-black mb-2">清空记录？</h3>
    <p class="text-xs text-slate-400 font-bold leading-relaxed mb-8">此操作将删除所有本地下载记录，不可撤销。</p>
    <div class="grid grid-cols-2 gap-3 w-full">
      <button onclick="closeModal()" class="py-4 bg-slate-50 rounded-2xl text-[10px] font-black uppercase tracking-widest text-slate-400">取消</button>
      <button onclick="doClear()" class="py-4 bg-red-500 rounded-2xl text-[10px] font-black uppercase tracking-widest text-white shadow-lg shadow-red-100">确认删除</button>
    </div>
  </div>
</div>

<script>
  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('opacity-100', 'translate-y-0');
    toast.classList.remove('-translate-y-24');
    setTimeout(() => {
      toast.classList.remove('opacity-100', 'translate-y-0');
      toast.classList.add('-translate-y-24');
    }, 3000);
  }

  function filterType(btn, type) {
    // 更新 UI 样式
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => {
      b.classList.remove('filter-active');
      b.classList.add('bg-white', 'text-slate-400');
    });
    btn.classList.add('filter-active');
    btn.classList.remove('bg-white', 'text-slate-400');

    showToast(`筛选类型: ${type}`);
  }

  function reDownload() {
    showToast("准备重新下载中...");
    // 模拟下载进度
    setTimeout(() => {
      showToast("下载任务已添加到后台");
    }, 1500);
  }

  function confirmClear() {
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  function doClear() {
    closeModal();
    showToast("记录已成功清空");
    // 这里可以执行实际的 DOM 删除操作
    setTimeout(() => {
      location.reload();
    }, 1000);
  }
</script>

</body>
</html>
