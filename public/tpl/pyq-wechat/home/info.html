<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Momentum Ultra - 封面详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
          boxShadow: {
            'premium': '0 15px 35px -12px rgba(0, 0, 0, 0.08)',
            'glow-amber': '0 0 15px rgba(251, 191, 36, 0.2)',
            'glow-indigo': '0 0 25px rgba(79, 70, 229, 0.15)',
          },
          animation: {
            'morph': 'morph 8s ease-in-out infinite',
            'float': 'float 4s ease-in-out infinite',
            'slide-in': 'slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
          },
          keyframes: {
            morph: {
              '0%, 100%': { borderRadius: '20% 30% 20% 30%' },
              '50%': { borderRadius: '30% 20% 30% 20%' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            slideIn: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            },
            pop: {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.2)' },
              '100%': { transform: 'scale(1)' }
            }
          }
        }
      }
    }
  </script>

  <style>
    :root { --glass: rgba(255, 255, 255, 0.8); }
    body {
      background: #F8FAFC;
      color: #0F172A;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .bg-blob {
      position: fixed;
      width: 450px;
      height: 450px;
      background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
      filter: blur(80px);
      z-index: -1;
      animation: morph 10s linear infinite;
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .wechat-sim-container {
      transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .aspect-cover { aspect-ratio: 1 / 1; }
    .aspect-full { aspect-ratio: 3 / 4; }

    /* 头像圆角收敛 */
    .wx-avatar {
      position: absolute;
      right: 24px;
      bottom: -30px;
      width: 72px;
      height: 72px;
      background: #fff;
      border-radius: 8px; /* 更方正的头像圆角 */
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      z-index: 50;
    }
    .wx-name {
      position: absolute;
      right: 110px;
      bottom: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 40;
    }

    .tab-active { background: #0F172A; color: #fff; box-shadow: 0 5px 15px rgba(15,23,42,0.1); }

    .is-fav { color: #F43F5E !important; animation: pop 0.4s ease; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen">

<div class="bg-blob top-[-80px] right-[-80px]"></div>
<div class="bg-blob bottom-[-80px] left-[-80px]" style="background: #F0F9FF;"></div>

<!-- 顶部导航：圆角收缩为 xl -->
<nav class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md z-[100] px-6 py-6 flex justify-between items-center pointer-events-none">
  <button onclick="history.back()" class="pointer-events-auto w-10 h-10 glass rounded-xl flex items-center justify-center shadow-premium active:scale-90 transition-all">
    <i class="fa-solid fa-arrow-left text-slate-800 text-sm"></i>
  </button>

  <div class="flex gap-2 pointer-events-auto">
    <div class="flex items-center gap-3 glass px-4 py-2 rounded-xl shadow-premium border border-white/60">
      <i class="fa-solid fa-wallet text-amber-500 text-[10px]"></i>
      <div class="flex flex-col">
        <span class="text-[8px] font-bold text-slate-400 uppercase leading-none mb-0.5">剩余积分</span>
        <span id="userPoints" class="text-xs font-extrabold text-slate-900 leading-none">240</span>
      </div>
    </div>

    <button id="favBtn" onclick="toggleFavorite()" class="w-10 h-10 glass rounded-xl flex items-center justify-center shadow-premium active:scale-90 transition-all text-slate-400">
      <i class="fa-solid fa-heart text-sm"></i>
    </button>
  </div>
</nav>

<main class="max-w-md mx-auto px-6 pt-24 pb-32">

  <!-- 封面预览区：圆角修改为 2xl -->
  <section class="animate-slide-in relative">
    <div id="simContainer" class="wechat-sim-container relative aspect-cover">
      <div class="absolute inset-0 rounded-2xl overflow-hidden shadow-premium group bg-slate-200">
        <div class="absolute top-0 inset-x-0 h-10 px-6 flex justify-between items-center text-white z-20 text-[10px] font-bold opacity-80">
          <span>9:41</span>
          <div class="flex gap-1.5">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-full text-sm"></i>
          </div>
        </div>

        <img id="coverImg" src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1200"
             class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">

        <div class="wx-name">莫门特</div>

        <div class="absolute top-12 left-6 glass px-3 py-1.5 rounded-lg flex items-center gap-2">
          <i class="fa-solid fa-star text-[8px] text-amber-500 animate-pulse"></i>
          <span class="text-[9px] font-black tracking-widest uppercase text-slate-800">官方精品</span>
        </div>

        <div id="safeArea" class="absolute inset-0 bg-black/30 backdrop-blur-[2px] hidden pointer-events-none flex flex-col justify-between p-6">
          <div class="border border-dashed border-white/40 h-14 rounded-lg flex items-center justify-center text-[9px] text-white font-bold">顶部避让区</div>
          <div class="self-end w-32 h-32 border border-dashed border-white/40 rounded-lg flex items-center justify-center text-[9px] text-white font-bold">头像/名字区</div>
        </div>
      </div>

      <div class="wx-avatar overflow-hidden border-[3px] border-white">
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200" class="w-full h-full object-cover">
      </div>
    </div>

    <!-- 工具切换：圆角修改为 xl -->
    <div class="mt-10 flex items-center justify-between">
      <div class="flex bg-slate-200/50 p-1 rounded-xl">
        <button id="tabNormal" onclick="toggleView('normal')" class="px-5 py-2 rounded-lg text-[11px] font-bold transition-all tab-active">常规视图</button>
        <button id="tabFull" onclick="toggleView('full')" class="px-5 py-2 rounded-lg text-[11px] font-bold transition-all text-slate-400">下拉全屏</button>
      </div>
      <button onclick="toggleGuides()" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-slate-400 hover:text-indigo-500 transition-all active:scale-90">
        <i class="fa-solid fa-layer-group text-sm"></i>
      </button>
    </div>
  </section>

  <section class="mt-10 animate-slide-in" style="animation-delay: 0.1s">
    <div class="flex justify-between items-start mb-4">
      <h1 class="text-3xl font-extrabold tracking-tighter text-slate-900 leading-tight">落日余晖 · 动态</h1>
      <div class="text-right">
        <span class="block text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">创作者</span>
        <span class="text-xs font-bold text-indigo-600">@摄影师阿强</span>
      </div>
    </div>
    <div class="flex gap-2 mb-8 overflow-x-auto no-scrollbar">
      <span class="shrink-0 px-3 py-1 bg-white rounded-md text-[9px] font-bold text-slate-500 shadow-sm border border-slate-100 uppercase">4K Quality</span>
      <span class="shrink-0 px-3 py-1 bg-white rounded-md text-[9px] font-bold text-slate-500 shadow-sm border border-slate-100 uppercase">Live Wall</span>
      <span class="shrink-0 px-3 py-1 bg-indigo-600 rounded-md text-[9px] font-bold text-white shadow-sm">独家首发</span>
    </div>
    <p class="text-sm text-slate-500 leading-relaxed font-medium">
      捕捉大自然最震撼的一刻。此作品已通过算法优化，确保作为背景时不会干扰微信文字的阅读，为您带来沉浸式视觉美感。
    </p>
  </section>

  <!-- 操作中心：圆角修改为 xl/2xl -->
  <section class="mt-10 space-y-3 animate-slide-in" style="animation-delay: 0.2s">
    <div class="relative group">
      <button id="dlBtn" onclick="handleDownload()" class="w-full h-16 bg-slate-900 rounded-xl flex items-center justify-between px-6 text-white shadow-premium active:scale-95 transition-all overflow-hidden">
        <div class="flex items-center gap-4 z-10">
          <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center">
            <i id="dlIcon" class="fa-solid fa-download text-sm"></i>
          </div>
          <div class="text-left">
            <span class="block text-sm font-bold tracking-tight">消耗 50 积分 解锁原图</span>
            <span class="block text-[10px] text-slate-500 font-medium uppercase tracking-widest">余额: <span class="points-val">240</span></span>
          </div>
        </div>
        <i class="fa-solid fa-chevron-right z-10 opacity-30 text-xs"></i>
        <div id="dlProgress" class="absolute inset-y-0 left-0 bg-indigo-600 w-0 transition-all duration-300"></div>
      </button>
    </div>

    <button onclick="openAdModal()" class="w-full h-14 glass rounded-xl flex items-center justify-between px-6 text-slate-700 shadow-premium active:scale-95 transition-all">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 bg-rose-100 rounded-md flex items-center justify-center text-rose-500 text-xs">
          <i class="fa-solid fa-video"></i>
        </div>
        <span class="text-xs font-bold">看个短片 免费领 50 积分</span>
      </div>
      <i class="fa-solid fa-plus text-[10px] font-black text-indigo-600"></i>
    </button>
  </section>

  <section class="mt-14 animate-slide-in" style="animation-delay: 0.3s">
    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">猜你喜欢</h4>
    <div class="grid grid-cols-2 gap-4">
      <div class="group cursor-pointer">
        <div class="aspect-square rounded-xl overflow-hidden mb-3 shadow-sm border border-white">
          <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=400" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
        </div>
        <p class="text-[10px] font-bold text-slate-800 text-center">梦幻山脉 · 动态</p>
      </div>
      <div class="group cursor-pointer">
        <div class="aspect-square rounded-xl overflow-hidden mb-3 shadow-sm border border-white">
          <img src="https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=400" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
        </div>
        <p class="text-[10px] font-bold text-slate-800 text-center">北欧森林 · 静态</p>
      </div>
    </div>
  </section>

</main>

<!-- 广告模态框：圆角修改为 2xl -->
<div id="adModal" class="fixed inset-0 z-[200] opacity-0 pointer-events-none transition-all duration-500 flex items-center justify-center p-6">
  <div class="absolute inset-0 bg-slate-900/90 backdrop-blur-xl"></div>
  <div id="adBox" class="relative w-full max-w-sm bg-white rounded-2xl overflow-hidden shadow-2xl scale-95 transition-transform duration-500">
    <div class="aspect-[9/16] relative">
      <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/40 p-8 flex flex-col justify-between">
        <div class="flex justify-between items-center">
          <div class="bg-indigo-600 px-3 py-1 rounded-md text-[9px] font-bold text-white tracking-widest uppercase">激励视频</div>
          <div id="adTimer" class="w-10 h-10 rounded-full border border-white/30 flex items-center justify-center text-white font-bold text-xs">5</div>
        </div>
        <div class="text-center">
          <div class="w-16 h-16 bg-amber-400 rounded-xl mx-auto mb-5 flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-crown text-white text-2xl"></i>
          </div>
          <h3 class="text-xl font-bold text-white mb-2">Momentum Pro</h3>
          <p class="text-xs text-white/50 mb-8 leading-relaxed">解锁 12,000+ 独家动态素材<br>告别积分限制</p>
          <button id="closeAdBtn" disabled class="w-full h-14 bg-white rounded-xl text-slate-900 font-bold text-sm opacity-50 cursor-not-allowed transition-all">
            正在观看视频...
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast：圆角修改为 xl -->
<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 bg-slate-900/95 backdrop-blur rounded-xl text-white text-[11px] font-bold shadow-2xl transform translate-y-32 opacity-0 transition-all duration-500 flex items-center gap-3">
  <i id="toastIcon" class="fa-solid fa-circle-check text-indigo-400 text-base"></i>
  <span id="toastMsg">操作成功</span>
</div>

<script>
  let points = 240;
  let isFavorited = false;
  const COST = 50;
  const REWARD = 50;

  function toggleFavorite() {
    const btn = document.getElementById('favBtn');
    isFavorited = !isFavorited;
    if (isFavorited) {
      btn.classList.add('is-fav');
      showToast('已加入收藏', 'fa-heart');
    } else {
      btn.classList.remove('is-fav');
      showToast('已从收藏中移除', 'fa-heart-crack');
    }
  }

  function toggleView(type) {
    const sim = document.getElementById('simContainer');
    const tabN = document.getElementById('tabNormal');
    const tabF = document.getElementById('tabFull');
    if(type === 'full') {
      sim.classList.replace('aspect-cover', 'aspect-full');
      tabF.classList.add('tab-active');
      tabN.classList.remove('tab-active', 'text-slate-400');
      tabN.classList.add('text-slate-400');
    } else {
      sim.classList.replace('aspect-full', 'aspect-cover');
      tabN.classList.add('tab-active');
      tabF.classList.remove('tab-active', 'text-slate-400');
      tabF.classList.add('text-slate-400');
    }
  }

  function toggleGuides() {
    document.getElementById('safeArea').classList.toggle('hidden');
  }

  function handleDownload() {
    if (points < COST) {
      showToast('积分不足，请先领取积分', 'fa-circle-exclamation');
      return;
    }
    const btn = document.getElementById('dlBtn');
    const progress = document.getElementById('dlProgress');
    const icon = document.getElementById('dlIcon');
    btn.style.pointerEvents = 'none';
    points -= COST;
    updatePointsDisplay();
    let p = 0;
    const timer = setInterval(() => {
      p += Math.random() * 25;
      if (p >= 100) {
        p = 100;
        clearInterval(timer);
        icon.className = 'fa-solid fa-check';
        showToast('原图已保存到相册', 'fa-circle-check');
        setTimeout(() => {
          progress.style.width = '0%';
          icon.className = 'fa-solid fa-download';
          btn.style.pointerEvents = 'auto';
        }, 2000);
      }
      progress.style.width = p + '%';
    }, 150);
  }

  function updatePointsDisplay() {
    document.getElementById('userPoints').innerText = points;
    document.querySelectorAll('.points-val').forEach(el => el.innerText = points);
  }

  function openAdModal() {
    const modal = document.getElementById('adModal');
    const box = document.getElementById('adBox');
    modal.classList.replace('opacity-0', 'opacity-100');
    modal.classList.remove('pointer-events-none');
    box.classList.replace('scale-95', 'scale-100');
    let count = 5;
    const timerDiv = document.getElementById('adTimer');
    const btn = document.getElementById('closeAdBtn');
    timerDiv.innerText = count;
    btn.disabled = true;
    const interval = setInterval(() => {
      count--;
      timerDiv.innerText = count;
      if (count <= 0) {
        clearInterval(interval);
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
        btn.innerText = '领取积分并关闭';
        btn.onclick = closeAdModal;
      }
    }, 1000);
  }

  function closeAdModal() {
    const modal = document.getElementById('adModal');
    modal.classList.replace('opacity-100', 'opacity-0');
    modal.classList.add('pointer-events-none');
    points += REWARD;
    updatePointsDisplay();
    showToast('积分已到账', 'fa-coins');
  }

  function showToast(msg, iconClass) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    document.getElementById('toastIcon').className = `fa-solid ${iconClass} text-indigo-400 text-lg`;
    toast.classList.replace('translate-y-32', 'translate-y-0');
    toast.classList.replace('opacity-0', 'opacity-100');
    setTimeout(() => {
      toast.classList.replace('translate-y-0', 'translate-y-32');
      toast.classList.replace('opacity-100', 'opacity-0');
    }, 3000);
  }

  updatePointsDisplay();
</script>
</body>
</html>
