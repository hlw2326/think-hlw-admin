<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>粉丝排行榜 - 权重助手</title>
    <style>
        :root {
            --bg-start: #fff1d6;
            --bg-end: #f8fbff;
            --card: rgba(255, 255, 255, 0.92);
            --text: #1e1e22;
            --muted: #7a7f87;
            --line: rgba(30, 30, 34, 0.08);
            --accent: #ff9a3c;
            --accent-strong: #ff6b2c;
            --accent-soft: #ffe0bd;
            --good: #15b06a;
            --down: #ff5c62;
            --shadow: 0 18px 45px rgba(255, 138, 61, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at 12% 10%, rgba(255, 170, 90, 0.18), transparent 55%),
                radial-gradient(circle at 90% 20%, rgba(67, 165, 255, 0.18), transparent 50%),
                linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 0;
        }

        .page {
            max-width: 440px;
            margin: 0 auto;
            padding: 16px 14px 20px;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0 2px, transparent 2px 8px);
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .page > * {
            position: relative;
            z-index: 1;
        }

        .hero {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85), rgba(255, 248, 235, 0.92));
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 18px;
            padding: 18px 18px 16px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            backdrop-filter: blur(12px);
        }

        .hero-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .hero-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px rgba(255, 107, 44, 0.35);
        }

        .hero-title {
            font-family: "ZCOOL XiaoWei", "STKaiti", "KaiTi", serif;
            font-size: 22px;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .hero-sub {
            font-size: 12px;
            color: var(--muted);
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }

        /* 分类标签 */
        .tab-bar {
            display: flex;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 4px;
            margin-bottom: 12px;
        }

        .tab-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
            color: #6f757d;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-item.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            font-weight: 600;
        }

        /* 排行列表 */
        .rank-list {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 16px 30px rgba(30, 30, 34, 0.08);
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(30, 30, 34, 0.06);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            position: relative;
            animation: liftIn 0.5s ease both;
        }

        .rank-item:last-child {
            border-bottom: none;
        }

        .rank-item:active {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0.98);
        }

        .rank-num {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #8a9098;
            flex-shrink: 0;
            background: rgba(30, 30, 34, 0.04);
        }

        .rank-item.is-top1 .rank-num,
        .rank-item.is-top2 .rank-num,
        .rank-item.is-top3 .rank-num {
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            box-shadow: 0 6px 14px rgba(255, 107, 44, 0.35);
        }

        .rank-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            margin: 0 12px 0 12px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #ffcf91, #ff9a3c);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .rank-item.is-top1 .rank-avatar {
            background: linear-gradient(135deg, #ffe59a, #ffb347);
        }

        .rank-item.is-top2 .rank-avatar {
            background: linear-gradient(135deg, #d7e4ff, #8fb4ff);
        }

        .rank-item.is-top3 .rank-avatar {
            background: linear-gradient(135deg, #ffd9c0, #ff7f50);
        }

        .rank-info {
            flex: 1;
            min-width: 0;
        }

        .rank-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        .rank-data {
            text-align: right;
            flex-shrink: 0;
        }

        .rank-fans {
            font-size: 15px;
            font-weight: 700;
            color: #ff7f2a;
            margin-bottom: 2px;
        }

        .rank-change {
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 2px;
        }

        .rank-change.up { color: var(--good); }
        .rank-change.down { color: var(--down); }

        .rank-badge {
            position: absolute;
            right: 16px;
            top: 10px;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 999px;
            background: rgba(255, 107, 44, 0.12);
            color: #ff6b2c;
            display: none;
        }

        .rank-item.is-top1 .rank-badge,
        .rank-item.is-top2 .rank-badge,
        .rank-item.is-top3 .rank-badge {
            display: inline-flex;
        }

        @keyframes liftIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 解锁卡片 */
        .unlock-card {
            background: linear-gradient(135deg, rgba(255, 236, 210, 0.9) 0%, rgba(255, 255, 255, 0.95) 100%);
            border: 1px solid rgba(255, 184, 102, 0.4);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            margin-top: 12px;
            box-shadow: 0 18px 40px rgba(255, 154, 60, 0.2);
        }

        .unlock-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .unlock-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .unlock-desc {
            font-size: 13px;
            color: #999;
            margin-bottom: 16px;
        }

        .unlock-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .unlock-btn {
            flex: 1;
            max-width: 140px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
        }

        .unlock-btn.ad {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
        }

        .unlock-btn.points {
            background: #fff;
            border: 1px solid #ff8a3d;
            color: #ff8a3d;
        }

        .unlock-btn:active {
            transform: scale(0.95);
        }

        /* 解锁弹窗 */
        .unlock-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(18, 18, 22, 0.65);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .unlock-modal.show {
            display: flex;
        }

        .unlock-modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 300px;
            text-align: center;
            animation: popIn 0.3s ease;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .unlock-modal-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
        }

        .unlock-modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .unlock-modal-desc {
            font-size: 13px;
            color: #999;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .unlock-modal-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .unlock-modal-btn:active {
            transform: scale(0.98);
        }

        .unlock-modal-close {
            margin-top: 12px;
            font-size: 13px;
            color: #999;
            cursor: pointer;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 24px 0;
            font-size: 12px;
            color: #9aa0a6;
        }

        @media (prefers-reduced-motion: reduce) {
            .rank-item {
                animation: none;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <header class="hero">
        <div class="hero-brand">
            <div class="hero-icon">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="#fff"><path d="M13 2l-2 7H4l5.5 4-2 7L13 15l5.5 5-2-7L22 9h-7z"/></svg>
            </div>
            <div>
                <div class="hero-title">粉丝排行榜</div>
                <div class="hero-sub">实时热度 · 增长趋势 · 数据洞察</div>
            </div>
        </div>
        <div class="hero-stats">
            <div class="stat">
                <div class="stat-label">展示范围</div>
                <div class="stat-value">TOP 10</div>
            </div>
            <div class="stat">
                <div class="stat-label">更新时间</div>
                <div class="stat-value">今日</div>
            </div>
        </div>
    </header>
    <!-- 排行列表 -->
    <div class="rank-list" id="rankList">
        <!-- 动态生成 -->
    </div>

    <!-- 解锁提示 -->
    <div class="unlock-card" id="unlockCard">
        <div class="unlock-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M12 17a2 2 0 0 0 2-2v-2a2 2 0 1 0-4 0v2a2 2 0 0 0 2 2zm6-7h-1V8a5 5 0 0 0-10 0v2H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zm-3 0H9V8a3 3 0 0 1 6 0v2z"/></svg>
        </div>
        <div class="unlock-title">仅展示前 10 名</div>
        <div class="unlock-desc">观看广告或使用积分即可解锁更多排名数据</div>
        <div class="unlock-btns">
            <button class="unlock-btn ad" onclick="openUnlockModal('ad')">看广告解锁</button>
            <button class="unlock-btn points" onclick="openUnlockModal('points')">积分解锁</button>
        </div>
    </div>

    <!-- 解锁弹窗 -->
    <div class="unlock-modal" id="unlockModal">
        <div class="unlock-modal-box">
            <div class="unlock-modal-icon">
                <svg viewBox="0 0 24 24" width="60" height="60" fill="#f6a623"><path d="M12 2a7 7 0 0 0-7 7v3H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-1V9a7 7 0 0 0-7-7zm5 10H7V9a5 5 0 0 1 10 0v3z"/></svg>
            </div>
            <div class="unlock-modal-title" id="unlockModalTitle">解锁更多排名</div>
            <div class="unlock-modal-desc" id="unlockModalDesc">观看 15 秒广告即可解锁全部排名数据。</div>
            <button class="unlock-modal-btn" id="unlockModalBtn" onclick="confirmUnlock()">立即解锁</button>
            <div class="unlock-modal-close" onclick="closeUnlockModal()">暂不解锁</div>
        </div>
    </div>

    <footer class="footer">AI智能分析 · 权重助手</footer>
</main>

<script>
    // 模拟数据
    const rankData = {
        total: [
            { name: '疯狂小杨哥', fans: 12800, change: 15.2, works: 856, type: 'up' },
            { name: '刘畊宏', fans: 9200, change: 8.5, works: 423, type: 'up' },
            { name: '董宇辉', fans: 8500, change: 12.3, works: 312, type: 'up' },
            { name: '张同学', fans: 7800, change: -2.1, works: 245, type: 'down' },
            { name: '李子柒', fans: 7200, change: 3.6, works: 156, type: 'up' },
            { name: '罗永浩', fans: 6800, change: 5.2, works: 289, type: 'up' },
            { name: '小杨哥', fans: 6500, change: 8.9, works: 567, type: 'up' },
            { name: '祝晓晗', fans: 5900, change: -1.2, works: 432, type: 'down' },
            { name: '郭聪明', fans: 5600, change: 6.5, works: 321, type: 'up' },
            { name: '浪味仙', fans: 5200, change: 4.3, works: 198, type: 'up' },
            { name: '多余和毛毛姐', fans: 4800, change: -0.8, works: 176, type: 'down' },
            { name: '小贝鞭炮', fans: 4500, change: 2.1, works: 204, type: 'up' },
            { name: '大狼狗郑建鹏', fans: 4300, change: 1.4, works: 268, type: 'up' },
            { name: '一只酸奶牛', fans: 4100, change: -1.9, works: 152, type: 'down' },
            { name: '陈翔六点半', fans: 3900, change: 3.2, works: 612, type: 'up' }
        ]
    };
    const initialVisibleCount = 10;
    let unlocked = false;
    let unlockType = 'ad';

    // 格式化数字
    function formatFans(num) {
        if (num >= 10000) {
            return (num / 10000).toFixed(1) + '亿';
        }
        return num + '万';
    }

    // 渲染排行列表
    function renderRankList(data) {
        const maxCount = unlocked ? data.length : initialVisibleCount;
        const list = data.slice(0, maxCount);
        const html = list.map((item, index) => {
            const rank = index + 1;
            const rankClass = rank === 1 ? 'is-top1' : rank === 2 ? 'is-top2' : rank === 3 ? 'is-top3' : '';
            const badgeText = rank === 1 ? 'TOP 1' : rank === 2 ? 'TOP 2' : rank === 3 ? 'TOP 3' : '';
            return `
                <div class="rank-item ${rankClass}" style="animation-delay:${index * 0.04}s">
                    <span class="rank-num">${rank}</span>
                    <div class="rank-avatar">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="rank-info">
                        <div class="rank-name">${item.name}</div>
                        <div class="rank-meta">
                            <span>作品 ${item.works}</span>
                        </div>
                    </div>
                    <div class="rank-data">
                        <div class="rank-fans">${formatFans(item.fans)}</div>
                        <div class="rank-change ${item.type}">
                            ${item.type === 'up' ? '↑' : '↓'} ${Math.abs(item.change)}%
                        </div>
                    </div>
                    <span class="rank-badge">${badgeText}</span>
                </div>
            `;
        }).join('');
        document.getElementById('rankList').innerHTML = html;
    }

    function updateUnlockCard() {
        const card = document.getElementById('unlockCard');
        if (unlocked || rankData.total.length <= initialVisibleCount) {
            card.style.display = 'none';
        } else {
            card.style.display = 'block';
        }
    }

    function openUnlockModal(type) {
        unlockType = type;
        const title = document.getElementById('unlockModalTitle');
        const desc = document.getElementById('unlockModalDesc');
        const btn = document.getElementById('unlockModalBtn');
        if (type === 'ad') {
            title.textContent = '广告解锁';
            desc.textContent = '观看 15 秒广告即可解锁全部排名数据。';
            btn.textContent = '观看广告';
        } else {
            title.textContent = '积分解锁';
            desc.textContent = '消耗 30 积分即可解锁全部排名数据。';
            btn.textContent = '确认解锁';
        }
        document.getElementById('unlockModal').classList.add('show');
    }

    function closeUnlockModal() {
        document.getElementById('unlockModal').classList.remove('show');
    }

    function confirmUnlock() {
        const btn = document.getElementById('unlockModalBtn');
        btn.disabled = true;
        btn.textContent = unlockType === 'ad' ? '广告播放中...' : '处理中...';
        const done = () => {
            unlocked = true;
            renderRankList(rankData.total);
            updateUnlockCard();
            closeUnlockModal();
            showToast('已解锁更多数据');
            btn.disabled = false;
            btn.textContent = unlockType === 'ad' ? '观看广告' : '确认解锁';
        };
        if (unlockType === 'ad') {
            setTimeout(done, 1200);
        } else {
            setTimeout(done, 400);
        }
    }

    // Toast提示
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:6px;font-size:14px;z-index:2000;';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // 初始化
    renderRankList(rankData.total);
    updateUnlockCard();
</script>
</body>
</html>
