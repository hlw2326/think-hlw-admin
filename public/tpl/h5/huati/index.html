<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>热门话题 - 权重助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #f5f0ff 0%, #fff 100%);
            color: #1d1d1f;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 0;
        }

        .page {
            max-width: 440px;
            margin: 0 auto;
            padding: 10px;
            min-height: 100vh;
        }

        /* 返回导航 */
        .nav-bar {
            display: flex;
            align-items: center;
            padding: 10px 0 16px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
            background: #f5f5f5;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: #333;
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin-right: 36px;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            padding: 16px 0 20px;
        }

        .header-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 13px;
            color: #86868b;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            gap: 8px;
            padding: 0 0 14px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-item {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
        }

        .tab-item:active {
            transform: scale(0.95);
        }

        /* 更新时间 */
        .update-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 12px;
            color: #999;
        }

        .update-time {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #667eea;
            cursor: pointer;
        }

        .refresh-btn svg {
            transition: transform 0.3s;
        }

        .refresh-btn.loading svg {
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        /* 话题列表 */
        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .topic-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .topic-item:active {
            transform: scale(0.98);
            background: #f9f9f9;
        }

        .topic-rank {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .topic-rank.top1 {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
        }

        .topic-rank.top2 {
            background: linear-gradient(135deg, #ffa502, #ff7f50);
            color: #fff;
        }

        .topic-rank.top3 {
            background: linear-gradient(135deg, #ffc107, #ffdb4d);
            color: #fff;
        }

        .topic-rank.normal {
            background: #f5f5f5;
            color: #999;
        }

        .topic-content {
            flex: 1;
            min-width: 0;
        }

        .topic-title {
            font-size: 15px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topic-title span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topic-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .topic-tag.hot {
            background: #fff2f0;
            color: #ff4d4f;
        }

        .topic-tag.new {
            background: #e6f7ff;
            color: #1890ff;
        }

        .topic-tag.up {
            background: #f6ffed;
            color: #52c41a;
        }

        .topic-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: #999;
        }

        .topic-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .topic-meta-item svg {
            width: 14px;
            height: 14px;
            fill: #999;
        }

        .topic-trend {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 12px;
        }

        .topic-trend.up {
            color: #52c41a;
        }

        .topic-trend.down {
            color: #ff4d4f;
        }

        .topic-trend svg {
            width: 12px;
            height: 12px;
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 16px;
        }

        .load-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .load-more-btn:active {
            transform: scale(0.95);
        }

        .load-more-btn.loading {
            color: #999;
            pointer-events: none;
        }

        /* 解锁卡片 */
        .unlock-card {
            background: linear-gradient(135deg, #f5f5f5 0%, #fff 100%);
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
        }

        .unlock-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .unlock-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .unlock-desc {
            font-size: 13px;
            color: #999;
            margin-bottom: 16px;
        }

        .unlock-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .unlock-btn {
            flex: 1;
            max-width: 140px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
        }

        .unlock-btn.ad {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .unlock-btn.points {
            background: #fff;
            border: 1px solid #667eea;
            color: #667eea;
        }

        .unlock-btn:active {
            transform: scale(0.95);
        }

        .unlock-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 解锁弹窗 */
        .unlock-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .unlock-modal.show {
            display: flex;
        }

        .unlock-modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 300px;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .unlock-modal-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .unlock-modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .unlock-modal-desc {
            font-size: 13px;
            color: #999;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .unlock-modal-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .unlock-modal-btn:active {
            transform: scale(0.98);
        }

        .unlock-modal-close {
            margin-top: 12px;
            font-size: 13px;
            color: #999;
            cursor: pointer;
        }

        /* 推荐使用卡片 */
        .recommend-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .recommend-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .recommend-content {
            flex: 1;
            color: #fff;
        }

        .recommend-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .recommend-desc {
            font-size: 12px;
            opacity: 0.85;
        }

        .recommend-btn {
            padding: 8px 14px;
            background: #fff;
            color: #667eea;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        .recommend-btn:active {
            transform: scale(0.95);
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 24px 0;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>

<main class="page">
    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>

    <!-- 头部 -->

    <div class="recommend-card">

        <button class="recommend-btn" onclick="generateIdea()">立即生成</button>
    </div>

    <!-- 分类标签 -->
    <div class="category-tabs" id="categoryTabs">
        <div class="tab-item active" data-type="all">全部</div>

    <!-- 更新时间 -->
    <div class="update-info">
        <div class="update-time">

            <span>刷新</span>
        </div>
    </div>

    <!-- 话题列表 -->
    <div class="topic-list" id="topicList">
        <!-- 动态生成 -->
    </div>

    <!-- 解锁更多 -->
    <div class="unlock-card" id="unlockCard">
        <div class="unlock-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>

        <div class="unlock-desc">解锁查看完整TOP100榜单</div>
        <div class="unlock-btns">

            <button class="unlock-btn points" onclick="unlockByPoints()">

                50积分解锁
            </button>
        </div>
    </div>

    <footer class="footer">AI智能分析 · 权重助手</footer>
</main>

<!-- 广告解锁弹窗 -->
<div class="unlock-modal" id="adModal">
    <div class="unlock-modal-box">

            <svg viewBox="0 0 24 24" width="60" height="60" fill="#667eea"><path d="M8 5v14l11-7z"/></svg>

</div>

<!-- 积分解锁弹窗 -->

        <div class="unlock-modal-desc">消耗50积分解锁剩余90个热门话题<br>当前积分：<span id="currentPoints">120</span></div>

        <div class="unlock-modal-close" onclick="closePointsModal()">取消</div>

</div>

            { title: '我的宝藏APP分享', plays: 25600000, participants: 980000, tag: '', trend: 'up', trendValue: 6.8 },
            { title: '打工人日常', plays: 23400000, participants: 890000, tag: '', trend: 'down', trendValue: 1.5 },
            { title: '今天吃什么', plays: 21200000, participants: 760000, tag: '', trend: 'up', trendValue: 3.2 }
        ]
    };

    let currentType = 'all';
    let currentPage = 1;

    // 格式化数字
    function formatNumber(num) {
        if (num >= 100000000) {
            return (num / 100000000).toFixed(1) + '亿';
        }
        if (num >= 10000) {
            return (num / 10000).toFixed(1) + 'w';
        }
        return num.toString();
    }

    // 渲染话题列表
    function renderTopics(topics, append = false) {
        const container = document.getElementById('topicList');
        const html = topics.map((topic, index) => {
            const rank = append ? index + 11 : index + 1;
            let rankClass = 'normal';
            if (rank === 1) rankClass = 'top1';
            else if (rank === 2) rankClass = 'top2';
            else if (rank === 3) rankClass = 'top3';

            let tagHtml = '';
            if (topic.tag === 'hot') tagHtml = '<span class="topic-tag hot">热</span>';
            else if (topic.tag === 'new') tagHtml = '<span class="topic-tag new">新</span>';
            else if (topic.tag === 'up') tagHtml = '<span class="topic-tag up">飙升</span>';

            const trendIcon = topic.trend === 'up'
                ? '<svg viewBox="0 0 24 24" fill="#52c41a"><path d="M7 14l5-5 5 5z"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="#ff4d4f"><path d="M7 10l5 5 5-5z"/></svg>';

            return `
                <div class="topic-item" onclick="openTopic('${topic.title}')">
                    <div class="topic-rank ${rankClass}">${rank}</div>
                    <div class="topic-content">
                        <div class="topic-title">
                            <span>#${topic.title}#</span>
                            ${tagHtml}
                        </div>
                        <div class="topic-meta">
                            <div class="topic-meta-item">
                                <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                ${formatNumber(topic.plays)}
                            </div>
                            <div class="topic-meta-item">
                                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                                ${formatNumber(topic.participants)}人参与
                            </div>
                        </div>
                    </div>
                    <div class="topic-trend ${topic.trend}">
                        ${trendIcon}
                        ${topic.trendValue}%
                    </div>
                </div>
            `;
        }).join('');

        if (append) {
            container.innerHTML += html;
        } else {
            container.innerHTML = html;
        }
    }

    // 切换分类
    document.getElementById('categoryTabs').addEventListener('click', function(e) {
        if (e.target.classList.contains('tab-item')) {
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            e.target.classList.add('active');
            currentType = e.target.dataset.type;
            currentPage = 1;
            renderTopics(topicData[currentType] || []);
        }
    });

    // 刷新话题
    function refreshTopics() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('loading');

        setTimeout(() => {
            btn.classList.remove('loading');
            document.getElementById('updateTime').textContent = '刚刚更新';
            renderTopics(topicData[currentType] || []);
            showToast('已刷新');
        }, 1000);
    }

    // 广告解锁
    function unlockByAd() {
        document.getElementById('adModal').classList.add('show');
    }

    function closeAdModal() {
        document.getElementById('adModal').classList.remove('show');
    }

    function watchAd() {
        const btn = document.querySelector('#adModal .unlock-modal-btn');
        btn.textContent = '广告加载中...';
        btn.disabled = true;

        // 模拟广告播放
        let countdown = 15;
        const timer = setInterval(() => {
            countdown--;
            btn.textContent = `广告播放中 ${countdown}s`;
            if (countdown <= 0) {
                clearInterval(timer);
                closeAdModal();
                unlockSuccess();
            }
        }, 1000);
    }

    // 积分解锁
    function unlockByPoints() {
        document.getElementById('pointsModal').classList.add('show');
    }

    function closePointsModal() {
        document.getElementById('pointsModal').classList.remove('show');
    }

    function usePoints() {
        closePointsModal();
        unlockSuccess();
    }

    // 解锁成功
    function unlockSuccess() {
        // 隐藏解锁卡片
        document.getElementById('unlockCard').style.display = 'none';

        // 加载更多话题
        const moreTopics = generateMoreTopics(90);
        renderTopics(moreTopics, true);

        showToast('解锁成功！已加载全部话题');
    }

    // 生成更多话题
    function generateMoreTopics(count) {
        const titles = [
            '宠物日常', '美食制作教程', '旅行vlog', '健身打卡', '穿搭分享',
            '读书笔记', '职场干货', '情感故事', '搞笑段子', '游戏攻略',
            '数码测评', '家居改造', '护肤心得', '育儿经验', '学习方法',
            '理财知识', '音乐推荐', '电影解说', '手工DIY', '摄影技巧'
        ];
        const topics = [];
        for (let i = 0; i < count; i++) {
            topics.push({
                title: titles[i % titles.length] + (i > 19 ? Math.floor(i / 20 + 1) : ''),
                plays: Math.floor(Math.random() * 15000000) + 1000000,
                participants: Math.floor(Math.random() * 500000) + 50000,
                tag: Math.random() > 0.8 ? (Math.random() > 0.5 ? 'new' : 'up') : '',
                trend: Math.random() > 0.3 ? 'up' : 'down',
                trendValue: (Math.random() * 20 + 1).toFixed(1)
            });
        }
        return topics;
    }

    // 打开话题
    function openTopic(title) {
        showToast('正在打开 #' + title + '#');
    }

    // 生成灵感
    function generateIdea() {
        showToast('AI正在生成创作灵感...');
    }

    // Toast提示
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:6px;font-size:14px;z-index:3000;';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // 初始化
    renderTopics(topicData.all);
</script>
</body>
</html>
