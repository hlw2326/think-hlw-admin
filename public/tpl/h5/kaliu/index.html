<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>卡流查询 - 权重助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #fff5f5 0%, #fff 100%);
            color: #1d1d1f;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 0;
        }

        .page {
            max-width: 440px;
            margin: 0 auto;
            padding: 10px;
            min-height: 100vh;
        }

        /* 返回导航 */
        .nav-bar {
            display: flex;
            align-items: center;
            padding: 10px 0 20px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
            background: #f5f5f5;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: #333;
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin-right: 36px;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            padding: 20px 0 30px;
        }

        .header-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #86868b;
        }

        /* 输入区域 */
        .input-section {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .input-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-label::before {
            content: '';
            width: 3px;
            height: 12px;
            background: linear-gradient(180deg, #ff4757, #ff6b81);
            border-radius: 2px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-field {
            width: 100%;
            height: 48px;
            background: #f7f7f7;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 0 50px 0 16px;
            font-size: 15px;
            color: #1d1d1f;
            outline: none;
            transition: all 0.3s;
        }

        .input-field::placeholder {
            color: #bbb;
        }

        .input-field:focus {
            border-color: #ff4757;
            background: #fff;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: #e8e8e8;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            color: #999;
        }

        .clear-btn.show {
            display: flex;
        }

        /* 查询按钮 */
        .submit-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .submit-btn .loading {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit-btn.loading .loading {
            display: block;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 结果区域 */
        .result-section {
            display: none;
            animation: fadeUp 0.4s ease;
            margin-top: 20px;
        }

        .result-section.show {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 状态卡片 */
        .status-card {
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 12px;
            text-align: center;
        }

        .status-card.danger {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff;
        }

        .status-card.warning {
            background: linear-gradient(135deg, #ffa502, #ffbe76);
            color: #fff;
        }

        .status-card.success {
            background: linear-gradient(135deg, #2ed573, #7bed9f);
            color: #fff;
        }

        .status-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .status-desc {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 账号信息 */
        .account-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .account-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .account-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .account-info {
            flex: 1;
        }

        .account-name {
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .account-id {
            font-size: 13px;
            color: #86868b;
        }

        .account-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 10px 6px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: #86868b;
        }

        /* 检测结果 */
        .detect-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .detect-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detect-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #ff4757, #ff6b81);
            border-radius: 2px;
        }

        .detect-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .detect-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .detect-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detect-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detect-icon.check { background: #f6ffed; }
        .detect-icon.warning { background: #fffbe6; }
        .detect-icon.error { background: #fff2f0; }

        .detect-name {
            font-size: 14px;
            color: #333;
        }

        .detect-status {
            font-size: 13px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .detect-status.normal {
            background: #f6ffed;
            color: #52c41a;
        }

        .detect-status.warning {
            background: #fffbe6;
            color: #faad14;
        }

        .detect-status.error {
            background: #fff2f0;
            color: #ff4d4f;
        }

        /* 限流原因 */
        .reason-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .reason-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff4757;
        }

        .reason-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: #ff4757;
            border-radius: 2px;
        }

        .reason-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .reason-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            padding: 10px;
            background: #fff2f0;
            border-radius: 6px;
        }

        .reason-icon {
            width: 18px;
            height: 18px;
            background: #ff4d4f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* 解除方案 */
        .solution-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .solution-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .solution-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #52c41a, #95de64);
            border-radius: 2px;
        }

        .solution-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .solution-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #f6ffed;
            border-radius: 6px;
            border: 1px solid #b7eb8f;
        }

        .solution-num {
            width: 24px;
            height: 24px;
            background: #52c41a;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .solution-content {
            flex: 1;
        }

        .solution-content h4 {
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .solution-content p {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }

        /* 一键解除 */
        .unlock-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .unlock-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .unlock-content {
            flex: 1;
            color: #fff;
        }

        .unlock-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .unlock-desc {
            font-size: 12px;
            opacity: 0.85;
        }

        .unlock-btn {
            padding: 10px 16px;
            background: #fff;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .unlock-btn:active {
            transform: scale(0.95);
        }

        /* 提示 */
        .tips-card {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 6px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }

        .tips-content {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 12px;
            color: #8c6d1f;
            line-height: 1.6;
        }

        .tips-icon {
            flex-shrink: 0;
        }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px 0 24px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
<main class="page">
    <!-- 导航栏 -->
    <nav class="nav-bar">
        <div class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>
        <span class="nav-title">卡流查询</span>
    </nav>

    <!-- 头部 -->
    <header class="header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <h1>卡流检测</h1>
        <p>快速检测账号是否被限流</p>
    </header>

    <!-- 输入区域 -->
    <section class="input-section">
        <div class="input-label">输入抖音号或主页链接</div>
        <div class="input-wrapper">
            <input type="text" class="input-field" id="accountInput" placeholder="请输入抖音号或粘贴主页链接">
            <div class="clear-btn" id="clearBtn" onclick="clearInput()">×</div>
        </div>
    </section>

    <!-- 查询按钮 -->
    <button class="submit-btn" id="submitBtn" onclick="checkFlow()">
        <span class="loading"></span>
        <span class="btn-text">开始检测</span>
    </button>

    <!-- 结果区域 -->
    <section class="result-section" id="resultSection">
        <!-- 状态卡片 -->
        <div class="status-card danger" id="statusCard">
            <div class="status-icon">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <div class="status-title" id="statusTitle">检测到限流</div>
            <div class="status-desc" id="statusDesc">您的账号存在限流风险，建议尽快处理</div>
        </div>

        <!-- 账号信息 -->
        <div class="account-card">
            <div class="account-header">
                <div class="account-avatar">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="account-info">
                    <div class="account-name" id="accountName">创作者昵称</div>
                    <div class="account-id">抖音号：<span id="accountIdText">--</span></div>
                </div>
            </div>
            <div class="account-stats">
                <div class="stat-item">
                    <div class="stat-value" id="fansCount">--</div>
                    <div class="stat-label">粉丝</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="followCount">--</div>
                    <div class="stat-label">关注</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="worksCount">--</div>
                    <div class="stat-label">作品</div>
                </div>
            </div>
        </div>

        <!-- 检测结果 -->
        <div class="detect-card">
            <div class="detect-title">检测项目</div>
            <div class="detect-list" id="detectList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 限流原因 -->
        <div class="reason-card" id="reasonCard">
            <div class="reason-title">可能的限流原因</div>
            <div class="reason-list" id="reasonList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 解除方案 -->
        <div class="solution-card">
            <div class="solution-title">解除限流方案</div>
            <div class="solution-list" id="solutionList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 一键解除 -->
        <div class="unlock-card">
            <div class="unlock-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
            </div>
            <div class="unlock-content">
                <div class="unlock-title">智能解除限流</div>
                <div class="unlock-desc">AI辅助快速恢复账号流量</div>
            </div>
            <button class="unlock-btn" onclick="unlockFlow()">立即解除</button>
        </div>

        <!-- 提示 -->
        <div class="tips-card">
            <div class="tips-content">
                <span class="tips-icon">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="#faad14"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </span>
                <span>限流检测结果仅供参考，具体情况以平台官方为准。建议遵守平台规则，发布优质内容。</span>
            </div>
        </div>
    </section>

    <footer class="footer">AI智能分析 · 权重助手</footer>
</main>

<!-- 解除弹窗 -->
<div class="unlock-modal" id="unlockModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:30px 40px;text-align:center;animation:popIn 0.3s ease;">
        <div id="unlockSpinner" style="width:50px;height:50px;margin:0 auto 16px;border:4px solid #f0f0f0;border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <div id="unlockText" style="font-size:16px;font-weight:600;color:#333;margin-bottom:6px;">正在解除限流...</div>
        <div id="unlockSubText" style="font-size:13px;color:#999;">请稍候，AI正在处理</div>
    </div>
</div>

<style>
    @keyframes popIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }
    .unlock-modal.show { display: flex !important; }
</style>

<script>
    const input = document.getElementById('accountInput');
    const clearBtn = document.getElementById('clearBtn');
    const submitBtn = document.getElementById('submitBtn');
    const resultSection = document.getElementById('resultSection');

    input.addEventListener('input', function() {
        clearBtn.classList.toggle('show', this.value.length > 0);
    });

    function clearInput() {
        input.value = '';
        clearBtn.classList.remove('show');
        input.focus();
    }

    // 检测卡流
    function checkFlow() {
        const value = input.value.trim();
        if (!value) {
            alert('请输入抖音号或主页链接');
            return;
        }

        submitBtn.classList.add('loading');
        submitBtn.disabled = true;

        setTimeout(() => {
            const mockData = generateMockData(value);
            updateResult(mockData);

            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
            resultSection.classList.add('show');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 1500);
    }

    // 生成模拟数据
    function generateMockData(accountId) {
        const status = Math.random();
        let level, statusType;

        if (status < 0.4) {
            level = 'danger';
            statusType = '严重限流';
        } else if (status < 0.7) {
            level = 'warning';
            statusType = '轻度限流';
        } else {
            level = 'success';
            statusType = '流量正常';
        }

        return {
            accountId: accountId.length > 15 ? accountId.substring(0, 15) + '...' : accountId,
            name: '创作者_' + Math.random().toString(36).substring(2, 8),
            fans: Math.floor(Math.random() * 500000) + 1000,
            follow: Math.floor(Math.random() * 500) + 50,
            works: Math.floor(Math.random() * 200) + 10,
            level: level,
            statusType: statusType,
            detects: [
                { name: '播放量检测', status: level === 'success' ? 'normal' : (Math.random() > 0.5 ? 'warning' : 'error'), statusText: level === 'success' ? '正常' : (Math.random() > 0.5 ? '偏低' : '异常') },
                { name: '推荐流量', status: level === 'success' ? 'normal' : 'error', statusText: level === 'success' ? '正常' : '受限' },
                { name: '搜索可见性', status: level === 'danger' ? 'error' : 'normal', statusText: level === 'danger' ? '受限' : '正常' },
                { name: '账号状态', status: level === 'danger' ? 'warning' : 'normal', statusText: level === 'danger' ? '异常' : '正常' },
                { name: '内容审核', status: Math.random() > 0.7 ? 'warning' : 'normal', statusText: Math.random() > 0.7 ? '待审核' : '已通过' }
            ],
            reasons: level === 'success' ? [] : [
                '近期发布内容可能触发平台审核机制',
                '账号活跃度下降，系统降低推荐权重',
                '视频完播率较低，影响流量分配'
            ],
            solutions: level === 'success' ? [
                { title: '继续保持', desc: '您的账号状态良好，继续保持优质内容输出' },
                { title: '提升互动', desc: '增加与粉丝的互动，提高账号活跃度' }
            ] : [
                { title: '停止违规操作', desc: '检查近期是否有刷量、搬运等违规行为，立即停止' },
                { title: '养号7天', desc: '每天正常刷视频1-2小时，点赞评论，不发布内容' },
                { title: '优化内容', desc: '发布原创优质内容，提升视频完播率和互动率' },
                { title: '账号申诉', desc: '如确认无违规，可通过官方渠道进行申诉' }
            ]
        };
    }

    // 格式化数字
    function formatNumber(num) {
        if (num >= 10000) {
            return (num / 10000).toFixed(1) + 'w';
        }
        return num.toString();
    }

    // 更新结果
    function updateResult(data) {
        document.getElementById('accountName').textContent = data.name;
        document.getElementById('accountIdText').textContent = data.accountId;
        document.getElementById('fansCount').textContent = formatNumber(data.fans);
        document.getElementById('followCount').textContent = data.follow;
        document.getElementById('worksCount').textContent = data.works;

        // 状态卡片
        const statusCard = document.getElementById('statusCard');
        statusCard.className = 'status-card ' + data.level;
        document.getElementById('statusTitle').textContent = data.statusType;

        const descMap = {
            'danger': '您的账号存在严重限流，建议尽快处理',
            'warning': '您的账号存在轻度限流风险，建议关注',
            'success': '恭喜！您的账号流量状态正常'
        };
        document.getElementById('statusDesc').textContent = descMap[data.level];

        // 状态图标
        const iconMap = {
            'danger': '<svg viewBox="0 0 24 24" width="28" height="28" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>',
            'warning': '<svg viewBox="0 0 24 24" width="28" height="28" fill="#fff"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>',
            'success': '<svg viewBox="0 0 24 24" width="28" height="28" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>'
        };
        statusCard.querySelector('.status-icon').innerHTML = iconMap[data.level];

        // 检测项目
        const detectList = document.getElementById('detectList');
        detectList.innerHTML = data.detects.map(item => `
            <div class="detect-item">
                <div class="detect-item-left">
                    <div class="detect-icon ${item.status}">
                        ${item.status === 'normal' ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="#52c41a"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' :
                          item.status === 'warning' ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="#faad14"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>' :
                          '<svg viewBox="0 0 24 24" width="16" height="16" fill="#ff4d4f"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>'}
                    </div>
                    <span class="detect-name">${item.name}</span>
                </div>
                <span class="detect-status ${item.status}">${item.statusText}</span>
            </div>
        `).join('');

        // 限流原因
        const reasonCard = document.getElementById('reasonCard');
        if (data.reasons.length === 0) {
            reasonCard.style.display = 'none';
        } else {
            reasonCard.style.display = 'block';
            document.getElementById('reasonList').innerHTML = data.reasons.map(reason => `
                <div class="reason-item">
                    <span class="reason-icon">
                        <svg viewBox="0 0 24 24" width="10" height="10" fill="#fff"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </span>
                    <span>${reason}</span>
                </div>
            `).join('');
        }

        // 解除方案
        document.getElementById('solutionList').innerHTML = data.solutions.map((item, i) => `
            <div class="solution-item">
                <span class="solution-num">${i + 1}</span>
                <div class="solution-content">
                    <h4>${item.title}</h4>
                    <p>${item.desc}</p>
                </div>
            </div>
        `).join('');
    }

    // 一键解除
    function unlockFlow() {
        const modal = document.getElementById('unlockModal');
        modal.classList.add('show');

        setTimeout(() => {
            document.getElementById('unlockSpinner').style.borderTopColor = '#52c41a';
            document.getElementById('unlockSpinner').style.animation = 'none';
            document.getElementById('unlockSpinner').innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24" fill="#52c41a" style="margin:13px"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            document.getElementById('unlockText').textContent = '解除成功！';
            document.getElementById('unlockText').style.color = '#52c41a';
            document.getElementById('unlockSubText').textContent = '账号流量已恢复正常';

            setTimeout(() => {
                modal.classList.remove('show');
                // 更新状态
                document.getElementById('statusCard').className = 'status-card success';
                document.getElementById('statusTitle').textContent = '流量正常';
                document.getElementById('statusDesc').textContent = '恭喜！您的账号流量已恢复正常';
                document.getElementById('statusCard').querySelector('.status-icon').innerHTML = '<svg viewBox="0 0 24 24" width="28" height="28" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
            }, 1000);
        }, 2000);
    }

    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkFlow();
        }
    });
</script>
</body>
</html>
