<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>抖音作品卡流解除工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'enter-up': 'enterUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-soft': 'pulseSoft 2s infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scan': 'scan 2s linear infinite',
                    },
                    keyframes: {
                        enterUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseSoft: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.6' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        scan: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(200%)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            /* 背景调整得更清透 */
            background-image:
                    radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                    radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
                    radial-gradient(at 50% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow:
                    0 4px 6px -1px rgba(0, 0, 0, 0.02),
                    0 10px 15px -3px rgba(0, 0, 0, 0.03),
                    inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* 状态标签样式 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .status-badge-stuck {
            background: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
            box-shadow: 0 2px 5px rgba(225, 29, 72, 0.05);
        }

        .status-badge-normal {
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        .status-badge-fixing {
            background: #fefce8;
            color: #ca8a04;
            border: 1px solid #fde047;
        }

        /* 日志行 */
        .log-line {
            padding: 6px 0;
            border-bottom: 1px dashed rgba(226, 232, 240, 0.6);
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
        }
        .log-line:last-child { border-bottom: none; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-rose-100 selection:text-rose-900">

<!-- 1. Header -->
<header class="w-full max-w-md sticky top-0 z-40 glass-panel border-b border-white/50">
    <div class="px-5 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-rose-500 to-orange-500 text-white flex items-center justify-center shadow-lg shadow-rose-200 ring-2 ring-white">
                <i class="fa-solid fa-unlock-keyhole text-sm"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-slate-800 tracking-tight text-base leading-tight">Unblock Pro</h1>
                <p class="text-[9px] text-slate-400 font-semibold tracking-wide">卡流解除工具</p>
            </div>
        </div>
        <div class="relative group cursor-pointer">
            <div class="absolute inset-0 bg-blue-400 rounded-full blur opacity-20 group-hover:opacity-40 transition-opacity"></div>
            <div class="relative text-[10px] font-bold text-blue-600 bg-blue-50/80 px-3 py-1.5 rounded-full border border-blue-100 flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
                节点正常
            </div>
        </div>
    </div>
</header>

<main class="w-full max-w-md flex-1 p-5 pb-24 flex flex-col gap-6">

    <!-- 2. Input Section -->
    <div id="inputSection" class="animate-enter-up" style="animation-delay: 0.1s;">
        <div class="glass-panel rounded-3xl p-7 relative overflow-hidden group hover:shadow-lg transition-all duration-500">
            <!-- 装饰光效 -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-rose-500/5 rounded-full blur-3xl group-hover:bg-rose-500/10 transition-colors"></div>

            <div class="text-center mb-7 relative z-10">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-slate-50 mb-3 text-2xl shadow-inner text-rose-500">
                    <i class="fa-solid fa-gauge-high"></i>
                </div>
                <h2 class="text-xl font-extrabold text-slate-800 mb-1.5">作品播放量卡顿检测</h2>
                <p class="text-xs text-slate-500 font-medium">深度诊断 · 解决0播放/低播放 · 一键解除卡流</p>
            </div>

            <div class="relative mb-5 z-10">
                <div class="absolute top-3.5 left-4 text-slate-400 transition-colors group-focus-within:text-rose-500">
                    <i class="fa-solid fa-link"></i>
                </div>
                <input id="urlInput" type="text"
                       class="glass-input w-full h-12 rounded-xl pl-10 pr-20 text-sm font-medium placeholder:text-slate-400 focus:outline-none"
                       placeholder="输入抖音号或主页链接...">

                <button onclick="pasteText()" class="absolute top-2 right-2 bg-white hover:bg-slate-50 text-[10px] font-bold text-slate-600 px-3 py-1.5 rounded-lg border border-slate-200 transition-colors shadow-sm active:scale-95">
                    粘贴
                </button>
            </div>

            <button onclick="startAnalysis()" class="w-full h-12 bg-slate-900 hover:bg-black text-white font-bold text-sm rounded-xl shadow-xl shadow-slate-200 active:scale-[0.98] transition-all relative overflow-hidden group z-10">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-bolt text-yellow-300"></i>
                    一键检测卡流
                </span>
                <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
        </div>
    </div>

    <!-- 3. Loading State -->
    <div id="loadingSection" class="hidden animate-enter-up">
        <div class="glass-panel rounded-3xl p-8 flex flex-col items-center justify-center min-h-[400px] relative overflow-hidden">
            <!-- 扫描动画 -->
            <div class="absolute inset-0 overflow-hidden rounded-3xl">
                <div class="w-full h-20 bg-gradient-to-b from-transparent via-rose-500/5 to-transparent animate-scan absolute top-0"></div>
            </div>

            <div class="relative w-24 h-24 mb-8 z-10 animate-float">
                <div class="absolute inset-0 bg-rose-500/10 rounded-full blur-xl animate-pulse"></div>
                <div class="relative w-full h-full bg-white rounded-2xl flex items-center justify-center text-rose-500 text-4xl shadow-2xl shadow-rose-200/50 border border-white">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
            </div>

            <h3 class="font-bold text-slate-800 text-lg mb-2 tracking-wide" id="loadingText">分析播放数据...</h3>
            <div class="flex items-center gap-2 px-3 py-1 bg-white/50 rounded-full border border-white/60">
                <div class="w-1.5 h-1.5 bg-rose-500 rounded-full animate-pulse"></div>
                <p class="text-[10px] text-slate-500 font-mono" id="loadingSubText">正在检测异常节点...</p>
            </div>
        </div>
    </div>

    <!-- 4. Result Dashboard -->
    <div id="resultSection" class="hidden space-y-5">

        <!-- User Info Card -->
        <div class="glass-panel p-5 rounded-3xl animate-enter-up relative overflow-hidden">
            <div class="absolute right-0 top-0 w-32 h-full bg-gradient-to-l from-rose-50/50 to-transparent"></div>
            <div class="flex items-center gap-4 relative z-10">
                <div class="relative">
                    <img id="userAvatar" src="" class="relative w-16 h-16 rounded-full border-2 border-white shadow-md object-cover">
                    <div class="absolute bottom-0 right-0 w-4 h-4 bg-green-500 rounded-full border-[3px] border-white flex items-center justify-center">
                        <i class="fa-solid fa-check text-[6px] text-white"></i>
                    </div>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start mb-1">
                        <div>
                            <h3 class="font-extrabold text-slate-800 text-lg truncate tracking-tight" id="userName">--</h3>
                            <p class="text-[10px] text-slate-400 font-mono">ID: <span id="userId">--</span></p>
                        </div>
                        <div class="bg-slate-100 text-slate-500 text-[10px] px-2.5 py-1 rounded-lg font-bold">
                            Lv.<span id="userLevel">3</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 text-xs mt-3">
                        <div class="text-center">
                            <span class="block font-bold text-slate-800 text-sm" id="userFans">0</span>
                            <span class="text-slate-400 text-[9px] font-medium">粉丝</span>
                        </div>
                        <div class="w-px h-6 bg-slate-100"></div>
                        <div class="text-center">
                            <span class="block font-bold text-slate-800 text-sm" id="userLikes">0</span>
                            <span class="text-slate-400 text-[9px] font-medium">获赞</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Header -->
        <div class="glass-panel p-1 rounded-3xl animate-enter-up" style="animation-delay: 0.1s;">
            <div class="bg-gradient-to-br from-red-50 via-white to-white p-5 rounded-[20px] border border-white/50 relative overflow-hidden transition-colors duration-500" id="overallStatusCardInner">
                <div class="flex items-center justify-between relative z-10">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse" id="statusDot"></div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">诊断报告</span>
                        </div>
                        <h2 class="text-xl font-black text-slate-800 flex items-center gap-2" id="statusTitle">
                            发现作品卡流
                        </h2>
                        <p class="text-[11px] text-red-500 font-medium mt-1 flex items-center gap-1" id="statusDesc">
                            <i class="fa-solid fa-circle-exclamation"></i>
                            检测到 2 个作品播放量被系统卡主
                        </p>
                    </div>
                    <!-- Health Score Chart -->
                    <div class="text-right">
                        <div class="relative inline-block">
                            <svg class="w-14 h-14 -rotate-90 transform">
                                <circle cx="28" cy="28" r="24" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-100" />
                                <circle cx="28" cy="28" r="24" stroke="currentColor" stroke-width="4" fill="transparent" stroke-dasharray="150" stroke-dashoffset="60" class="text-slate-800 transition-all duration-1000" id="healthCircle" />
                            </svg>
                            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-lg font-black text-slate-800" id="healthScore">55</span>
                        </div>
                        <div class="text-[9px] text-slate-400 font-bold mt-1">账号权重分</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Works Flow List -->
        <div class="animate-enter-up space-y-4" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between px-2">
                <h4 class="text-sm font-extrabold text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-rose-500"></i>
                    卡流作品列表
                </h4>
                <span class="text-[10px] text-slate-400 bg-white/60 px-2.5 py-1 rounded-full border border-white font-medium">
                    请点击 <span class="text-red-500">红色卡片</span> 解除
                </span>
            </div>

            <div id="worksList" class="space-y-3 pb-4">
                <!-- Javascript will inject items here -->
            </div>
        </div>

        <!-- Restart Button -->
        <button onclick="resetApp()" class="w-full py-4 text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors">
            <i class="fa-solid fa-rotate-right mr-1"></i> 检测其他账号
        </button>
    </div>

</main>

<!-- 5. Repair Modal (解除卡流终端) -->
<div id="repairModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-[6px] transition-opacity opacity-0" id="repairBackdrop"></div>

    <!-- Modal Content -->
    <div class="bg-white/95 backdrop-blur-xl w-full max-w-sm rounded-[32px] overflow-hidden transform scale-95 transition-all duration-300 relative z-10 shadow-2xl shadow-rose-500/20 opacity-0 border border-white/50" id="repairContent">

        <!-- Header -->
        <div class="bg-slate-50/50 px-6 py-5 flex items-center justify-between border-b border-slate-100">
            <div>
                <h3 class="font-extrabold text-slate-800 text-lg">卡流解除终端</h3>
                <p class="text-[10px] text-slate-400 font-medium">TRAFFIC UNBLOCK SYSTEM</p>
            </div>
            <button onclick="closeRepairModal()" class="w-8 h-8 rounded-full bg-white border border-slate-200 text-slate-400 flex items-center justify-center text-sm hover:bg-slate-50 hover:text-slate-600 transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6">
            <div class="flex gap-4 mb-6 p-1">
                <div class="relative w-16 h-20 flex-shrink-0">
                    <img id="repairImg" src="" class="w-full h-full object-cover rounded-xl shadow-md border border-white">
                    <div class="absolute -bottom-2 -right-2 bg-red-100 text-red-600 text-[10px] p-1 rounded-md border border-red-200 shadow-sm">
                        <i class="fa-solid fa-ban"></i>
                    </div>
                </div>
                <div class="flex-1 min-w-0 flex flex-col justify-center">
                    <div class="text-slate-800 font-bold mb-1 truncate text-sm" id="repairTitle">Title</div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="status-badge status-badge-stuck px-2 py-0.5 text-[9px]">
                            播放量卡顿
                        </span>
                    </div>
                    <div class="text-[10px] text-slate-400 font-mono">发布时间: <span id="repairDate">--</span></div>
                </div>
            </div>

            <!-- Console Output -->
            <div class="bg-slate-50 rounded-2xl p-4 h-36 overflow-y-auto custom-scroll mb-6 border border-slate-100/80 shadow-inner" id="consoleOutput">
                <div class="log-line text-[10px] text-slate-400">
                    <span class="text-rose-400 mr-2">●</span>等待指令...
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-slate-100 h-2.5 rounded-full mb-6 overflow-hidden border border-slate-200/50">
                <div id="repairProgressBar" class="h-full bg-gradient-to-r from-rose-500 via-orange-500 to-rose-500 w-0 transition-all duration-300 rounded-full relative overflow-hidden">
                    <div class="absolute inset-0 bg-white/20 animate-[shimmer_1s_infinite]"></div>
                </div>
            </div>

            <button id="repairActionBtn" onclick="runRepairProcess()" class="w-full h-12 bg-slate-900 hover:bg-black text-white font-bold rounded-2xl shadow-xl shadow-slate-200 transition-all flex items-center justify-center gap-2 text-sm group">
                <i class="fa-solid fa-hammer group-hover:rotate-12 transition-transform"></i>
                立即解除卡流
            </button>
            <button id="closeRepairBtn" onclick="closeRepairModal()" class="w-full h-12 bg-green-50 text-green-600 font-bold rounded-2xl hover:bg-green-100 text-sm hidden border border-green-100 transition-colors">
                完成 (播放量恢复中)
            </button>
        </div>
    </div>
</div>

<script>
    // State
    let currentRepairId = null;

    // UI References
    const inputSection = document.getElementById('inputSection');
    const loadingSection = document.getElementById('loadingSection');
    const resultSection = document.getElementById('resultSection');
    const urlInput = document.getElementById('urlInput');
    const worksList = document.getElementById('worksList');

    // Repair Modal
    const repairModal = document.getElementById('repairModal');
    const repairBackdrop = document.getElementById('repairBackdrop');
    const repairContent = document.getElementById('repairContent');
    const consoleOutput = document.getElementById('consoleOutput');
    const repairProgressBar = document.getElementById('repairProgressBar');
    const repairActionBtn = document.getElementById('repairActionBtn');
    const closeRepairBtn = document.getElementById('closeRepairBtn');

    async function pasteText() {
        try {
            const text = await navigator.clipboard.readText();
            urlInput.value = text;
        } catch (err) {
            alert('请手动粘贴');
        }
    }

    function startAnalysis() {
        const val = urlInput.value.trim();
        if (!val) {
            urlInput.parentElement.parentElement.classList.add('translate-x-[-5px]');
            setTimeout(() => urlInput.parentElement.parentElement.classList.remove('translate-x-[-5px]'), 100);
            setTimeout(() => urlInput.parentElement.parentElement.classList.add('translate-x-[5px]'), 200);
            setTimeout(() => urlInput.parentElement.parentElement.classList.remove('translate-x-[5px]'), 300);
            return;
        }

        inputSection.classList.add('hidden');
        loadingSection.classList.remove('hidden');

        // Loading Logs
        const logText = document.getElementById('loadingText');
        const subText = document.getElementById('loadingSubText');
        const steps = [
            { t: "获取作品播放数据...", s: "连接数据中心 [CN-Public]..." },
            { t: "分析播放曲线...", s: "识别 0 播放/低播放作品..." },
            { t: "检测账号权重...", s: "正在比对同赛道基准值..." },
            { t: "扫描限流标签...", s: "深度检测系统隐形降权..." },
            { t: "生成卡流报告...", s: "AI 正在计算疏通方案..." }
        ];

        let i = 0;
        const interval = setInterval(() => {
            if(i < steps.length) {
                logText.innerText = steps[i].t;
                subText.innerText = steps[i].s;
                i++;
            } else {
                clearInterval(interval);
                renderResults();
            }
        }, 600);
    }

    function renderResults() {
        loadingSection.classList.add('hidden');
        resultSection.classList.remove('hidden');

        // Populate User Info (Mock Data)
        const mockName = "抖音用户_" + Math.floor(Math.random() * 9999);
        document.getElementById('userName').innerText = mockName;
        document.getElementById('userId').innerText = Math.floor(Math.random() * 89999999 + 10000000);
        document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${mockName}&background=f43f5e&color=fff&size=128`;
        document.getElementById('userFans').innerText = (Math.random() * 10 + 0.1).toFixed(1) + 'w';
        document.getElementById('userLikes').innerText = (Math.random() * 50 + 10).toFixed(1) + 'w';
        document.getElementById('userLevel').innerText = Math.floor(Math.random() * 3 + 2);

        // Generate mock works
        worksList.innerHTML = '';
        const works = [
            { id: 1, title: "为什么这条视频没有播放量？", views: 12, date: "1小时前", status: "stuck", reason: "0播放/审核卡顿" },
            { id: 2, title: "日常分享一下", views: 12500, date: "昨天", status: "normal", reason: "流量正常" },
            { id: 3, title: "这个特效太好玩了！", views: 45, date: "2天前", status: "stuck", reason: "低播放/疑似搬运" },
            { id: 4, title: "家人们谁懂啊...", views: 54000, date: "3天前", status: "normal", reason: "流量正常" },
            { id: 5, title: "挑战一分钟不眨眼", views: 105, date: "4天前", status: "stuck", reason: "推荐流量卡死" },
        ];

        works.forEach((work, index) => {
            const isStuck = work.status === "stuck";
            const div = document.createElement('div');
            const img = `https://picsum.photos/seed/${work.id + 55}/200/260`;

            div.className = `glass-panel p-3 rounded-2xl flex gap-4 transition-all duration-500 opacity-0 animate-enter-up hover:scale-[1.02] cursor-default`;
            div.style.animationDelay = `${index * 0.1}s`;
            div.id = `work-card-${work.id}`;

            if(isStuck) {
                div.style.borderColor = "rgba(254, 202, 202, 0.6)";
                div.style.backgroundColor = "rgba(254, 242, 242, 0.4)";
            }

            div.innerHTML = `
                <div class="relative w-[70px] h-[90px] flex-shrink-0 rounded-xl overflow-hidden shadow-sm group border border-white">
                    <img src="${img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    ${isStuck ? '<div class="absolute inset-0 bg-red-500/10 mix-blend-overlay"></div>' : ''}
                </div>

                <div class="flex-1 min-w-0 flex flex-col justify-between py-0.5">
                    <div>
                        <div class="text-sm font-bold text-slate-800 truncate leading-tight mb-1">${work.title}</div>
                        <div class="text-[10px] text-slate-400 font-medium flex items-center gap-2">
                            <span>${work.date}</span>
                            <span class="w-0.5 h-0.5 bg-slate-300 rounded-full"></span>
                            <span class="${isStuck ? 'text-red-500 font-bold' : ''}">${work.views} 播放</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mt-2">
                        <div class="status-badge ${getStatusClasses(work.status)}" id="status-badge-${work.id}">
                            ${isStuck ? `<i class="fa-solid fa-triangle-exclamation mr-1.5"></i>${work.reason}` : '<i class="fa-solid fa-check mr-1.5"></i>推流正常'}
                        </div>

                        ${isStuck ? `
                        <button onclick="openRepairModal(${work.id}, '${work.title}', '${img}', '${work.date}')" class="text-[10px] bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg shadow-md hover:shadow-lg transition-all font-bold flex items-center gap-1 active:scale-95">
                            <i class="fa-solid fa-bolt"></i> 解除
                        </button>` : ''}
                    </div>
                </div>
            `;
            worksList.appendChild(div);
        });
    }

    function getStatusClasses(status) {
        if(status === 'stuck') return 'status-badge-stuck';
        if(status === 'normal') return 'status-badge-normal';
        return '';
    }

    // --- Repair Logic ---

    function openRepairModal(id, title, img, date) {
        currentRepairId = id;

        document.getElementById('repairTitle').innerText = title;
        document.getElementById('repairImg').src = img;
        document.getElementById('repairDate').innerText = date;
        consoleOutput.innerHTML = '<div class="log-line text-[10px] text-slate-400"><span class="text-rose-400 mr-2">●</span>系统初始化完成...</div>';
        repairProgressBar.style.width = '0%';
        repairActionBtn.classList.remove('hidden');
        closeRepairBtn.classList.add('hidden');
        repairActionBtn.disabled = false;
        repairActionBtn.innerHTML = '<i class="fa-solid fa-hammer group-hover:rotate-12 transition-transform"></i> 立即解除卡流';
        repairActionBtn.classList.add('bg-slate-900', 'text-white', 'hover:bg-black', 'shadow-xl');
        repairActionBtn.classList.remove('bg-slate-100', 'text-slate-400', 'cursor-not-allowed', 'shadow-none');

        repairModal.classList.remove('hidden');
        setTimeout(() => {
            repairBackdrop.classList.remove('opacity-0');
            repairContent.classList.remove('opacity-0', 'scale-95');
            repairContent.classList.add('scale-100');
        }, 10);
    }

    function closeRepairModal() {
        repairBackdrop.classList.add('opacity-0');
        repairContent.classList.remove('scale-100');
        repairContent.classList.add('opacity-0', 'scale-95');
        setTimeout(() => {
            repairModal.classList.add('hidden');
        }, 300);
    }

    function runRepairProcess() {
        const btn = document.getElementById('repairActionBtn');
        btn.disabled = true;
        btn.classList.remove('bg-slate-900', 'text-white', 'hover:bg-black', 'shadow-xl');
        btn.classList.add('bg-slate-100', 'text-slate-400', 'cursor-not-allowed', 'shadow-none');
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 正在疏通...';

        const logs = [
            { msg: "诊断播放量停滞原因...", t: 500 },
            { msg: "检测到推流通道存在异常拥堵...", t: 1500 },
            { msg: "尝试重置作品推荐权重...", t: 2500 },
            { msg: "向系统提交二次加热申请...", t: 3500 },
            { msg: "注入激活流量包 (Re-Push)...", t: 4500 },
            { msg: "<span class='text-emerald-600 font-bold'>✓ 成功：卡流已解除，推流恢复中。</span>", t: 5500 }
        ];

        let totalTime = 5500;
        setTimeout(() => repairProgressBar.style.width = '100%', 100);

        logs.forEach(log => {
            setTimeout(() => {
                const line = document.createElement('div');
                line.className = "log-line text-[10px] text-slate-600 animate-enter-up";
                line.innerHTML = `<span class="text-rose-400 mr-2">></span>${log.msg}`;
                consoleOutput.appendChild(line);
                consoleOutput.scrollTop = consoleOutput.scrollHeight;
            }, log.t);
        });

        setTimeout(() => {
            repairActionBtn.classList.add('hidden');
            closeRepairBtn.classList.remove('hidden');
            updateCardStatus(currentRepairId);
        }, totalTime);
    }

    function updateCardStatus(id) {
        const card = document.getElementById(`work-card-${id}`);
        const badge = document.getElementById(`status-badge-${id}`);
        const btn = card.querySelector('button');

        if(card) {
            card.style.borderColor = "rgba(187, 247, 208, 0.6)";
            card.style.backgroundColor = "rgba(240, 253, 244, 0.4)";

            badge.className = "status-badge status-badge-fixing";
            badge.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i>播放量恢复中';

            if(btn) {
                btn.style.opacity = '0';
                setTimeout(() => btn.remove(), 300);
            }
        }

        const scoreEl = document.getElementById('healthScore');
        let score = parseInt(scoreEl.innerText);
        animateValue(scoreEl, score, 85, 1000);

        document.getElementById('statusTitle').innerHTML = "正在恢复权重";
        document.getElementById('statusTitle').classList.add('text-emerald-600');
        document.getElementById('statusDot').classList.replace('bg-red-500', 'bg-emerald-500');
        document.getElementById('statusDesc').innerHTML = '<i class="fa-solid fa-chart-line"></i> 播放量正在回升，预计24h内恢复';
        document.getElementById('statusDesc').classList.replace('text-red-500', 'text-emerald-500');
        document.getElementById('overallStatusCardInner').classList.remove('from-red-50');
        document.getElementById('overallStatusCardInner').classList.add('from-emerald-50');

        const circle = document.getElementById('healthCircle');
        circle.classList.remove('text-slate-800');
        circle.classList.add('text-emerald-500');
        circle.setAttribute('stroke-dashoffset', '30');
    }

    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function resetApp() {
        resultSection.classList.add('hidden');
        urlInput.value = '';
        inputSection.classList.remove('hidden');
    }
</script>
</body>
