<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>开通会员 - 尊享特权</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
            mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          animation: {
            'enter-up': 'enterUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-glow': 'pulseGlow 2s infinite',
            'shimmer': 'shimmer 2.5s infinite linear',
          },
          keyframes: {
            enterUp: {
              '0%': { opacity: '0', transform: 'translateY(20px) scale(0.98)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 15px rgba(0,0,0,0.05)' },
              '50%': { boxShadow: '0 0 25px rgba(251, 191, 36, 0.2)' },
            },
            shimmer: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' }
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 100px; /* Space for bottom action bar */
    }

    /* 玻璃拟态容器 */
    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
    }

    /* 选中的套餐样式 */
    .plan-card.active {
      background: linear-gradient(to bottom right, #fffbeb, #fff);
      border-color: #f59e0b;
      box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15);
    }

    .plan-card.active .check-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* 黑金卡片 */
    .vip-card-dark {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      position: relative;
      overflow: hidden;
    }

    /* 流光效果 */
    .shimmer-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .shimmer-line {
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
      transform: skewX(-20deg);
      position: absolute;
      animation: shimmer 3s infinite;
    }

    .text-gold-gradient {
      background: linear-gradient(to right, #fcd34d, #fbbf24, #d97706);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-amber-100">

<!-- 背景装饰 (保持与个人中心一致) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
  <div class="absolute top-[-10%] left-[-10%] w-[80vw] h-[80vw] rounded-full bg-amber-200/10 blur-3xl animate-pulse-glow"></div>
  <div class="absolute bottom-[-10%] right-[-20%] w-[100vw] h-[100vw] rounded-full bg-blue-500/5 blur-3xl"></div>
</div>

<!-- 1. Header -->
<header class="w-full max-w-md sticky top-0 z-50 glass-panel border-b border-slate-200/50">
  <div class="px-5 h-14 flex items-center justify-between">
    <div class="w-8 h-8 rounded-full flex items-center justify-center text-slate-600 active:bg-slate-100 transition-colors cursor-pointer" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i>
    </div>
    <h1 class="font-bold text-slate-800 tracking-tight text-lg">开通会员</h1>
    <div class="w-8 h-8"></div> <!-- 占位保持标题居中 -->
  </div>
</header>

<main class="w-full max-w-md flex-1 p-5 flex flex-col gap-6">

  <!-- 2. Hero VIP Card Preview -->
  <div class="animate-enter-up">
    <div class="vip-card-dark rounded-2xl p-6 text-white shadow-xl shadow-slate-300/50 border border-slate-700/50 relative group">
      <!-- 装饰流光 -->
      <div class="shimmer-wrapper">
        <div class="shimmer-line"></div>
      </div>

      <!-- 卡片内容 -->
      <div class="relative z-10 flex justify-between items-start">
        <div>
          <div class="flex items-center gap-2 mb-2">
            <i class="fa-solid fa-crown text-amber-400 text-xl"></i>
            <span class="text-gold-gradient font-black text-2xl italic tracking-wide">PRO MEMBER</span>
          </div>
          <p class="text-slate-400 text-xs font-medium">解锁高阶权重隐形分查询权限</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-amber-300 to-yellow-600 flex items-center justify-center shadow-lg shadow-amber-500/20">
          <i class="fa-solid fa-gem text-white"></i>
        </div>
      </div>

      <div class="relative z-10 mt-8 flex items-end justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full border border-white/20 overflow-hidden bg-slate-800">
            <img src="https://ui-avatars.com/api/?name=User&background=0f172a&color=fcd34d" class="w-full h-full object-cover">
          </div>
          <div class="text-xs text-slate-300">
            <div>当前账户</div>
            <div class="font-mono text-white font-bold">Guest_9527</div>
          </div>
        </div>
        <div class="text-[10px] text-amber-200/80 bg-white/10 px-2 py-1 rounded backdrop-blur-sm border border-white/5">
          未开通
        </div>
      </div>
    </div>
  </div>

  <!-- 3. Rights / Benefits Grid -->
  <div class="glass-panel rounded-2xl p-5 animate-enter-up" style="animation-delay: 0.1s;">
    <h3 class="font-bold text-slate-800 mb-4 text-sm flex items-center gap-2">
      <i class="fa-solid fa-star text-amber-500"></i> 会员尊享权益
    </h3>
    <div class="grid grid-cols-4 gap-4">
      <div class="flex flex-col items-center gap-2 text-center group">
        <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-lg shadow-sm group-hover:scale-110 transition-transform duration-300">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <span class="text-[10px] font-medium text-slate-600">极速报告</span>
      </div>
      <div class="flex flex-col items-center gap-2 text-center group">
        <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center text-lg shadow-sm group-hover:scale-110 transition-transform duration-300">
          <i class="fa-solid fa-magnifying-glass-chart"></i>
        </div>
        <span class="text-[10px] font-medium text-slate-600">深度分析</span>
      </div>
      <div class="flex flex-col items-center gap-2 text-center group">
        <div class="w-10 h-10 rounded-xl bg-purple-50 text-purple-500 flex items-center justify-center text-lg shadow-sm group-hover:scale-110 transition-transform duration-300">
          <i class="fa-solid fa-eye"></i>
        </div>
        <span class="text-[10px] font-medium text-slate-600">监控追踪</span>
      </div>
      <div class="flex flex-col items-center gap-2 text-center group">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg shadow-sm group-hover:scale-110 transition-transform duration-300">
          <i class="fa-solid fa-headset"></i>
        </div>
        <span class="text-[10px] font-medium text-slate-600">专属客服</span>
      </div>
    </div>
  </div>

  <!-- 4. Pricing Plans -->
  <div class="animate-enter-up space-y-3" style="animation-delay: 0.2s;">
    <h3 class="font-bold text-slate-800 px-1 text-sm">选择套餐</h3>

    <!-- Plan 1: Weekly -->
    <div onclick="selectPlan(this, 9.9, '周卡')" class="plan-card glass-panel rounded-xl p-4 relative cursor-pointer border-2 border-transparent transition-all duration-300 group hover:shadow-md">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center check-circle transition-colors">
            <div class="w-2.5 h-2.5 rounded-full bg-white opacity-0 check-dot transition-opacity"></div>
          </div>
          <div>
            <div class="font-bold text-slate-800">体验周卡</div>
            <div class="text-[10px] text-gray-400">有效期 7 天</div>
          </div>
        </div>
        <div class="text-right">
          <div class="text-lg font-black text-slate-800">¥9.9</div>
          <div class="text-[10px] text-gray-400 line-through">¥19.9</div>
        </div>
      </div>
    </div>

    <!-- Plan 2: Yearly (Recommended) - ACTIVE DEFAULT -->
    <div onclick="selectPlan(this, 168, '年卡')" class="plan-card active glass-panel rounded-xl p-4 relative cursor-pointer border-2 border-transparent transition-all duration-300 group hover:shadow-md overflow-hidden">
      <!-- Tag -->
      <div class="absolute top-0 left-0 bg-gradient-to-r from-red-500 to-pink-500 text-white text-[10px] font-bold px-2 py-1 rounded-br-lg shadow-sm z-10">
        超值推荐
      </div>

      <div class="flex items-center justify-between relative z-10 pl-2">
        <div class="flex items-center gap-3">
          <div class="w-5 h-5 rounded-full border-2 border-amber-500 bg-amber-500 flex items-center justify-center check-circle transition-colors">
            <div class="w-2.5 h-2.5 rounded-full bg-white opacity-100 check-dot transition-opacity"></div>
          </div>
          <div>
            <div class="font-bold text-slate-800 flex items-center gap-2">
              尊享年卡
              <span class="text-[9px] text-amber-600 bg-amber-100 px-1.5 rounded border border-amber-200">省 ¥70</span>
            </div>
            <div class="text-[10px] text-gray-400">有效期 365 天 · 平均 ¥0.4/天</div>
          </div>
        </div>
        <div class="text-right">
          <div class="text-2xl font-black text-amber-600">¥168</div>
          <div class="text-xs text-gray-400 line-through">¥238</div>
        </div>
      </div>
    </div>

    <!-- Plan 3: Monthly -->
    <div onclick="selectPlan(this, 29, '月卡')" class="plan-card glass-panel rounded-xl p-4 relative cursor-pointer border-2 border-transparent transition-all duration-300 group hover:shadow-md">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center check-circle transition-colors">
            <div class="w-2.5 h-2.5 rounded-full bg-white opacity-0 check-dot transition-opacity"></div>
          </div>
          <div>
            <div class="font-bold text-slate-800">超值月卡</div>
            <div class="text-[10px] text-gray-400">有效期 30 天</div>
          </div>
        </div>
        <div class="text-right">
          <div class="text-lg font-black text-slate-800">¥29</div>
          <div class="text-[10px] text-gray-400 line-through">¥49</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 5. Payment Method -->
  <div class="animate-enter-up glass-panel rounded-2xl p-4" style="animation-delay: 0.25s;">
    <h3 class="font-bold text-slate-800 mb-3 text-sm">支付方式</h3>
    <div class="flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
      <div class="flex items-center gap-3">
        <i class="fa-brands fa-weixin text-green-500 text-xl"></i>
        <span class="text-sm font-medium">微信支付</span>
      </div>
      <i class="fa-solid fa-circle-check text-blue-500"></i>
    </div>
  </div>

  <p class="text-[10px] text-center text-gray-400 mt-2 pb-5">
    点击支付即代表您同意《会员服务协议》<br>虚拟商品售出后不支持退款
  </p>

</main>

<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t border-slate-200 z-40 pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
  <div class="px-5 py-3 flex items-center justify-between">
    <div>
      <div class="text-[10px] text-gray-400 mb-0.5">实付金额</div>
      <div class="text-2xl font-black text-slate-800 leading-none">
        <span class="text-sm">¥</span><span id="displayPrice">168</span>
      </div>
    </div>
    <button onclick="processPayment()" id="payBtn" class="w-40 h-11 bg-gradient-to-r from-slate-800 to-black text-white rounded-full font-bold shadow-lg shadow-slate-300 active:scale-95 transition-transform flex items-center justify-center gap-2">
      <span class="btn-text">立即开通</span>
    </button>
  </div>
</div>

<script>
  let currentPrice = 168;
  let currentPlanName = '年卡';

  function selectPlan(element, price, name) {
    // 1. Reset all cards
    document.querySelectorAll('.plan-card').forEach(card => {
      card.classList.remove('active');
      card.classList.remove('border-amber-500'); // Remove fallback border if needed

      // Reset radio circle style
      const circle = card.querySelector('.check-circle');
      const dot = card.querySelector('.check-dot');

      circle.classList.remove('bg-amber-500', 'border-amber-500');
      circle.classList.add('border-slate-300');
      dot.classList.remove('opacity-100');
      dot.classList.add('opacity-0');
    });

    // 2. Activate clicked card
    element.classList.add('active');

    const activeCircle = element.querySelector('.check-circle');
    const activeDot = element.querySelector('.check-dot');

    activeCircle.classList.remove('border-slate-300');
    activeCircle.classList.add('bg-amber-500', 'border-amber-500');
    activeDot.classList.remove('opacity-0');
    activeDot.classList.add('opacity-100');

    // 3. Update State
    currentPrice = price;
    currentPlanName = name;

    // 4. Update UI Price with animation
    const priceEl = document.getElementById('displayPrice');
    animateValue(priceEl, parseFloat(priceEl.innerText), price, 300);
  }

  function processPayment() {
    const btn = document.getElementById('payBtn');
    const originalContent = btn.innerHTML;

    // Loading state
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> 处理中`;
    btn.classList.add('opacity-80');

    setTimeout(() => {
      alert(`支付成功！\n\n已为您开通：${currentPlanName}\n实付金额：¥${currentPrice}`);
      btn.disabled = false;
      btn.innerHTML = originalContent;
      btn.classList.remove('opacity-80');

      // Redirect logic would go here
      // window.location.href = 'user_center.html';
    }, 1500);
  }

  // Helper for number animation
  function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      // Handle float visualization
      const val = (progress * (end - start) + start).toFixed(1);
      // Remove .0 if it's an integer
      obj.innerHTML = val.endsWith('.0') ? parseInt(val) : val;

      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }
</script>
</body>
</html>
