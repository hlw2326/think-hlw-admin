<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>关注公众号</title>
  <!-- 引入 Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- 引入 FontAwesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* --- 全局重置与变量 --- */
    :root {
      --primary-color: #10b981; /* 更纯粹的绿色 */
      --bg-page: #f8fafc;
      --bg-card: #ffffff;
      --border-color: #e2e8f0;
      --text-primary: #334155;
      --text-secondary: #64748b;
      --safe-area-inset-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-page);
      color: var(--text-primary);
      font-size: 14px;
      overflow-x: hidden;
    }

    /* 容器 */
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background-color: var(--bg-page);
      position: relative;
      /* 扁平化移除外部阴影 */
      box-shadow: none;
      border-left: 1px solid #f1f5f9;
      border-right: 1px solid #f1f5f9;
    }

    /* --- Header (扁平化) --- */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      /* 移除毛玻璃，改用实色和边框 */
      backdrop-filter: none;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 16px;
      color: var(--text-primary);
    }
    .back-btn {
      position: absolute;
      left: 12px;
      padding: 8px;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-primary);
    }

    /* --- 主内容区 --- */
    .content-wrapper {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: calc(20px + var(--safe-area-inset-bottom));
    }

    /* --- 通用卡片样式 (扁平化) --- */
    .card {
      background: var(--bg-card);
      border-radius: 8px; /* 减小圆角 */
      /* 移除阴影，增加边框 */
      box-shadow: none;
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    /* --- 2. Hero Card --- */
    .hero-card {
      padding: 0;
    }

    .hero-content {
      padding: 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hero-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .icon-box {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-box.bg-green-light {
      background: #ecfdf5; /* 极淡的绿色背景 */
      border: 1px solid #d1fae5;
    }

    .text-green {
      color: var(--primary-color);
      font-size: 32px;
    }

    .hero-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hero-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--text-primary);
    }

    .hero-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .points-badge {
      background: #fff7ed;
      border: 1px solid #ffedd5;
      color: #ff6600; /* 已调整：更加鲜亮的橙色 */
      padding: 6px 12px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.2;
    }

    .badge-val {
      font-size: 16px;
      font-weight: 800;
    }

    .badge-unit {
      font-size: 10px;
      font-weight: 600;
    }

    .dashed-line {
      height: 1px;
      background: var(--border-color);
      margin: 0;
    }

    .hero-tips {
      padding: 12px 20px;
      background: #f8fafc;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border-color);
    }

    /* --- 通用标题 --- */
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      padding-left: 4px;
      border-left: 3px solid var(--primary-color); /* 左侧强调线 */
      line-height: 1;
    }

    .recommend-tag {
      font-size: 10px;
      background: var(--primary-color);
      color: white;
      padding: 3px 6px;
      border-radius: 4px;
      box-shadow: none; /* 移除阴影 */
      font-weight: normal;
    }

    /* --- 3. QR Card --- */
    .qr-card {
      padding: 20px;
    }

    .qr-main-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 5px;
    }

    .qr-container {
      position: relative;
      width: 180px;
      height: 180px;
      padding: 8px;
      background: white;
      border-radius: 4px;
      border: 1px solid var(--border-color); /* 边框替代阴影 */
      box-shadow: none;
      margin-bottom: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    .qr-img {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: auto;
    }

    /* 四角装饰 (简化为平角) */
    .corner {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 3px solid var(--primary-color);
      z-index: 2;
      pointer-events: none;
    }
    .top-left { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .top-right { top: -1px; right: -1px; border-left: none; border-bottom: none; }
    .bottom-left { bottom: -1px; left: -1px; border-right: none; border-top: none; }
    .bottom-right { bottom: -1px; right: -1px; border-left: none; border-top: none; }

    /* 扫描线动画 (改为纯色线条) */
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px; /* 变细 */
      background: var(--primary-color);
      box-shadow: 0 0 4px var(--primary-color);
      animation: scan 2.5s infinite linear;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .qr-guide-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      text-align: center;
    }

    .highlight-text {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 600;
    }

    .sub-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .save-btn {
      background: white;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
      font-size: 14px;
      font-weight: 600;
      padding: 0 32px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px; /* 小圆角 */
      box-shadow: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-btn:active {
      background: #f0fdf4;
      transform: translateY(1px);
    }
    .save-btn i {
      margin-right: 8px;
    }

    /* --- 4. Action Card --- */
    .action-card {
      padding: 20px;
    }

    .search-method-row {
      background: #f8fafc;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .left-info {
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .mini-copy-btn {
      background: white;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .mini-copy-btn:active {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .sub-tip {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }

    /* --- 5. Exchange Card --- */
    .exchange-card {
      padding: 20px;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      height: 44px;
    }

    .custom-input {
      flex: 1;
      height: 100%;
      background: #f8fafc;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 0 16px;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
      /* 扁平风格：移除默认样式 */
      appearance: none;
    }

    .custom-input:focus {
      background: white;
      border-color: var(--primary-color);
    }

    .redeem-btn {
      width: 80px;
      height: 100%;
      background: #e2e8f0;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      border: none;
      cursor: not-allowed;
      transition: all 0.2s;
    }

    .redeem-btn.active {
      background: var(--text-primary);
      color: white;
      box-shadow: none; /* 移除阴影 */
      cursor: pointer;
    }
    .redeem-btn.active:active {
      opacity: 0.9;
    }

    /* --- Toast Component Style (扁平化) --- */
    .toast-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(30, 41, 59, 0.95); /* 深色背景 */
      color: white;
      padding: 16px 24px;
      border-radius: 6px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 140px;
      box-shadow: none;
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header class="app-header">
    <div class="back-btn"><i class="fas fa-arrow-left"></i></div>
    <span>关注公众号</span>
  </header>

  <!-- 主内容区 (移除背景 blob) -->
  <div class="content-wrapper">

    <!-- 2. 头部引导 -->
    <div class="card hero-card">
      <div class="hero-content">
        <div class="hero-left">
          <div class="icon-box bg-green-light">
            <i class="fab fa-weixin text-green"></i>
          </div>
          <div class="hero-info">
            <span class="hero-title">全网数据助手</span>
            <span class="hero-desc">关注即可获取实时监控通知</span>
          </div>
        </div>
        <div class="points-badge">
          <span class="badge-val">+100</span>
          <span class="badge-unit">积分</span>
        </div>
      </div>
      <!-- 实线分割 -->
      <div class="dashed-line"></div>
      <div class="hero-tips">
        <i class="fas fa-info-circle"></i>
        <span>完成关注后回复“领积分”获取兑换码</span>
      </div>
    </div>

    <!-- 3. 二维码 (推荐方式) -->
    <div class="card qr-card">
      <div class="section-title">
        <span>方式一：扫码关注</span>
        <span class="recommend-tag">推荐</span>
      </div>

      <div class="qr-main-area">
        <div class="qr-container">
          <!-- 扫描线 -->
          <div class="scan-line"></div>
          <!-- 四角装饰 (平角) -->
          <div class="corner top-left"></div>
          <div class="corner top-right"></div>
          <div class="corner bottom-left"></div>
          <div class="corner bottom-right"></div>

          <!-- 图片 -->
          <img :src="qrImageUrl" class="qr-img" alt="公众号二维码" />
        </div>

        <div class="qr-guide-text">
          <span class="highlight-text">长按识别上方二维码</span>
          <span class="sub-text">若无法识别，请保存图片后扫一扫</span>
        </div>

        <button class="save-btn" @click="saveQrCode">
          <i class="fas fa-download"></i> 保存二维码
        </button>
      </div>
    </div>

    <!-- 4. 搜索关注 -->
    <div class="card action-card">
      <div class="section-title">
        <span>方式二：搜索关注</span>
      </div>

      <div class="search-method-row">
        <div class="left-info">
          <span class="label">公众号ID</span>
          <span class="value">{{ oaId }}</span>
        </div>
        <button class="mini-copy-btn" @click="copyId">复制 ID</button>
      </div>

      <div class="sub-tip">
        复制ID后，打开微信搜索并关注
      </div>
    </div>

    <!-- 5. 兑换输入框 -->
    <div class="card exchange-card">
      <div class="section-title">
        <span>奖励兑换</span>
      </div>
      <div class="input-wrapper">
        <input type="text"
               v-model="redeemCode"
               placeholder="输入兑换码 (如: VIP888)"
               class="custom-input" />
        <button class="redeem-btn"
                :class="{ active: redeemCode }"
                @click="handleRedeem">兑换
        </button>
      </div>
    </div>
  </div>

  <!-- Toast 弹窗 -->
  <transition name="fade">
    <div v-if="toast.show" class="toast-wrapper">
      <i v-if="toast.icon === 'success'" class="fas fa-check"></i>
      <i v-else-if="toast.icon === 'error'" class="fas fa-times"></i>
      <div v-else class="fas fa-spinner fa-spin"></div>
      <span>{{ toast.title }}</span>
    </div>
  </transition>
</div>

<script>
  const { createApp, ref, reactive } = Vue;

  createApp({
    setup() {
      const oaId = ref('DataHelperPro');
      const redeemCode = ref('');
      const qrImageUrl = ref('https://ui-avatars.com/api/?name=QR&background=ffffff&color=10b981&size=400&font-size=0.3&length=2');

      const toast = reactive({
        show: false,
        title: '',
        icon: 'none'
      });

      const showToast = ({ title, icon = 'none', duration = 1500 }) => {
        toast.title = title;
        toast.icon = icon;
        toast.show = true;
        if (duration > 0) {
          setTimeout(() => {
            toast.show = false;
          }, duration);
        }
      };
      const hideToast = () => { toast.show = false; };

      const copyId = async () => {
        try {
          await navigator.clipboard.writeText(oaId.value);
          showToast({ title: '已复制ID', icon: 'success' });
        } catch (err) {
          const textArea = document.createElement("textarea");
          textArea.value = oaId.value;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand("copy");
          document.body.removeChild(textArea);
          showToast({ title: '已复制ID', icon: 'success' });
        }
      };

      const saveQrCode = () => {
        showToast({ title: '保存中...', icon: 'loading', duration: 0 });
        setTimeout(() => {
          const link = document.createElement('a');
          link.href = qrImageUrl.value;
          link.download = 'qrcode.png';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          hideToast();
          showToast({ title: '下载指令已触发', icon: 'success' });
        }, 800);
      };

      const handleRedeem = () => {
        if (!redeemCode.value) return;
        showToast({ title: '兑换中...', icon: 'loading', duration: 0 });
        setTimeout(() => {
          hideToast();
          if (redeemCode.value.toUpperCase() === 'VIP888') {
            showToast({ title: '兑换成功 +100积分', icon: 'success' });
            redeemCode.value = '';
          } else {
            showToast({ title: '无效兑换码', icon: 'error' });
          }
        }, 1000);
      };

      return {
        oaId,
        redeemCode,
        qrImageUrl,
        copyId,
        saveQrCode,
        handleRedeem,
        toast
      };
    }
  }).mount('#app');
</script>

</body>
</html>
