<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>开通会员 - 交互版</title>

  <!-- UnoCSS Runtime -->
  <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>

  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* 基础设置 */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb; /* gray-50 */
      padding-bottom: 100px;
      -webkit-tap-highlight-color: transparent;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* 简单的过渡效果 */
    .transition-all-200 {
      transition: all 0.2s ease-in-out;
    }
  </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col items-center">

<!-- 1. Header -->
<header class="w-full max-w-md sticky top-0 z-50 bg-white border-b border-gray-100">
  <div class="px-5 h-14 flex items-center justify-between">
    <div class="w-8 h-8 flex items-center justify-center text-gray-600 active:bg-gray-100 rounded-full cursor-pointer">
      <i class="fa-solid fa-arrow-left"></i>
    </div>
    <h1 class="font-bold text-gray-800 text-lg">开通会员</h1>
    <div class="w-8 h-8"></div>
  </div>
</header>

<main class="w-full max-w-md flex-1 p-5 flex flex-col gap-6">

  <!-- 2. VIP Card -->
  <!-- Added border border-gray-800 -->
  <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 text-white relative overflow-hidden shadow-sm">
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-gray-800 rounded-full opacity-50"></div>

    <div class="relative z-10 flex justify-between items-start mb-8">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <i class="fa-solid fa-crown text-amber-400 text-xl"></i>
          <span class="font-bold text-2xl tracking-wide text-amber-400">PRO MEMBER</span>
        </div>
        <p class="text-gray-400 text-xs">解锁高阶权重隐形分查询权限</p>
      </div>
    </div>

    <div class="relative z-10 flex items-end justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-gray-700 overflow-hidden border-2 border-gray-800">
          <img src="https://ui-avatars.com/api/?name=User&background=374151&color=fff" class="w-full h-full object-cover">
        </div>
        <div class="text-sm">
          <div class="text-gray-400 text-xs">当前账户</div>
          <div class="font-bold text-white">Guest_9527</div>
        </div>
      </div>
      <div class="text-xs bg-gray-800 px-3 py-1 rounded text-gray-300">
        未开通
      </div>
    </div>
  </div>

  <!-- 3. Rights Grid -->
  <!-- Changed border-gray-200 to border-gray-300 for clearer outline -->
  <div class="bg-white rounded-xl p-5 border border-gray-300 shadow-sm">
    <h3 class="font-bold text-gray-800 mb-4 text-sm flex items-center gap-2">
      <i class="fa-solid fa-star text-amber-500"></i> 会员权益
    </h3>
    <div class="grid grid-cols-4 gap-2">
      <div class="flex flex-col items-center gap-2 text-center">
        <div class="w-10 h-10 rounded-lg bg-amber-50 text-amber-500 flex items-center justify-center text-lg">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <span class="text-xs text-gray-600">极速报告</span>
      </div>
      <div class="flex flex-col items-center gap-2 text-center">
        <div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center text-lg">
          <i class="fa-solid fa-magnifying-glass-chart"></i>
        </div>
        <span class="text-xs text-gray-600">深度分析</span>
      </div>
      <div class="flex flex-col items-center gap-2 text-center">
        <div class="w-10 h-10 rounded-lg bg-purple-50 text-purple-500 flex items-center justify-center text-lg">
          <i class="fa-solid fa-eye"></i>
        </div>
        <span class="text-xs text-gray-600">监控追踪</span>
      </div>
      <div class="flex flex-col items-center gap-2 text-center">
        <div class="w-10 h-10 rounded-lg bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg">
          <i class="fa-solid fa-headset"></i>
        </div>
        <span class="text-xs text-gray-600">专属客服</span>
      </div>
    </div>
  </div>

  <!-- 4. Pricing Plans (Interactive) -->
  <div class="space-y-3" id="planContainer">
    <h3 class="font-bold text-gray-800 px-1 text-sm">选择套餐</h3>

    <!-- Plan 1: Weekly -->
    <div onclick="selectPlan(this, '9.9')" class="plan-item bg-white border border-gray-300 rounded-xl p-4 flex items-center justify-between cursor-pointer relative overflow-hidden transition-all-200 box-border hover:border-orange-300 shadow-sm">
      <div class="flex items-center gap-3">
        <!-- Radio Circle -->
        <div class="plan-radio w-5 h-5 rounded-full border border-gray-400 flex items-center justify-center transition-all-200">
          <i class="fa-solid fa-check text-white text-xs opacity-0 transform scale-50 transition-all-200"></i>
        </div>
        <div>
          <div class="font-bold text-gray-800 text-sm">体验周卡</div>
          <div class="text-xs text-gray-400">有效期 7 天</div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-lg font-bold text-gray-800">¥9.9</div>
        <div class="text-xs text-gray-400 line-through">¥19.9</div>
      </div>
    </div>

    <!-- Plan 2: Yearly (Default Active) -->
    <div onclick="selectPlan(this, '168')" class="plan-item active bg-orange-50 border border-orange-600 ring-1 ring-orange-200 rounded-xl p-4 flex items-center justify-between relative overflow-hidden cursor-pointer transition-all-200 shadow-sm box-border">
      <div class="absolute top-0 left-0 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-br-lg z-10">
        推荐
      </div>

      <div class="flex items-center gap-3 pl-2">
        <!-- Radio Circle Checked (Solid Orange + White Check) -->
        <div class="plan-radio w-5 h-5 rounded-full border border-orange-600 bg-orange-600 flex items-center justify-center transition-all-200">
          <i class="fa-solid fa-check text-white text-xs opacity-100 transform scale-100 transition-all-200"></i>
        </div>
        <div>
          <div class="font-bold text-gray-900 text-sm flex items-center gap-2">
            尊享年卡
            <span class="text-[10px] text-orange-600 bg-white px-1 rounded border border-orange-200">省 ¥70</span>
          </div>
          <div class="text-xs text-gray-500">有效期 365 天</div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-2xl font-bold text-orange-600">¥168</div>
        <div class="text-xs text-gray-400 line-through">¥238</div>
      </div>
    </div>

    <!-- Plan 3: Monthly -->
    <div onclick="selectPlan(this, '29')" class="plan-item bg-white border border-gray-300 rounded-xl p-4 flex items-center justify-between cursor-pointer relative overflow-hidden transition-all-200 box-border hover:border-orange-300 shadow-sm">
      <div class="flex items-center gap-3">
        <!-- Radio Circle -->
        <div class="plan-radio w-5 h-5 rounded-full border border-gray-400 flex items-center justify-center transition-all-200">
          <i class="fa-solid fa-check text-white text-xs opacity-0 transform scale-50 transition-all-200"></i>
        </div>
        <div>
          <div class="font-bold text-gray-800 text-sm">超值月卡</div>
          <div class="text-xs text-gray-400">有效期 30 天</div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-lg font-bold text-gray-800">¥29</div>
        <div class="text-xs text-gray-400 line-through">¥49</div>
      </div>
    </div>
  </div>

  <!-- 5. Payment Method (Interactive) -->
  <!-- Changed border-gray-200 to border-gray-300 for clearer outline -->
  <div class="bg-white rounded-xl p-4 border border-gray-300 shadow-sm" id="payContainer">
    <h3 class="font-bold text-gray-800 mb-3 text-sm">支付方式</h3>

    <!-- WeChat Pay -->
    <div onclick="selectPayment(this, 'wechat')" class="pay-item active flex items-center justify-between p-3 rounded-lg bg-green-50 border border-green-600 ring-1 ring-green-200 mb-2 cursor-pointer transition-all-200 box-border">
      <div class="flex items-center gap-3">
        <i class="fa-brands fa-weixin text-green-600 text-xl"></i>
        <span class="pay-text text-sm font-bold text-gray-800">微信支付</span>
      </div>
      <i class="pay-icon fa-solid fa-circle-check text-green-600 text-lg"></i>
    </div>

    <!-- Alipay -->
    <div onclick="selectPayment(this, 'alipay')" class="pay-item flex items-center justify-between p-3 rounded-lg border border-transparent hover:bg-gray-50 cursor-pointer transition-all-200 box-border">
      <div class="flex items-center gap-3">
        <i class="fa-brands fa-alipay text-blue-500 text-xl"></i>
        <span class="pay-text text-sm font-medium text-gray-600">支付宝</span>
      </div>
      <i class="pay-icon fa-regular fa-circle text-gray-300 text-lg"></i>
    </div>
  </div>

  <p class="text-[10px] text-center text-gray-400 mt-2">
    点击支付即代表您同意《会员服务协议》<br>虚拟商品售出后不支持退款
  </p>

</main>

<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 z-40 pb-safe">
  <div class="px-5 py-3 flex items-center justify-between">
    <div>
      <div class="text-[10px] text-gray-400">实付金额</div>
      <div class="text-2xl font-bold text-gray-900 leading-none">
        <span class="text-sm">¥</span><span id="displayPrice">168</span>
      </div>
    </div>
    <button onclick="pay()" id="payBtn" class="w-40 h-11 bg-gray-900 text-white rounded-lg font-bold active:opacity-90 flex items-center justify-center transition-all-200 shadow-lg shadow-gray-200">
      立即开通
    </button>
  </div>
</div>

<!-- Logic Script -->
<script>
  function selectPlan(el, price) {
    // 1. Reset Styles for all plans
    const plans = document.querySelectorAll('.plan-item');
    plans.forEach(plan => {
      // Reset Container
      plan.classList.remove('bg-orange-50', 'border', 'border-orange-600', 'ring-1', 'ring-orange-200', 'active');
      plan.classList.add('bg-white', 'border', 'border-gray-300');

      // Reset Radio
      const radio = plan.querySelector('.plan-radio');
      radio.classList.remove('border-orange-600', 'bg-orange-600');
      radio.classList.add('border-gray-400');

      // Reset Checkmark Icon
      const checkIcon = radio.querySelector('i');
      checkIcon.classList.remove('opacity-100', 'scale-100');
      checkIcon.classList.add('opacity-0', 'scale-50');
    });

    // 2. Set Active Style for clicked plan
    el.classList.remove('bg-white', 'border', 'border-gray-300');
    // Add darker border (orange-600) and thinner border (1px default) and thinner ring (ring-1)
    el.classList.add('bg-orange-50', 'border', 'border-orange-600', 'ring-1', 'ring-orange-200', 'active');

    // Set Active Radio (Solid Darker Orange)
    const activeRadio = el.querySelector('.plan-radio');
    activeRadio.classList.remove('border-gray-400');
    activeRadio.classList.add('border-orange-600', 'bg-orange-600');

    // Show Checkmark Icon
    const activeCheckIcon = activeRadio.querySelector('i');
    activeCheckIcon.classList.remove('opacity-0', 'scale-50');
    activeCheckIcon.classList.add('opacity-100', 'scale-100');

    // 3. Update Price
    document.getElementById('displayPrice').innerText = price;
  }

  function selectPayment(el, type) {
    // 1. Reset all payment methods
    const methods = document.querySelectorAll('.pay-item');
    methods.forEach(method => {
      // Reset Container
      method.classList.remove('bg-green-50', 'border', 'border-green-600', 'ring-1', 'ring-green-200', 'bg-blue-50', 'border-blue-600', 'ring-blue-200', 'active');
      method.classList.add('border-transparent', 'hover:bg-gray-50');

      // Reset Text Weight
      const text = method.querySelector('.pay-text');
      text.classList.remove('font-bold', 'text-gray-800');
      text.classList.add('font-medium', 'text-gray-600');

      // Reset Icon
      const icon = method.querySelector('.pay-icon');
      icon.className = 'pay-icon fa-regular fa-circle text-gray-300 text-lg';
    });

    // 2. Set Active Style
    el.classList.remove('border-transparent', 'hover:bg-gray-50');
    el.classList.add('active', 'border', 'ring-1');

    const text = el.querySelector('.pay-text');
    text.classList.remove('font-medium', 'text-gray-600');
    text.classList.add('font-bold', 'text-gray-800');

    const icon = el.querySelector('.pay-icon');

    if (type === 'wechat') {
      el.classList.add('bg-green-50', 'border-green-600', 'ring-green-200');
      icon.className = 'pay-icon fa-solid fa-circle-check text-green-600 text-lg';
    } else if (type === 'alipay') {
      el.classList.add('bg-blue-50', 'border-blue-600', 'ring-blue-200');
      icon.className = 'pay-icon fa-solid fa-circle-check text-blue-500 text-lg';
    }
  }

  function pay() {
    const btn = document.getElementById('payBtn');
    const originalText = btn.innerHTML;

    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> 处理中';
    btn.classList.add('opacity-80', 'cursor-not-allowed');
    btn.disabled = true;

    setTimeout(() => {
      alert('支付成功！');
      btn.innerHTML = originalText;
      btn.classList.remove('opacity-80', 'cursor-not-allowed');
      btn.disabled = false;
    }, 1500);
  }
</script>

</body>
</html>
