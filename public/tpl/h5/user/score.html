<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>积分充值 - 账户余额</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
                        mono: ['Inter', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
                    },
                    animation: {
                        'enter-up': 'enterUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-glow': 'pulseGlow 2s infinite',
                        'shimmer': 'shimmer 2.5s infinite linear',
                    },
                    keyframes: {
                        enterUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px) scale(0.98)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(0,0,0,0.05)' },
                            '50%': { boxShadow: '0 0 25px rgba(251, 191, 36, 0.2)' },
                        },
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 110px; /* Space for bottom action bar */
        }

        /* 玻璃拟态容器 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        /* 选中的套餐样式 */
        .bundle-card.active {
            background: linear-gradient(to bottom right, #fffbeb, #fff);
            border-color: #f59e0b;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.15);
        }

        .bundle-card.active .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* 黑金卡片 */
        .vip-card-dark {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        /* 流光效果 */
        .shimmer-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .shimmer-line {
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
            transform: skewX(-20deg);
            position: absolute;
            animation: shimmer 3s infinite;
        }

        .text-gold-gradient {
            background: linear-gradient(to right, #fcd34d, #fbbf24, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 优惠标签样式 */
        .discount-tag {
            background: linear-gradient(90deg, #ef4444, #f43f5e);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 85%);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-amber-100">

<!-- 背景装饰 -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] right-[-10%] w-[80vw] h-[80vw] rounded-full bg-amber-200/10 blur-3xl animate-pulse-glow"></div>
    <div class="absolute bottom-[-10%] left-[-20%] w-[100vw] h-[100vw] rounded-full bg-blue-500/5 blur-3xl"></div>
</div>

<!-- 1. Header -->
<header class="w-full max-w-md sticky top-0 z-50 glass-panel border-b border-slate-200/50">
    <div class="px-5 h-14 flex items-center justify-between">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-slate-600 active:bg-slate-100 transition-colors cursor-pointer" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        <h1 class="font-bold text-slate-800 tracking-tight text-lg">积分充值</h1>
        <div class="w-8 h-8 flex items-center justify-center text-slate-600 text-sm font-medium cursor-pointer">
            明细
        </div>
    </div>
</header>

<main class="w-full max-w-md flex-1 p-5 flex flex-col gap-6">

    <!-- 2. Hero Points Balance -->
    <div class="animate-enter-up">
        <div class="vip-card-dark rounded-2xl p-6 text-white shadow-xl shadow-slate-300/50 border border-slate-700/50 relative group">
            <!-- 装饰流光 -->
            <div class="shimmer-wrapper">
                <div class="shimmer-line"></div>
            </div>

            <!-- 卡片内容 -->
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-slate-700/50 border border-slate-600 flex items-center justify-center">
                            <i class="fa-solid fa-wallet text-amber-400 text-sm"></i>
                        </div>
                        <span class="text-slate-300 text-sm font-medium tracking-wide">当前余额</span>
                    </div>
                    <div class="px-2 py-1 rounded bg-white/10 border border-white/10 text-[10px] text-amber-200 backdrop-blur-sm">
                        永久有效
                    </div>
                </div>

                <div class="flex items-baseline gap-2">
                    <span class="text-5xl font-black text-gold-gradient tracking-tight" id="userBalance">1,204</span>
                    <span class="text-sm text-slate-400 font-medium">积分</span>
                </div>

                <div class="mt-4 pt-4 border-t border-slate-700/50 flex items-center justify-between text-xs text-slate-400">
                    <span>Guest_9527</span>
                    <span class="flex items-center gap-1"><i class="fa-solid fa-arrows-rotate text-[10px]"></i> 刚刚更新</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Usage Icons (Simplified) -->
    <div class="glass-panel rounded-2xl p-4 animate-enter-up flex justify-around items-center" style="animation-delay: 0.1s;">
        <div class="flex flex-col items-center gap-1.5 opacity-80">
            <div class="w-8 h-8 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center text-sm"><i class="fa-solid fa-gift"></i></div>
            <span class="text-[10px] font-medium text-slate-600">兑换礼品</span>
        </div>
        <div class="w-px h-8 bg-slate-200"></div>
        <div class="flex flex-col items-center gap-1.5 opacity-80">
            <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm"><i class="fa-solid fa-lock-open"></i></div>
            <span class="text-[10px] font-medium text-slate-600">解锁内容</span>
        </div>
        <div class="w-px h-8 bg-slate-200"></div>
        <div class="flex flex-col items-center gap-1.5 opacity-80">
            <div class="w-8 h-8 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-sm"><i class="fa-solid fa-gamepad"></i></div>
            <span class="text-[10px] font-medium text-slate-600">参与活动</span>
        </div>
    </div>

    <!-- 4. Recharge Bundles (Grid Layout) -->
    <div class="animate-enter-up space-y-3" style="animation-delay: 0.2s;">
        <h3 class="font-bold text-slate-800 px-1 text-sm flex items-center gap-2">
            充值套餐 <span class="text-[10px] font-normal text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full border border-amber-100">首充赠送 10%</span>
        </h3>

        <div class="grid grid-cols-2 gap-3">
            <!-- Option 1: Small -->
            <div onclick="selectBundle(this, 6, 60)" class="bundle-card glass-panel rounded-xl p-4 relative cursor-pointer border-2 border-transparent transition-all duration-200 active:scale-95">
                <div class="text-center">
                    <div class="font-black text-2xl text-slate-800 mb-1">60<span class="text-xs font-medium text-slate-400 ml-0.5">积分</span></div>
                    <div class="text-amber-600 font-bold text-sm">¥6.00</div>
                </div>
            </div>

            <!-- Option 2: Medium (Recommended) -->
            <div onclick="selectBundle(this, 30, 330)" class="bundle-card active glass-panel rounded-xl p-4 relative cursor-pointer border-2 border-transparent transition-all duration-200 active:scale-95 overflow-hidden">
                <!-- Tag -->
                <div class="absolute top-0 left-0 bg-gradient-to-r from-amber-500 to-orange-500 text-white text-[9px] font-bold px-2 py-1 rounded-br-lg z-10">
                    热销
                </div>
                <div class="text-center relative z-10 pt-1">
                    <div class="font-black text-2xl text-slate-800 mb-1">330<span class="text-xs font-medium text-slate-400 ml-0.5">积分</span></div>
                    <div class="text-amber-600 font-bold text-sm">¥30.00</div>
                    <div class="text-[9px] text-red-500 mt-1 font-medium bg-red-50 inline-block px-1.5 rounded">多送30积分</div>
                </div>
            </div>

            <!-- Option 3: Large -->
            <div onclick="selectBundle(this, 68, 750)" class="bundle-card glass-panel rounded-xl p-4 relative cursor-pointer border-2 border-transparent transition-all duration-200 active:scale-95">
                <div class="text-center">
                    <div class="font-black text-2xl text-slate-800 mb-1">750<span class="text-xs font-medium text-slate-400 ml-0.5">积分</span></div>
                    <div class="text-amber-600 font-bold text-sm">¥68.00</div>
                    <div class="text-[9px] text-red-500 mt-1 font-medium bg-red-50 inline-block px-1.5 rounded">多送70积分</div>
                </div>
            </div>

            <!-- Option 4: Extra Large -->
            <div onclick="selectBundle(this, 128, 1500)" class="bundle-card glass-panel rounded-xl p-4 relative cursor-pointer border-2 border-transparent transition-all duration-200 active:scale-95 overflow-hidden">
                <!-- Tag -->
                <div class="absolute top-0 right-0 bg-blue-500 text-white text-[9px] font-bold px-2 py-1 rounded-bl-lg z-10">
                    超值
                </div>
                <div class="text-center pt-1">
                    <div class="font-black text-2xl text-slate-800 mb-1">1500<span class="text-xs font-medium text-slate-400 ml-0.5">积分</span></div>
                    <div class="text-amber-600 font-bold text-sm">¥128.00</div>
                    <div class="text-[9px] text-red-500 mt-1 font-medium bg-red-50 inline-block px-1.5 rounded">多送220积分</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 5. Payment Method -->
    <div class="animate-enter-up glass-panel rounded-2xl p-4" style="animation-delay: 0.25s;">
        <h3 class="font-bold text-slate-800 mb-3 text-sm">支付方式</h3>
        <div class="flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
            <div class="flex items-center gap-3">
                <i class="fa-brands fa-weixin text-green-500 text-xl"></i>
                <div class="flex flex-col">
                    <span class="text-sm font-medium">微信支付</span>
                    <span class="text-[10px] text-gray-400">亿万用户的选择</span>
                </div>
            </div>
            <i class="fa-solid fa-circle-check text-blue-500"></i>
        </div>
    </div>

    <p class="text-[10px] text-center text-gray-400 mt-2 pb-5">
        充值即代表您同意《积分使用规范》<br>积分仅限应用内使用，不可提现
    </p>

</main>

<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-md border-t border-slate-200 z-40 pb-safe shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
    <div class="px-5 py-3 flex items-center justify-between">
        <div class="flex flex-col">
            <div class="flex items-baseline gap-1">
                <span class="text-xs font-bold text-slate-800">¥</span>
                <span id="displayPrice" class="text-2xl font-black text-slate-800 leading-none">30</span>
            </div>
            <div class="text-[10px] text-amber-600 font-medium mt-0.5">
                获得 <span id="displayPoints">330</span> 积分
            </div>
        </div>
        <button onclick="processPayment()" id="payBtn" class="w-36 h-11 bg-gradient-to-r from-slate-800 to-black text-white rounded-full font-bold shadow-lg shadow-slate-300 active:scale-95 transition-transform flex items-center justify-center gap-2">
            <span class="btn-text">立即充值</span>
        </button>
    </div>
</div>

<script>
    let currentPrice = 30;
    let currentPoints = 330;

    function selectBundle(element, price, points) {
        // 1. Reset all cards
        document.querySelectorAll('.bundle-card').forEach(card => {
            card.classList.remove('active');
            card.classList.remove('border-amber-500');
        });

        // 2. Activate clicked card
        element.classList.add('active');

        // 3. Update State
        const oldPrice = currentPrice;
        currentPrice = price;
        currentPoints = points;

        // 4. Update UI Price with animation
        const priceEl = document.getElementById('displayPrice');
        const pointsEl = document.getElementById('displayPoints');

        animateValue(priceEl, oldPrice, price, 300);

        // Text fade effect for points text
        pointsEl.style.opacity = 0;
        setTimeout(() => {
            pointsEl.innerText = points;
            pointsEl.style.opacity = 1;
        }, 150);
    }

    function processPayment() {
        const btn = document.getElementById('payBtn');
        const originalContent = btn.innerHTML;

        // Loading state
        btn.disabled = true;
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> 处理中`;
        btn.classList.add('opacity-80');

        setTimeout(() => {
            // Simulate success
            const currentBalanceEl = document.getElementById('userBalance');
            const currentBalance = parseInt(currentBalanceEl.innerText.replace(/,/g, ''));
            const newBalance = currentBalance + currentPoints;

            animateValue(currentBalanceEl, currentBalance, newBalance, 1000);

            alert(`充值成功！\n\n支付金额：¥${currentPrice}\n到账积分：${currentPoints}`);

            btn.disabled = false;
            btn.innerHTML = originalContent;
            btn.classList.remove('opacity-80');
        }, 1500);
    }

    // Helper for number animation
    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);

            // Easing function for smoother feel
            const easeOutQuad = 1 - (1 - progress) * (1 - progress);

            const val = (easeOutQuad * (end - start) + start);

            // Format logic: if the target is an integer, show integer.
            // If it's the price field, we might want decimals if not whole number, but here we assume whole numbers for simplified UX
            if(obj.id === 'userBalance') {
                obj.innerHTML = Math.floor(val).toLocaleString();
            } else {
                obj.innerHTML = Number.isInteger(val) ? parseInt(val) : val.toFixed(1);
            }

            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }
</script>
</body>
</html>
