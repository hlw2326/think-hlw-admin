<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>积分充值 - 扁平极简版</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#fff7ed',
              100: '#ffedd5',
              500: '#f97316', // Orange-500 for flat accent
              600: '#ea580c',
              900: '#1a1a1a', // Almost black
            }
          },
          boxShadow: {
            'flat': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
            'float': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025)',
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F5F7FA;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 120px;
    }

    /* 去除默认滚动条样式 */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    /* 选中态的平滑过渡 */
    .bundle-card {
      transition: all 0.2s ease-in-out;
    }

    /* 选中状态样式：粗边框 + 浅色背景 */
    .bundle-card.active {
      border-color: #f97316; /* brand-500 */
      background-color: #fff7ed; /* brand-50 */
      box-shadow: 0 0 0 1px #f97316; /* Double border effect */
    }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center selection:bg-brand-100">

<!-- 1. Header (Clean White) -->
<header class="w-full max-w-md sticky top-0 z-50 bg-white/95 border-b border-slate-100">
  <div class="px-4 h-14 flex items-center justify-between">
    <div class="w-10 h-10 flex items-center justify-center text-slate-800 active:opacity-50 transition-opacity cursor-pointer" onclick="history.back()">
      <i class="fa-solid fa-arrow-left text-lg"></i>
    </div>
    <h1 class="font-bold text-slate-900 text-base">积分充值</h1>
    <div class="w-10 h-10 flex items-center justify-center text-slate-500 text-sm font-medium cursor-pointer active:opacity-50">
      明细
    </div>
  </div>
</header>

<main class="w-full max-w-md flex-1 px-4 py-6 flex flex-col gap-6">

  <!-- 2. Hero Points Balance (Flat Card) -->
  <!-- 改动：移除流光，使用纯色黑卡或深灰卡，强调文字排版 -->
  <div class="bg-slate-900 rounded-2xl p-6 text-white shadow-float relative overflow-hidden">
    <!-- 简单的装饰圆，增加一点层次但不破坏扁平感 -->
    <div class="absolute -top-6 -right-6 w-32 h-32 bg-white/5 rounded-full"></div>

    <div class="relative z-10 flex justify-between items-start mb-8">
      <div class="flex flex-col gap-1">
        <span class="text-slate-400 text-xs font-medium uppercase tracking-wider">Current Balance</span>
        <span class="text-slate-200 text-sm">当前余额</span>
      </div>
      <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
        <i class="fa-solid fa-user text-xs text-white"></i>
      </div>
    </div>

    <div class="relative z-10 flex items-baseline gap-2">
      <span class="text-5xl font-bold tracking-tight font-sans" id="userBalance">1,204</span>
      <span class="text-base text-brand-500 font-bold">PTS</span>
    </div>
  </div>
  <!-- 3. Usage Icons (Card Style) -->
  <div class="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm">
    <div class="flex justify-between items-center">
      <div class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform">
        <div class="w-12 h-12 rounded-2xl bg-orange-50 text-orange-500 flex items-center justify-center text-xl shadow-sm border border-orange-100">
          <i class="fa-solid fa-gift"></i>
        </div>
        <span class="text-xs font-medium text-slate-600">兑换礼品</span>
      </div>
      <div class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform">
        <div class="w-12 h-12 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center text-xl shadow-sm border border-blue-100">
          <i class="fa-solid fa-cube"></i>
        </div>
        <span class="text-xs font-medium text-slate-600">特权服务</span>
      </div>
      <div class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform">
        <div class="w-12 h-12 rounded-2xl bg-purple-50 text-purple-500 flex items-center justify-center text-xl shadow-sm border border-purple-100">
          <i class="fa-solid fa-ticket"></i>
        </div>
        <span class="text-xs font-medium text-slate-600">活动票务</span>
      </div>
      <div class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform">
        <div class="w-12 h-12 rounded-2xl bg-slate-100 text-slate-500 flex items-center justify-center text-xl shadow-sm border border-slate-200">
          <i class="fa-solid fa-ellipsis"></i>
        </div>
        <span class="text-xs font-medium text-slate-600">更多</span>
      </div>
    </div>
  </div>

  <!-- 4. Recharge Bundles -->
  <div class="mt-2">
    <h3 class="font-bold text-slate-900 text-base mb-4 flex items-center gap-2">
      选择充值金额
    </h3>

    <!-- 包裹卡片容器 -->
    <div class="bg-white rounded-2xl p-3 border border-slate-200 shadow-sm">
      <div class="grid grid-cols-2 gap-3">
        <!-- Option 1 -->
        <div onclick="selectBundle(this, 6, 60)" class="bundle-card bg-slate-50 rounded-xl p-4 cursor-pointer border border-transparent relative group active:scale-[0.98]">
          <div class="flex flex-col items-center">
            <div class="text-2xl font-bold text-slate-900 mb-1">60</div>
            <div class="text-xs text-slate-400 font-medium">¥6.00</div>
          </div>
        </div>

        <!-- Option 2 (Active) -->
        <div onclick="selectBundle(this, 30, 330)" class="bundle-card active bg-slate-50 rounded-xl p-4 cursor-pointer border border-transparent relative overflow-hidden active:scale-[0.98]">
          <div class="absolute top-0 right-0 bg-brand-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-bl-lg">
            推荐
          </div>
          <div class="flex flex-col items-center">
            <div class="text-2xl font-bold text-slate-900 mb-1">330</div>
            <div class="text-xs text-brand-600 font-bold">¥30.00</div>
            <div class="mt-2 text-[10px] font-medium text-brand-600 bg-brand-100 px-1.5 py-0.5 rounded">
              多送 30 积分
            </div>
          </div>
        </div>

        <!-- Option 3 -->
        <div onclick="selectBundle(this, 68, 750)" class="bundle-card bg-slate-50 rounded-xl p-4 cursor-pointer border border-transparent relative active:scale-[0.98]">
          <div class="flex flex-col items-center">
            <div class="text-2xl font-bold text-slate-900 mb-1">750</div>
            <div class="text-xs text-slate-400 font-medium">¥68.00</div>
            <div class="mt-2 text-[10px] font-medium text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">
              多送 70
            </div>
          </div>
        </div>

        <!-- Option 4 -->
        <div onclick="selectBundle(this, 128, 1500)" class="bundle-card bg-slate-50 rounded-xl p-4 cursor-pointer border border-transparent relative active:scale-[0.98]">
          <div class="absolute top-0 left-0 bg-slate-800 text-white text-[10px] font-bold px-2 py-0.5 rounded-br-lg">
            超值
          </div>
          <div class="flex flex-col items-center">
            <div class="text-2xl font-bold text-slate-900 mb-1">1500</div>
            <div class="text-xs text-slate-400 font-medium">¥128.00</div>
            <div class="mt-2 text-[10px] font-medium text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">
              多送 220
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 5. Payment Method (Simple List) -->
  <div class="bg-white rounded-xl border border-slate-200 p-0 overflow-hidden">
    <div class="flex items-center justify-between p-4 border-b border-slate-100 last:border-0 hover:bg-slate-50 cursor-pointer">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-[#07c160]/10 text-[#07c160] flex items-center justify-center text-lg">
          <i class="fa-brands fa-weixin"></i>
        </div>
        <span class="text-sm font-semibold text-slate-800">微信支付</span>
      </div>
      <div class="w-5 h-5 rounded-full border-2 border-brand-500 flex items-center justify-center">
        <div class="w-2.5 h-2.5 rounded-full bg-brand-500"></div>
      </div>
    </div>
  </div>

  <div class="text-center">
    <span class="text-[10px] text-slate-400">点击充值即代表同意 <a href="#" class="text-slate-600 underline">用户协议</a></span>
  </div>

</main>

<!-- Fixed Bottom Action Bar (Solid) -->
<div class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-200 z-40 pb-safe shadow-lg">
  <div class="px-5 py-3 flex items-center justify-between h-20">
    <div class="flex flex-col">
      <div class="flex items-baseline gap-1 text-slate-900">
        <span class="text-sm font-bold">总计</span>
        <span class="text-xs font-bold self-start mt-1">¥</span>
        <span id="displayPrice" class="text-3xl font-black leading-none tracking-tight">30</span>
      </div>
      <div class="text-[11px] text-slate-500 font-medium mt-1">
        获得 <span id="displayPoints" class="text-brand-600 font-bold">330</span> 积分
      </div>
    </div>
    <!-- 扁平化黑色按钮，极简风格 -->
    <button onclick="processPayment()" id="payBtn" class="w-40 h-12 bg-slate-900 hover:bg-black text-white rounded-lg font-bold text-sm active:scale-95 transition-all flex items-center justify-center gap-2">
      <span class="btn-text">立即支付</span>
    </button>
  </div>
</div>

<script>
  let currentPrice = 30;
  let currentPoints = 330;

  function selectBundle(element, price, points) {
    // 1. Reset Styles
    document.querySelectorAll('.bundle-card').forEach(card => {
      card.classList.remove('active');
      // Remove active text colors if they were dynamically added,
      // but here we handle typography via specific CSS classes in the HTML structure
    });

    // 2. Activate clicked card
    element.classList.add('active');

    // 3. Update Logic
    const oldPrice = currentPrice;
    currentPrice = price;
    currentPoints = points;

    // 4. Animate Price
    const priceEl = document.getElementById('displayPrice');
    const pointsEl = document.getElementById('displayPoints');

    animateValue(priceEl, oldPrice, price, 200);

    // Simple update for points
    pointsEl.innerText = points;
  }

  function processPayment() {
    const btn = document.getElementById('payBtn');
    const originalContent = btn.innerHTML;

    // Loading state
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`;
    btn.classList.add('opacity-80');

    setTimeout(() => {
      // Update Balance logic
      const currentBalanceEl = document.getElementById('userBalance');
      const currentBalance = parseInt(currentBalanceEl.innerText.replace(/,/g, ''));
      const newBalance = currentBalance + currentPoints;

      animateValue(currentBalanceEl, currentBalance, newBalance, 800);

      // Simple Flat Alert (Native)
      alert(`支付成功！\n实付: ¥${currentPrice}`);

      btn.disabled = false;
      btn.innerHTML = originalContent;
      btn.classList.remove('opacity-80');
    }, 1200);
  }

  // Number animation utility
  function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      const val = Math.floor(progress * (end - start) + start);

      // Format with commas if it's the balance
      if(obj.id === 'userBalance') {
        obj.innerHTML = val.toLocaleString();
      } else {
        obj.innerHTML = val;
      }

      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }
</script>
</body>
</html>
