<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>个人中心 - 权重隐形分 (UnoCSS)</title>

    <!-- 0. 引入样式重置 (CSS Reset) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@unocss/reset/tailwind.min.css">

    <!-- 1. 必须先定义配置 -->
    <script>
        window.__unocss = {
            theme: {
                fontFamily: {
                    sans: '-apple-system, BlinkMacSystemFont, Inter, Helvetica Neue, sans-serif',
                    mono: 'ui-monospace, SFMono-Regular, Menlo, monospace',
                },
                boxShadow: {
                    'flat': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                    'flat-lg': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                },
                colors: {
                    slate: {
                        50: '#f8fafc',
                        100: '#f1f5f9',
                        200: '#e2e8f0',
                        300: '#cbd5e1',
                        400: '#94a3b8',
                        500: '#64748b',
                        600: '#475569',
                        700: '#334155',
                        800: '#1e293b',
                        900: '#0f172a',
                    }
                }
            },
            shortcuts: {
                // 布局与容器
                'layout-container': 'w-full max-w-md flex flex-col',
                'glass-panel': 'bg-white border-b border-slate-200',

                // 卡片样式
                'flat-card': 'bg-white border border-slate-200 shadow-flat rounded-xl p-5 box-border',
                'vip-card-flat': 'bg-slate-800 text-white relative overflow-hidden rounded-xl p-5 shadow-flat-lg box-border',

                // 交互反馈 (保留样式，但无逻辑)
                'active-press': 'active:scale-98 active:opacity-90 transition-transform duration-100 cursor-pointer select-none',

                // 按钮样式
                'btn-primary': 'bg-slate-900 text-white text-xs font-bold rounded-lg px-4 h-9 flex items-center justify-center gap-1.5 shadow-md shadow-slate-200 hover:bg-slate-800 active-press border-none outline-none',
                'btn-outline': 'bg-white text-slate-700 border border-slate-200 text-xs font-bold rounded-lg px-4 h-9 flex items-center justify-center gap-1.5 hover:bg-slate-50 active-press outline-none',
                'btn-vip': 'bg-amber-400 text-slate-900 text-xs font-bold px-4 py-2 rounded-lg border-none hover:bg-amber-300 transition-colors shadow-lg shadow-amber-900/20 active-press outline-none',

                // 列表项样式
                'menu-item': 'flex items-center justify-between p-4 bg-white hover:bg-slate-50 active:bg-slate-100 transition-colors cursor-pointer no-underline decoration-none text-slate-700',

                // 状态标签
                'tag-hot': 'text-[10px] font-bold text-white bg-red-500 px-1.5 py-0.5 rounded leading-none',
                'tag-new': 'text-[10px] font-bold text-white bg-orange-500 px-1.5 py-0.5 rounded leading-none',

                // 套餐选项
                'package-base': 'border rounded-lg p-3 flex flex-col items-center justify-center cursor-pointer relative transition-all box-border',
                'package-normal': 'package-base border-slate-200 bg-white hover:border-slate-300',
                'package-active': 'package-base border-2 border-amber-400 bg-amber-50 shadow-sm'
            }
        }
    </script>

    <!-- 2. 然后加载 UnoCSS Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 40px; /* 调整底部间距，因为导航栏已移除 */
            opacity: 0;
            transition: opacity 0.2s ease-in;
        }

        [un-cloak] { display: none; }

        /* 动画定义 */
        @keyframes enterUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-enter-up {
            animation: enterUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes shimmerEffect {
            0% { transform: skewX(-20deg) translateX(-150%); }
            20% { transform: skewX(-20deg) translateX(150%); }
            100% { transform: skewX(-20deg) translateX(150%); }
        }

        .vip-shimmer-gold {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent 0%, rgba(255, 255, 255, 0.15) 50%, transparent 100%);
            transform: skewX(-20deg) translateX(-150%);
            animation: shimmerEffect 4s infinite;
            z-index: 1;
            pointer-events: none;
        }

        .vip-decor-circle {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            z-index: 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        a { text-decoration: none; color: inherit; }
    </style>

    <script>
        window.onload = function() {
            document.body.style.opacity = '1';
        }
    </script>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-slate-200 font-sans">

<!-- 1. Header -->
<header class="w-full max-w-md sticky top-0 z-50 glass-panel">
    <div class="px-5 h-14 flex items-center justify-between">
        <h1 class="font-bold text-slate-800 text-lg m-0">个人中心</h1>
        <div class="w-8 h-8 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-100 transition-colors active-press">
            <i class="fa-solid fa-gear"></i>
        </div>
    </div>
</header>

<main class="w-full max-w-md flex-1 p-5 flex flex-col gap-4">

    <!-- 2. Profile Card -->
    <div class="flat-card animate-enter-up flex items-center gap-4">
        <div class="relative flex-shrink-0">
            <div class="w-16 h-16 rounded-full border border-slate-100 bg-slate-100 overflow-hidden relative z-10">
                <img src="https://ui-avatars.com/api/?name=Admin&background=0f172a&color=ffffff&bold=true" class="w-full h-full object-cover block">
            </div>
            <!-- 等级标签 -->
            <div class="absolute -bottom-1 -right-1 z-20 bg-slate-800 text-white text-[10px] px-2 py-0.5 rounded-md border-2 border-white font-bold flex items-center gap-1 leading-none">
                Lv.9
            </div>
        </div>
        <div class="flex-1 min-w-0">
            <h2 class="font-bold text-slate-900 text-xl flex items-center gap-2 m-0 leading-tight">
                Guest_9527
                <span class="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold leading-none align-middle inline-block">PRO</span>
            </h2>
            <!-- ID Area -->
            <div class="flex items-center gap-2 mt-1.5 group cursor-pointer w-fit">
                <div class="text-xs text-slate-400 font-mono group-hover:text-slate-600 transition-colors">
                    ID: <span id="userIdDisplay">88329104</span>
                </div>
                <i class="fa-regular fa-copy text-slate-300 text-xs group-hover:text-slate-600 transition-colors"></i>
            </div>
        </div>
        <button class="text-xs font-semibold bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg active-press hover:bg-slate-50 outline-none">
            编辑
        </button>
    </div>

    <!-- 3. VIP / Membership Banner -->
    <div class="animate-enter-up">
        <div class="vip-card-flat">
            <!-- 动画层 -->
            <div class="vip-shimmer-gold"></div>
            <!-- 装饰背景 -->
            <div class="vip-decor-circle w-32 h-32 -top-10 -right-10"></div>
            <div class="vip-decor-circle w-24 h-24 bottom-2 right-10"></div>

            <div class="flex justify-between items-start mb-6 relative z-10">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-6 h-6 rounded bg-amber-400 flex items-center justify-center text-slate-900 text-xs flex-shrink-0">
                            <i class="fa-solid fa-crown"></i>
                        </div>
                        <span class="text-white font-bold text-lg tracking-tight leading-none">PRO MEMBER</span>
                    </div>
                    <div class="text-xs text-slate-400 font-medium">
                        尊贵身份 · 极速通道 · 无限次查询
                    </div>
                </div>
                <button class="btn-vip">
                    立即续费
                </button>
            </div>

            <div class="flex items-end justify-between relative z-10 border-t border-slate-700/50 pt-4">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                    <span class="text-xs text-slate-300">状态：生效中</span>
                </div>
                <div class="text-xs text-slate-400 font-mono">有效期至 2026.08.18</div>
            </div>
        </div>
    </div>

    <!-- 4. Points Center -->
    <div class="flat-card animate-enter-up">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-sm font-bold text-slate-800 m-0">我的积分</h3>
            <button class="text-[10px] font-bold text-blue-600 bg-blue-50 border border-blue-100 px-2.5 py-1 rounded-md active-press flex items-center gap-1 outline-none">
                <i class="fa-solid fa-calendar-check"></i> 签到
            </button>
        </div>

        <div class="flex items-center justify-between mb-6">
            <div>
                <div class="text-4xl font-black text-slate-800 tracking-tight leading-none" id="userPoints">2850</div>
                <div class="text-[11px] font-medium text-amber-600 bg-amber-50 px-2 py-0.5 rounded mt-2 inline-block leading-none">
                    PRO 会员 1.2倍加速中
                </div>
            </div>
            <div class="flex gap-2">
                <button class="btn-primary">
                    <i class="fa-solid fa-wallet"></i> 充值
                </button>
                <button class="btn-outline">
                    <i class="fa-solid fa-play text-blue-500"></i> 领分
                </button>
            </div>
        </div>

        <!-- Quick Stats -->
        <div class="grid grid-cols-3 gap-4 pt-4 border-t border-slate-100">
            <div class="text-center">
                <div class="text-base font-bold text-slate-800 leading-tight">128</div>
                <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide mt-1">历史查询</div>
            </div>
            <div class="text-center relative after:content-[''] after:absolute after:right-0 after:top-2 after:bottom-2 after:w-[1px] after:bg-slate-100 before:content-[''] before:absolute before:left-0 before:top-2 before:bottom-2 before:w-[1px] before:bg-slate-100">
                <div class="text-base font-bold text-slate-800 leading-tight">12</div>
                <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide mt-1">正在监控</div>
            </div>
            <div class="text-center">
                <div class="text-base font-bold text-slate-800 leading-tight">All</div>
                <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide mt-1">已解锁</div>
            </div>
        </div>
    </div>

    <!-- 5. Function Menu List -->
    <div class="flat-card !p-0 overflow-hidden animate-enter-up divide-y divide-slate-100">

        <div class="menu-item group">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-book-open text-slate-400 text-sm w-5 text-center"></i>
                <span class="text-sm font-semibold text-slate-700">新手使用教程</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="tag-new">New</span>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </div>
        </div>

        <div class="menu-item group">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-file-contract text-slate-400 text-sm w-5 text-center"></i>
                <span class="text-sm font-semibold text-slate-700">查询报告记录</span>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
        </div>

        <div class="menu-item group">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-user-group text-slate-400 text-sm w-5 text-center"></i>
                <span class="text-sm font-semibold text-slate-700">邀请好友赚积分</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="tag-hot">Hot</span>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </div>
        </div>

        <div class="menu-item group">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-headset text-slate-400 text-sm w-5 text-center"></i>
                <span class="text-sm font-semibold text-slate-700">联系客服</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-medium text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">09:00-22:00</span>
                <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
            </div>
        </div>

        <div class="menu-item group">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-circle-question text-slate-400 text-sm w-5 text-center"></i>
                <span class="text-sm font-semibold text-slate-700">帮助中心</span>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
        </div>

    </div>

    <!-- 6. Bottom Info -->
    <div class="text-center mt-2 pb-5 animate-enter-up">
        <p class="text-[10px] font-medium text-slate-400 m-0">UID: 88329104 · Version 6.1.2 (Static)</p>
    </div>

</main>

<!-- (Bottom Navigation Bar has been removed) -->

<!-- Hidden Modals (Kept structure but unreachable) -->
<div id="tutorialModal" class="hidden"></div>
<div id="buyModal" class="hidden"></div>
<div id="adModal" class="hidden"></div>

</body>
</html>
