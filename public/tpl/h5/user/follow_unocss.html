<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>关注公众号</title>

  <!-- 引入 Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- 引入 FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#10b981', // emerald-500
            'bg-page': '#f8fafc', // slate-50
            'text-main': '#334155', // slate-700
            'text-sub': '#64748b', // slate-500
          },
          animation: {
            'scan': 'scan 2.5s infinite linear',
          },
          keyframes: {
            scan: {
              '0%': { top: '0', opacity: '0' },
              '10%': { opacity: '1' },
              '90%': { opacity: '1' },
              '100%': { top: '100%', opacity: '0' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* 解决 Tailwind 无法覆盖的一些浏览器默认行为 */
    body { -webkit-tap-highlight-color: transparent; }
    /* 隐藏滚动条但保留功能 (可选) */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="bg-bg-page text-text-main font-sans text-sm antialiased overflow-x-hidden">

<div id="app" class="max-w-[480px] mx-auto min-h-screen bg-bg-page border-x border-slate-100 relative shadow-none">

  <!-- Header -->
  <header class="sticky top-0 z-50 h-[44px] flex items-center justify-center bg-white border-b border-slate-200 font-semibold text-base text-text-main">
    <div class="absolute left-3 p-2 text-base cursor-pointer active:opacity-70">
      <i class="fas fa-arrow-left"></i>
    </div>
    <span>关注公众号</span>
  </header>

  <!-- Content Wrapper -->
  <div class="p-4 flex flex-col gap-4 pb-[calc(20px+env(safe-area-inset-bottom))]">

    <!-- 2. Hero Card -->
    <div class="bg-white rounded-lg border border-slate-200 overflow-hidden p-0">
      <div class="p-6 px-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
          <!-- Icon Box -->
          <div class="w-14 h-14 rounded-lg flex items-center justify-center bg-emerald-50 border border-emerald-100 text-primary text-[32px]">
            <i class="fab fa-weixin"></i>
          </div>
          <div class="flex flex-col gap-1">
            <span class="text-lg font-bold text-text-main">全网数据助手</span>
            <span class="text-[13px] text-text-sub">关注即可获取实时监控通知</span>
          </div>
        </div>
        <!-- Points Badge -->
        <div class="bg-orange-50 border border-orange-100 text-orange-700 px-3 py-1.5 rounded-md flex flex-col items-center leading-tight">
          <span class="text-base font-extrabold">+100</span>
          <span class="text-[10px] font-semibold">积分</span>
        </div>
      </div>


      <!-- Tips -->
      <div class="px-5 py-3 bg-slate-50 text-xs text-text-sub flex items-center gap-2 border-t border-slate-200">
        <i class="fas fa-info-circle"></i>
        <span>完成关注后回复“领积分”获取兑换码</span>
      </div>
    </div>

    <!-- 3. QR Card (推荐方式) -->
    <div class="bg-white rounded-lg border border-slate-200 overflow-hidden p-5">
      <div class="flex items-center gap-2 text-[15px] font-bold text-text-main mb-3 pl-1 border-l-[3px] border-primary leading-none">
        <span>方式一：扫码关注</span>
        <span class="text-[10px] bg-primary text-white px-1.5 py-0.5 rounded font-normal shadow-none">推荐</span>
      </div>

      <div class="flex flex-col items-center pb-1">
        <!-- QR Container -->
        <div class="relative w-[180px] h-[180px] p-2 bg-white rounded border border-slate-200 mb-5 select-none shadow-none">
          <!-- 扫描线动画 -->
          <div class="absolute top-0 left-0 w-full h-[2px] bg-primary shadow-[0_0_4px_#10b981] animate-scan z-10 pointer-events-none"></div>

          <!-- 四角装饰 (使用 Tailwind 组合) -->
          <div class="absolute -top-[1px] -left-[1px] w-3 h-3 border-primary border-l-[3px] border-t-[3px] z-20 pointer-events-none"></div>
          <div class="absolute -top-[1px] -right-[1px] w-3 h-3 border-primary border-r-[3px] border-t-[3px] z-20 pointer-events-none"></div>
          <div class="absolute -bottom-[1px] -left-[1px] w-3 h-3 border-primary border-l-[3px] border-b-[3px] z-20 pointer-events-none"></div>
          <div class="absolute -bottom-[1px] -right-[1px] w-3 h-3 border-primary border-r-[3px] border-b-[3px] z-20 pointer-events-none"></div>

          <img :src="qrImageUrl" class="w-full h-full block pointer-events-auto" alt="公众号二维码" />
        </div>

        <div class="flex flex-col items-center gap-1.5 mb-5 text-center">
          <span class="text-sm font-semibold text-text-main">长按识别上方二维码</span>
          <span class="text-xs text-text-sub">若无法识别，请保存图片后扫一扫</span>
        </div>

        <button @click="saveQrCode" class="w-full max-w-[240px] h-10 bg-white text-primary border border-primary text-sm font-semibold rounded-md flex items-center justify-center transition-all active:bg-emerald-50 active:translate-y-[1px]">
          <i class="fas fa-download mr-2"></i> 保存二维码
        </button>
      </div>
    </div>

    <!-- 4. 搜索关注 -->
    <div class="bg-white rounded-lg border border-slate-200 overflow-hidden p-5">
      <div class="flex items-center gap-2 text-[15px] font-bold text-text-main mb-3 pl-1 border-l-[3px] border-primary leading-none">
        <span>方式二：搜索关注</span>
      </div>

      <div class="bg-slate-50 border border-slate-200 rounded-md py-3 px-4 flex justify-between items-center mb-3">
        <div class="flex flex-col">
          <span class="text-[11px] text-text-sub mb-1 uppercase tracking-wide">公众号ID</span>
          <span class="font-mono text-base font-semibold text-text-main">{{ oaId }}</span>
        </div>
        <button @click="copyId" class="bg-white border border-slate-200 text-text-main text-xs px-3.5 py-1.5 rounded font-medium transition-all active:bg-slate-100 active:border-slate-300">
          复制 ID
        </button>
      </div>

      <div class="text-xs text-text-sub text-center">
        复制ID后，打开微信搜索并关注
      </div>
    </div>

    <!-- 5. 奖励兑换 -->
    <div class="bg-white rounded-lg border border-slate-200 overflow-hidden p-5">
      <div class="flex items-center gap-2 text-[15px] font-bold text-text-main mb-3 pl-1 border-l-[3px] border-primary leading-none">
        <span>奖励兑换</span>
      </div>
      <div class="flex gap-2.5 h-11">
        <input type="text"
               v-model="redeemCode"
               placeholder="输入兑换码 (如: VIP888)"
               class="flex-1 h-full bg-slate-50 border border-slate-200 rounded-md px-4 text-sm text-text-main outline-none focus:bg-white focus:border-primary transition-colors appearance-none" />
        <button class="w-20 h-full bg-slate-200 text-slate-400 text-sm font-semibold rounded-md transition-all border-none"
                :class="{ 'bg-slate-800 text-white cursor-pointer active:opacity-90 shadow-none': redeemCode, 'cursor-not-allowed': !redeemCode }"
                @click="handleRedeem">
          兑换
        </button>
      </div>
    </div>
  </div>

  <!-- Toast 弹窗 -->
  <transition
          enter-active-class="transition ease-out duration-200"
          enter-from-class="opacity-0 scale-90"
          enter-to-class="opacity-100 scale-100"
          leave-active-class="transition ease-in duration-200"
          leave-from-class="opacity-100 scale-100"
          leave-to-class="opacity-0 scale-90">
    <div v-if="toast.show" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-800/95 text-white px-6 py-4 rounded-md z-[999] flex flex-col items-center gap-2.5 min-w-[140px] shadow-none backdrop-blur-sm">
      <i v-if="toast.icon === 'success'" class="fas fa-check text-xl"></i>
      <i v-else-if="toast.icon === 'error'" class="fas fa-times text-xl"></i>
      <div v-else class="fas fa-spinner fa-spin text-xl"></div>
      <span class="text-sm font-medium">{{ toast.title }}</span>
    </div>
  </transition>
</div>

<script>
  const { createApp, ref, reactive } = Vue;

  createApp({
    setup() {
      const oaId = ref('DataHelperPro');
      const redeemCode = ref('');
      // 使用占位二维码 API
      const qrImageUrl = ref('https://ui-avatars.com/api/?name=QR&background=ffffff&color=10b981&size=400&font-size=0.3&length=2');

      const toast = reactive({
        show: false,
        title: '',
        icon: 'none'
      });

      const showToast = ({ title, icon = 'none', duration = 1500 }) => {
        toast.title = title;
        toast.icon = icon;
        toast.show = true;
        if (duration > 0) {
          setTimeout(() => {
            toast.show = false;
          }, duration);
        }
      };

      const hideToast = () => { toast.show = false; };

      const copyId = async () => {
        try {
          await navigator.clipboard.writeText(oaId.value);
          showToast({ title: '已复制ID', icon: 'success' });
        } catch (err) {
          // 降级方案
          const textArea = document.createElement("textarea");
          textArea.value = oaId.value;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand("copy");
          document.body.removeChild(textArea);
          showToast({ title: '已复制ID', icon: 'success' });
        }
      };

      const saveQrCode = () => {
        showToast({ title: '保存中...', icon: 'loading', duration: 0 });
        setTimeout(() => {
          const link = document.createElement('a');
          link.href = qrImageUrl.value;
          link.download = 'qrcode.png';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          hideToast();
          showToast({ title: '下载指令已触发', icon: 'success' });
        }, 800);
      };

      const handleRedeem = () => {
        if (!redeemCode.value) return;
        showToast({ title: '兑换中...', icon: 'loading', duration: 0 });
        setTimeout(() => {
          hideToast();
          if (redeemCode.value.toUpperCase() === 'VIP888') {
            showToast({ title: '兑换成功 +100积分', icon: 'success' });
            redeemCode.value = '';
          } else {
            showToast({ title: '无效兑换码', icon: 'error' });
          }
        }, 1000);
      };

      return {
        oaId,
        redeemCode,
        qrImageUrl,
        copyId,
        saveQrCode,
        handleRedeem,
        toast
      };
    }
  }).mount('#app');
</script>

</body>
</html>
