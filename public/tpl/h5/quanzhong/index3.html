<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>抖音账号权重隐形分查询</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'SF Pro Text', 'Helvetica Neue', 'sans-serif'],
          },
          colors: {
            primary: '#2563eb', // Solid Blue
            secondary: '#475569', // Slate
            bg: '#f8fafc',
          },
          animation: {
            'bar-grow': 'barGrow 0.8s ease-out forwards',
            'width-grow': 'widthGrow 1s ease-out forwards',
            'draw-line': 'drawLine 1.5s ease-out forwards',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
          },
          keyframes: {
            barGrow: {
              '0%': { height: '0%' },
              '100%': { height: 'var(--h)' }
            },
            widthGrow: {
              '0%': { width: '0%' },
              '100%': { width: 'var(--w)' }
            },
            drawLine: {
              '0%': { strokeDashoffset: '1000' },
              '100%': { strokeDashoffset: '0' }
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f1f5f9; /* Slate-100 */
      -webkit-tap-highlight-color: transparent;
    }

    /* 扁平化卡片 */
    .flat-card {
      background: #ffffff;
      border: 1px solid #e2e8f0; /* Slate-200 */
      border-radius: 12px; /* 标准圆角，不要太大 */
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05); /* 极简阴影 */
    }

    .flat-input {
      background: #f8fafc; /* Slate-50 */
      border: 1px solid #cbd5e1; /* Slate-300 */
      border-radius: 8px;
      transition: all 0.2s;
    }
    .flat-input:focus {
      background: #ffffff;
      border-color: #2563eb; /* Primary Blue */
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* 隐藏滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 纯色按钮点击态 */
    .btn-active:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .text-primary { color: #2563eb; }
    .bg-primary { background-color: #2563eb; }
  </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col items-center">

<!-- 1. Header (Clean & Solid) -->
<header class="w-full max-w-md sticky top-0 z-50 bg-white border-b border-slate-200">
  <div class="px-5 h-14 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded bg-black text-white flex items-center justify-center">
        <i class="fa-brands fa-tiktok text-sm"></i>
      </div>
      <h1 class="font-bold text-slate-900 tracking-tight text-sm">权重隐形分 Pro</h1>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">
        v17.1 修复版
      </div>
      <button class="text-slate-400 hover:text-slate-900 transition-colors">
        <i class="fa-solid fa-share-nodes"></i>
      </button>
    </div>
  </div>
</header>

<main class="w-full max-w-md flex-1 p-4 pb-10 flex flex-col gap-4">

  <!-- 2. Input Section (Clean) -->
  <div id="inputSection" class="animate-fade-in">
    <div class="flat-card p-5">
      <h2 class="text-sm font-bold text-slate-800 mb-3 flex items-center">
        输入主页链接 / 口令
      </h2>

      <div class="relative mb-4">
                    <textarea id="urlInput"
                              class="flat-input w-full h-24 p-3 text-xs text-slate-700 placeholder:text-slate-400 outline-none resize-none leading-relaxed"
                              placeholder="粘贴抖音个人主页分享链接..."></textarea>

        <div class="absolute bottom-2 right-2 flex gap-2">
          <button onclick="clearText()" id="clearBtn" class="text-slate-400 hover:text-red-500 hidden text-xs px-2 py-1">
            <i class="fa-solid fa-trash-can"></i>
          </button>
          <button onclick="pasteText()" class="bg-slate-200 text-slate-600 text-[10px] font-bold px-2.5 py-1 rounded hover:bg-slate-300 transition-colors">
            粘贴
          </button>
        </div>
      </div>

      <button onclick="startAnalysis()" id="analyzeBtn" class="w-full h-11 bg-slate-900 text-white font-bold text-sm rounded-lg btn-active hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        立即诊断
      </button>

      <div class="flex justify-center gap-4 mt-4 text-[10px] text-slate-400">
        <span class="flex items-center gap-1"><i class="fa-solid fa-check-circle text-green-500"></i> 安全无痕</span>
        <span class="flex items-center gap-1"><i class="fa-solid fa-check-circle text-green-500"></i> 官方接口</span>
      </div>
    </div>
  </div>

  <!-- 3. Loading State (Simplified) -->
  <div id="loadingSection" class="hidden animate-fade-in">
    <div class="flat-card p-8 flex flex-col items-center justify-center min-h-[300px]">
      <div class="relative w-16 h-16 mb-6">
        <div class="w-16 h-16 border-4 border-slate-100 rounded-full"></div>
        <div class="absolute top-0 left-0 w-16 h-16 border-4 border-slate-900 rounded-full border-t-transparent animate-spin"></div>
      </div>

      <h3 class="font-bold text-slate-800 text-base mb-2" id="loadingText">数据解析中...</h3>
      <div class="w-48 bg-slate-100 rounded-full h-1.5 mt-2 overflow-hidden">
        <div class="bg-slate-900 h-full rounded-full w-1/2 animate-[widthGrow_2s_infinite]"></div>
      </div>
      <div class="text-xs text-slate-400 mt-6 font-mono bg-slate-50 px-3 py-1 rounded border border-slate-100" id="consoleLog">
        > 连接服务器...
      </div>
    </div>
  </div>

  <!-- 4. Result Dashboard -->
  <div id="resultSection" class="hidden space-y-4">

    <!-- A. User Profile (Clean Row) -->
    <div class="flat-card p-4 flex items-center gap-4 animate-fade-in">
      <div class="relative w-14 h-14">
        <img id="resultAvatar" src="" class="w-full h-full rounded-full object-cover border border-slate-100">
        <div class="absolute -bottom-1 -right-1 bg-black text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">
          <i class="fa-brands fa-tiktok"></i>
        </div>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
          <h3 class="font-bold text-slate-900 text-base truncate" id="resultName">User</h3>
          <button onclick="toggleVip()" id="vipBadge" class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold border border-slate-200">
            普通用户
          </button>
        </div>
        <div class="text-xs text-slate-400 font-mono" id="resultId">ID: 00000</div>
      </div>
      <div class="text-right">
        <div class="text-xs text-slate-400 mb-0.5">粉丝数</div>
        <div class="font-bold text-slate-900" id="resultFans">0</div>
      </div>
    </div>

    <!-- B. Core Metrics (Split Grid) -->
    <div id="weightSection" class="grid grid-cols-2 gap-3 animate-fade-in" style="animation-delay: 0.1s;">

      <!-- 1. Weight Score -->
      <div class="flat-card p-4 flex flex-col justify-between h-32 relative overflow-hidden" id="mainWeightPanel">
        <div>
          <div class="text-xs text-slate-500 font-medium mb-1">综合权重</div>
          <div class="flex items-center gap-2">
            <span class="text-3xl font-black text-slate-900" id="scoreNum">0</span>
            <span class="text-[10px] font-bold text-green-600 bg-green-50 px-1.5 py-0.5 rounded" id="weightChangeBadge">+3</span>
          </div>
        </div>
        <div class="flex items-center justify-between mt-2">
          <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded" id="scoreLevel">-</span>
          <!-- Simple Chart Icon -->
          <i class="fa-solid fa-chart-simple text-slate-200 text-4xl absolute -bottom-2 -right-2 transform rotate-12"></i>
        </div>
      </div>

      <!-- 2. Traffic Pool -->
      <div class="flat-card p-4 flex flex-col justify-between h-32">
        <div class="text-xs text-slate-500 font-medium mb-1">当前流量池</div>
        <div class="text-xl font-bold text-slate-900 leading-tight" id="trafficLevel">-</div>
        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden mt-auto">
          <div class="bg-blue-600 h-full rounded-full" style="width: 60%"></div>
        </div>
      </div>
    </div>

    <!-- Boost Button (Solid) -->
    <div id="boostBtnContainer" class="animate-fade-in" style="animation-delay: 0.15s;">
      <button onclick="tryBoost()" id="boostBtn" class="w-full h-12 bg-blue-600 text-white font-bold text-sm rounded-lg btn-active shadow-sm shadow-blue-200 flex items-center justify-center gap-2">
        <i class="fa-solid fa-arrow-trend-up"></i>
        一键提升权重
        <span class="bg-white/20 px-1.5 py-0.5 rounded text-[10px] font-normal">50积分</span>
      </button>
      <div class="text-center mt-2 flex justify-center items-center gap-1 text-[10px] text-slate-400">
        可用积分: <span id="pointsDisplay" class="text-slate-800 font-bold">20</span>
        <button class="text-blue-600 hover:underline" onclick="alert('观看视频可获取更多积分！')">获取</button>
      </div>
    </div>

    <!-- C. Data Analysis Grid (Clean List) -->
    <div class="flat-card p-4 animate-fade-in" style="animation-delay: 0.2s;">
      <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-2">
        <h4 class="text-xs font-bold text-slate-800">六维能力模型</h4>
        <span class="text-[10px] text-slate-400">AI Analysis</span>
      </div>
      <div class="space-y-3" id="radarStats">
        <!-- Injected via JS -->
      </div>
    </div>

    <!-- D. Prediction (Simple Box) -->
    <div class="flat-card p-4 animate-fade-in" style="animation-delay: 0.25s;">
      <div class="flex items-center justify-between mb-3">
        <h4 class="text-xs font-bold text-slate-800">下个作品预测</h4>
        <div class="flex items-center gap-1 text-[10px] text-orange-500 font-bold bg-orange-50 px-2 py-0.5 rounded">
          <i class="fa-solid fa-fire"></i> <span id="viralProb">15%</span> 爆款率
        </div>
      </div>
      <div class="flex justify-between items-end bg-slate-50 p-3 rounded-lg border border-slate-100">
        <span class="text-[10px] text-slate-500">预估播放量</span>
        <span class="text-lg font-black text-slate-900" id="predictViews">2000 ~ 5000</span>
      </div>
    </div>

    <!-- E. Keyword Cloud (Chips) -->
    <div class="flat-card p-4 animate-fade-in" style="animation-delay: 0.3s;">
      <h4 class="text-xs font-bold text-slate-800 mb-3">内容关键词</h4>
      <div class="flex flex-wrap gap-2" id="keywordCloud">
        <!-- JS Injected -->
      </div>
    </div>

    <!-- F. Recent Works (Grid) -->
    <div class="flat-card p-4 animate-fade-in" style="animation-delay: 0.35s;">
      <h4 class="text-xs font-bold text-slate-800 mb-3">近期作品诊断</h4>
      <div class="grid grid-cols-3 gap-2" id="recentWorks">
        <!-- JS Injected -->
      </div>
      <button class="w-full mt-3 py-2.5 bg-slate-50 text-slate-600 text-xs font-bold rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors" onclick="alert('跳转作品详情...')">
        查看更多分析
      </button>
    </div>

    <!-- G. Bottom Reset -->
    <button onclick="resetApp()" class="w-full py-4 text-xs text-slate-400 hover:text-slate-600 font-medium transition-colors">
      查询其他账号
    </button>

  </div>
</main>

<!-- Modals (Flat Style) -->

<!-- Ad Modal -->
<div id="adModal" class="fixed inset-0 bg-black/50 z-[70] hidden flex items-center justify-center p-6 opacity-0 transition-opacity duration-200">
  <div class="bg-white rounded-xl w-full max-w-sm p-6 text-center transform scale-95 transition-transform duration-200 shadow-xl">
    <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-900">
      <i class="fa-solid fa-coins text-xl"></i>
    </div>
    <h3 class="text-base font-bold text-slate-900 mb-2">积分不足</h3>
    <p class="text-sm text-slate-500 mb-6" id="adModalDesc">需要 50 积分来提升权重。</p>
    <div class="flex gap-3">
      <button onclick="closeAdModal()" class="flex-1 py-2.5 border border-slate-200 text-slate-600 rounded-lg font-bold text-sm hover:bg-slate-50">取消</button>
      <button onclick="watchAd()" class="flex-1 py-2.5 bg-slate-900 text-white rounded-lg font-bold text-sm hover:bg-slate-800">观看广告</button>
    </div>
  </div>
</div>

<!-- Processing Overlay (Flat) -->
<div id="boostOverlay" class="fixed inset-0 bg-white/90 z-[60] hidden flex flex-col items-center justify-center text-slate-900">
  <div class="w-16 h-16 border-4 border-slate-200 border-t-slate-900 rounded-full animate-spin mb-4"></div>
  <h3 class="text-lg font-bold">数据优化中...</h3>
  <p class="text-sm text-slate-500 mt-1" id="boostStatus">正在连接服务器</p>
</div>

<!-- Fake Ad Player (Full Screen Black) -->
<div id="adPlayer" class="fixed inset-0 bg-black z-[80] hidden flex flex-col justify-center items-center text-white">
  <div class="text-center">
    <div class="text-2xl font-bold mb-2">广告时间</div>
    <div class="text-sm text-gray-400">剩余 <span id="adCountdown" class="text-white font-bold">3</span> 秒</div>
  </div>
</div>

<script>
  // DOM Elements
  const urlInput = document.getElementById('urlInput');
  const clearBtn = document.getElementById('clearBtn');
  const loadingSection = document.getElementById('loadingSection');
  const resultSection = document.getElementById('resultSection');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const consoleLog = document.getElementById('consoleLog');
  const inputSection = document.getElementById('inputSection');
  const boostOverlay = document.getElementById('boostOverlay');
  const boostBtn = document.getElementById('boostBtn');
  const pointsDisplay = document.getElementById('pointsDisplay');
  const adModal = document.getElementById('adModal');
  const adPlayer = document.getElementById('adPlayer');
  const vipBadge = document.getElementById('vipBadge');

  // State
  let currentLevel = 0;
  let currentScore = 0;
  let currentPoints = 20;
  let isVip = false;
  let vipDailyLimitReached = false;
  let currentBoostCost = 50;

  // Input Handling
  urlInput.addEventListener('input', (e) => {
    clearBtn.classList.toggle('hidden', e.target.value.length === 0);
  });

  function clearText() {
    urlInput.value = '';
    clearBtn.classList.add('hidden');
    urlInput.focus();
  }

  async function pasteText() {
    try {
      const text = await navigator.clipboard.readText();
      urlInput.value = text;
      clearBtn.classList.remove('hidden');
    } catch (err) {
      alert('请手动粘贴');
    }
  }

  function startAnalysis() {
    const val = urlInput.value.trim();
    if (!val) {
      urlInput.focus();
      return;
    }

    let mockName = "未知用户";
    try {
      const nameMatch = val.match(/【(.*?)】/) || val.match(/看看(.*?)的/);
      if(nameMatch) mockName = nameMatch[1];
      else mockName = "抖音用户" + Math.floor(Math.random() * 1000);
    } catch(e) { mockName = "抖音用户"; }

    analyzeBtn.disabled = true;
    analyzeBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> 处理中...`;

    inputSection.classList.add('hidden');
    loadingSection.classList.remove('hidden');

    const steps = ["连接服务器...", "获取公开数据...", "计算权重模型...", "生成报告..."];
    let stepIndex = 0;
    const logInterval = setInterval(() => {
      if (stepIndex < steps.length) {
        consoleLog.innerText = `> ${steps[stepIndex]}`;
        stepIndex++;
      } else {
        clearInterval(logInterval);
        finishAnalysis(mockName);
      }
    }, 500);
  }

  function finishAnalysis(name) {
    const r = Math.random();
    if (r < 0.2) currentLevel = 2;
    else if (r < 0.6) currentLevel = 3;
    else if (r < 0.9) currentLevel = 5;
    else currentLevel = 6;

    currentScore = Math.min(100, currentLevel * 10 + Math.floor(Math.random() * 10));

    updateVipUI();
    renderData(name, currentLevel, currentScore);
    updatePointsUI();

    loadingSection.classList.add('hidden');
    resultSection.classList.remove('hidden');

    updateBoostButtonState();
  }

  function toggleVip() {
    isVip = !isVip;
    updateVipUI();
    updateBoostButtonState();
    const msg = isVip ? "已切换至 VIP 模式 (无限免费提升)" : "已切换至普通模式";
    // Simple toast could be better, using alert for simplicity
    // alert(msg);
  }

  function updateVipUI() {
    const badge = document.getElementById('vipBadge');
    if(isVip) {
      badge.className = "text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold border border-amber-200 cursor-pointer";
      badge.innerHTML = `<i class="fa-solid fa-crown mr-1"></i>PRO会员`;
    } else {
      badge.className = "text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold border border-slate-200 cursor-pointer";
      badge.innerHTML = `普通用户`;
    }
  }

  function updateBoostButtonState() {
    if (currentLevel >= 9) {
      boostBtn.disabled = true;
      boostBtn.className = "w-full h-12 bg-slate-100 text-slate-400 font-bold text-sm rounded-lg flex items-center justify-center cursor-not-allowed";
      boostBtn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> 已达满级 (Lv.9)`;
    } else {
      boostBtn.disabled = false;
      if (isVip) {
        if (vipDailyLimitReached) {
          boostBtn.disabled = true;
          boostBtn.className = "w-full h-12 bg-slate-100 text-slate-400 font-bold text-sm rounded-lg flex items-center justify-center cursor-not-allowed";
          boostBtn.innerHTML = `今日 VIP 额度已用完`;
        } else {
          boostBtn.className = "w-full h-12 bg-amber-500 text-white font-bold text-sm rounded-lg btn-active shadow-sm shadow-amber-200 flex items-center justify-center gap-2 hover:bg-amber-600 transition-colors";
          boostBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> VIP 免费极速提升`;
        }
      } else {
        boostBtn.className = "w-full h-12 bg-slate-900 text-white font-bold text-sm rounded-lg btn-active shadow-sm shadow-slate-300 flex items-center justify-center gap-2 hover:bg-slate-800 transition-colors";
        boostBtn.innerHTML = `<i class="fa-solid fa-arrow-trend-up"></i> 一键提升权重 <span class="bg-white/20 px-1.5 py-0.5 rounded text-[10px] font-normal">${currentBoostCost}积分</span>`;
      }
    }
  }

  const trafficMap = {
    0: { desc: '僵尸号', color: 'text-slate-500', bg: 'bg-slate-100' },
    1: { desc: '最低权重', color: 'text-slate-500', bg: 'bg-slate-100' },
    2: { desc: '低权重', color: 'text-slate-600', bg: 'bg-slate-200' },
    3: { desc: '基础权重', color: 'text-orange-600', bg: 'bg-orange-50' },
    4: { desc: '正常权重', color: 'text-blue-600', bg: 'bg-blue-50' },
    5: { desc: '良好权重', color: 'text-blue-600', bg: 'bg-blue-50' },
    6: { desc: '优质权重', color: 'text-indigo-600', bg: 'bg-indigo-50' },
    7: { desc: '高权重', color: 'text-pink-600', bg: 'bg-pink-50' },
    8: { desc: '超高权重', color: 'text-red-600', bg: 'bg-red-50' },
    9: { desc: '顶流权重', color: 'text-green-600', bg: 'bg-green-50' }
  };

  function renderData(name, level, score) {
    const levelData = trafficMap[level];
    const money = (score * 120 + Math.random() * 1000).toFixed(0);
    const fans = (Math.random() * 50 + 1).toFixed(1) + 'w';
    const dyId = 80000000 + Math.floor(Math.random()*999999);

    if(name) {
      document.getElementById('resultName').innerText = name.substring(0, 10) + (name.length > 10 ? '...' : '');
      document.getElementById('resultAvatar').src = `https://ui-avatars.com/api/?name=${name}&background=random&color=fff`;
    }
    document.getElementById('resultId').innerText = `ID: ${dyId}`;
    document.getElementById('resultFans').innerText = fans;

    const lvlEl = document.getElementById('scoreLevel');
    lvlEl.innerText = `Lv.${level} ${levelData.desc}`;
    lvlEl.className = `text-xs font-bold px-2 py-1 rounded ${levelData.color} ${levelData.bg}`;

    const traffEl = document.getElementById('trafficLevel');
    traffEl.innerText = levelData.desc + "流量池";

    document.getElementById('scoreNum').innerText = score;
    // document.getElementById('moneyVal').innerText = money; // Removed in flat design? No wait, removed in html for flat? Let's check html.
    // Ah, money val is NOT in the flat html. Wait, I should double check.
    // I removed money card in flat design HTML block above?
    // Checking...
    // "C. Data Analysis Grid"
    // "D. Prediction"
    // "E. Keyword Cloud"
    // "F. Recent Works"
    // Yes, Money Valuation card is NOT in the HTML body of flat design. So removing references to it in JS.

    // Stats Update
    const baseView = level * 500 + Math.floor(Math.random() * 500);
    const highView = baseView * (1.5 + Math.random());
    document.getElementById('predictViews').innerText = `${baseView} ~ ${Math.floor(highView)}`;
    document.getElementById('viralProb').innerText = Math.min(99, level * 8 + Math.floor(Math.random()*10)) + '%';

    renderRadarStats(level);
    renderKeywords();
    renderRecentWorks(level);
  }

  function renderRadarStats(level) {
    const stats = [
      { name: '内容质量', color: 'bg-indigo-500', width: 0 },
      { name: '粉丝粘性', color: 'bg-blue-500', width: 0 },
      { name: '互动率', color: 'bg-purple-500', width: 0 },
      { name: '传播力', color: 'bg-pink-500', width: 0 },
      { name: '垂直度', color: 'bg-teal-500', width: 0 },
      { name: '活跃度', color: 'bg-orange-500', width: 0 },
    ];

    const container = document.getElementById('radarStats');
    container.innerHTML = stats.map(s => {
      const w = Math.min(100, Math.max(30, (level * 10) + Math.random() * 30)) + '%';
      return `
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] text-slate-500 w-12 text-right">${s.name}</span>
                        <div class="flex-1 bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="${s.color} h-full rounded-full animate-bar-grow" style="--h: 100%; width: ${w}"></div>
                        </div>
                    </div>
                `;
    }).join('');
  }

  function renderKeywords() {
    const words = ['剧情', '反转', '干货', '日常', 'Vlog', '搞笑', '情感', '治愈'];
    const container = document.getElementById('keywordCloud');
    container.innerHTML = words.sort(() => 0.5 - Math.random()).slice(0, 5).map(w =>
            `<span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded border border-slate-200">${w}</span>`
    ).join('');
  }

  function renderRecentWorks(level) {
    const container = document.getElementById('recentWorks');
    container.innerHTML = [1,2,3].map(i => {
      const status = Math.random() > 0.5 ? '正常' : '热门';
      const color = status === '热门' ? 'bg-red-500' : 'bg-slate-500';
      return `
                    <div class="aspect-[3/4] bg-slate-200 rounded-lg relative overflow-hidden group">
                        <div class="absolute inset-0 bg-slate-300"></div>
                        <div class="absolute top-1 right-1 text-[8px] text-white px-1.5 py-0.5 rounded ${color}">${status}</div>
                        <div class="absolute bottom-1 left-1 text-[10px] text-white font-bold drop-shadow-md">
                            <i class="fa-solid fa-play text-[8px]"></i> ${(Math.random()*10 * (level+1)).toFixed(1)}w
                        </div>
                    </div>
                `;
    }).join('');
  }

  // --- Points & Logic ---

  function updatePointsUI() {
    pointsDisplay.innerText = currentPoints;
  }

  function tryBoost() {
    if (currentLevel >= 9) return;

    if (isVip) {
      if (vipDailyLimitReached) {
        alert("VIP今日额度已用完");
        return;
      }
      executeBoostAnimation();
    } else {
      if (currentPoints >= currentBoostCost) {
        currentPoints -= currentBoostCost;
        updatePointsUI();
        executeBoostAnimation();
      } else {
        document.getElementById('adModalDesc').innerHTML = `当前积分 <span class="font-bold text-slate-900">${currentPoints}</span>，提升需要 <span class="font-bold text-red-500">${currentBoostCost}</span> 积分。`;
        adModal.classList.remove('hidden');
        setTimeout(() => adModal.classList.remove('opacity-0'), 10);
      }
    }
  }

  function closeAdModal() {
    adModal.classList.add('opacity-0');
    setTimeout(() => adModal.classList.add('hidden'), 200);
  }

  function watchAd() {
    closeAdModal();
    adPlayer.classList.remove('hidden');
    let t = 3;
    const el = document.getElementById('adCountdown');
    const timer = setInterval(() => {
      t--;
      el.innerText = t;
      if(t<=0) {
        clearInterval(timer);
        adPlayer.classList.add('hidden');
        currentPoints += 100;
        updatePointsUI();
        alert("获得 100 积分");
      }
    }, 1000);
  }

  function executeBoostAnimation() {
    boostOverlay.classList.remove('hidden');
    const msgs = ["优化数据节点...", "重构流量模型...", "提升权重..."];
    const status = document.getElementById('boostStatus');
    let i = 0;
    const timer = setInterval(() => {
      if(i < msgs.length) status.innerText = msgs[i++];
    }, 600);

    setTimeout(() => {
      clearInterval(timer);
      boostOverlay.classList.add('hidden');

      if(currentLevel < 9) currentLevel++;
      currentScore = Math.min(100, currentLevel * 10 + 5);

      if (isVip) vipDailyLimitReached = true;
      else currentBoostCost *= 2;

      renderData("", currentLevel, currentScore); // name empty keeps old name
      updateBoostButtonState();

      const badge = document.getElementById('weightChangeBadge');
      badge.innerText = `刚刚 +1级`;
      badge.className = "text-[10px] font-bold text-green-600 bg-green-50 px-1.5 py-0.5 rounded";

    }, 2000);
  }

  function resetApp() {
    resultSection.classList.add('hidden');
    urlInput.value = '';
    clearBtn.classList.add('hidden');
    inputSection.classList.remove('hidden');
    analyzeBtn.disabled = false;
    analyzeBtn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> 立即诊断`;

    // Reset for demo
    currentBoostCost = 50;
    vipDailyLimitReached = false;
  }

  function goToValuation() {
    if(confirm("跳转至估值系统？")) {
      // mock jump
    }
  }
</script>
</body>
</html>
