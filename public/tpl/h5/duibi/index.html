<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>账号对比 - 权重助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #e8f4f8 0%, #fff 100%);
            color: #1d1d1f;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 0;
        }

        .page {
            max-width: 440px;
            margin: 0 auto;
            padding: 10px;
            min-height: 100vh;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            padding: 10px 0 16px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: #333;
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin-right: 36px;
        }

        .header {
            text-align: center;
            padding: 16px 0 20px;
        }

        .header-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 13px;
            color: #86868b;
        }

        .input-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .input-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-card-title .num {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            font-size: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-card-title .num.b {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        .input-field {
            width: 100%;
            height: 44px;
            background: #f7f7f7;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 0 14px;
            font-size: 14px;
            color: #1d1d1f;
            outline: none;
        }

        .input-field:focus {
            border-color: #00b894;
            background: #fff;
        }

        .input-field.b:focus {
            border-color: #6c5ce7;
        }

        .submit-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn .loading {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .submit-btn.loading .loading { display: block; }
        .submit-btn.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-section {
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .result-section.show { display: block; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .compare-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .account-box {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            text-align: center;
        }

        .account-box.a { border-top: 3px solid #00b894; }
        .account-box.b { border-top: 3px solid #6c5ce7; }

        .account-box-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .account-box.a .account-box-avatar { background: linear-gradient(135deg, #00b894, #00cec9); }
        .account-box.b .account-box-avatar { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }

        .account-box-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .account-box-id {
            font-size: 11px;
            color: #999;
        }

        .compare-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .compare-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .compare-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #00b894, #00cec9);
            border-radius: 2px;
        }

        .compare-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .compare-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .compare-item-header {
            display: flex;
            justify-content: space-between;
        }

        .compare-item-name {
            font-size: 13px;
            color: #666;
        }

        .compare-item-diff {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .compare-item-diff.a-win { background: #e8f8f5; color: #00b894; }
        .compare-item-diff.b-win { background: #f0efff; color: #6c5ce7; }
        .compare-item-diff.tie { background: #f5f5f5; color: #999; }

        .compare-bar-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .compare-bar {
            flex: 1;
            height: 24px;
            background: #f5f5f5;
            border-radius: 4px;
            overflow: hidden;
        }

        .compare-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .compare-bar-fill.a { background: linear-gradient(90deg, #00b894, #00cec9); }
        .compare-bar-fill.b { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }

        .compare-value {
            width: 55px;
            font-size: 12px;
            font-weight: 600;
            text-align: right;
        }

        .compare-value.a { color: #00b894; }
        .compare-value.b { color: #6c5ce7; }

        .radar-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .radar-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radar-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #00b894, #00cec9);
            border-radius: 2px;
        }

        .radar-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.a { background: #00b894; }
        .legend-dot.b { background: #6c5ce7; }

        .radar-chart {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radar-label {
            width: 60px;
            font-size: 12px;
            color: #666;
            text-align: right;
        }

        .radar-bars {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .radar-bar {
            height: 10px;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .radar-bar.a { background: linear-gradient(90deg, #00b894, #55efc4); }
        .radar-bar.b { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }

        .conclusion-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .conclusion-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .conclusion-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(180deg, #f39c12, #f1c40f);
            border-radius: 2px;
        }

        .conclusion-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .conclusion-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        .conclusion-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .conclusion-icon.tip { background: #fff3cd; }
        .conclusion-icon.good { background: #d4edda; }

        .footer {
            text-align: center;
            padding: 24px 0;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
<main class="page">
    <nav class="nav-bar">
        <div class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>
        <span class="nav-title">账号对比</span>
    </nav>

    <header class="header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="#fff"><path d="M10 3H4a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1zM9 9H5V5h4v4zm11-6h-6a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1zm-1 6h-4V5h4v4zm-9 4H4a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1zm-1 6H5v-4h4v4zm8-6c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
        </div>
        <h1>账号数据对比</h1>
        <p>多维度分析两个账号差异</p>
    </header>

    <div class="input-card">
        <div class="input-card-title">
            <span class="num">A</span>
            <span>账号A</span>
        </div>
        <input type="text" class="input-field" id="inputA" placeholder="请输入抖音号或粘贴主页链接">
    </div>

    <div class="input-card">
        <div class="input-card-title">
            <span class="num b">B</span>
            <span>账号B</span>
        </div>
        <input type="text" class="input-field b" id="inputB" placeholder="请输入抖音号或粘贴主页链接">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="compareAccounts()">
        <span class="loading"></span>
        <span class="btn-text">开始对比</span>
    </button>

    <section class="result-section" id="resultSection">
        <div class="compare-header">
            <div class="account-box a">
                <div class="account-box-avatar">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="account-box-name" id="nameA">账号A</div>
                <div class="account-box-id" id="idA">--</div>
            </div>
            <div class="account-box b">
                <div class="account-box-avatar">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="account-box-name" id="nameB">账号B</div>
                <div class="account-box-id" id="idB">--</div>
            </div>
        </div>

        <div class="compare-card">
            <div class="compare-title">核心数据对比</div>
            <div class="compare-list" id="compareList"></div>
        </div>

        <div class="radar-card">
            <div class="radar-title">能力对比</div>
            <div class="radar-legend">
                <div class="legend-item"><span class="legend-dot a"></span><span id="legendA">账号A</span></div>
                <div class="legend-item"><span class="legend-dot b"></span><span id="legendB">账号B</span></div>
            </div>
            <div class="radar-chart" id="radarChart"></div>
        </div>

        <div class="conclusion-card">
            <div class="conclusion-title">分析结论</div>
            <div class="conclusion-list" id="conclusionList"></div>
        </div>
    </section>

    <footer class="footer">AI智能分析 · 权重助手</footer>
</main>

<script>
    const inputA = document.getElementById('inputA');
    const inputB = document.getElementById('inputB');
    const submitBtn = document.getElementById('submitBtn');
    const resultSection = document.getElementById('resultSection');

    function formatNumber(num) {
        if (num >= 100000000) return (num / 100000000).toFixed(1) + '亿';
        if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
        return num.toString();
    }

    function compareAccounts() {
        const valueA = inputA.value.trim();
        const valueB = inputB.value.trim();
        if (!valueA || !valueB) {
            alert('请输入两个账号进行对比');
            return;
        }

        submitBtn.classList.add('loading');
        submitBtn.disabled = true;

        setTimeout(() => {
            const dataA = generateMockData(valueA, 'A');
            const dataB = generateMockData(valueB, 'B');
            updateResult(dataA, dataB);
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
            resultSection.classList.add('show');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 1500);
    }

    function generateMockData(accountId, type) {
        const base = type === 'A' ? 1 : 0.8 + Math.random() * 0.4;
        return {
            id: accountId.length > 12 ? accountId.substring(0, 12) + '...' : accountId,
            name: '创作者_' + Math.random().toString(36).substring(2, 6),
            fans: Math.floor((Math.random() * 500000 + 50000) * base),
            likes: Math.floor((Math.random() * 2000000 + 100000) * base),
            works: Math.floor((Math.random() * 200 + 30) * base),
            avgPlays: Math.floor((Math.random() * 100000 + 10000) * base),
            avgLikes: Math.floor((Math.random() * 5000 + 500) * base),
            engagement: (Math.random() * 10 + 3).toFixed(1),
            abilities: {
                content: Math.floor(Math.random() * 40 + 60),
                interact: Math.floor(Math.random() * 40 + 50),
                growth: Math.floor(Math.random() * 40 + 40),
                influence: Math.floor(Math.random() * 40 + 50),
                activity: Math.floor(Math.random() * 40 + 60)
            }
        };
    }

    function updateResult(dataA, dataB) {
        document.getElementById('nameA').textContent = dataA.name;
        document.getElementById('idA').textContent = dataA.id;
        document.getElementById('nameB').textContent = dataB.name;
        document.getElementById('idB').textContent = dataB.id;
        document.getElementById('legendA').textContent = dataA.name;
        document.getElementById('legendB').textContent = dataB.name;

        const compareData = [
            { name: '粉丝数', a: dataA.fans, b: dataB.fans },
            { name: '获赞数', a: dataA.likes, b: dataB.likes },
            { name: '作品数', a: dataA.works, b: dataB.works },
            { name: '平均播放', a: dataA.avgPlays, b: dataB.avgPlays },
            { name: '平均点赞', a: dataA.avgLikes, b: dataB.avgLikes },
            { name: '互动率', a: parseFloat(dataA.engagement), b: parseFloat(dataB.engagement), suffix: '%' }
        ];

        document.getElementById('compareList').innerHTML = compareData.map(item => {
            const max = Math.max(item.a, item.b);
            const aPercent = (item.a / max * 100).toFixed(0);
            const bPercent = (item.b / max * 100).toFixed(0);
            let diffClass = 'tie', diffText = '持平';
            if (item.a > item.b) { diffClass = 'a-win'; diffText = 'A领先'; }
            else if (item.b > item.a) { diffClass = 'b-win'; diffText = 'B领先'; }
            const suffix = item.suffix || '';
            return `
                <div class="compare-item">
                    <div class="compare-item-header">
                        <span class="compare-item-name">${item.name}</span>
                        <span class="compare-item-diff ${diffClass}">${diffText}</span>
                    </div>
                    <div class="compare-bar-wrap">
                        <span class="compare-value a">${formatNumber(item.a)}${suffix}</span>
                        <div class="compare-bar"><div class="compare-bar-fill a" style="width:${aPercent}%"></div></div>
                    </div>
                    <div class="compare-bar-wrap">
                        <span class="compare-value b">${formatNumber(item.b)}${suffix}</span>
                        <div class="compare-bar"><div class="compare-bar-fill b" style="width:${bPercent}%"></div></div>
                    </div>
                </div>
            `;
        }).join('');

        const abilities = [
            { name: '内容质量', keyA: dataA.abilities.content, keyB: dataB.abilities.content },
            { name: '互动能力', keyA: dataA.abilities.interact, keyB: dataB.abilities.interact },
            { name: '成长潜力', keyA: dataA.abilities.growth, keyB: dataB.abilities.growth },
            { name: '影响力', keyA: dataA.abilities.influence, keyB: dataB.abilities.influence },
            { name: '活跃度', keyA: dataA.abilities.activity, keyB: dataB.abilities.activity }
        ];

        document.getElementById('radarChart').innerHTML = abilities.map(item => `
            <div class="radar-row">
                <span class="radar-label">${item.name}</span>
                <div class="radar-bars">
                    <div class="radar-bar a" style="width:${item.keyA}%"></div>
                    <div class="radar-bar b" style="width:${item.keyB}%"></div>
                </div>
            </div>
        `).join('');

        const conclusions = [];
        if (dataA.fans > dataB.fans) conclusions.push({ type: 'tip', text: `账号A粉丝量领先，多出${formatNumber(dataA.fans - dataB.fans)}粉丝` });
        else conclusions.push({ type: 'tip', text: `账号B粉丝量领先，多出${formatNumber(dataB.fans - dataA.fans)}粉丝` });

        if (parseFloat(dataA.engagement) > parseFloat(dataB.engagement)) conclusions.push({ type: 'good', text: '账号A的互动率更高，粉丝粘性更强' });
        else conclusions.push({ type: 'good', text: '账号B的互动率更高，粉丝粘性更强' });

        if (dataA.avgPlays > dataB.avgPlays) conclusions.push({ type: 'tip', text: '账号A的平均播放量更高，内容曝光度更好' });
        else conclusions.push({ type: 'tip', text: '账号B的平均播放量更高，内容曝光度更好' });

        document.getElementById('conclusionList').innerHTML = conclusions.map(item => `
            <div class="conclusion-item">
                <span class="conclusion-icon ${item.type}">
                    ${item.type === 'good'
                        ? '<svg viewBox="0 0 24 24" width="12" height="12" fill="#28a745"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
                        : '<svg viewBox="0 0 24 24" width="12" height="12" fill="#ffc107"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'}
                </span>
                <span>${item.text}</span>
            </div>
        `).join('');
    }

    inputB.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') compareAccounts();
    });
</script>
</body>
</html>
