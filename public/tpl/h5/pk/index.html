<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>抖音账号权重PK分析</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          animation: {
            'enter-up': 'enterUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'enter-left': 'enterLeft 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'enter-right': 'enterRight 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-soft': 'pulseSoft 2s infinite',
            'float': 'float 4s ease-in-out infinite',
            'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'scan': 'scan 2s linear infinite',
            'vs-clash': 'vsClash 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'bar-grow': 'barGrow 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'shimmer': 'shimmer 2s linear infinite',
            'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
          },
          keyframes: {
            enterUp: { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            enterLeft: { '0%': { opacity: '0', transform: 'translateX(-20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
            enterRight: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
            pulseSoft: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.6' } },
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            scan: { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(200%)' } },
            vsClash: { '0%': { transform: 'scale(3) rotate(-20deg)', opacity: '0' }, '100%': { transform: 'scale(1) rotate(0)', opacity: '1' } },
            barGrow: { '0%': { width: '0%' }, '100%': { width: 'var(--target-width)' } },
            shimmer: { '0%': { transform: 'translateX(-100%)' }, '100%': { transform: 'translateX(100%)' } },
            popIn: { '0%': { opacity: '0', transform: 'scale(0.9) translateY(20px)' }, '100%': { opacity: '1', transform: 'scale(1) translateY(0)' } }
          },
          colors: {
            pkRed: '#f43f5e', // Rose 500
            pkBlue: '#3b82f6', // Blue 500
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f8fafc;
      background-image:
              radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
              radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
              radial-gradient(at 50% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
      color: #1e293b;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 10px 15px -3px rgba(0, 0, 0, 0.03), inset 0 0 20px rgba(255, 255, 255, 0.5);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(226, 232, 240, 0.8);
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    /* 隐藏滚动条但保留功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Poster Specific Styles */
    .poster-bg {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      position: relative;
    }
    .poster-bg::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
              radial-gradient(circle at 10% 20%, rgba(244, 63, 94, 0.2) 0%, transparent 40%),
              radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.2) 0%, transparent 40%);
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center relative overflow-x-hidden selection:bg-rose-100 selection:text-rose-900">

<!-- 1. Header -->
<header class="w-full max-w-md sticky top-0 z-40 glass-panel border-b border-white/50">
  <div class="px-5 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 text-white flex items-center justify-center shadow-lg ring-2 ring-white text-sm">
        <i class="fa-solid fa-scale-balanced"></i>
      </div>
      <div>
        <h1 class="font-extrabold text-slate-800 tracking-tight text-base leading-tight">Account VS</h1>
        <p class="text-[9px] text-slate-400 font-semibold tracking-wide">权重对比分析系统</p>
      </div>
    </div>
    <div class="text-[10px] font-bold text-green-600 bg-green-50 px-3 py-1.5 rounded-full border border-green-100 flex items-center gap-1.5">
      <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
      AI Engine Ready
    </div>
  </div>
</header>

<main class="w-full max-w-md flex-1 p-5 pb-32 flex flex-col gap-6 relative">

  <!-- PK Input Stage -->
  <div id="pkInputStage" class="animate-enter-up">
    <div class="glass-panel rounded-3xl p-6 relative overflow-hidden">
      <!-- BG Decorations -->
      <div class="absolute top-0 left-0 w-32 h-32 bg-blue-500/5 rounded-full blur-3xl"></div>
      <div class="absolute bottom-0 right-0 w-32 h-32 bg-rose-500/5 rounded-full blur-3xl"></div>

      <div class="text-center mb-6 relative z-10">
        <h2 class="text-xl font-extrabold text-slate-800">账号权重对决</h2>
        <p class="text-[11px] text-slate-500 font-medium">输入两个账号，AI自动分析优劣势</p>
      </div>

      <!-- Input Wrapper -->
      <div class="relative flex flex-col gap-12 mb-6">
        <!-- Input A (Red) -->
        <div class="relative group">
          <label class="block text-[10px] font-bold text-rose-500 mb-1.5 ml-3 uppercase tracking-wider">选手 A (主账号)</label>
          <div class="relative">
            <div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-1.5 h-8 bg-rose-500 rounded-l-full shadow-sm"></div>
            <input id="pkInputA" type="text" class="glass-input w-full h-12 rounded-xl pl-4 pr-16 text-sm placeholder:text-slate-400 focus:ring-rose-200 focus:border-rose-300" placeholder="输入主账号ID...">
            <button onclick="pasteText('pkInputA')" class="absolute top-2 right-2 bg-white text-[10px] font-bold text-slate-600 px-3 py-1.5 rounded-lg border border-slate-200 active:scale-95 transition-transform">粘贴</button>
          </div>
        </div>

        <!-- VS Circle (Centered in gap) -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none">
          <div class="w-10 h-10 rounded-full bg-gradient-to-br from-slate-800 to-slate-900 border-4 border-white shadow-lg flex items-center justify-center text-white text-[10px] font-black italic">
            VS
          </div>
        </div>

        <!-- Input B (Blue) -->
        <div class="relative group">
          <label class="block text-[10px] font-bold text-blue-500 mb-1.5 ml-3 uppercase tracking-wider">选手 B (对标账号)</label>
          <div class="relative">
            <div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-1.5 h-8 bg-blue-500 rounded-l-full shadow-sm"></div>
            <input id="pkInputB" type="text" class="glass-input w-full h-12 rounded-xl pl-4 pr-16 text-sm placeholder:text-slate-400 focus:ring-blue-200 focus:border-blue-300" placeholder="输入对标账号ID...">
            <button onclick="pasteText('pkInputB')" class="absolute top-2 right-2 bg-white text-[10px] font-bold text-slate-600 px-3 py-1.5 rounded-lg border border-slate-200 active:scale-95 transition-transform">粘贴</button>
          </div>
        </div>
      </div>

      <button onclick="startPK()" class="w-full h-12 bg-gradient-to-r from-rose-500 via-purple-600 to-blue-500 hover:brightness-110 text-white font-bold text-sm rounded-xl shadow-xl shadow-purple-200 active:scale-[0.98] transition-all relative overflow-hidden group z-10">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-fire-flame-curved"></i> 开始对决分析
                </span>
        <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
      </button>
    </div>
  </div>

  <!-- PK Loading Stage -->
  <div id="pkLoadingStage" class="hidden">
    <div class="glass-panel rounded-3xl p-8 min-h-[350px] flex flex-col items-center justify-center relative overflow-hidden">
      <!-- Avatars moving towards each other -->
      <div class="flex items-center gap-8 mb-8 relative z-10">
        <div class="w-16 h-16 rounded-full bg-rose-100 border-4 border-white shadow-lg animate-enter-left flex items-center justify-center text-rose-500 text-2xl">
          <i class="fa-solid fa-user"></i>
        </div>
        <div class="text-3xl font-black italic text-slate-300 animate-pulse">VS</div>
        <div class="w-16 h-16 rounded-full bg-blue-100 border-4 border-white shadow-lg animate-enter-right flex items-center justify-center text-blue-500 text-2xl">
          <i class="fa-solid fa-user-ninja"></i>
        </div>
      </div>

      <h3 class="font-bold text-slate-800 animate-pulse text-lg">正在比对核心数据...</h3>
      <p class="text-xs text-slate-400 mt-2 font-mono" id="loadingText">Fetching public data...</p>

      <!-- Scanning Line -->
      <div class="absolute inset-0 w-full h-full pointer-events-none">
        <div class="w-full h-2 bg-gradient-to-b from-transparent via-purple-500/20 to-transparent absolute top-0 animate-scan"></div>
      </div>
    </div>
  </div>

  <!-- PK Result Stage -->
  <div id="pkResultStage" class="hidden space-y-5">

    <!-- 1. The Head-to-Head Header -->
    <div class="glass-panel p-4 rounded-[24px] relative overflow-visible mt-4">
      <div class="absolute left-1/2 top-0 -translate-x-1/2 -translate-y-1/2 z-20 animate-vs-clash" style="animation-delay: 0.3s">
        <div class="w-14 h-14 bg-gradient-to-br from-slate-900 to-black rounded-full border-4 border-white flex items-center justify-center shadow-xl">
          <span class="text-white font-black italic text-lg">VS</span>
        </div>
      </div>

      <div class="flex justify-between items-end pt-4">
        <!-- Player A -->
        <div class="flex flex-col items-center w-[45%]">
          <div class="relative mb-2 animate-enter-left">
            <img id="resAvatarA" src="" class="w-16 h-16 rounded-full border-[3px] border-rose-500 p-0.5 object-cover shadow-lg shadow-rose-200 bg-white">
            <div class="absolute -top-2 -left-2 bg-rose-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-md shadow-sm">我方</div>
          </div>
          <h3 class="font-bold text-slate-800 text-sm truncate w-full text-center" id="resNameA">--</h3>
          <div class="text-[10px] text-slate-400 font-mono" id="resIdA">ID: --</div>
        </div>

        <!-- Player B -->
        <div class="flex flex-col items-center w-[45%]">
          <div class="relative mb-2 animate-enter-right">
            <img id="resAvatarB" src="" class="w-16 h-16 rounded-full border-[3px] border-blue-500 p-0.5 object-cover shadow-lg shadow-blue-200 bg-white">
            <div class="absolute -top-2 -right-2 bg-blue-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-md shadow-sm">对方</div>
            <!-- Winner Crown (Hidden by default) -->
            <div id="crownB" class="absolute -top-6 -right-4 text-2xl text-yellow-400 drop-shadow-sm animate-bounce hidden">
              <i class="fa-solid fa-crown"></i>
            </div>
          </div>
          <h3 class="font-bold text-slate-800 text-sm truncate w-full text-center" id="resNameB">--</h3>
          <div class="text-[10px] text-slate-400 font-mono" id="resIdB">ID: --</div>
        </div>
      </div>
    </div>

    <!-- 2. The Comparison Bars -->
    <div class="glass-panel p-6 rounded-3xl animate-enter-up" style="animation-delay: 0.1s">
      <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider text-center mb-6 flex items-center justify-center gap-2">
        <span class="w-8 h-px bg-slate-200"></span>
        核心数据对比
        <span class="w-8 h-px bg-slate-200"></span>
      </h4>
      <div class="space-y-6" id="comparisonBars"></div>
    </div>

    <!-- 3. Traffic Pool Analysis -->
    <div class="glass-panel p-5 rounded-3xl animate-enter-up" style="animation-delay: 0.2s">
      <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-5 flex items-center gap-2">
        <i class="fa-solid fa-layer-group text-slate-600"></i> 流量层级侦测
      </h4>

      <div class="flex justify-between items-end relative px-2 mb-2" id="trafficPoolLevels"></div>
      <div class="w-full h-1.5 bg-slate-100 rounded-full mt-2 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-slate-200 to-slate-300 w-full"></div>
      </div>
      <p class="text-[10px] text-slate-400 text-center mt-3" id="trafficPoolVerdict"></p>
    </div>

    <!-- 4. Audience Analysis -->
    <div class="glass-panel p-5 rounded-3xl animate-enter-up" style="animation-delay: 0.25s">
      <div class="flex items-center justify-between mb-4">
        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
          <i class="fa-solid fa-users text-slate-600"></i> 粉丝画像透视
        </h4>
        <span class="text-[9px] bg-slate-100 px-2 py-1 rounded text-slate-500 font-bold">性别分布</span>
      </div>

      <div class="space-y-4">
        <!-- A Audience -->
        <div>
          <div class="flex justify-between text-[10px] text-slate-500 mb-1.5 font-medium">
            <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[6px] text-rose-500"></i> 我方粉丝</span>
            <span id="genderTextA"></span>
          </div>
          <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden flex">
            <div id="barMaleA" class="h-full bg-slate-800" style="width: 40%"></div>
            <div class="h-full bg-slate-300 flex-1"></div>
          </div>
        </div>
        <!-- B Audience -->
        <div>
          <div class="flex justify-between text-[10px] text-slate-500 mb-1.5 font-medium">
            <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-[6px] text-blue-500"></i> 对方粉丝</span>
            <span id="genderTextB"></span>
          </div>
          <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden flex">
            <div id="barMaleB" class="h-full bg-slate-800" style="width: 30%"></div>
            <div class="h-full bg-slate-300 flex-1"></div>
          </div>
        </div>
      </div>

      <div class="mt-4 flex flex-wrap gap-2" id="audienceTags"></div>
    </div>

    <!-- 5. Publishing Habits -->
    <div class="glass-panel p-4 rounded-3xl flex items-center justify-between animate-enter-up" style="animation-delay: 0.3s">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl bg-orange-50 text-orange-500 flex items-center justify-center">
          <i class="fa-regular fa-clock"></i>
        </div>
        <div>
          <div class="text-[10px] text-slate-400 font-bold uppercase">黄金发布时间</div>
          <div class="text-sm font-bold text-slate-800" id="bestTimeText"></div>
        </div>
      </div>
      <div class="h-8 w-px bg-slate-100"></div>
      <div class="text-right">
        <div class="text-[10px] text-slate-400 font-bold uppercase">日均更新</div>
        <div class="text-sm font-bold text-slate-800" id="updateFreqText"></div>
      </div>
    </div>

    <!-- 6. AI Verdict -->
    <div class="glass-panel p-0 rounded-3xl overflow-hidden animate-enter-up" style="animation-delay: 0.35s">
      <div class="bg-gradient-to-r from-slate-900 to-slate-800 p-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center text-yellow-300">
            <i class="fa-solid fa-robot"></i>
          </div>
          <span class="text-white font-bold text-sm">AI 诊断结论</span>
        </div>
        <span class="text-[10px] text-slate-400 bg-white/5 px-2 py-1 rounded border border-white/10">基于 7 维模型</span>
      </div>
      <div class="p-5">
        <p class="text-sm text-slate-600 leading-relaxed font-medium" id="aiVerdictText"></p>
        <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
          <div class="text-center">
            <span class="block text-[10px] text-slate-400 font-medium">综合胜率</span>
            <span class="text-xl font-black text-slate-800" id="winRate"></span>
          </div>
          <div class="text-center">
            <span class="block text-[10px] text-slate-400 font-medium">建议操作</span>
            <span class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded mt-1 border border-green-100">
                            <i class="fa-solid fa-lightbulb mr-1"></i><span id="adviceTag"></span>
                        </span>
          </div>
        </div>
      </div>
    </div>

    <!-- 7. Action Buttons -->
    <div class="grid grid-cols-2 gap-3 animate-enter-up" style="animation-delay: 0.4s">
      <button onclick="showPoster()" class="py-3.5 bg-white border border-slate-200 rounded-2xl text-xs font-bold text-slate-600 shadow-sm hover:bg-slate-50 transition-colors flex items-center justify-center gap-1.5 active:scale-95">
        <i class="fa-solid fa-share-nodes text-blue-500"></i> 生成分享海报
      </button>
      <button onclick="resetPK()" class="py-3.5 bg-slate-900 text-white rounded-2xl text-xs font-bold shadow-lg shadow-slate-300 active:scale-95 transition-all flex items-center justify-center gap-1.5">
        <i class="fa-solid fa-rotate-right"></i> 开始新一轮分析
      </button>
    </div>
  </div>
</main>

<!-- Poster Modal -->
<div id="posterModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closePoster()"></div>

  <!-- Poster Content -->
  <div class="relative w-full max-w-[340px] animate-pop-in">
    <div class="poster-bg rounded-[24px] overflow-hidden shadow-2xl shadow-blue-900/50 text-white relative">
      <!-- Header -->
      <div class="p-6 pb-2 text-center relative z-10">
        <div class="inline-flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full border border-white/20 mb-2">
          <i class="fa-solid fa-scale-balanced text-[10px] text-yellow-300"></i>
          <span class="text-[10px] font-bold tracking-wider uppercase">Account VS Analysis</span>
        </div>
        <h2 class="text-2xl font-black italic tracking-tighter">账号权重对决</h2>
      </div>

      <!-- VS Visual -->
      <div class="relative h-32 flex items-center justify-center mt-2">
        <!-- Line -->
        <div class="absolute w-full h-px bg-white/10"></div>

        <!-- Avatar A -->
        <div class="absolute left-6 top-1/2 -translate-y-1/2 flex flex-col items-center">
          <div class="w-16 h-16 rounded-full border-2 border-rose-500 p-0.5 bg-white/10 backdrop-blur">
            <img id="posterAvatarA" class="w-full h-full rounded-full object-cover">
          </div>
          <span class="text-[10px] font-bold mt-1 max-w-[80px] truncate" id="posterNameA"></span>
        </div>

        <!-- VS -->
        <div class="relative z-10 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg shadow-black/20">
          <span class="text-slate-900 font-black italic text-lg">VS</span>
        </div>

        <!-- Avatar B -->
        <div class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col items-center">
          <div class="w-16 h-16 rounded-full border-2 border-blue-500 p-0.5 bg-white/10 backdrop-blur">
            <img id="posterAvatarB" class="w-full h-full rounded-full object-cover">
          </div>
          <span class="text-[10px] font-bold mt-1 max-w-[80px] truncate" id="posterNameB"></span>
        </div>
      </div>

      <!-- Verdict Card -->
      <div class="mx-4 mt-2 bg-white/10 backdrop-blur-md rounded-2xl p-5 border border-white/10">
        <div class="flex justify-between items-end mb-3 pb-3 border-b border-white/10">
          <div>
            <div class="text-[9px] text-slate-300 font-medium uppercase mb-0.5">综合胜率</div>
            <div class="text-3xl font-black text-yellow-300" id="posterWinRate"></div>
          </div>
          <div class="text-right">
            <div class="text-[9px] text-slate-300 font-medium uppercase mb-1">建议策略</div>
            <div class="text-xs font-bold bg-green-500 text-white px-2 py-1 rounded" id="posterAdvice"></div>
          </div>
        </div>
        <p class="text-[10px] text-slate-200 leading-relaxed font-medium" id="posterVerdict">
          <!-- Verdict Text -->
        </p>
      </div>

      <!-- Footer -->
      <div class="p-5 flex items-center justify-between">
        <div>
          <div class="font-extrabold text-sm tracking-tight">TikMaster Pro</div>
          <div class="text-[9px] text-slate-400">AI 驱动的账号诊断引擎</div>
        </div>
        <!-- Fake QR -->
        <div class="w-10 h-10 bg-white p-1 rounded-lg">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TikMasterPro" class="w-full h-full">
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <button onclick="closePoster()" class="w-full mt-4 bg-white text-slate-900 font-bold py-3 rounded-xl shadow-lg hover:bg-slate-100 transition-colors text-sm">
      <i class="fa-solid fa-download mr-1"></i> 保存图片 (模拟)
    </button>
  </div>
</div>

<script>
  // --- State ---
  let currentPKData = null;

  // --- Helpers ---
  async function pasteText(elementId) {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById(elementId).value = text;
    } catch (err) {
      alert('请长按输入框手动粘贴');
    }
  }

  function shake(el) {
    el.parentElement.classList.add('translate-x-[-5px]');
    setTimeout(() => el.parentElement.classList.remove('translate-x-[-5px]'), 100);
    setTimeout(() => el.parentElement.classList.add('translate-x-[5px]'), 200);
    setTimeout(() => el.parentElement.classList.remove('translate-x-[5px]'), 300);
  }

  // --- PK Logic ---
  function startPK() {
    const inA = document.getElementById('pkInputA');
    const inB = document.getElementById('pkInputB');

    if(!inA.value.trim()) { shake(inA); return; }
    if(!inB.value.trim()) { shake(inB); return; }

    document.getElementById('pkInputStage').classList.add('hidden');
    document.getElementById('pkLoadingStage').classList.remove('hidden');

    // Fake Loading Steps
    const loadingText = document.getElementById('loadingText');
    const steps = [
      "正在抓取 A 账号数据...",
      "正在抓取 B 账号数据...",
      "正在比对 7 维数据模型...",
      "AI 正在生成策略建议..."
    ];

    let step = 0;
    const interval = setInterval(() => {
      if (step < steps.length) {
        loadingText.innerText = steps[step];
        step++;
      }
    }, 600);

    setTimeout(() => {
      clearInterval(interval);
      renderPKResults(inA.value, inB.value);
    }, 2500);
  }

  function renderPKResults(nameA_val, nameB_val) {
    document.getElementById('pkLoadingStage').classList.add('hidden');
    document.getElementById('pkResultStage').classList.remove('hidden');

    // Mock Data Generation
    const dataA = generateMockData(nameA_val || "用户A");
    const dataB = generateMockData(nameB_val || "用户B");

    // 1. Set Header Info
    document.getElementById('resNameA').innerText = dataA.name;
    document.getElementById('resIdA').innerText = "ID: " + dataA.id;
    document.getElementById('resAvatarA').src = `https://ui-avatars.com/api/?name=${dataA.name}&background=f43f5e&color=fff&size=128`;

    document.getElementById('resNameB').innerText = dataB.name;
    document.getElementById('resIdB').innerText = "ID: " + dataB.id;
    document.getElementById('resAvatarB').src = `https://ui-avatars.com/api/?name=${dataB.name}&background=3b82f6&color=fff&size=128`;

    // 2. Render Comparison Bars
    const container = document.getElementById('comparisonBars');
    container.innerHTML = '';

    const metrics = [
      { label: '粉丝量级', key: 'fans', format: (v) => v + 'w' },
      { label: '作品平均赞', key: 'avgLike', format: (v) => v },
      { label: '互动率', key: 'engagement', format: (v) => v + '%' },
      { label: '账号权重分', key: 'weight', format: (v) => v },
    ];

    let winsA = 0;
    let winsB = 0;

    metrics.forEach((m, idx) => {
      const valA = dataA[m.key];
      const valB = dataB[m.key];
      const total = valA + valB;
      const safeTotal = total === 0 ? 1 : total;
      const pctA = (valA / safeTotal) * 100;
      const pctB = (valB / safeTotal) * 100;

      if (valA > valB) winsA++; else if (valB > valA) winsB++;

      const html = `
                <div class="relative">
                    <div class="flex justify-between text-[10px] text-slate-400 font-bold mb-1.5 px-1">
                        <span class="${valA > valB ? 'text-rose-500' : ''}">${m.format(valA)}</span>
                        <span>${m.label}</span>
                        <span class="${valB > valA ? 'text-blue-500' : ''}">${m.format(valB)}</span>
                    </div>
                    <!-- The Bar Track -->
                    <div class="w-full h-3 bg-slate-100 rounded-full flex overflow-hidden relative">
                        <!-- Bar A -->
                        <div class="h-full bg-rose-500 rounded-l-full relative shadow-[0_0_10px_rgba(244,63,94,0.3)] z-10 animate-bar-grow flex items-center justify-end pr-1"
                             style="--target-width: ${pctA}%; width: 0%;">
                             ${valA > valB ? '<i class="fa-solid fa-caret-left text-white text-[8px] absolute -right-1.5 z-20 text-rose-500"></i>' : ''}
                        </div>
                        <!-- Divider -->
                        <div class="w-0.5 h-full bg-white z-20"></div>
                        <!-- Bar B -->
                        <div class="h-full bg-blue-500 rounded-r-full relative animate-bar-grow flex items-center pl-1 shadow-[0_0_10px_rgba(59,130,246,0.3)]"
                             style="--target-width: ${pctB}%; width: 0%; animation-delay: 0.1s">
                             ${valB > valA ? '<i class="fa-solid fa-caret-right text-white text-[8px] absolute -left-1.5 z-20 text-blue-500"></i>' : ''}
                        </div>
                    </div>
                </div>
            `;
      container.innerHTML += html;
    });

    // 3. Render Traffic Pool Analysis
    const levels = ["初始池", "推荐池", "热门池", "顶级池"];
    const poolContainer = document.getElementById('trafficPoolLevels');
    poolContainer.innerHTML = '';

    levels.forEach((lvl, idx) => {
      const isA = dataA.trafficLevel === idx;
      const isB = dataB.trafficLevel === idx;

      let badgeHTML = '';
      if(isA && isB) {
        badgeHTML = `
                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 flex items-center gap-1 bg-white border border-slate-200 shadow-sm px-1.5 py-0.5 rounded-md">
                        <span class="w-2 h-2 rounded-full bg-rose-500"></span>
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                    </div>
                 `;
      } else if(isA) {
        badgeHTML = `<div class="absolute -top-6 left-1/2 -translate-x-1/2 w-4 h-4 rounded-full bg-rose-500 border-2 border-white shadow-md flex items-center justify-center text-[8px] text-white font-bold">A</div>`;
      } else if(isB) {
        badgeHTML = `<div class="absolute -top-6 left-1/2 -translate-x-1/2 w-4 h-4 rounded-full bg-blue-500 border-2 border-white shadow-md flex items-center justify-center text-[8px] text-white font-bold">B</div>`;
      }

      const activeClass = (isA || isB) ? 'text-slate-800 font-bold' : 'text-slate-300';

      poolContainer.innerHTML += `
                <div class="relative flex-1 flex flex-col items-center">
                    ${badgeHTML}
                    <div class="w-1 h-1 bg-slate-200 rounded-full mb-1"></div>
                    <span class="text-[9px] ${activeClass}">${lvl}</span>
                </div>
            `;
    });

    const diffLevel = dataA.trafficLevel - dataB.trafficLevel;
    const verdictEl = document.getElementById('trafficPoolVerdict');
    if(diffLevel > 0) {
      verdictEl.innerHTML = `您的账号处于 <span class="font-bold text-rose-500">${levels[dataA.trafficLevel]}</span>，曝光能力优于对方。`;
    } else if (diffLevel < 0) {
      verdictEl.innerHTML = `检测到对方处于 <span class="font-bold text-blue-500">${levels[dataB.trafficLevel]}</span>，曝光层级高于您。`;
    } else {
      verdictEl.innerHTML = `双方均处于 <span class="font-bold text-slate-700">${levels[dataA.trafficLevel]}</span>，流量起跑线一致。`;
    }

    // 4. Render Audience
    document.getElementById('barMaleA').style.width = dataA.malePct + '%';
    document.getElementById('barMaleB').style.width = dataB.malePct + '%';
    document.getElementById('genderTextA').innerText = `男 ${dataA.malePct}% · 女 ${100-dataA.malePct}%`;
    document.getElementById('genderTextB').innerText = `男 ${dataB.malePct}% · 女 ${100-dataB.malePct}%`;

    const tagsContainer = document.getElementById('audienceTags');
    tagsContainer.innerHTML = '';
    const mockTags = ["高消费力", "Z世代", "精致宝妈", "科技党", "剧情控", "颜控"];
    for(let i=0; i<3; i++) {
      const t = mockTags[Math.floor(Math.random()*mockTags.length)];
      tagsContainer.innerHTML += `<span class="px-2 py-1 bg-slate-100 rounded text-[9px] text-slate-500 font-medium">#${t}</span>`;
    }

    // 5. Habits
    const hours = Math.floor(Math.random() * 5) + 17; // 17 - 21
    document.getElementById('bestTimeText').innerText = `${hours}:00 - ${hours+2}:00`;
    document.getElementById('updateFreqText').innerText = (Math.random() * 1.5 + 0.5).toFixed(1) + ' 条/天';

    // 6. Verdict & Win Rate
    const iWin = winsA >= winsB;
    const winnerName = iWin ? dataA.name : dataB.name;
    const winnerColor = iWin ? "text-rose-500" : "text-blue-500";

    let verdict = "";
    let advice = "";

    if (iWin) {
      verdict = `恭喜！您的账号 <span class="${winnerColor} font-bold">${dataA.name}</span> 在多项核心数据上表现优于对方。建议保持当前的垂直度，并重点维护 <span class="font-bold text-slate-700">评论区互动</span>。`;
      advice = "保持垂直度";
    } else {
      verdict = `注意：对方账号 <span class="${winnerColor} font-bold">${dataB.name}</span> 在流量层级和粉丝粘性上更胜一筹。系统建议您模仿对方的 <span class="font-bold text-slate-700">前3秒文案结构</span>。`;
      advice = "优化文案";
    }

    document.getElementById('adviceTag').innerText = advice;

    const txtEl = document.getElementById('aiVerdictText');
    txtEl.innerHTML = verdict;

    const totalRounds = 4;
    const winPct = (Math.max(winsA, winsB) / totalRounds * 100).toFixed(0) + "%";
    document.getElementById('winRate').innerText = winPct;

    // Save State for Poster
    currentPKData = {
      dataA, dataB, winPct, advice,
      shortVerdict: iWin ? "综合数据表现优秀，处于优势地位" : "流量层级略有差距，建议优化内容"
    };
  }

  function generateMockData(name) {
    return {
      name: name,
      id: Math.floor(Math.random() * 8999999 + 1000000),
      fans: parseFloat((Math.random() * 50 + 1).toFixed(1)),
      avgLike: Math.floor(Math.random() * 5000 + 200),
      engagement: parseFloat((Math.random() * 15 + 1).toFixed(1)),
      weight: Math.floor(Math.random() * 40 + 50),
      trafficLevel: Math.floor(Math.random() * 4), // 0-3
      malePct: Math.floor(Math.random() * 60 + 20)
    };
  }

  function resetPK() {
    document.getElementById('pkResultStage').classList.add('hidden');
    document.getElementById('pkInputStage').classList.remove('hidden');
    document.getElementById('pkInputA').value = '';
    document.getElementById('pkInputB').value = '';
  }

  // --- Poster Functions ---
  function showPoster() {
    if(!currentPKData) return;

    // Populate Data
    document.getElementById('posterAvatarA').src = `https://ui-avatars.com/api/?name=${currentPKData.dataA.name}&background=f43f5e&color=fff&size=128`;
    document.getElementById('posterAvatarB').src = `https://ui-avatars.com/api/?name=${currentPKData.dataB.name}&background=3b82f6&color=fff&size=128`;
    document.getElementById('posterNameA').innerText = currentPKData.dataA.name;
    document.getElementById('posterNameB').innerText = currentPKData.dataB.name;

    document.getElementById('posterWinRate').innerText = currentPKData.winPct;
    document.getElementById('posterAdvice').innerText = currentPKData.advice;
    document.getElementById('posterVerdict').innerText = currentPKData.shortVerdict;

    // Show Modal
    document.getElementById('posterModal').classList.remove('hidden');
  }

  function closePoster() {
    document.getElementById('posterModal').classList.add('hidden');
  }
</script>
</body>
</html>
