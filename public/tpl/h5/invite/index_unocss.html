<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>邀请有礼</title>
  <!-- UnoCSS Runtime -->
  <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime"></script>
  <!-- Reset CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@unocss/reset/tailwind.min.css">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F5F7FA;
      -webkit-tap-highlight-color: transparent;
    }
    /* 自定义垂直滚动动画，纯CSS实现 */
    @keyframes scroll-vertical {
      0%, 20% { transform: translateY(0); }
      25%, 45% { transform: translateY(-24px); }
      50%, 70% { transform: translateY(-48px); }
      75%, 95% { transform: translateY(-72px); }
      100% { transform: translateY(-72px); }
    }
    .animate-marquee {
      animation: scroll-vertical 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
  </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col max-w-md mx-auto relative bg-gray-50">

<!-- Header: 扁平化，无模糊，纯白背景 -->
<header class="w-full sticky top-0 z-50 bg-white border-b border-gray-100">
  <div class="px-5 h-14 flex items-center justify-between">
    <div class="w-8 h-8 rounded-full flex items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
      <i class="fa-solid fa-arrow-left"></i>
    </div>
    <h1 class="font-bold text-gray-900 text-base">邀请好友</h1>
    <div class="text-sm font-medium text-gray-500 hover:text-gray-900">
      规则
    </div>
  </div>
</header>

<main class="flex-1 p-5 flex flex-col gap-5 pb-32">

  <!-- Stats Card: 扁平化深色卡片，去除了流光和渐变边框 -->
  <div class="bg-gray-900 rounded-xl p-6 text-white relative overflow-hidden">
    <!-- 简单的装饰圆环，替代复杂的背景光斑 -->
    <div class="absolute -right-6 -top-6 w-24 h-24 rounded-full border-4 border-white/5"></div>

    <div class="flex justify-between items-start mb-6 relative z-10">
      <div class="flex items-center gap-2">
        <span class="text-gray-400 text-xs font-medium uppercase tracking-wider">My Rewards</span>
      </div>
      <div class="px-2 py-0.5 rounded bg-amber-400 text-gray-900 text-[10px] font-bold">
        限时翻倍
      </div>
    </div>

    <div class="flex gap-10 relative z-10">
      <div>
        <div class="text-xs text-gray-400 mb-1">累计积分</div>
        <div class="text-3xl font-bold text-white tracking-tight">2,400</div>
      </div>
      <div>
        <div class="text-xs text-gray-400 mb-1">邀请人数</div>
        <div class="text-3xl font-bold text-white tracking-tight">12</div>
      </div>
    </div>

    <div class="mt-6 pt-4 border-t border-gray-800 flex items-center justify-between text-xs text-gray-400 relative z-10">
                <span class="flex items-center gap-1">
                    邀请1人得 <span class="text-amber-400 font-bold">200</span> 积分
                </span>
      <span class="flex items-center gap-1">
                    查看明细 <i class="fa-solid fa-angle-right text-[10px]"></i>
                </span>
    </div>
  </div>

  <!-- Invitation Methods: 扁平化白色卡片，描边风格 -->
  <div class="space-y-3">
    <h3 class="font-bold text-gray-900 text-sm">选择方式</h3>

    <div class="grid grid-cols-2 gap-3">
      <!-- Method 1 -->
      <div class="bg-white border border-gray-200 rounded-xl p-5 flex flex-col items-center justify-center gap-3 text-center h-36 hover:border-blue-500 transition-colors group">
        <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-lg">
          <i class="fa-solid fa-link"></i>
        </div>
        <div>
          <div class="font-bold text-gray-900 text-sm group-hover:text-blue-600 transition-colors">复制链接</div>
          <div class="text-[10px] text-gray-400 mt-1">发送专属链接</div>
        </div>
      </div>

      <!-- Method 2 -->
      <div class="bg-white border border-gray-200 rounded-xl p-5 flex flex-col items-center justify-center gap-3 text-center h-36 hover:border-amber-500 transition-colors group">
        <div class="w-10 h-10 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center text-lg">
          <i class="fa-solid fa-image"></i>
        </div>
        <div>
          <div class="font-bold text-gray-900 text-sm group-hover:text-amber-600 transition-colors">生成海报</div>
          <div class="text-[10px] text-gray-400 mt-1">分享精美图片</div>
        </div>
      </div>
    </div>
  </div>

  <!-- How it works: 纯白背景，简单虚线 -->
  <div class="bg-white border border-gray-200 rounded-xl p-5">
    <h3 class="font-bold text-gray-900 text-sm text-center mb-6">3步得奖励</h3>

    <div class="relative">
      <!-- 静态虚线 -->
      <div class="absolute top-5 left-[15%] w-[70%] h-px border-t border-dashed border-gray-300 z-0"></div>

      <div class="grid grid-cols-3 relative z-10 gap-2">
        <!-- Step 1 -->
        <div class="flex flex-col items-center text-center gap-3">
          <div class="w-10 h-10 rounded-full bg-white border border-gray-200 text-gray-700 flex items-center justify-center text-sm font-bold z-10 shadow-sm">
            1
          </div>
          <div>
            <div class="text-xs font-bold text-gray-900 mb-0.5">发送邀请</div>
            <div class="text-[10px] text-gray-400">链接或海报</div>
          </div>
        </div>

        <!-- Step 2 -->
        <div class="flex flex-col items-center text-center gap-3">
          <div class="w-10 h-10 rounded-full bg-white border border-gray-200 text-gray-700 flex items-center justify-center text-sm font-bold z-10 shadow-sm">
            2
          </div>
          <div>
            <div class="text-xs font-bold text-gray-900 mb-0.5">好友打开</div>
            <div class="text-[10px] text-gray-400">无需注册</div>
          </div>
        </div>

        <!-- Step 3 -->
        <div class="flex flex-col items-center text-center gap-3">
          <div class="w-10 h-10 rounded-full bg-amber-50 border border-amber-100 text-amber-600 flex items-center justify-center text-sm font-bold z-10">
            <i class="fa-solid fa-check"></i>
          </div>
          <div>
            <div class="text-xs font-bold text-amber-600 mb-0.5">到账奖励</div>
            <div class="text-[10px] text-gray-400">自动发放</div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-5 text-center">
                <span class="inline-block px-3 py-1 bg-gray-50 text-gray-500 text-[10px] rounded">
                    新用户首次邀请奖励翻倍
                </span>
    </div>
  </div>

  <!-- Recent Invites: 简化的通知栏 -->
  <div class="flex items-center justify-center gap-2 py-2 px-3 bg-white border border-gray-100 rounded-full shadow-sm w-max mx-auto">
    <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
    <div class="h-6 overflow-hidden relative w-48">
      <div class="animate-marquee flex flex-col text-[10px] text-gray-500 leading-6">
        <div>用户 138****8291 获得 <span class="font-bold text-gray-900">200</span> 积分</div>
        <div>用户 159****3341 获得 <span class="font-bold text-gray-900">200</span> 积分</div>
        <div>用户 186****1102 获得 <span class="font-bold text-gray-900">400</span> 积分</div>
        <div>用户 138****8291 获得 <span class="font-bold text-gray-900">200</span> 积分</div>
      </div>
    </div>
  </div>

</main>

<!-- Bottom Action Bar: 扁平化，无毛玻璃 -->
<div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 z-40 pb-8 pt-3 px-5 shadow-none">
  <button class="w-full h-11 bg-gray-900 text-white rounded-lg font-bold hover:bg-black transition-colors flex items-center justify-center gap-2 active:scale-[0.99] transform transition-transform">
    <i class="fa-brands fa-weixin text-lg"></i>
    <span>立即邀请微信好友</span>
  </button>
  <div class="text-center mt-2.5">
    <span class="text-[10px] text-gray-400">无需填写邀请码，系统自动识别</span>
  </div>
</div>

</body>
</html>
